<h1 class="title-poem">Clown in the Moon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/dylan-thomas.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dylan Thomas</h2>
<p>My tears are like the quiet drift<br />
Of petals from some magic rose;<br />
And all my grief flows from the rift<br />
Of unremembered skies and snows.<br />
<br />
I think, that if I touched the earth,<br />
It would crumble;<br />
It is so sad and beautiful,<br />
So tremulously like a dream.</p>
