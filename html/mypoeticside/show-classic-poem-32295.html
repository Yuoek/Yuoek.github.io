<h1 class="title-poem">Answered</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ESPW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Stuart Phelps Ward</h2>
<p>Why did I never sing a song to you?<br />
Dearest! To you again, behold the question start.<br />
To mine own pulses have I ever sung? Or do<br />
I read a rhyme unto my beating heart?</p>
