<h1 class="title-poem">To heal mine aching moods</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/10/scollard.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clinton Scollard</h2>
<p>To heal mine aching moods,<br />
Give me God's virgin woods.</p>
