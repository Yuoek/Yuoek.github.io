<h1 class="title-poem">Life's Priestess</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/12/rose.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rose Hawthorne Lathrop</h2>
<p>ll to herself a woman never sings<br />
A happy song. Oh no! but it is so<br />
As when the thrush has closed down his wings<br />
Within the wood, and hears his hidden woe<br />
From his own bill fill aisles of leaves, and go<br />
About the wood and come to him again.</p>
