<h1 class="title-poem">Mengcheng Col</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>New house Mengcheng entrance<br />
Old tree surplus sorrow willow<br />
Come person again for who<br />
Only sorrow former person be  <br />
<br />
<br />
Who will come after, I do not know,<br />
He must feel sorrow for those in the past.</p>
