<h1 class="title-poem">Upon Concluded Lives</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>735<br />
<br />
Upon Concluded Lives<br />
There's nothing cooler falls—<br />
Than Life's sweet Calculations—<br />
The mixing Bells and Palls—<br />
<br />
Make Lacerating Tune—<br />
To Ears the Dying Side—<br />
'Tis Coronal—and Funeral—<br />
Saluting—in the Road—</p>
