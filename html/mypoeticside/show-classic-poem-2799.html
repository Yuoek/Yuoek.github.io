<h1 class="title-poem">A Man May Tear A Jewel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/gal-004a1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bhartrihari</h2>
<p>A man may tear a jewel<br />
                       From a sea monster's jaws,<br />
                       Cross a tumultuous sea<br />
                       Of raging tides,<br />
                       Or twine garlandwise<br />
                       A wrathful serpent on his head.<br />
                       But no man can alter<br />
                       The thoughts of an obstinate fool.</p>
