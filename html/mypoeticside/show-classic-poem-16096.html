<h1 class="title-poem">Days</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/philip_larkin.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Philip Larkin</h2>
<p>What are days for?<br />
Days are where we live.<br />
They come, they wake us<br />
Time and time over.<br />
They are to be happy in:<br />
Where can we live but days?<br />
<br />
Ah, solving that question<br />
Brings the priest and the doctor<br />
In their long coats<br />
Running over the fields.</p>
