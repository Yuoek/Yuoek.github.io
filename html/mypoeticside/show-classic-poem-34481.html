<h1 class="title-poem">The Great Figure</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>Among the rain<br />
and lights<br />
I saw the figure 5<br />
in gold<br />
on a red<br />
firetruck<br />
moving<br />
tense<br />
unheeded<br />
to gong clangs<br />
siren howls<br />
and wheels rumbling<br />
through the dark city.</p>
