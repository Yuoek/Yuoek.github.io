<h1 class="title-poem">Kin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Brother, I am fire<br />
Surging under the ocean floor.<br />
I shall never meet you, brother--<br />
Not for years, anyhow;<br />
Maybe thousands of years, brother.<br />
Then I will warm you,<br />
Hold you close, wrap you in circles,<br />
Use you and change you--<br />
Maybe thousands of years, brother.</p>
