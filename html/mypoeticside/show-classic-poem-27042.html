<h1 class="title-poem">To the Moon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/shelley-percy4.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Percy Bysshe Shelley</h2>
<p>Art thou pale for weariness<br />
Of climbing heaven and gazing on the earth,<br />
Wandering companionless<br />
Among the stars that have a different birth, -<br />
And ever changing, like a joyless eye<br />
That finds no object worth its constancy?</p>
