<h1 class="title-poem">The Goops</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Gelett-Burgess.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gelett Burgess</h2>
<p>The meanest trick I ever knew<br />
Was one I know you never do.<br />
I saw a Goop once try to do it,<br />
And there was nothing funny to it.<br />
He pulled a chair from under me<br />
As I was sitting down; but he<br />
Was sent to bed, and rightly, too.<br />
It was a horrid thing to do!</p>
