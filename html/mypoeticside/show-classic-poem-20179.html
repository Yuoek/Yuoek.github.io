<h1 class="title-poem">Inscription For A Grammar</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Christopher-Morley.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christopher Morley</h2>
<p>There were two cheerful pronouns<br />
 And nought did them disturb:<br />
Until they met, out walking.<br />
 A conjugative verb.<br />
<br />
The pronouns, child, were You and I,<br />
 We might as well confess;<br />
But, ah, the mischief-making verb<br />
 I leave to you to guess!</p>
