<h1 class="title-poem">Oh, Fair To See</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Oh, fair to see<br />
Blossom-laden cherry tree,<br />
Arrayed in sunny white;<br />
An April day's delight,<br />
Oh, fair to see!<br />
Oh, fair to see<br />
Fruit-laden cherry tree,<br />
With balls of shining red<br />
Decking a leafy head,<br />
Oh, fair to see!</p>
