<h1 class="title-poem">So proud she was to die</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>So proud she was to die<br />
  It made us all ashamed<br />
That what we cherished, so unknown<br />
  To her desire seemed.<br />
<br />
So satisfied to go<br />
  Where none of us should be,<br />
Immediately, that anguish stooped<br />
  Almost to jealousy.</p>
