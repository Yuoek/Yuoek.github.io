<h1 class="title-poem">I robbed the Woods</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>41<br />
<br />
I robbed the Woods—<br />
The trusting Woods.<br />
The unsuspecting Trees<br />
Brought out their Burs and mosses<br />
My fantasy to please.<br />
I scanned their trinkets curious—I grasped—I bore away—<br />
What will the solemn Hemlock—<br />
What will the Oak tree say?</p>
