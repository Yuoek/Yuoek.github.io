<h1 class="title-poem">Moon Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>THERE is a star that runs very fast,<br />
That goes pulling the moon<br />
Through the tops of the poplars.<br />
It is all in silver,<br />
The tall star:<br />
The moon rolls goldenly along<br />
Out of breath.<br />
Mr. Moon, does he make you hurry?</p>
