<h1 class="title-poem">Always Mine!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>839<br />
<br />
Always Mine!<br />
No more Vacation!<br />
Term of Light this Day begun!<br />
Failless as the fair rotation<br />
Of the Seasons and the Sun.<br />
<br />
Old the Grace, but new the Subjects—<br />
Old, indeed, the East,<br />
Yet upon His Purple Programme<br />
Every Dawn, is first.</p>
