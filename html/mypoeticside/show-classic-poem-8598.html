<h1 class="title-poem">Did the Harebell loose her girdle</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>213<br />
<br />
Did the Harebell loose her girdle<br />
To the lover Bee<br />
Would the Bee the Harebell hallow<br />
Much as formerly?<br />
<br />
Did the "Paradise"—persuaded—<br />
Yield her moat of pearl—<br />
Would the Eden be an Eden,<br />
Or the Earl—an Earl?</p>
