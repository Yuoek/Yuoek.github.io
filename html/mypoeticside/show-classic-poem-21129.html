<h1 class="title-poem">Burma</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/George-Orwell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">George Orwell</h2>
<p>Brush your teeth up and down, brother,<br />
Oh, brush them up and down!<br />
All the folks in London Town<br />
Brush their teeth right up and down,<br />
Oh! How they shine!<br />
Aren't they bloody fine?<br />
Night and morning, my brother,<br />
Oh brush them up and down!"</p>
