<h1 class="title-poem">Given in Marriage unto Thee</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>817<br />
<br />
Given in Marriage unto Thee<br />
Oh thou Celestial Host—<br />
Bride of the Father and the Son<br />
Bride of the Holy Ghost.<br />
<br />
Other Betrothal shall dissolve—<br />
Wedlock of Will, decay—<br />
Only the Keeper of this Ring<br />
Conquer Mortality—</p>
