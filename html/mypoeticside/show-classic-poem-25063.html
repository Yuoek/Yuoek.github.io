<h1 class="title-poem">Maybe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Maybe he believes me, maybe not.<br />
Maybe I can marry him, maybe not.<br />
<br />
Maybe the wind on the prairie,<br />
The wind on the sea, maybe,<br />
Somebody, somewhere, maybe can tell.<br />
<br />
I will lay my head on his shoulder<br />
And when he asks me I will say yes,<br />
Maybe.</p>
