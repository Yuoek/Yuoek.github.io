<h1 class="title-poem">One and One—are One</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>769<br />
<br />
One and One—are One—<br />
Two—be finished using—<br />
Well enough for Schools—<br />
But for Minor Choosing—<br />
<br />
Life—just—or Death—<br />
Or the Everlasting—<br />
More—would be too vast<br />
For the Soul's Comprising—</p>
