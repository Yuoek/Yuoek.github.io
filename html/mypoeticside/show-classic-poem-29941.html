<h1 class="title-poem">Hunched-Back Volcano</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>Red is the mouth of Pele, passionate<br />
Against the fires of the kindling stars:<br />
Fire to fire moves: the heavens wait<br />
As low to earth comes crimson-dripping Mars:<br />
They kiss in thunder, shudder, suffocate–<br />
Below men pause and listen, at their wars.</p>
