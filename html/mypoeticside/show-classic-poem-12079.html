                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>This rose is from the dust of one like me.<br />
His joy within the rose, thus I can see.<br />
My companion and confidant it is, because<br />
The colorful rose brings the sweet scent of he.</p>
