<h1 class="title-poem">A Portrait in Georgia</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Jean-Toomer.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jean Toomer</h2>
<p>Hair-braided chestnut,<br />
           coiled like a lyncher's rope,<br />
Eyes-fagots,<br />
Lips-old scars, or the first red blisters,<br />
Breath-the last sweet scent of cane,<br />
And her slim body, white as the ash<br />
           of black flesh after flame.</p>
