<h1 class="title-poem">Ione, Dead the Long Year</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>Empty are the ways,<br />
Empty are the ways of this land<br />
And the flowers<br />
         Bend over with heavy heads.<br />
They bend in vain.<br />
Empty are the ways of this land<br />
                                       Where Ione<br />
Walked once, and now does not walk<br />
But seems like a person just gone.</p>
