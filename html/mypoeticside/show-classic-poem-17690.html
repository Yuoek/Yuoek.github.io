<h1 class="title-poem">Prayer for lightning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>My corn is green with red tassels,<br />
I am praying to the lightning to ripen my corn,<br />
I am praying to the thunder which carries the lightning.<br />
Corn is sweet where lightning has fallen.<br />
I pray to the six-coloured clouds.</p>
