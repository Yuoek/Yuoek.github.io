<h1 class="title-poem">Rain Passes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yuan Mei</h2>
<p> Rain passes, washing the face of the mountain.<br />
<br />
Clouds come, the mountain's in a dream.<br />
<br />
Clouds and rain come and go as they please.<br />
<br />
Only the mountain, forever green, remains.</p>
