<h1 class="title-poem">Struggle</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Sidney-Lanier.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sidney Lanier</h2>
<p>My soul is like the oar that momently<br />
Dies in a desperate stress beneath the wave,<br />
Then glitters out again and sweeps the sea:<br />
Each second I'm new-born from some new grave.</p>
