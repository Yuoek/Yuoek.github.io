<h1 class="title-poem">Katherine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>We see you as we see a face<br />
That trembles in a forest place<br />
Upon the mirror of a pool<br />
Forever quiet, clear and cool;<br />
And in the wayward glass, appears<br />
To hover between smiles and tears,<br />
Elfin and human, airy and true,<br />
And backed by the reflected blue.</p>
