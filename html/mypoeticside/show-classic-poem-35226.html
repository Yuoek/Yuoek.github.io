<h1 class="title-poem">The Realists</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>HOPE that you may understand!<br />
What can books of men that wive<br />
In a dragon-guarded land,<br />
paintings of the dolphin-drawn<br />
Sea-nymphs in their pearly wagons<br />
Do, but awake a hope to live<br />
That had gone<br />
With the dragons?</p>
