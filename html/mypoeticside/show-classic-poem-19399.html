<h1 class="title-poem">Goodbye S.S.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/MV5BMzIwMzc3Mjk2MV5BMl5BanBnXkFtZTcwNDQwNDMxOA@@._V1_SY317_CR30214317_.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Spike Milligan</h2>
<p>Go away girl, go away<br />
   and let me pack my dreams<br />
Now where did I put those yesteryears<br />
   made up with broken seams<br />
Where shall I sweep the pieces<br />
   my God they still look new<br />
There's a taxi waiting at the door<br />
   but there's only room for you</p>
