<h1 class="title-poem">Beautiful City</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/Alfred-Lord-Tennyson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alfred Lord Tennyson</h2>
<p>Beautiful city, the centre and crater of European confusion,<br />
O you with your passionate shriek for the rights of an equal<br />
    humanity,<br />
How often your Re-volution has proven but E-volution<br />
Roll’d again back on itself in the tides of a civic insanity!<br />
</p>
