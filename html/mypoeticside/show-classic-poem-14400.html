<h1 class="title-poem">A Suggestion to My Friend, Liu</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>There's a gleam of green in an old bottle,<br />
There's a stir of red in the quiet stove,<br />
There's a feeling of snow in the dusk outside --<br />
What about a cup of wine inside?</p>
