<h1 class="title-poem">Meditatio</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>When I carefully consider the curious habits of dogs<br />
I am compelled to conclude<br />
That man is the superior animal.<br />
<br />
When I consider the curious habits of man<br />
I confess, my friend, I am puzzled.</p>
