<h1 class="title-poem">If Stars Dropped Out Of Heaven</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>If stars dropped out of heaven,<br />
And if flowers took their place,<br />
The sky would still look very fair,<br />
And fair earth's face.<br />
Winged angels might fly down to us<br />
To pluck the stars,<br />
Be we could only long for flowers<br />
Beyond the cloudy bars.</p>
