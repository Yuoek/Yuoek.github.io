<h1 class="title-poem">Ho Chih-chang</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>When we met the first time at Ch’ang-an<br />
       He called me the ‘Lost Immortal’.<br />
       Then he loved the Way of Forgetting.<br />
       Now under the pine-trees he is dust.<br />
       His golden keepsake bought us wine.<br />
       Remembering, the tears run down my cheeks.</p>
