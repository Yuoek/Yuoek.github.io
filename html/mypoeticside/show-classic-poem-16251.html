<h1 class="title-poem">Search for Truth</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/lawrence.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">D.H. Lawrence</h2>
<p>Search for nothing any more, nothing<br />
except truth.<br />
Be very still, and try and get at the truth.<br />
<br />
And the first question to ask yourself is:<br />
How great a liar am I?</p>
