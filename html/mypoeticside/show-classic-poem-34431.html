<h1 class="title-poem">To a Friend</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>Well, Lizzie Anderson! seventeen men--and<br />
the baby hard to find a father for!<br />
<br />
What will the good Father in Heaven say<br />
to the local judge if he do not solve this problem?<br />
A little two-pointed smile and--pouff!--<br />
the law is changed into a mouthful of phrases.</p>
