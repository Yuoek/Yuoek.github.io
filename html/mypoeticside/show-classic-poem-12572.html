<h1 class="title-poem">Chapter Heading</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Ernest-Hemingway.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ernest Hemingway</h2>
<p>For we have thought the larger thoughts<br />
<br />
    And gone the shorter way.<br />
<br />
And we have danced to devil's tunes,<br />
<br />
    Shivering home to pray;<br />
<br />
To serve one master in the night,<br />
<br />
    Another in the day.</p>
