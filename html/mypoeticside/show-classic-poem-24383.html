<h1 class="title-poem">How Long</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>How long will you think about this painful life?<br />
How long will you think about this harmful world?<br />
The only thing it can take from you is your body.<br />
Don't say all this rubbish and stop thinking.</p>
