<h1 class="title-poem">The Skeleton</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/G-K-Chesterton.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gilbert Keith Chesterton</h2>
<p>Chattering finch and water-fly<br />
Are not merrier than I;<br />
Here among the flowers I lie<br />
Laughing everlastingly.<br />
No; I may not tell the best;<br />
Surely, friends, I might have guessed<br />
Death was but the good King's jest,<br />
It was hid so carefully.</p>
