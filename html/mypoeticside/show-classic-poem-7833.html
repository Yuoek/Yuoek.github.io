<h1 class="title-poem">A nearness to Tremendousness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>963<br />
<br />
A nearness to Tremendousness—<br />
An Agony procures—<br />
Affliction ranges Boundlessness—<br />
Vicinity to Laws<br />
<br />
Contentment's quiet Suburb—<br />
Affliction cannot stay<br />
In Acres—Its Location<br />
Is Illocality—</p>
