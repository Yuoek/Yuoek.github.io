<h1 class="title-poem">New Year's Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/maozedong.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mao Zedong</h2>
<p>Ninghua, Qingliu, Guihua --<br />
What narrow paths, deep woods and slippery moss!<br />
Whither are we bound today?<br />
Straight to the foot of Wuyi Mountain.<br />
To the mountain, the foot of the mountain,<br />
Red flags stream in the wind in a blaze of glory.</p>
