<h1 class="title-poem">Jenny kiss'd Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/leighhunt.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Leigh Hunt</h2>
<p>JENNY kiss'd me when we met,<br />
 Jumping from the chair she sat in;<br />
Time, you thief, who love to get<br />
 Sweets into your list, put that in!<br />
Say I'm weary, say I'm sad,<br />
 Say that health and wealth have miss'd me,<br />
Say I'm growing old, but add,<br />
   Jenny kiss'd me.</p>
