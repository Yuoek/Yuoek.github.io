<h1 class="title-poem">Daphne</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>Why do you follow me?—<br />
Any moment I can be<br />
Nothing but a laurel-tree.<br />
<br />
Any moment of the chase<br />
I can leave you in my place<br />
A pink bough for your embrace.<br />
<br />
Yet if over hill and hollow<br />
Still it is your will to follow,<br />
I am off;—to heel, Apollo!</p>
