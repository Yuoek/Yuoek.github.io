                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>To Walter Savage Landor<br />
<br />
<br />
<br />
Ah, Walter, where you lived I rue<br />
<br />
These days come all too late for me;<br />
<br />
What matter if her eyes were blue<br />
<br />
Whose rival is Persephone?<br />
<br />
<br />
Fiesole, 1909</p>
