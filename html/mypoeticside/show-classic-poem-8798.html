<h1 class="title-poem">I had no time to hate, because</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I had no time to hate, because<br />
The grave would hinder me,<br />
And life was not so ample I<br />
Could finish enmity.<br />
<br />
Nor had I time to love, but since<br />
Some industry must be,<br />
The little toil of love, I thought,<br />
Was large enough for me.</p>
