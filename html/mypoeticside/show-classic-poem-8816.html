<h1 class="title-poem">My life closed twice before its close;</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>My life closed twice before its close;<br />
  It yet remains to see<br />
If Immortality unveil<br />
  A third event to me,<br />
<br />
So huge, so hopeless to conceive,<br />
  As these that twice befell.<br />
Parting is all we know of heaven,<br />
  And all we need of hell.</p>
