<h1 class="title-poem">Pensive And Faltering</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>PENSIVE and faltering,<br />
The words, the dead, I write;<br />
For living are the Dead;<br />
(Haply the only living, only real,<br />
And I the apparition--I the spectre.)</p>
