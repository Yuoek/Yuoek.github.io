<h1 class="title-poem">Celebration</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>This is our time.<br />
We women and men<br />
Here once and only once<br />
Celebrate our time<br />
In song.<br />
Gather together,<br />
Make the swift day<br />
Rich; the life<br />
Full; find company<br />
Dear to the heart<br />
This is our day,<br />
Our own our only time<br />
Together we make<br />
Today.</p>
