<h1 class="title-poem">Being Young And Green</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>Being Young and Green, I said in love's despite:<br />
Never in the world will I to living wight<br />
Give over, air my mind<br />
To anyone,<br />
Hang out its ancient secrets in the strong wind<br />
To be shredded and faded—<br />
<br />
Oh, me, invaded<br />
And sacked by the wind and the sun!</p>
