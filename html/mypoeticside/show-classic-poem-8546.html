<h1 class="title-poem">A transport one cannot contain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>184<br />
<br />
A transport one cannot contain<br />
May yet a transport be—<br />
Though God forbid it lift the lid—<br />
Unto its Ecstasy!<br />
<br />
A Diagram—of Rapture!<br />
A sixpence at a Show—<br />
With Holy Ghosts in Cages!<br />
The Universe would go!</p>
