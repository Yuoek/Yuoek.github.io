<h1 class="title-poem">2</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nelly-Sachs.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nelly Sachs</h2>
<p>O the chimneys<br />
On the ingeniously devised habitations of death<br />
When Israel’s body drifted as smoke<br />
Through the air —</p>
