<h1 class="title-poem">Helen's Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/pjb.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Philip James Bailey</h2>
<p>The Rose is<br />
Weeping for her love,<br />
The nightingale.<br />
<br />
And he is flying<br />
Fast above,<br />
To her he will<br />
Not fail.<br />
<br />
Already golden<br />
Eve appears;<br />
He wings his way along;<br />
<br />
Ah! look he comes<br />
To kiss her tears,<br />
And soothe her<br />
With his song.</p>
