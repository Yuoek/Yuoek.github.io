<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Admonition 14</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Swallow not the deception of a foe. Purchase not conceit from a panegyrist. The one has laid out a snare for provisions and the other has opened the jaws of covetousness.</p>
