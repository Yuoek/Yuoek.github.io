<h1 class="title-poem">Mating Saliva</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>A girl in a green mini-<br />
skirt, not very pretty, walks<br />
down the street.<br />
<br />
A businessman stops, turns<br />
to stare at her ass<br />
that looks like a moldy<br />
refrigerator.<br />
<br />
There are now 200,000,000 people<br />
in America.</p>
