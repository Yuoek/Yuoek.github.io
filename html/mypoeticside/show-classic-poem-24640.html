<h1 class="title-poem">Ch 03 On The Excellence Of Contentment Story 27</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>A thief said to a mendicant: ‘Art thou not ashamed to stretch out thy hand for a grain of silver to every sordid fellow?’ He replied:<br />
<br />
            ‘To hold out the hand for a grain of silver  <br />
             Is better than to get it cut off for one dane and a half.’</p>
