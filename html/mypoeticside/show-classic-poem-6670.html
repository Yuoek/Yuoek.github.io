<h1 class="title-poem">Fresher</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Than spring's new scents<br />
<br />
The winter's earliest wind<br />
<br />
Blows from the hills the first faint breath<br />
<br />
Of Snow.<br />
<br />
<br />
<br />
<br />
<br />
Why have I<br />
<br />
thought the dew<br />
<br />
Ephemeral when I<br />
<br />
Shall rest so short a time, myself,<br />
<br />
On earth?</p>
