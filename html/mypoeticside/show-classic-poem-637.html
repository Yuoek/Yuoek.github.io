<h1 class="title-poem">A Dedication</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Aldrich.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Bailey Aldrich</h2>
<p>Take these rhymes into thy grace, <br />
Since they are of thy begetting, <br />
Lady, that dost make each place <br />
Where thou art a jewel's setting.<br />
<br />
Some such glamour lend this Book; <br />
Let it be thy poet's wages <br />
That henceforth thy gracious look <br />
Lies reflected on its pages.</p>
