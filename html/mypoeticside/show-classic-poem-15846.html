<h1 class="title-poem">Proud Word You Never Spoke</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>Proud word you never spoke, but you will speak<br />
Four not exempt from pride some future day.<br />
Resting on one white hand a warm wet cheek,<br />
Over my open volume you will say,<br />
'This man loved me'—then rise and trip away.</p>
