<h1 class="title-poem">A Dream</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/12/blind.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mathilde Blind</h2>
<p>Only a dream, a beautiful baseless dream;<br />
           Only a bright<br />
Flash from your eyes, a brief electrical gleam,<br />
           Charged with delight.<br />
<br />
Only a waking, alone, in the moon's last gleam<br />
           Fading from sight;<br />
Only a flooding of tears that shudder and stream<br />
           Fast through the night.</p>
