<h1 class="title-poem">In the desert</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>In the desert<br />
I saw a creature, naked, bestial,<br />
who, squatting upon the ground,<br />
Held his heart in his hands,<br />
And ate of it.<br />
I said, "Is it good, friend?"<br />
"It is bitter -- bitter," he answered;<br />
"But I like it<br />
Because it is bitter,<br />
And because it is my heart."</p>
