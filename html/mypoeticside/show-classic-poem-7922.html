<h1 class="title-poem">How far is it to Heaven?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>929<br />
<br />
How far is it to Heaven?<br />
As far as Death this way—<br />
Of River or of Ridge beyond<br />
Was no discovery.<br />
<br />
How far is it to Hell?<br />
As far as Death this way—<br />
How far left hand the Sepulchre<br />
Defies Topography.</p>
