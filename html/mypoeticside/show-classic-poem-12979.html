<h1 class="title-poem">Mean In Our Mean</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Though frankincense the deities require,<br />
We must not give all to the hallow'd fire.<br />
Such be our gifts, and such be our expense,<br />
As for ourselves to leave some frankince</p>
