<h1 class="title-poem">Epitaph</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>As a boy, reserved and naughty;<br />
As a youth, a coxcomb and haughty;<br />
As a man, for action inclined;<br />
As a greybeard, fickle in mind.--<br />
Upon thy grave will people read:<br />
This was a very man, indeed!</p>
