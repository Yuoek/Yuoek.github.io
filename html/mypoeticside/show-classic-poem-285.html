<h1 class="title-poem">The Magyar Messiahs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ady.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Endre Ady</h2>
<p>More bitter is our weeping, <br />
different the griefs that try us. <br />
A thousand times Messiahs <br />
are the Magyar Messiahs. <br />
A thousand times they perish, <br />
unblest their crucifixition, <br />
for vain was their affliction, <br />
oh, vain was their affliction.</p>
