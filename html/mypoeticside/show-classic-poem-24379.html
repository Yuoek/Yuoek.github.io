<h1 class="title-poem">Out of Your Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Out of your love the fire of youth will rise.<br />
In the chest, visions of the soul will rise.<br />
If you are going to kill me, kill me, it is alright.<br />
When the friend kills, a new life will rise.</p>
