<h1 class="title-poem">Bjarni, Goodbye!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jonas Hallgrimsson</h2>
<p>Leaping upward like a spark,<br />
light and fleet --- none fleeter! ---<br />
my poet fled this dirty, dark<br />
den of kitchen fetor.</p>
