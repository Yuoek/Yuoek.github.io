<h1 class="title-poem">Germany And Her Princes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Thou hast produced mighty monarchs, of whom thou art not unworthy,<br />
      For the obedient alone make him who governs them great.<br />
But, O Germany, try if thou for thy rulers canst make it<br />
      Harder as kings to be great,--easier, though, to be men!</p>
