<h1 class="title-poem">Aftermath of Mining Days</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Clark-Ashton-Smith.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clark Ashton Smith</h2>
<p>Monotonously rolled<br />
On the hills the broom<br />
Spreads its many-acred gold.</p>
