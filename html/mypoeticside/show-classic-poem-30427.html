<h1 class="title-poem">The Look</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Strephon kissed me in the spring,<br />
  Robin in the fall,<br />
But Colin only looked at me<br />
  And never kissed at all.<br />
<br />
Strephon's kiss was lost in jest,<br />
  Robin's lost in play,<br />
But the kiss in Colin's eyes<br />
  Haunts me night and day.</p>
