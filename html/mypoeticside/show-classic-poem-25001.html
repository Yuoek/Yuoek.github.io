<h1 class="title-poem">Primer Lesson</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Look out how you use proud words.<br />
When you let proud words go, it is not easy to call them back.<br />
They wear long boots, hard boots; they walk off proud; they can't hear you calling--<br />
Look out how you use proud words.</p>
