<h1 class="title-poem">I found the phrase to every thought</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I found the phrase to every thought<br />
I ever had, but one;<br />
And that defies me,--as a hand<br />
Did try to chalk the sun<br />
<br />
To races nurtured in the dark;--<br />
How would your own begin?<br />
Can blaze be done in cochineal,<br />
Or noon in mazarin?</p>
