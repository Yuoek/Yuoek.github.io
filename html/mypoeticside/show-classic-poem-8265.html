<h1 class="title-poem">I've heard an Organ talk, sometimes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>183<br />
<br />
I've heard an Organ talk, sometimes<br />
In a Cathedral Aisle,<br />
And understood no word it said—<br />
Yet held my breath, the while—<br />
<br />
And risen up—and gone away,<br />
A more Berdardine Girl—<br />
Yet—know not what was done to me<br />
In that old Chapel Aisle.</p>
