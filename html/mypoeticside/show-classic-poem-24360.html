<h1 class="title-poem">Last night you left me and slept</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Last night you left me and slept<br />
your own deep sleep. Tonight you turn<br />
and turn. I say,<br />
"You and I will be together<br />
till the universe dissolves."<br />
You mumble back things you thought of<br />
when you were drunk.</p>
