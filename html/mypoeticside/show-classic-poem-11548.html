<h1 class="title-poem">The Wanderer's Night-Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>THOU who comest from on high,<br />
<br />
Who all woes and sorrows stillest,<br />
Who, for twofold misery,<br />
<br />
Hearts with twofold balsam fillest,<br />
Would this constant strife would cease!<br />
<br />
What are pain and rapture now?<br />
Blissful Peace,<br />
<br />
To my bosom hasten thou!</p>
