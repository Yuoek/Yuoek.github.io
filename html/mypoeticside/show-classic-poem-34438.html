<h1 class="title-poem">The Poor</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>By constantly tormenting them<br />
with reminders of the lice in<br />
their children's hair, the<br />
School Physician first<br />
brought their hatred down on him.<br />
But by this familiarity<br />
they grew used to him, and so,<br />
at last,<br />
took him for their friend and adviser.</p>
