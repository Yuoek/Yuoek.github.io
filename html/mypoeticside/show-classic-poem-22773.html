<h1 class="title-poem">Tame Cat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>It rests me to be among beautiful women<br />
Why should one always lie about such matters?<br />
I repeat:<br />
It rests me to converse with beautiful women<br />
Even though we talk nothing but nonsense,<br />
<br />
The purring of the invisible antennae<br />
Is both stimulating and delightful.</p>
