<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Sirww.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir William Watson</h2>
<p>APRIL, April,<br />
Laugh thy girlish laughter;<br />
Then, the moment after,<br />
Weep thy girlish tears!<br />
April, that mine ears<br />
Like a lover greetest,<br />
If I tell thee, sweetest,<br />
All my hopes and fears,<br />
April, April,<br />
Laugh thy golden laughter,<br />
But, the moment after,<br />
Weep thy golden tears!</p>
