<h1 class="title-poem">Two Passivists</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Eradicate the optimist<br />
who takes the easy view<br />
that human values will persist<br />
no matter what we do.<br />
Annihilate the pessimist<br />
whose ineffectual cry<br />
is that the goal's already missed<br />
however hard we try.</p>
