                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/minaloy.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mina Loy</h2>
<p>Curie<br />
of the laboratory<br />
of vocabulary<br />
she crushed<br />
the tonnage<br />
of consciousness<br />
congealed to phrases<br />
to extract<br />
a radium of the word</p>
