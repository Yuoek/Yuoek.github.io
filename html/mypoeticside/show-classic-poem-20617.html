<h1 class="title-poem">Casting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nemerov.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Howard Nemerov</h2>
<p>The waters deep, the waters dark,<br />
Reflect the seekers, hide the sought,<br />
Whether in water or in air to drown.<br />
Between them curls the silver spark,<br />
Barbed, baited, waiting, of a thought--<br />
Which in the world is upside down,<br />
The fish hook or the question mark?</p>
