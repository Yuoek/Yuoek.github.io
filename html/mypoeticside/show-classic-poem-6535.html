<h1 class="title-poem">I walked in a desert</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>I walked in a desert.<br />
And I cried,<br />
"Ah, God, take me from this place!"<br />
A voice said, "It is no desert."<br />
I cried, "Well, But --<br />
The sand, the heat, the vacant horizon."<br />
A voice said, "It is no desert."</p>
