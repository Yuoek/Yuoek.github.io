<h1 class="title-poem">Who makes these changes?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Who makes these changes?<br />
I shoot an arrow right.<br />
It lands left.<br />
I ride after a deer and find myself<br />
Chased by a hog.<br />
I plot to get what I want<br />
And end up in prison.<br />
I dig pits to trap others<br />
And fall in.<br />
<br />
I should be suspicious<br />
Of what I want.<br />
</p>
