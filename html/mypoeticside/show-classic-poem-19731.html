<h1 class="title-poem">September</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/lcm.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lucy Maud Montgomery</h2>
<p>Lo! a ripe sheaf of many golden days<br />
Gleaned by the year in autumn's harvest ways,<br />
With here and there, blood-tinted as an ember,<br />
Some crimson poppy of a late delight<br />
Atoning in its splendor for the flight<br />
Of summer blooms and joys­<br />
This is September.</p>
