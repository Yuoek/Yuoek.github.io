<h1 class="title-poem">Drinking in the Mountains.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Mountain flowers open in our faces.<br />
       You and I are triply lost in wine.<br />
       I’m drunk, my friend, sleepy. Rise and go.<br />
       With your dawn lute, return, if you wish, and stay.</p>
