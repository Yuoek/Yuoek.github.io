<h1 class="title-poem">Besides this May</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>977<br />
<br />
Besides this May<br />
We know<br />
There is Another—<br />
How fair<br />
Our Speculations of the Foreigner!<br />
<br />
Some know Him whom We knew—<br />
Sweet Wonder—<br />
A Nature be<br />
Where Saints, and our plain going Neighbor<br />
Keep May!</p>
