<h1 class="title-poem">Purpose</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>No wrath of men, or rage of seas,<br />
Can shake a just man's purposes;<br />
No threats of tyrants, or the grim<br />
Visage of them can alter him;<br />
But what he doth at first intend,<br />
That he holds firmly to the end.</p>
