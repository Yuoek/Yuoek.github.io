<h1 class="title-poem">The Yelpers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>OUR rides in all directions bend,<br />
<br />
For business or for pleasure,<br />
Yet yelpings on our steps attend,<br />
<br />
And barkings without measure.<br />
The dog that in our stable dwells,<br />
<br />
After our heels is striding,<br />
And all the while his noisy yells<br />
<br />
But show that we are riding.</p>
