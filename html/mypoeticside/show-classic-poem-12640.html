<h1 class="title-poem">Bring Her Again</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/williame.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Ernest Henley</h2>
<p>Bring her again, O western wind,<br />
  Over the western sea!<br />
Gentle and good and fair and kind,<br />
  Bring her again to me!<br />
<br />
Not that her fancy holds me dear,<br />
  Not that a hope may be:<br />
Only that I may know her near,<br />
  Wind of the western sea!</p>
