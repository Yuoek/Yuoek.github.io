<h1 class="title-poem">Christmas Blessings</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>As when a pigeon, loos'd in realms remote,<br />
Takes instant wing, and seeks his native cote,<br />
So speed my blessings from a barb'rous clime<br />
To thee and Providence at Christmas time!</p>
