<h1 class="title-poem">Suspense—is Hostiler than Death</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>705<br />
<br />
Suspense—is Hostiler than Death—<br />
Death—tho'soever Broad,<br />
Is Just Death, and cannot increase—<br />
Suspense—does not conclude—<br />
<br />
But perishes—to live anew—<br />
But just anew to die—<br />
Annihilation—plated fresh<br />
With Immortality—</p>
