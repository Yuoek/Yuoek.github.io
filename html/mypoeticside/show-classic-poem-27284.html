<h1 class="title-poem">Double cherry blossoms</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/12/shiki.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Masaoka Shiki</h2>
<p>Double cherry blossoms<br />
Flutter in the wind<br />
One petal after another.</p>
