<h1 class="title-poem">The Statue</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>When we are dead, some Hunting-boy will pass<br />
And find a stone half-hidden in tall grass<br />
And grey with age: but having seen that stone<br />
(Which was your image), ride more slowly on.</p>
