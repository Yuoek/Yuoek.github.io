<h1 class="title-poem">Divine Epigrams: To our Lord, upon the Water Made Wine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/richard-crashaw.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Crashaw</h2>
<p>Thou water turn'st to wine, fair friend of life,<br />
       Thy foe, to cross the sweet arts of thy reign,<br />
   Distills from thence the tears of wrath and strife,<br />
       And so turns wine to water back again.</p>
