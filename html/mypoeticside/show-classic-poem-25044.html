<h1 class="title-poem">Lost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Desolate and lone<br />
All night long on the lake<br />
Where fog trails and mist creeps,<br />
The whistle of a boat<br />
Calls and cries unendingly,<br />
Like some lost child<br />
In tears and trouble<br />
Hunting the harbor's breast<br />
And the harbor's eyes.</p>
