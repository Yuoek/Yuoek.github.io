<h1 class="title-poem">The Pity Of Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>A PITY beyond all telling<br />
Is hid in the heart of love:<br />
The folk who are buying and selling,<br />
The clouds on their journey above,<br />
The cold wet winds ever blowing,<br />
And the shadowy hazel grove<br />
Where mouse-grey waters are flowing,<br />
Threaten the head that I love.</p>
