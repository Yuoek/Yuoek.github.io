<h1 class="title-poem">Birds Calling in the Ravine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>I'm idle, as osmanthus flowers fall,<br />
This quiet night in spring, the hill is empty.<br />
The moon comes out and startles the birds on the hill,<br />
They don't stop calling in the spring ravine.</p>
