<h1 class="title-poem">Plowman's Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/knister.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Raymond Knister</h2>
<p>Turn under, plow,<br />
    My trouble;<br />
    Turn under griefs<br />
    And stubble.<br />
    Turn mouse's nest,<br />
    Gnawing years;<br />
    Old roots up<br />
    For new love's tears.<br />
    Turn, plow, the clods<br />
    For new thunder.<br />
    Turn under, plow,<br />
    Turn under.</p>
