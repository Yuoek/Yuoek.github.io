                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>If like me, you too fall in this trap,<br />
Hold the wine and cup upon your lap.<br />
We are the lovers, burning our tracks,<br />
Join us, if you can put up with the crap.</p>
