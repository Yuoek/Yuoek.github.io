<h1 class="title-poem">You Smiled, You Spoke, and I Believed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>You smiled, you spoke, and I believed,<br />
    By every word and smile deceived.<br />
    Another man would hope no more;<br />
    Nor hope I what I hoped before:<br />
    But let not this last wish be vain;<br />
    Deceive, deceive me once again!</p>
