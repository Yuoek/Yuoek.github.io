                    <h2 class="title-content">Owen Suffolk</h2>
<p>I'm out in the world once more,<br />
And I mean to run the rig,<br />
For I've learned from the prison lore<br />
That the pauper fares worse than the prig.<br />
I've shivered and starved in vain,<br />
And been honest for months in rag,<br />
So if I'm convicted again,<br />
I think it won't be on the vag.</p>
