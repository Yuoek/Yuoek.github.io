<h1 class="title-poem">I saw no Way—The Heavens were stitched</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>378<br />
<br />
I saw no Way—The Heavens were stitched—<br />
I felt the Columns close—<br />
The Earth reversed her Hemispheres—<br />
I touched the Universe—<br />
<br />
And back it slid—and I alone—<br />
A Speck upon a Ball—<br />
Went out upon Circumference—<br />
Beyond the Dip of Bell—</p>
