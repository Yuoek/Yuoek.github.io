<h1 class="title-poem">Upon Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Love scorched my finger, but did spare<br />
The burning of my heart,<br />
To signify in love my share<br />
Should be a little part.<br />
<br />
Little I love, but if that he<br />
Would but that heat recall,<br />
That joint to ashes should be burnt<br />
Ere I would love at all.</p>
