                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>Pick up the joy giving wine and come hither.<br />
Temptations of mean foes decline and come hither.<br />
Don’t listen to the one who says sit down and stay;<br />
Listen to me, pick up the line and come hither.</p>
