<h1 class="title-poem">Days</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/08/janet-loxley-lewis.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Janet Lewis</h2>
<p>Swift and subtle<br />
The flying shuttle<br />
Crosses the web<br />
And fills the loom,<br />
Leaving for range<br />
Of choice or change<br />
No time, no room.</p>
