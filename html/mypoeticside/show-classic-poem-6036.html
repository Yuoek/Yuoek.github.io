<h1 class="title-poem">The Three Sorts of Friends (fragment)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/coleridge.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel Taylor Coleridge</h2>
<p>Though friendships differ endless  in degree ,<br />
   The  sorts , methinks, may be reduced to three.<br />
    Ac quaintance many, and  Con quaintance few;<br />
   But for  In quaintance I know only two--<br />
   The friend I've mourned with, and the maid I woo!</p>
