<h1 class="title-poem">Waterfall at Lu-shan</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Sunlight streams on the river stones.<br />
From high above, the river steadily plunges--<br />
<br />
three thousand feet of sparkling water--<br />
the Milky Way pouring down from heaven.</p>
