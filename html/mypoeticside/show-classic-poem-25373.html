<h1 class="title-poem">Majestas Populi</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Majesty of the nature of man!  In crowds shall I seek thee?<br />
      'Tis with only a few that thou hast made thine abode.<br />
Only a few ever count; the rest are but blanks of no value,<br />
      And the prizes are hid 'neath the vain stir that they make.</p>
