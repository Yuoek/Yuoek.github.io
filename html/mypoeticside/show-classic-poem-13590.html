<h1 class="title-poem">Friends and Foes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/WDH.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Dean Howells</h2>
<p>BITTER the things one’s enemies will say<br />
Against one sometimes when one is away,<br />
But of a bitterness far more intense<br />
The things one’s friends will say in one’s defence.</p>
