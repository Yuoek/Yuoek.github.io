<h1 class="title-poem">Wild Nights! Wild Nights!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Wild Nights! Wild Nights!<br />
Were I with thee,<br />
Wild Nights should be<br />
Our luxury!<br />
<br />
Futile the winds<br />
To a heart in port, --<br />
Done with the compass,<br />
Done with the chart!<br />
<br />
Rowing in Eden!<br />
Ah! the sea!<br />
Might I but moor<br />
To-night in Thee!</p>
