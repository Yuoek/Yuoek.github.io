<h1 class="title-poem">A South Wind—has a pathos</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>719<br />
<br />
A South Wind—has a pathos<br />
Of individual Voice—<br />
As One detect on Landings<br />
An Emigrant's address.<br />
<br />
A Hint of Ports and Peoples—<br />
And much not understood—<br />
The fairer—for the farness—<br />
And for the foreignhood.</p>
