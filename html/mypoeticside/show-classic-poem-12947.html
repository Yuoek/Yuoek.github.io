<h1 class="title-poem">The Bleeding Hand; Or The Sprig Of Eglantine Given To A Maid</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>From this bleeding hand of mine,<br />
Take this sprig of Eglantine:<br />
Which, though sweet unto your smell,<br />
Yet the fretful briar will tell,<br />
He who plucks the sweets, shall prove<br />
Many thorns to be in love.</p>
