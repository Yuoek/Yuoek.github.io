<h1 class="title-poem">Buffalo Bill</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>Buffalo Bill's<br />
defunct<br />
       who used to<br />
       ride a watersmooth-silver<br />
                                  stallion<br />
and break onetwothreefourfive pigeons justlikethat<br />
                                                            Jesus<br />
he was a handsome man<br />
                     and what I want to know is<br />
how do you like your blue-eyed boy<br />
Mister Death</p>
