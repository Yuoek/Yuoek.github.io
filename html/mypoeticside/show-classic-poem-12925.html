<h1 class="title-poem">Cherry Ripe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Cherry-ripe, ripe, ripe, I cry,<br />
Full and fair ones; come, and buy:<br />
If so be you ask me where<br />
They do grow?  I  answer, there<br />
Where my Julia's lips do smile;--<br />
There's the land, or cherry-isle;<br />
Whose plantations fully show<br />
All the year where cherries grow.</p>
