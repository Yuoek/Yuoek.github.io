<h1 class="title-poem">Sicilian Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>YE black and roguish eyes,<br />
<br />
If ye command.<br />
Each house in ruins lies,<br />
<br />
No town can stand.<br />
And shall my bosom's chain,--<br />
<br />
This plaster wall,<br />
To think one moment, deign,--<br />
<br />
Shall I not fall?</p>
