<h1 class="title-poem">On the Road to T'ien-T- Ai</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yuan Mei</h2>
<p>On the Road to T'ien-T- Ai<br />
<br />
Wrapped, surrounded by ten thousand mountains.<br />
<br />
Cut off, no place to go...<br />
<br />
Until you're here, there's no way to get here.<br />
<br />
Once you're here, there's no way to go.</p>
