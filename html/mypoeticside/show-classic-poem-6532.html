<h1 class="title-poem">Tradition, thou art for suckling children</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Tradition, thou art for suckling children,<br />
Thou art the enlivening milk for babes;<br />
But no meat for men is in thee.<br />
Then --<br />
But, alas, we all are babes.</p>
