<h1 class="title-poem">Death leaves Us homesick, who behind</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>935<br />
<br />
Death leaves Us homesick, who behind,<br />
Except that it is gone<br />
Are ignorant of its Concern<br />
As if it were not born.<br />
<br />
Through all their former Places, we<br />
Like Individuals go<br />
Who something lost, the seeking for<br />
Is all that's left them, now—</p>
