<h1 class="title-poem">You cannot put a Fire out</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>530<br />
<br />
You cannot put a Fire out—<br />
A Thing that can ignite<br />
Can go, itself, without a Fan—<br />
Upon the slowest Night—<br />
<br />
You cannot fold a Flood—<br />
And put it in a Drawer—<br />
Because the Winds would find it out—<br />
And tell your Cedar Floor—</p>
