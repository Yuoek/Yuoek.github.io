<h1 class="title-poem">The White Horse</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/lawrence.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">D.H. Lawrence</h2>
<p>The youth walks up to the white horse, to put its halter on<br />
and the horse looks at him in silence.<br />
They are so silent, they are in another world.</p>
