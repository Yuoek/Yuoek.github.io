<h1 class="title-poem">We thirst at first—'tis Nature's Act</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>726<br />
<br />
We thirst at first—'tis Nature's Act—<br />
And later—when we die—<br />
A little Water supplicate—<br />
Of fingers going by—<br />
<br />
It intimates the finer want—<br />
Whose adequate supply<br />
Is that Great Water in the West—<br />
Termed Immortality—</p>
