<h1 class="title-poem">Sweet, to have had them lost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>901<br />
<br />
Sweet, to have had them lost<br />
For news that they be saved—<br />
The nearer they departed Us<br />
The nearer they, restored,<br />
<br />
Shall stand to Our Right Hand—<br />
Most precious and the Dead—<br />
Next precious<br />
Those that rose to go—<br />
Then thought of Us, and stayed.</p>
