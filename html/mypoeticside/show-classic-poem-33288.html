<h1 class="title-poem">Wei City Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Wei City morning rain<br />
dampens the light dust.<br />
<br />
By this inn, green,<br />
newly green willows.<br />
<br />
I urge you to drink<br />
another cup of wine;<br />
<br />
west of Yang Pass<br />
are no old friends.</p>
