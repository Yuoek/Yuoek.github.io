<h1 class="title-poem">The Kiss</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I hoped that he would love me,<br />
And he has kissed my mouth,<br />
But I am like a stricken bird<br />
That cannot reach the south.<br />
<br />
For though I know he loves me,<br />
To-night my heart is sad;<br />
His kiss was not so wonderful<br />
As all the dreams I had.</p>
