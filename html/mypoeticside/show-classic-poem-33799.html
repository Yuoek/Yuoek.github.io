<h1 class="title-poem">Hast Never Come To Thee An Hour</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>HAST never come to thee an hour,<br />
A sudden gleam divine, precipitating, bursting all these bubbles,<br />
        fashions, wealth?<br />
These eager business aims--books, politics, art, amours,<br />
To utter nothingness?</p>
