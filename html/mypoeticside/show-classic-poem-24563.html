<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 08</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>A weak foe, who professes submission and shows friendship, has no other object than to become a strong enemy. It has been said that as the friendship of friends is unreliable, what trust can be put in the flattery of enemies?</p>
