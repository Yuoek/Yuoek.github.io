<h1 class="title-poem">Suppose</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/08/ARA.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anne Reeve Aldrich</h2>
<p>How sad if, by some strange new law,<br />
All kisses scarred!<br />
For she who is most beautiful<br />
Would be most marred.<br />
<br />
And we might be surprised to see<br />
Some lovely wife<br />
Smooth-visaged, while a seeming prude<br />
Was marked for life.</p>
