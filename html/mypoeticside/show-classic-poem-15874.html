<h1 class="title-poem">Rose Aylmer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>Ah what avails the sceptred race,<br />
        Ah what the form divine!<br />
    What every virtue, every grace!<br />
        Rose Aylmer, all were thine.<br />
    Rose Aylmer, whom these wakeful eyes<br />
        May weep, but never see,<br />
    A night of memories and of sighs<br />
        I consecrate to thee.</p>
