<h1 class="title-poem">He vows</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Cavafy.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Constantine Cavafy</h2>
<p>Every so often he vows to start a better life.<br />
But when night comes with her own counsels,<br />
with her compromises, and with her promises;<br />
but when night comes with her own power<br />
of the body that wants and demands, he returns,<br />
forlorn, to the same fatal joy.</p>
