<h1 class="title-poem">Upon The Sherrifs Beere</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/07/strode.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Strode</h2>
<p>The Sheriffe of Oxford late is grown so wise<br />
As to repreive his Beere till next assize:<br />
Alas! twas not so quick, twas not so heady,<br />
The Jury sate and found it dead already.</p>
