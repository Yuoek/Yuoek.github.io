<h1 class="title-poem">Delirium</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Srecko.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Srecko Kosovel</h2>
<p>Martyrdom of thoughts.<br />
A blue sea.<br />
A grey jail.<br />
A soldier spiking desperate thoughts<br />
with his bayonet<br />
under the window.<br />
Pardon me. "Never mind."<br />
Sigaretta.<br />
Eine Edison.<br />
I can hear the blue sea<br />
throbbing steadily<br />
at my skull.</p>
