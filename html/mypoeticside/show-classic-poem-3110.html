<h1 class="title-poem">The Question Answered</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>What is it men in women do require?<br />
The lineaments of gratified Desire.<br />
What is it women do in men require?<br />
The lineaments of gratified Desire</p>
