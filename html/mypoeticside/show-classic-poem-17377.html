<h1 class="title-poem">Christmas Snows</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>As Christmas snows (as yet a poet's trope)        <br />
Call back one's bygone days of youth and hope,    <br />
Four metrick lines I send--they're quite enough--<br />
Tho' once I fancy'd I could write the stuff!</p>
