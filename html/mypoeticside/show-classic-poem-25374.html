<h1 class="title-poem">Political Precept</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>All that thou doest is right; but, friend, don't carry this precept<br />
   On too far,--be content, all that is right to effect.<br />
It is enough to true zeal, if what is existing be perfect;<br />
False zeal always would find finished perfection at once.</p>
