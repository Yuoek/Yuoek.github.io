<h1 class="title-poem">On A Late Impiric Of Balmy Memory</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/lamb.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Lamb</h2>
<p>His namesake, born of Jewish breeder,<br />
Knew "from the Hyssop to the Cedar;"<br />
But he, unlike the Jewish leader,<br />
Scarce knew the Hyssop from the Cedar.</p>
