<h1 class="title-poem">If you Want What Visible Reality</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>If you want what visible reality<br />
can give, you're an employee.<br />
If you want the unseen world,<br />
you're not living your truth.<br />
Both wishes are foolish,<br />
but you'll be forgiven for forgetting<br />
that what you really want is<br />
love's confusing joy.</p>
