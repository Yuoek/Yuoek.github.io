<h1 class="title-poem">Divine Epigrams: Samson to his Delilah</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/richard-crashaw.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Crashaw</h2>
<p>Could not once blinding me, cruel, suffice?<br />
   When first I look'd on thee, I lost mine eyes.</p>
