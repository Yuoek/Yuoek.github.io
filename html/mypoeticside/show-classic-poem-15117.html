<h1 class="title-poem">A Lover's Journey</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>When a lover hies abroad<br />
              Looking for his love,<br />
              Azrael smiling sheathes his sword,<br />
              Heaven smiles above.<br />
              Earth and sea<br />
              His servants be,<br />
              And to lesser compass round,<br />
              That his love be sooner found!</p>
