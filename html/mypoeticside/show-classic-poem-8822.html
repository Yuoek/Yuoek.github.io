<h1 class="title-poem">Presentiment is that long shadow on the lawn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Presentiment is that long shadow on the lawn<br />
Indicative that suns go down;<br />
The notice to the startled grass<br />
That darkness is about to pass.</p>
