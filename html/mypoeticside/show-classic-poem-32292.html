<h1 class="title-poem">A New Friend</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ESPW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Stuart Phelps Ward</h2>
<p>The sun is sinking on the sacred lands<br />
Wherein the grain ungarnered beckoning stands.<br />
<br />
<br />
Who loses never finds, nor can, nor may,<br />
The common, human glory of the day.<br />
<br />
<br />
Close, let us enter, tear-blind as we must;<br />
Reapers, not gleaners of a solemn trust.</p>
