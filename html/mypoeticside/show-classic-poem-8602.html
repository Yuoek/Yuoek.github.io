<h1 class="title-poem">Doom is the House without the Door</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>475<br />
<br />
Doom is the House without the Door—<br />
'Tis entered from the Sun—<br />
And then the Ladder's thrown away,<br />
Because Escape—is done—<br />
<br />
'Tis varied by the Dream<br />
Of what they do outside—<br />
Where Squirrels play—and Berries die—<br />
And Hemlocks—bow—to God—</p>
