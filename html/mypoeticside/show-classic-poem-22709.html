                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>Be in me as the eternal moods  <br />
       of the bleak wind, and not  <br />
As transient things are—  <br />
       gaiety of flowers.  <br />
Have me in the strong loneliness          <br />
       of sunless cliffs  <br />
And of gray waters.  <br />
       Let the gods speak softly of us  <br />
In days hereafter,  <br />
       the shadowy flowers of Orcus    <br />
Remember thee.</p>
