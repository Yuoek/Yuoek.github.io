<h1 class="title-poem">Proletarian Poet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>A big young bareheaded woman<br />
in an apron<br />
<br />
Her hair slicked back standing<br />
on the street<br />
<br />
One stockinged foot toeing<br />
the sidewalk<br />
<br />
Her shoe in her hand. Looking<br />
intently into it<br />
<br />
She pulls out the paper insole<br />
to find the nail<br />
<br />
That has been hurting her</p>
