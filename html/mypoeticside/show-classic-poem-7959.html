<h1 class="title-poem">Life, and Death, and Giants</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>706<br />
<br />
Life, and Death, and Giants—<br />
Such as These—are still—<br />
Minor—Apparatus—Hopper of the Mill—<br />
Beetle at the Candle—<br />
Or a Fife's Fame—<br />
Maintain—by Accident that they proclaim—</p>
