<h1 class="title-poem">How happy I was if I could forget</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>898<br />
<br />
How happy I was if I could forget<br />
To remember how sad I am<br />
Would be an easy adversity<br />
But the recollecting of Bloom<br />
<br />
Keeps making November difficult<br />
Till I who was almost bold<br />
Lose my way like a little Child<br />
And perish of the cold.</p>
