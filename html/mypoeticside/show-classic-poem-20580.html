<h1 class="title-poem">A Protest and a Protest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/johnnie.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Shaw Neilson</h2>
<p>A certain old maid at Port Victor<br />
had many strange pets to afflict her,<br />
her Kangaroos fought<br />
with the emu's she caught<br />
and when she protested, they kicked her</p>
