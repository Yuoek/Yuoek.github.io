<h1 class="title-poem">Black Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/soutar.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Soutar</h2>
<p>A skelp frae his teacher<br />
For a’ he cudna spell:<br />
A skelp frae his mither<br />
For cowpin owre the kale.<br />
A skelp frae his brither<br />
For clourin his braw bat:<br />
And a skelp frae his faither<br />
For the Lord kens what.</p>
