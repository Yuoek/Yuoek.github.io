<h1 class="title-poem">Porridge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/MV5BMzIwMzc3Mjk2MV5BMl5BanBnXkFtZTcwNDQwNDMxOA@@._V1_SY317_CR30214317_.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Spike Milligan</h2>
<p>Why is there no monument<br />
To Porridge in our land?<br />
If it's good enough to eat,<br />
It's good enough to stand!<br />
<br />
On a plinth in London<br />
A statue we should see<br />
Of Porridge made in Scotland<br />
Signed, "Oatmeal, O.B.E."<br />
(By a young dog of three)</p>
