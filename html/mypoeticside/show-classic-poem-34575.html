<h1 class="title-poem">Days</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Karl-Wilson-Baker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Karle Wilson Baker</h2>
<p>Some days my thoughts are just cocoons- all cold, and dull and blind,<br />
They hang from dripping branches in the grey woods of my mind;<br />
<br />
And other days they drift and shine - such free and flying things!<br />
I find the gold-dust in my hair, left by their brushing wings.</p>
