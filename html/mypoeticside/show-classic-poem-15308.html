<h1 class="title-poem">A Bank Fraud</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>He drank strong waters and his speech was coarse;<br />
He purchased raiment and forbore to pay';<br />
He stuck a trusting junior with a horse,<br />
And won gymkhanas in a doubtful way.<br />
Then 'twixt a vice and folly, turned aside<br />
To do good deeds and straight to cloak them, lied.</p>
