<h1 class="title-poem">Trust Thou Thy Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/ruskin.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Ruskin</h2>
<p>Trust thou thy Love: if she be proud, is she not sweet?<br />
Trust thou thy Love: if she be mute, is she not pure?<br />
Lay thou thy soul full in her hands, low at her feet;<br />
Fail, Sun and Breath!--yet, for thy peace, She shall endure.</p>
