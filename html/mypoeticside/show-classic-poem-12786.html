<h1 class="title-poem">To Electra</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>I dare not ask a kiss,<br />
I dare not beg a smile;<br />
Lest having that, or this,<br />
I might grow proud the while.<br />
<br />
No, no, the utmost share<br />
Of my desire shall be,<br />
Only to kiss that air<br />
That lately kissed thee,</p>
