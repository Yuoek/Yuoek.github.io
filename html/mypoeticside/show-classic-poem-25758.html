<h1 class="title-poem">Resurgam-</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/alan-seeger.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alan Seeger</h2>
<p>Exiled afar from youth and happy love,<br />
If Death should ravish my fond spirit hence<br />
I have no doubt but, like a homing dove,<br />
It would return to its dear residence,<br />
And through a thousand stars find out the road<br />
Back into earthly flesh that was its loved abode.</p>
