<h1 class="title-poem">Rubaiyat 24</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shams.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>At dawn your eyes from Jupiter learn<br />
O God, may fantasies of my mind burn.<br />
The ear adorned with that elegant ring<br />
Gems of Hafiz’s poems may earn.</p>
