<h1 class="title-poem">The sky is low, the clouds are mean,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>The sky is low, the clouds are mean,<br />
A travelling flake of snow<br />
Across a barn or through a rut<br />
Debates if it will go.<br />
<br />
A narrow wind complains all day<br />
How some one treated him;<br />
Nature, like us, is sometimes caught<br />
Without her diadem.</p>
