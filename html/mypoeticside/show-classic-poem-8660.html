<h1 class="title-poem">If those I loved were lost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>29<br />
<br />
If those I loved were lost<br />
The Crier's voice would tell me—<br />
If those I loved were found<br />
The bells of Ghent would ring—<br />
<br />
Did those I loved repose<br />
The Daisy would impel me.<br />
Philip—when bewildered<br />
Bore his riddle in!</p>
