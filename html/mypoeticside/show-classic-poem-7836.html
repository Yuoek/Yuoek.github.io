<h1 class="title-poem">A Shade upon the mind there passes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>882<br />
<br />
A Shade upon the mind there passes<br />
As when on Noon<br />
A Cloud the mighty Sun encloses<br />
Remembering<br />
<br />
That some there be too numb to notice<br />
Oh God<br />
Why give if Thou must take away<br />
The Loved?</p>
