<h1 class="title-poem">Bahnhofstrasse</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>The eyes that mock me sign the way<br />
Whereto I pass at eve of day.<br />
<br />
Grey way whose violet signals are<br />
The trysting and the twining star.<br />
<br />
Ah star of evil! star of pain!<br />
Highhearted youth comes not again<br />
<br />
Nor old heart's wisdom yet to know<br />
The signs that mock me as I go.</p>
