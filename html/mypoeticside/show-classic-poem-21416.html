<h1 class="title-poem">Words of Comfort to Be Scratched on a Mirror</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Helen of Troy had a wandering glance;<br />
Sappho's restriction was only the sky;<br />
Ninon was ever the chatter of France;<br />
But oh, what a good girl am I!</p>
