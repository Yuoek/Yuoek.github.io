<h1 class="title-poem">The Soul's distinct connection</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>974<br />
<br />
The Soul's distinct connection<br />
With immortality<br />
Is best disclosed by Danger<br />
Or quick Calamity—<br />
<br />
As Lightning on a Landscape<br />
Exhibits Sheets of Place—<br />
Not yet suspected—but for Flash—<br />
And Click—and Suddenness.</p>
