<h1 class="title-poem">Love's Draft</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>THE draft of love was cool and sweet<br />
You gave me in the cup,<br />
But, ah, love's fire is keen and fleet,<br />
And I am burning up.<br />
Unless the tears I shed for you<br />
Shall quench this burning flame,<br />
It will consume me through and through,<br />
And leave but ash — a name.</p>
