<h1 class="title-poem">In The French Translation Of Lucan, By Monsieur De Brebeuf</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Andrew-Marvell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Andrew Marvell</h2>
<p>C'est de luy que nous vient cet Art ingenieux<br />
De peindre la Parole, et deparler aua Yeux;<br />
Et, parles traits divers de figures tracees,<br />
Donner de la couleur et du corps aux pensees.</p>
