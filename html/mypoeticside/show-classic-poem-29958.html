<h1 class="title-poem">Angular</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>Other hearts have broken gracefully, for your sake,<br />
And now your eyes reproach me that my ache<br />
Is awkward, and my arms<br />
Are angular across my breast<br />
Where emptiness is pressed.</p>
