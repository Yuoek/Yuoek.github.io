<h1 class="title-poem">On Hearing That The Students Of Our New University...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>Where, where but here have pride and Truth,<br />
That long to give themselves for wage,<br />
To shake their wicked sides at youth<br />
Restraining reckless middle-age?</p>
