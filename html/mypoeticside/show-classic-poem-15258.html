<h1 class="title-poem">In the House of Suddhoo</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>A stone's throw out on either hand<br />
From that well-ordered road we tread,<br />
And all the world is wild and strange;<br />
Churel and ghoul and Djinn and sprite<br />
Shall bear us company to-night,<br />
For we have reached the Oldest Land<br />
Wherein the powers of Darkness range.</p>
