<h1 class="title-poem">A Linnet In A Gilded Cage</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>A linnet in a gilded cage, -<br />
A linnet on a bough, -<br />
In frosty winter one might doubt<br />
Which bird is luckier now.<br />
But let the trees burst out in leaf,<br />
And nests be on the bough,<br />
Which linnet is the luckier bird,<br />
Oh who could doubt it now?</p>
