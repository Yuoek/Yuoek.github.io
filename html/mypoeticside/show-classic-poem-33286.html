<h1 class="title-poem">Hut Among the Bamboos</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Sitting alone<br />
      in the hush of the bamboo grove<br />
I thrum my lute<br />
      and whistle lingering notes.<br />
In the secrecy of the wood<br />
      no one can hear --<br />
Only the clear moon<br />
      comes to shine on me.</p>
