<h1 class="title-poem">A New Hymn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Katherine-Mansfield.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Katherine Mansfield</h2>
<p>Sing a song of men's pyjamas,<br />
Half-past-six has got a pair,<br />
And he's wearing them this evening,<br />
And he's looking such a dear.<br />
<br />
Sing a song of frocks with pockets<br />
I have got one, it is so's<br />
I can use my `nitial hankies<br />
Every time I blow my nose.</p>
