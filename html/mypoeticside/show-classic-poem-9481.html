<h1 class="title-poem">Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>THE gray dawn on the mountain top<br />
Is slow to pass away.<br />
Still lays him by in sluggish dreams,<br />
The golden God of day.<br />
And then a light along the hills,<br />
Your laughter silvery gay;<br />
The Sun God wakes, a bluebird trills,<br />
You come and it is day.</p>
