<h1 class="title-poem">Pigeon Post</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/KLB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Katharine Lee Bates</h2>
<p>White wing, white wing, <br />
Lily of the air, <br />
What word dost bring, <br />
On whose errand fare? <br />
<br />
Red word, red word, <br />
Snowy plumes abhor. <br />
I, Christ's own bird, <br />
Do the work of war.</p>
