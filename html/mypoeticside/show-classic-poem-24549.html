                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Strike the head of a serpent with the hand of a foe because one of two advantages will result. If the enemy succeeds thou hast killed the snake and if the latter, thou hast been delivered from a foe.</p>
