<h1 class="title-poem">Song and Pain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/gurney.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ivor Gurney</h2>
<p>Out of my sorrow<br />
      have I made these songs,<br />
             Out of my sorrow;<br />
<br />
              Though somewhat<br />
   of the making's eager pain<br />
          From Joy did borrow.<br />
<br />
             Someday, I trust,<br />
 God's purpose of Pain for me<br />
            Shall be complete,<br />
<br />
                   And then -<br />
to enter the House of Joy .....<br />
             Prepare, my feet.</p>
