<h1 class="title-poem">The Empty Quatrain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>A flawless cup: how delicate and fine<br />
 The flowing curve of every jewelled line!<br />
 Look, turn it up or down, 't is perfect still,--<br />
But holds no drop of life's heart-warming wine.</p>
