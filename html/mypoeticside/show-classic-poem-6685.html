<h1 class="title-poem">Hypnos, God of Sleep</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>The shadowy boy of night<br />
<br />
Crosses the dusking land;<br />
<br />
He sows his poppy-seeds<br />
<br />
With steady, gentle hand.<br />
<br />
<br />
The shadowy boy of night<br />
<br />
Young husbandman of dreams,<br />
<br />
Garners his gracious blooms<br />
<br />
By far and moonlit streams.</p>
