<h1 class="title-poem">The Last Laugh</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/John-Betjeman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir John Betjeman</h2>
<p>I made hay while the sun shone.<br />
My work sold.<br />
Now, if the harvest is over<br />
And the world cold,<br />
Give me the bonus of laughter<br />
As I lose hold.</p>
