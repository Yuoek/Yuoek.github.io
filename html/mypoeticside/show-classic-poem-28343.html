<h1 class="title-poem">System</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>Every night my prayers I say,<br />
And get my dinner every day;<br />
And every day that I've been good,<br />
I get an orange after food.<br />
<br />
The child that is not clean and neat,<br />
With lots of toys and things to eat,<br />
He is a naughty child, I'm sure--<br />
Or else his dear papa is poor.</p>
