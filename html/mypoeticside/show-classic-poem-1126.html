<h1 class="title-poem">A Dog After Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/yehuda.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yehuda Amichai</h2>
<p>After you left me<br />
I let a dog smell at<br />
My chest and my belly. It will fill its nose<br />
And set out to find you.<br />
<br />
I hope it will tear the<br />
Testicles of your lover and bite off his penis<br />
Or at least<br />
Will bring me your stockings between his teeth.</p>
