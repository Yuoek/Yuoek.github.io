<h1 class="title-poem">Brown And Furry</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Brown and furry<br />
Caterpillar in a hurry,<br />
Take your walk<br />
To the shady leaf, or stalk,<br />
Or what not,<br />
Which may be the chosen spot.<br />
No toad spy you,<br />
Hovering bird of prey pass by you;<br />
Spin and die,<br />
To live again a butterfly.</p>
