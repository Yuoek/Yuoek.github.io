<h1 class="title-poem">Sight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Unseemly are the open eyes<br />
 That watch the midnight sheep,<br />
That look upon the secret skies<br />
 Nor close, abashed, in sleep;<br />
<br />
That see the dawn drag in, unbidden,<br />
 To birth another day-<br />
Oh, better far their gaze were hidden<br />
 Below the decent clay.</p>
