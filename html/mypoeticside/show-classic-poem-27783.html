<h1 class="title-poem">Bag-Snatching in Dublin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>Sisely<br />
Walked so nicely<br />
With footsteps so discreet<br />
To see her pass<br />
You'd never guess<br />
She walked upon the street.<br />
<br />
Down where the Liffey waters' turgid flood<br />
Churns up to greet the ocean-driven mud,<br />
A bruiser in fix<br />
Murdered her for 6/6.</p>
