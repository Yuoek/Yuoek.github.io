<h1 class="title-poem">'A terra d'u ricorde</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/AP.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Albino Pierro</h2>
<p>S'i campène<br />
di Pasck<br />
su' paroue<br />
di Crist<br />
ch'è fatte nghiure<br />
'a morte,<br />
mò sta parleta<br />
frisca di paise<br />
jèttete<br />
u bbànne<br />
e dìcete:<br />
"vinèse a què,<br />
v'àgghie grapute<br />
i porte".</p>
