<h1 class="title-poem">Rhyme For My Tomb</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Service.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert William Service</h2>
<p>Here lyeth one<br />
Who loved the sun;<br />
Who lived with zest,<br />
Whose work was done,<br />
Reward, dear Lord,<br />
Thy weary son:<br />
May he be blest<br />
With peace and rest,<br />
Nor wake again,<br />
         Amen.</p>
