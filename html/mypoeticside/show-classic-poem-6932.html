<h1 class="title-poem">yes is a pleasant country...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>yes is a pleasant country:<br />
if's wintry<br />
(my lovely)<br />
let's open the year<br />
<br />
both is the very weather<br />
(not either)<br />
my treasure,<br />
when violets appear<br />
<br />
love is a deeper season<br />
than reason;<br />
my sweet one<br />
(and april's where we're)</p>
