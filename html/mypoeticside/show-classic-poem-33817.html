<h1 class="title-poem">The Torch</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>ON my northwest coast in the midst of the night, a fishermen's group<br />
        stands watching;<br />
Out on the lake, that expands before them, others are spearing<br />
        salmon;<br />
The canoe, a dim shadowy thing, moves across the black water,<br />
Bearing a Torch a-blaze at the prow.</p>
