<h1 class="title-poem">I lost a World - the other day!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>181<br />
<br />
I lost a World - the other day!<br />
Has Anybody found?<br />
You'll know it by the Row of Stars<br />
Around its forehead bound.<br />
<br />
A Rich man—might not notice it—<br />
Yet—to my frugal Eye,<br />
Of more Esteem than Ducats—<br />
Oh find it—Sir—for me!</p>
