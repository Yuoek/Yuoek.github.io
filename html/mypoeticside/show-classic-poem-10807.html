<h1 class="title-poem">A Christmas Greeting To K.B.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/10/fur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Furphy</h2>
<p>While changing Seasons run their course,<br />
Controlled and guided from above,<br />
It is thy part to re-enforce<br />
The broadening stream of Light and Love.</p>
