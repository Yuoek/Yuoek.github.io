<h1 class="title-poem">8 Count</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>from my bed<br />
I watch<br />
3 birds<br />
on a telephone<br />
wire.<br />
one flies<br />
off.<br />
then<br />
another.<br />
one is left,<br />
then<br />
it too<br />
is gone.<br />
my typewriter is<br />
tombstone<br />
still.<br />
and I am<br />
reduced to bird<br />
watching.<br />
just thought I'd<br />
let you<br />
know,<br />
fucker.</p>
