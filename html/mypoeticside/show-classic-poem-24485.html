<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 64</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>The will of the Inscrutable brings down one from the royal throne, and protects the other in the belly of a fish.<br />
<br />
               Happy is the time of the man  <br />
               Who spends it in adoring thee.</p>
