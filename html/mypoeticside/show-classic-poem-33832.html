<h1 class="title-poem">Solid, Ironical, Rolling Orb</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>SOLID, ironical, rolling orb!<br />
Master of all, and matter of fact!--at last I accept your terms;<br />
Bringing to practical, vulgar tests, of all my ideal dreams,<br />
And of me, as lover and hero.</p>
