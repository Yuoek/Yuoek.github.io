<h1 class="title-poem">Evening clouds</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/07/uhland.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Ludwig Uhland</h2>
<p>Clouds seh I abendwaerts<br />
Completely dipped into purest glow,<br />
Clouds in light zerhaucht completely,<br />
Had so stifling darkened.<br />
Yes! my suspecting heart says to me:<br />
Once still it becomes whether also late,<br />
When the sun comes down,<br />
Me the soul shade clarifies.</p>
