<h1 class="title-poem">Dream Deferred</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>What happens to a dream deferred?<br />
Does it dry up<br />
Like a raisin in the sun?<br />
Or fester like a sore--<br />
And then run?<br />
Does it stink like rotten meat?<br />
Or crust and sugar over--<br />
like a syrupy sweet?<br />
Maybe it just sags<br />
like a heavy load.<br />
Or does it explode?</p>
