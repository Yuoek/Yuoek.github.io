<h1 class="title-poem">A slash of Blue</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>204<br />
<br />
A slash of Blue—<br />
A sweep of Gray—<br />
Some scarlet patches on the way,<br />
Compose an Evening Sky—<br />
A little purple—slipped between—<br />
Some Ruby Trousers hurried on—<br />
A Wave of Gold—<br />
A Bank of Day—<br />
This just makes out the Morning Sky.</p>
