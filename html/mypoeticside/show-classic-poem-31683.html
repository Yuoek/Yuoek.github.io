<h1 class="title-poem">Polish Flowers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/Julian-Tuwim.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Julian Tuwim</h2>
<p>A box with paints from childhood's time:<br />
The colors of town are earth and grime.<br />
An old worker at a dark doorway squats,<br />
The spuds in his bowl are powdery dry.<br />
It's a face of yellowish and gray spots<br />
In the midst of hunger, cold, dirt and slime.</p>
