<h1 class="title-poem">Circular Secret</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/John-Hall-Wheelock.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Hall Wheelock</h2>
<p>Leave starry heaven behind,<br />
Enter the atom, shrink<br />
Into the vast, and find<br />
You stand upon the brink<br />
Of starry heaven again--<br />
There where you were you are,<br />
Full circle come again,<br />
On a journey circular,<br />
Through the atom back to the stars.</p>
