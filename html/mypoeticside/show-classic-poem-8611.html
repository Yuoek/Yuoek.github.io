<h1 class="title-poem">Exultation is the going</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>76<br />
<br />
Exultation is the going<br />
Of an inland soul to sea,<br />
Past the houses—past the headlands—<br />
Into deep Eternity—<br />
<br />
Bred as we, among the mountains,<br />
Can the sailor understand<br />
The divine intoxication<br />
Of the first league out from land?</p>
