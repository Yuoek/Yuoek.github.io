<h1 class="title-poem">I went to thank Her</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>363<br />
<br />
I went to thank Her—<br />
But She Slept—<br />
Her Bed—a funneled Stone—<br />
With Nosegays at the Head and Foot—<br />
That Travellers—had thrown—<br />
<br />
Who went to thank Her—<br />
But She Slept—<br />
'Twas Short—to cross the Sea—<br />
To look upon Her like—alive—<br />
But turning back—'twas slow—</p>
