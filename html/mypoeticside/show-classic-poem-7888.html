<h1 class="title-poem">Each Scar I'll keep for Him</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>877<br />
<br />
Each Scar I'll keep for Him<br />
Instead I'll say of Gem<br />
In His long Absence worn<br />
A Costlier one<br />
<br />
But every Tear I bore<br />
Were He to count them o'er<br />
His own would fall so more<br />
I'll mis sum them.</p>
