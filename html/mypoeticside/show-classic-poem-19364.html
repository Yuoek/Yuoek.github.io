<h1 class="title-poem">The Unexplorer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>There was a road ran past our house<br />
Too lovely to explore.<br />
I asked my mother once -- she said<br />
That if you followed where it led<br />
It brought you to the milk-man's door.<br />
(That's why I have not travelled more.)</p>
