<h1 class="title-poem">Only God—detect the Sorrow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>626<br />
<br />
Only God—detect the Sorrow—<br />
Only God—<br />
The Jehovahs—are no Babblers—<br />
Unto God—<br />
God the Son—Confide it—<br />
Still secure—<br />
God the Spirit's Honor—<br />
Just as sure—</p>
