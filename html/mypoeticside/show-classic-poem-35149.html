<h1 class="title-poem">The Lady's First Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I TURN round<br />
Like a dumb beast in a show.<br />
Neither know what I am<br />
Nor where I go,<br />
My language beaten<br />
Into one name;<br />
I am in love<br />
And that is my shame.<br />
What hurts the soul<br />
My soul adores,<br />
No better than a beast<br />
Upon all fours.</p>
