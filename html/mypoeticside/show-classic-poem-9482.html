<h1 class="title-poem">Encouraged</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>BECAUSE you love me I have much achieved,<br />
Had you despised me then I must have failed,<br />
But since I knew you trusted and believed,<br />
I could not disappoint you and so prevailed.</p>
