<h1 class="title-poem">The Reason-</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>My life is vile<br />
         I hate it so<br />
         I'll wait awhile<br />
         And then I'll go.<br />
<br />
         Why wait at all?<br />
         Hope springs alive,<br />
         Good may befall<br />
         I yet may thrive.<br />
<br />
It is because I can't make up my mind<br />
If God is good, impotent or unkind.</p>
