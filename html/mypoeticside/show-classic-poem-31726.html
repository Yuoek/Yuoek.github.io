<h1 class="title-poem">Epigram</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/royall.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Royall Tyler</h2>
<p>My Breeches torn, my Coat threadbare,<br />
Go, court Dame Fortune's daughters fair,<br />
Says SAM, and you'll be well drest;<br />
Z---d's SAM, it is most clearly seen,<br />
That I full long have married been<br />
To that vile jade, the Eldest.</p>
