<h1 class="title-poem">To the maiden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>To the maiden<br />
The sea was blue meadow,<br />
Alive with little froth-people<br />
Singing.<br />
<br />
To the sailor, wrecked,<br />
The sea was dead grey walls<br />
Superlative in vacancy,<br />
Upon which nevertheless at fateful time<br />
Was written<br />
The grim hatred of nature.</p>
