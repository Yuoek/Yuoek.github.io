<h1 class="title-poem">A Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Ralph-Hodgson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Hodgson</h2>
<p>with Love among the haycocks<br />
We played at hide and seek;<br />
He shut his eyes and counted --<br />
We hid among the hay --<br />
Then he a haycock mounted,<br />
And spied us where we lay;<br />
And O! the merry laughter<br />
Across the hayfield after!</p>
