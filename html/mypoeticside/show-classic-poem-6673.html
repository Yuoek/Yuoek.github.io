<h1 class="title-poem">Dirge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Never the nightingale,<br />
<br />
Oh, my dear,<br />
<br />
Never again the lark<br />
<br />
Thou wilt hear;<br />
<br />
Though dusk and the morning still<br />
<br />
Tap at thy window-sill,<br />
<br />
Though ever love call and call<br />
<br />
Thou wilt not hear at all,<br />
<br />
My dear, my dear.</p>
