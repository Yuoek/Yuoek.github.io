<h1 class="title-poem">Crystal</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Paul-Celan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Celan</h2>
<p>not on my lips look for your mouth,<br />
not in front of the gate for the stranger,<br />
not in the eye for the tear.<br />
<br />
seven nights higher red makes for red,<br />
seven hearts deeper the hand knocks on the gate,<br />
seven roses later plashes the fountain.<br />
<br />
<br />
Anonymous submission.</p>
