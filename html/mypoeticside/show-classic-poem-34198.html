<h1 class="title-poem">Earthly Pride</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>How baseless is the mightiest earthly pride,<br />
The diamond is but charcoal purified,<br />
The lordliest pearl that decks a monarch's breast<br />
Is but an insect's sepulchre at best.</p>
