<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Admonition 09</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Do not pity the weakness of a foe because when he gains strength he will not spare thee.<br />
<br />
          Boast not of thy moustaches when thou seest thy foe is weak.  <br />
          There is marrow in every bone, a man in every coat.</p>
