<h1 class="title-poem">Time And Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/vidyapati.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vidyapati</h2>
<p>As I guard my honor,<br />
My love in a foreign land<br />
Ravishes beauties<br />
Who belong to others.<br />
Safely he will come,<br />
But he has left me dead.<br />
<br />
O traveler, tell him<br />
That my youth wastes away...<br />
If time goes on<br />
Life too will go<br />
And never shall we love again...</p>
