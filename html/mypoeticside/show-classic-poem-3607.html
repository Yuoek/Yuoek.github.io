<h1 class="title-poem">Kafka's Hat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>With the rain falling<br />
surgically against the roof,<br />
I ate a dish of ice cream<br />
that looked like Kafka's hat.<br />
It was a dish of ice cream<br />
tasting like an operating table<br />
with the patient staring<br />
up at the ceiling.</p>
