<h1 class="title-poem">Our share of night to bear</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>113<br />
<br />
Our share of night to bear—<br />
Our share of morning—<br />
Our blank in bliss to fill<br />
Our blank in scorning—<br />
<br />
Here a star, and there a star,<br />
Some lose their way!<br />
Here a mist, and there a mist,<br />
Afterwards—Day!</p>
