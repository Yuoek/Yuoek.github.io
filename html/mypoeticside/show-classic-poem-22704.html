<h1 class="title-poem">Three blind mice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Beatrix-Potter.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Beatrix Potter</h2>
<p>Three blind mice, three blind mice,<br />
See how they run!<br />
They all run after the farmer's wife,<br />
And she cut off their tails with a carving knife,<br />
Did ever you see such a thing in your life<br />
As three blind mice!</p>
