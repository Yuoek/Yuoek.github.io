<h1 class="title-poem">The Poet's Thought</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/lcm.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lucy Maud Montgomery</h2>
<p>It came to him in rainbow dreams,<br />
Blent with the wisdom of the sages,<br />
Of spirit and of passion born;<br />
In words as lucent as the morn<br />
He prisoned it, and now it gleams<br />
A jewel shining through the ages.</p>
