<h1 class="title-poem">Sown in dishonor</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>62<br />
<br />
"Sown in dishonor"!<br />
Ah! Indeed!<br />
May this "dishonor" be?<br />
If I were half so fine myself<br />
I'd notice nobody!<br />
<br />
"Sown in corruption"!<br />
Not so fast!<br />
Apostle is askew!<br />
Corinthians 1. 15. narrates<br />
A Circumstance or two!</p>
