<h1 class="title-poem">The Flowers Have Tender Little Souls</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>The flowers have tender little souls<br />
That love, rejoice, aspire.<br />
Each star that on its orbit rolls<br />
Feels infinite desire.<br />
The diamond longs to scintillate<br />
When hid beneath the sod.<br />
The universe is animate<br />
With consciousness of God.</p>
