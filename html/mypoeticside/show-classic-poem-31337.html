<h1 class="title-poem">Unsuspecting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Jean-Toomer.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jean Toomer</h2>
<p>There is a natty kind of mind<br />
That slicks its thoughts,<br />
Culls its oughts,<br />
Trims its views,<br />
Prunes its trues,<br />
And never suspects it is a rind.</p>
