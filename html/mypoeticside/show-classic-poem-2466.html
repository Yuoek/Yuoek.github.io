<h1 class="title-poem">The Vulture</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>The Vulture eats between his meals,<br />
And that's the reason why<br />
He very, very, rarely feels<br />
As well as you and I.<br />
<br />
His eye is dull, his head is bald,<br />
His neck is growing thinner.<br />
Oh! what a lesson for us all<br />
To only eat at dinner!</p>
