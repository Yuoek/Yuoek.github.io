<h1 class="title-poem">Tonight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The moon is a curving flower of gold,<br />
The sky is still and blue;<br />
The moon was made for the sky to hold,<br />
And I for you;<br />
<br />
The moon is a flower without a stem,<br />
The sky is luminous;<br />
Eternity was made for them,<br />
To-night for us.</p>
