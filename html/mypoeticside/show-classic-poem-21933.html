<h1 class="title-poem">Little song for the maimed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Benjamin Peret</h2>
<p>Lend me your arm<br />
<br />
To replace my leg<br />
<br />
The rats ate it for me<br />
<br />
At Verdun<br />
<br />
At Verdun<br />
<br />
I ate a lot of rats<br />
<br />
But they didn't give me back my leg<br />
<br />
And that's why I was given the Croix de Guerre<br />
<br />
And a wooden leg<br />
<br />
And a wooden leg</p>
