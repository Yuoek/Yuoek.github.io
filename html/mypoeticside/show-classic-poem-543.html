<h1 class="title-poem">Departure</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/annaa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anna Akhmatova</h2>
<p>Although this land is not my own, <br />
I will remember its inland sea <br />
and the waters that are so cold <br />
the sand as white <br />
as old bones, the pine trees <br />
strangely red where the sun comes down. <br />
<br />
I cannot say if it is our love, <br />
or the day, that is ending.</p>
