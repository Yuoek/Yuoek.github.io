<h1 class="title-poem">My Love Was Warm</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>My love was warm; for that I crossed<br />
The mountains and the sea,<br />
Nor counted that endeavour lost<br />
That gave my love to me.<br />
<br />
If that indeed were love at all,<br />
As still, my love, I trow,<br />
By what dear name am I to call<br />
The bond that holds me now</p>
