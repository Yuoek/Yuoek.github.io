<h1 class="title-poem">January</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>Again I reply to the triple winds<br />
running chromatic fifths of derision<br />
outside my window:<br />
                              Play louder.<br />
You will not succeed. I am<br />
bound more to my sentences<br />
the more you batter at me<br />
to follow you.<br />
                    And the wind,<br />
as before, fingers perfectly<br />
its derisive music.</p>
