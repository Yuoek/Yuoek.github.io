<h1 class="title-poem">Nocturne In A Deserted Brickyard</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Stuff of the moon<br />
Runs on the lapping sand<br />
Out to the longest shadows.<br />
Under the curving willows,<br />
And round the creep of the wave line,<br />
Fluxions of yellow and dusk on the waters<br />
Make a wide dreaming pansy of an old pond in the night.</p>
