<h1 class="title-poem">Language</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Nizar.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nizar Qabbani</h2>
<p>When a man is in love<br />
how can he use old words?<br />
Should a woman<br />
desiring her lover<br />
lie down with<br />
grammarians and linguists?<br />
<br />
I said nothing<br />
to the woman I loved<br />
but gathered<br />
love's adjectives into a suitcase<br />
and fled from all languages.</p>
