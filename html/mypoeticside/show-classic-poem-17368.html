<h1 class="title-poem">Good Saint Nick</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>May good St. Nick, like as a bird of night,    <br />
Bring thee rich blessings in his annual flight;<br />
Long by thy chimney rest his pond'rous pack,    <br />
And leave with lessen'd weight upon his back!</p>
