<h1 class="title-poem">Anthea's Retractation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Anthea laugh'd, and, fearing lest excess<br />
Might stretch the cords of civil comeliness<br />
She with a dainty blush rebuked her face,<br />
And call'd each line back to his rule and space.</p>
