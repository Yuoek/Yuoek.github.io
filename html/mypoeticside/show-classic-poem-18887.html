<h1 class="title-poem">English Poets: Shelley</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/07/mcin.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James McIntyre</h2>
<p>We have scarcely time to tell thee<br />
    Of the strange and gifted Shelley,<br />
    Kind hearted man, but ill-fated,<br />
    So youthful drowned and cremated.</p>
