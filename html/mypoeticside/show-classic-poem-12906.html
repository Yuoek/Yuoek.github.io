<h1 class="title-poem">Hymn To Bacchus</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Bacchus, let me drink no more!<br />
Wild are seas that want a shore!<br />
When our drinking has no stint,<br />
There is no one pleasure in't.<br />
I have drank up for to please<br />
Thee, that great cup, Hercules.<br />
Urge no more; and there shall be<br />
Daffadils giv'n up to thee.</p>
