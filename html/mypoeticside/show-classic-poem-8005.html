<h1 class="title-poem">Patience—has a quiet Outer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>926<br />
<br />
Patience—has a quiet Outer—<br />
Patience—Look within—<br />
Is an Insect's futile forces<br />
Infinites—between—<br />
<br />
'Scaping one—against the other<br />
Fruitlesser to fling—<br />
Patience—is the Smile's exertion<br />
Through the quivering—</p>
