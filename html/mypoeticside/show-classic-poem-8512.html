<h1 class="title-poem">Within my reach!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>90<br />
<br />
Within my reach!<br />
I could have touched!<br />
I might have chanced that way!<br />
Soft sauntered thro' the village—<br />
Sauntered as soft away!<br />
So unsuspected Violets<br />
Within the meadows go—<br />
Too late for striving fingers<br />
That passed, an hour ago!</p>
