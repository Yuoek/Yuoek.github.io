<h1 class="title-poem">Longing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I am not sorry for my soul<br />
That it must go unsatisfied,<br />
For it can live a thousand times,<br />
Eternity is deep and wide.<br />
<br />
I am not sorry for my soul,<br />
But oh, my body that must go<br />
Back to a little drift of dust<br />
Without the joy it longed to know.</p>
