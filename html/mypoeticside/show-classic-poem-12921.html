<h1 class="title-poem">An Epitaph Upon A Virgin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Here a solemn fast we keep,<br />
While all beauty lies asleep;<br />
Hush'd be all things, no noise here<br />
But the toning of a tear;<br />
Or a sigh of such as bring<br />
Cowslips for her covering.</p>
