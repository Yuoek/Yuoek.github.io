<h1 class="title-poem">Three Little Children</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Three little children<br />
On the wide wide earth,<br />
Motherless children -<br />
Cared for from their birth<br />
By tender angels.<br />
Three little children<br />
On the wide wide sea,<br />
Motherless children -<br />
Safe as safe can be<br />
With guardian angels.</p>
