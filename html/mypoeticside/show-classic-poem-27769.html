<h1 class="title-poem">Conviction (I)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>Christ died for God and me<br />
Upon the crucifixion tree<br />
For God a spoken Word<br />
For me a Sword<br />
For God a hymn of praise<br />
For me eternal days<br />
For God an explanation<br />
For me salvation.</p>
