<h1 class="title-poem">Epigram, 1734</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/ladym.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lady Mary Wortley Montagu</h2>
<p>Born to be slaves, our fathers freedom sought,<br />
And with their blood the precious treasure bought;<br />
We their mean offspring our own bondage plot,<br />
And, born to freedom, for our chains we vote.</p>
