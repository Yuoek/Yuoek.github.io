<h1 class="title-poem">Forgetting Someone</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/yehuda.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yehuda Amichai</h2>
<p>Forgetting someone is like forgetting to turn off the light <br />
    in the backyard so it stays lit all the next day <br />
<br />
But then it is the light that makes you remember.</p>
