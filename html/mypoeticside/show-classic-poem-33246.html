<h1 class="title-poem">The Stone Ledge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>On the stone ledge above the water,<br />
Where willow leaf-tips drink the wine.<br />
If you say the spring breeze has no meaning,<br />
Why does it bring me all these falling flowers?</p>
