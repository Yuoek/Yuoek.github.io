<h1 class="title-poem">The Himmaleh was known to stoop</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>481<br />
<br />
The Himmaleh was known to stoop<br />
Unto the Daisy low—<br />
Transported with Compassion<br />
That such a Doll should grow<br />
Where Tent by Tent—Her Universe<br />
Hung out its Flags of Snow—</p>
