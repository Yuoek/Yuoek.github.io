<h1 class="title-poem">Enough For Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Fadwa-Touqan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Fadwa Touqan</h2>
<p>Enough for me to die on her earth<br />
be buried in her<br />
to melt and vanish into her soil<br />
then sprout forth as a flower<br />
played with by a child from my country.<br />
Enough for me to remain<br />
in my country's embrace<br />
to be in her close as a handful of dust<br />
a sprig of grass<br />
a flower.</p>
