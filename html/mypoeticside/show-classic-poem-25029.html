<h1 class="title-poem">Fire Pages</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>I will read ashes for you, if you ask me.<br />
I will look on the fire and tell you from the gray lashes<br />
And out of the red and black tongues and stripes,<br />
I will tell how fire comes<br />
And how fire runs far as the sea.</p>
