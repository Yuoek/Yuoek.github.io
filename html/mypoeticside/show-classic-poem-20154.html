<h1 class="title-poem">Caught in the Undertow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Christopher-Morley.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christopher Morley</h2>
<p>COLIN, worshipping some frail,<br />
By self-deception sways her:<br />
Calls himself unworthy male,<br />
Hardly even fit to praise her.<br />
<br />
But this tactic insincere<br />
In the upshot greatly grieves him<br />
When he finds the lovely dear<br />
Quite implicitly believes him.</p>
