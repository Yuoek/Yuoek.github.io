<h1 class="title-poem">Might and Right</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>If Might made Right, life were a wild-beasts' cage;<br />
If Right made Might, this were the golden age;<br />
But now, until we win the long campaign,<br />
Right must gain Might to conquer and to reign.</p>
