<h1 class="title-poem">A Prayer To All The Dead Among Mine Own People</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Vachel-Lindsay.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vachel Lindsay</h2>
<p>Are these your presences, my clan from Heaven?<br />
Are these your hands upon my wounded soul?<br />
Mine own, mine own, blood of my blood be with me,<br />
Fly by my path till you have made me whole!</p>
