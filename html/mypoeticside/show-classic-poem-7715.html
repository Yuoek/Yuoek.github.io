<h1 class="title-poem">Growing Up</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/09/CJD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clarence Michael James Dennis</h2>
<p>Little Tommy Tadpole began to weep and wail,<br />
For little Tommy Tadpole had lost his little tail;<br />
  And his mother didn't know him as he wept upon a log,<br />
  For he wasn't Tommy Tadpole, but Mr. Thomas Frog.</p>
