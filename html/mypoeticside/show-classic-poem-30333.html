<h1 class="title-poem">Like Barley Bending</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Like barley bending<br />
In low fields by the sea,<br />
Singing in hard wind<br />
Ceaselessly;<br />
<br />
Like barley bending<br />
And rising again,<br />
So would I, unbroken,<br />
Rise from pain;<br />
<br />
So would I softly,<br />
Day long, night long,<br />
Change my sorrow<br />
Into song.</p>
