<h1 class="title-poem">It's no use</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>It's no use<br />
Mother dear, I<br />
can't finish my<br />
weaving<br />
You may<br />
blame Aphrodite<br />
<br />
soft as she is<br />
<br />
she has almost<br />
killed me with<br />
love for that boy</p>
