<h1 class="title-poem">Rangoon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>ust a changing sea of colour<br />
Surging up and flowing down;<br />
And pagodas shining golden, night and noon;<br />
And a sun-burst-tinted throng<br />
Of young priests that move along<br />
Under sun-burst-hued umbrellas through the town.<br />
That's Rangoon.</p>
