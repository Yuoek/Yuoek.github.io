<h1 class="title-poem">Nova Scotia</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/07/mcin.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James McIntyre</h2>
<p>If you are sulky, Nova Scotia,<br />
    We'll gladly let you float away<br />
    From out our Confederation;<br />
    You sicken us with sily agitation.<br />
    If any more our patience you do tax<br />
    We'll let you go to Halifax.</p>
