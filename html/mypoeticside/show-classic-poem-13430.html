<h1 class="title-poem">The Fairies Break Their Dances</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>The fairies break their dances<br />
And leave the printed lawn,<br />
And up from India glances<br />
The silver sail of dawn.<br />
<br />
The candles burn their sockets,<br />
The blinds let through the day,<br />
The young man feels his pockets<br />
And wonders what's to pay.</p>
