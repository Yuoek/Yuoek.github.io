<h1 class="title-poem">The Dog Lies In His Kennel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>The dog lies in his kennel,<br />
And Puss purrs on the rug,<br />
And baby perches on my knee<br />
For me to love and hug.<br />
Pat the dog and stroke the cat,<br />
Each in its degree;<br />
And cuddle and kiss my baby,<br />
And baby kiss me.</p>
