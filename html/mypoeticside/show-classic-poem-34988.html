<h1 class="title-poem">Mourning His Concubine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/11/otomo.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Otomo no Yakamochi</h2>
<p>From now on<br />
Coldly autumn winds<br />
Will blow:<br />
How can I bear<br />
To sleep the long night through?</p>
