<h1 class="title-poem">A Sea Child</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/10/bliss.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Bliss Carman</h2>
<p>The lover of child Marjory<br />
    Had one white hour of life brim full;<br />
  Now the old nurse, the rocking sea,<br />
    Hath him to lull.<br />
  The daughter of child Marjory<br />
    Hath in her veins, to beat and run,<br />
  The glad indomitable sea,<br />
    The strong white sun.</p>
