<h1 class="title-poem">Thunder Shower</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>Thedark cloud raged.<br />
Gone was the morning light.<br />
The big drops darted down:<br />
The storm stood tall on the rose-trees:<br />
and the bees that were getting honey<br />
out of wet roses,<br />
the hiding bees would not come out of the flowers<br />
into the rain.</p>
