<h1 class="title-poem">There Is One That Has A Head Without An Eye</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>There is one that has a head without an eye,<br />
And there's one that has an eye without a head:<br />
You may find the answer if you try;<br />
And when all is said,<br />
Half the answer hangs upon a thread!</p>
