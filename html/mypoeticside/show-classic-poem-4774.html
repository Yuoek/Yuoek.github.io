<h1 class="title-poem">Impending Doom</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/Wilhelm-Busch.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wilhelm Busch</h2>
<p>Es machen sich die Fliegen<br />
Ein luftig Tanzvergnügen.<br />
Der Frosch, der denkt: Nur munter!<br />
Ihr kommt schon noch herunter!<br />
<br />
Up high, the flies are playing,<br />
And frolicking, and swaying.<br />
The frog thinks: Dance! I know<br />
You'll end up here below.</p>
