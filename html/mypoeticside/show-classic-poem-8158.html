<h1 class="title-poem">You left me—Sire—two Legacies</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>644<br />
<br />
You left me—Sire—two Legacies—<br />
A Legacy of Love<br />
A Heavenly Father would suffice<br />
Had He the offer of—<br />
<br />
You left me Boundaries of Pain—<br />
Capacious as the Sea—<br />
Between Eternity and Time—<br />
Your Consciousness—and Me—</p>
