<h1 class="title-poem">To Foreign Lands</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>I HEARD that you ask'd for something to prove this puzzle, the New<br />
        World,<br />
And to define America, her athletic Democracy;<br />
Therefore I send you my poems, that you behold in them what you<br />
        wanted.</p>
