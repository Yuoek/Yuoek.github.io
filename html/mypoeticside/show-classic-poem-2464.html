<h1 class="title-poem">The Tiger</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>The tiger, on the other hand,<br />
Is kittenish and mild,<br />
And makes a pretty playfellow<br />
For any little child.<br />
And mothers of large families<br />
(Who claim to common sense)<br />
Will find a tiger well repays<br />
The trouble and expense.</p>
