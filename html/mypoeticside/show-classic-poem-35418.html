<h1 class="title-poem">The Fairy Cave</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/maozedong.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mao Zedong</h2>
<p>Inscription on a Picture Taken by Comrade Li Jin<br />
<br />
Amid the growing shades of dusk stand sturdy pines,<br />
Riotous clouds sweep past, swift and tranquil.<br />
Nature has excelled herself in the Fairy Cave,<br />
On perilous peaks dwells beauty in her infinite variety.</p>
