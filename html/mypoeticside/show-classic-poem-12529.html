<h1 class="title-poem">Atomyriades</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Nature, it seems is the popular name<br />
for milliards and milliards and milliards<br />
of particles playing their infinite game<br />
of billiards and billiards and billiards.</p>
