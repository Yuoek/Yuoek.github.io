<h1 class="title-poem">'Tis customary as we part</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>440<br />
<br />
'Tis customary as we part<br />
A trinket—to confer—<br />
It helps to stimulate the faith<br />
When Lovers be afar—<br />
<br />
'Tis various—as the various taste—<br />
Clematis—journeying far—<br />
Presents me with a single Curl<br />
Of her Electric Hair—</p>
