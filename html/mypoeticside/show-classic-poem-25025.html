<h1 class="title-poem">Between Two Hills</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Between two hills<br />
The old town stands.<br />
The houses loom<br />
And the roofs and trees<br />
And the dusk and the dark,<br />
The damp and the dew<br />
    Are there.<br />
<br />
The prayers are said<br />
And the people rest<br />
For sleep is there<br />
And the touch of dreams<br />
    Is over all.</p>
