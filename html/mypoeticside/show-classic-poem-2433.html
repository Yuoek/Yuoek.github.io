<h1 class="title-poem">The Big Baboon.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>The Big Baboon is found upon<br />
The plains of Cariboo:<br />
He goes about with nothing on<br />
(A shocking thing to do).<br />
<br />
But if he dressed up respectably<br />
And let his whiskers grow,<br />
How like this Big Baboon would be<br />
To Mister So-and-so!</p>
