<h1 class="title-poem">Reading Laozi</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>Those who speak do not know, those who know are silent,<br />
I heard this saying from the old gentleman.<br />
If the old gentleman was one who knew the way,<br />
Why did he feel able to write five thousand words?</p>
