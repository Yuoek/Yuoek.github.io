<h1 class="title-poem">Snowfall blankets the mountain village</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/simhun.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sim Hun</h2>
<p>Snowfall blankets the mountain village and buries my rocky lane.<br />
No need to open the brushwood gate, none will come to see me.<br />
Still, a crescent moon smiles brightly down, the truest friend I have.</p>
