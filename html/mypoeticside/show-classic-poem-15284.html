<h1 class="title-poem">The Bronckhurst Divorce Case</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>In the daytime, when she moved about me,<br />
In the night, when she was sleeping at my side, --<br />
I was wearied, I was wearied of her presence.<br />
Day by day and night by night I grew to hate her --<br />
Would God that she or I had died!</p>
