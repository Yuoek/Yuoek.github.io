<h1 class="title-poem">To hang our head—ostensibly</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>105<br />
<br />
To hang our head—ostensibly—<br />
And subsequent, to find<br />
That such was not the posture<br />
Of our immortal mind—<br />
<br />
Affords the sly presumption<br />
That in so dense a fuzz—<br />
You—too—take Cobweb attitudes<br />
Upon a plane of Gauze!</p>
