<h1 class="title-poem">from Runot ja Hipponaksin runot</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Pentti-Saarikoski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Pentti Saarikoski</h2>
<p>Life is given to man<br />
to make him consider carefully<br />
the position he'd like to be dead in,<br />
grey skies pass over,<br />
the sky's a hanging garden<br />
and earth comes into the mouth like bread.</p>
