<h1 class="title-poem">My Own</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Then let them point my every tear,<br />
 And let them mock and moan;<br />
Another week, another year,<br />
 And I'll be with my own<br />
<br />
Who slumber now by night and day<br />
 In fields of level brown;<br />
Whose hearts within their breasts were clay<br />
 Before they laid them down.</p>
