<h1 class="title-poem">The Wait</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>It seemed<br />
like years<br />
before<br />
I picked<br />
a bouquet<br />
of kisses<br />
off her mouth<br />
and put them<br />
into a dawn-colored vase<br />
in<br />
my<br />
heart.<br />
<br />
But<br />
the wait<br />
was worth it.<br />
<br />
Because<br />
I<br />
was<br />
in love.</p>
