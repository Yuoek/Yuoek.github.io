<h1 class="title-poem">To love thee Year by Year</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>434<br />
<br />
To love thee Year by Year—<br />
May less appear<br />
Than sacrifice, and cease—<br />
However, dear,<br />
Forever might be short, I thought to show—<br />
And so I pieced it, with a flower, now.</p>
