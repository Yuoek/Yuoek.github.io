<h1 class="title-poem">Farewell and Thanksgiving</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/vandoren.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mark Van Doren</h2>
<p>Whatever I have left unsaid<br />
When I am dead<br />
O'muse forgive me.<br />
You were always there,<br />
like light, like air.<br />
Those great good things<br />
of which the least bird sings,<br />
So why not I?<br />
Yet thank you even then,<br />
Sweet muse, Amen.</p>
