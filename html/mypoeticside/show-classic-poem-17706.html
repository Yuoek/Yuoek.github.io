<h1 class="title-poem">Carrefour</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>O you,<br />
Who came upon me once<br />
Stretched under apple-trees just after bathing,<br />
Why did you not strangle me before speaking<br />
Rather than fill me with the wild white honey of your words<br />
And then leave me to the mercy<br />
Of the forest bees?</p>
