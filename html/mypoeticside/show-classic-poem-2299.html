<h1 class="title-poem">Lay a garland on my hearse</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/01/FB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Francis Beaumont</h2>
<p>Lay a garland on my hearse, <br />
   Of the dismal yew, <br />
Maidens, willow branches bear, <br />
   Say I died true. <br />
My love was false, but I was firm <br />
   From my hour of birth; <br />
Upon my buried body lie <br />
   Lightly, gentle earth.</p>
