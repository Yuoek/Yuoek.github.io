<h1 class="title-poem">Give Me Women, Wine, and Snuff</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/04/keats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Keats</h2>
<p>GIVE me women, wine, and snuff<br />
Until I cry out "hold, enough!"<br />
You may do so sans objection<br />
Till the day of resurrection:<br />
For, bless my beard, they aye shall be<br />
My beloved Trinity.</p>
