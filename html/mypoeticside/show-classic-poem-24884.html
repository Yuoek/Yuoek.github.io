<h1 class="title-poem">Baby Toes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>There is a blue star, Janet,<br />
Fifteen years’ ride from us,<br />
If we ride a hundred miles an hour.<br />
 <br />
There is a white star, Janet,<br />
Forty years’ ride from us,<br />
If we ride a hundred miles an hour.<br />
 <br />
Shall we ride<br />
To the blue star<br />
Or the white star?</p>
