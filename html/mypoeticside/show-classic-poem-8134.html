<h1 class="title-poem">To offer brave assistance</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>767<br />
<br />
To offer brave assistance<br />
To Lives that stand alone—<br />
When One has failed to stop them—<br />
Is Human—but Divine<br />
<br />
To lend an Ample Sinew<br />
Unto a Nameless Man—<br />
Whose Homely Benediction<br />
No other—stopped to earn—</p>
