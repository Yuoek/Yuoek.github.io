<h1 class="title-poem">A Day! Help! Help! Another Day!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>42<br />
<br />
A Day! Help! Help! Another Day!<br />
Your prayers, oh Passer by!<br />
From such a common ball as this<br />
Might date a Victory!<br />
From marshallings as simple<br />
The flags of nations swang.<br />
Steady—my soul: What issues<br />
Upon thine arrow hang!</p>
