<h1 class="title-poem">My nosegays are for captives;</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>My nosegays are for captives;<br />
  Dim, long-expectant eyes,<br />
Fingers denied the plucking,<br />
  Patient till paradise.<br />
<br />
To such, if they should whisper<br />
  Of morning and the moor,<br />
They bear no other errand,<br />
  And I, no other prayer.</p>
