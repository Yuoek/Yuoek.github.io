<h1 class="title-poem">Walking in the sky,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Walking in the sky,<br />
A man in strange black garb<br />
Encountered a radiant form.<br />
Then his steps were eager;<br />
Bowed he devoutly.<br />
"My Lord," said he.<br />
But the spirit knew him not.</p>
