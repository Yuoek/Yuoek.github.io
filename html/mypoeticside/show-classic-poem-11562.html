<h1 class="title-poem">Flower-Salute</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>THIS nosegay,--'twas I dress'd it,--<br />
<br />
Greets thee a thousand times!<br />
Oft stoop'd I, and caress'd it,<br />
<br />
Ah! full a thousand times,<br />
And 'gainst my bosom press'd it<br />
<br />
A hundred thousand times!</p>
