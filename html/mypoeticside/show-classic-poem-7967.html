<h1 class="title-poem">My best Acquaintances are those</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>932<br />
<br />
My best Acquaintances are those<br />
With Whom I spoke no Word—<br />
The Stars that stated come to Town<br />
Esteemed Me never rude<br />
Although to their Celestial Call<br />
I failed to make reply—<br />
My constant—reverential Face<br />
Sufficient Courtesy.</p>
