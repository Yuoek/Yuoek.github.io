<h1 class="title-poem">Bringers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Cover me over<br />
In dusk and dust and dreams.<br />
<br />
Cover me over<br />
And leave me alone.<br />
<br />
Cover me over,<br />
You tireless, great.<br />
<br />
Hear me and cover me,<br />
Bringers of dusk and dust and dreams.</p>
