<h1 class="title-poem">Snow beneath whose chilly softness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>942<br />
<br />
Snow beneath whose chilly softness<br />
Some that never lay<br />
Make their first Repose this Winter<br />
I admonish Thee<br />
<br />
Blanket Wealthier the Neighbor<br />
We so new bestow<br />
Than thine acclimated Creature<br />
Wilt Thou, Austere Snow?</p>
