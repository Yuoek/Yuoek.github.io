<h1 class="title-poem">Don't know about the people</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/koba.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Kobayashi Issa</h2>
<p>Approaching my village:<br />
<br />
       Don't know about the people,<br />
       but all the scarecrows<br />
       are crooked.</p>
