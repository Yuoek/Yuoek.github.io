<h1 class="title-poem">Garland for Queens, may be</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>34<br />
<br />
Garland for Queens, may be—<br />
Laurels—for rare degree<br />
Of soul or sword.<br />
Ah—but remembering me—<br />
Ah—but remembering thee—<br />
Nature in chivalry—<br />
Nature in charity—<br />
Nature in equity—<br />
This Rose ordained!</p>
