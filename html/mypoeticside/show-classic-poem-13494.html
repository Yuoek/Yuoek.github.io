<h1 class="title-poem">Oh, when I was in love with you</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>Oh, when I was in love with you,<br />
Then I was clean and brave,<br />
And miles around the wonder grew<br />
How well did I behave.<br />
<br />
And now the fancy passes by,<br />
And nothing will remain,<br />
And miles around they'll say that I<br />
Am quite myself again.</p>
