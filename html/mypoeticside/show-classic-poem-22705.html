<h1 class="title-poem">Pussy-cat sits by the fire</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Beatrix-Potter.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Beatrix Potter</h2>
<p>Pussy-cat sits by the fire;<br />
How should she be fair?<br />
In walks the little dog,<br />
Says "Pussy! are you there?"<br />
<br />
"How do you do, Mistress Pussy?<br />
Mistress Pussy, how do you do?"<br />
"I thank you kindly, little dog,<br />
I fare as well as you!"</p>
