<h1 class="title-poem">This we Have Now</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>This we have now<br />
is not imagination.<br />
<br />
<br />
This is not<br />
grief or joy.<br />
<br />
<br />
Not a judging state,<br />
or an elation,<br />
or sadness.<br />
<br />
<br />
Those come and go.<br />
This is the presence that doesn't.</p>
