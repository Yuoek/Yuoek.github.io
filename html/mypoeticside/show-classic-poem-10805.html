<h1 class="title-poem">Impromptu Lines</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/10/fur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Furphy</h2>
<p>Deem not this wielder of this pen<br />
The happiest bloque alive,<br />
For I am only five-foot-ten,<br />
And ye are ten-foot-five.<br />
Wherefore I clothe myself in jute,<br />
And likewise softly go,<br />
Like that historical galoot<br />
Whose tale you surely know.</p>
