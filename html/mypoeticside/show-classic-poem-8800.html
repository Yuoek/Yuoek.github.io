<h1 class="title-poem">I lived on dread; to those who know</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I lived on dread; to those who know<br />
The stimulus there is<br />
In danger, other impetus<br />
Is numb and vital-less.<br />
<br />
As't were a spur upon the soul,<br />
A fear will urge it where<br />
To go without the spectre's aid<br />
Were challenging despair.</p>
