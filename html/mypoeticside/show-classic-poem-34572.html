<h1 class="title-poem">Let Me Grow Lovely</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Karl-Wilson-Baker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Karle Wilson Baker</h2>
<p>Let me grow lovely, growing old--<br />
So many fine things do:<br />
Laces, and ivory, and gold,<br />
And silks need not be new;<br />
And there is healing in old trees,<br />
Old streets a glamour hold;<br />
Why may not I, as well as these,<br />
Grow lovely, growing old?</p>
