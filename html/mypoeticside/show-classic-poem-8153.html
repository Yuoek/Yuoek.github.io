<h1 class="title-poem">Whole Gulfs—of Red, and Fleets—of Red</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>658<br />
<br />
Whole Gulfs—of Red, and Fleets—of Red—<br />
And Crews—of solid Blood—<br />
Did place upon the West—Tonight—<br />
As 'twere specific Ground—<br />
<br />
And They—appointed Creatures—<br />
In Authorized Arrays—<br />
Due—promptly—as a Drama—<br />
That bows—and disappears—</p>
