<h1 class="title-poem">Such Stuff As Dreams</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/01/FPA.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Franklin P. Adams</h2>
<p>Jenny kissed me in a dream; <br />
  So did Elsie, Lucy, Cora, <br />
Bessie, Gwendolyn, Eupheme, <br />
  Alice, Adelaide, and Dora. <br />
Say of honour I'm devoid, <br />
  Say monogamy has miss'd me, <br />
But don't say to Dr. Freud <br />
     Jenny kiss'd me.</p>
