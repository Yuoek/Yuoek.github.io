<h1 class="title-poem">A Bald-Headed Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/gal-004a1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bhartrihari</h2>
<p>A bald-headed man, his pate<br />
                    Pained by the rays of the sun,<br />
                    Desiring a shady spot,<br />
                    Went by fate to the foot<br />
                    Of a wood-apple tree.<br />
                    Alas, there his head<br />
                    Was smashed by a large<br />
                    Falling fruit.<br />
                    Verily,<br />
                    Where goes a man deserted by fortune,<br />
                    There do adversities follow him.</p>
