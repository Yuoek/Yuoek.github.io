<h1 class="title-poem">Atalanta</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Gaius-Valerius-Catullus.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gaius Valerius Catullus</h2>
<p>It’s as pleasing to me as, they say,<br />
that golden apple was to the swift girl,<br />
that loosed her belt, too long tied.</p>
