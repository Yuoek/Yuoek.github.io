                    <h2 class="title-content">Theognis</h2>
<p>Bitter and sweet, alluring and tormenting:<br />
   Such, till it be fulfilled, Kyrnos, is love to the young;<br />
For if one finds fulfillment, it proves sweet; but if, pursuing,<br />
   One fails of fulfillment, then of all things it is most painful.</p>
