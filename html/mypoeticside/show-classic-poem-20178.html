<h1 class="title-poem">Dedication for a Fireplace</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Christopher-Morley.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christopher Morley</h2>
<p>THIS hearth was built for thy delight,<br />
For thee the logs were sawn,<br />
For thee the largest chair, at night,<br />
Is to the chimney drawn.<br />
<br />
For thee, dear lass, the match was lit<br />
To yield the ruddy blaze--<br />
May Jack Frost give us joy of it<br />
For many, many days.</p>
