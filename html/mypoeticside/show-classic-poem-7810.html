<h1 class="title-poem">When I have seen the Sun emerge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>888<br />
<br />
When I have seen the Sun emerge<br />
From His amazing House—<br />
And leave a Day at every Door<br />
A Deed, in every place—<br />
<br />
Without the incident of Fame<br />
Or accident of Noise—<br />
The Earth has seemed to me a Drum,<br />
Pursued of little Boys</p>
