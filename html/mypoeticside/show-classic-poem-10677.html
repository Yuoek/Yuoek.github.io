<h1 class="title-poem">In Neglect</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>They leave us so to the way we took,<br />
As two in whom them were proved mistaken,<br />
That we sit sometimes in the wayside nook,<br />
With mischievous, vagrant, seraphic look,<br />
And try if we cannot feel forsaken.</p>
