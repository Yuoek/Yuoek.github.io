<h1 class="title-poem">To Man Who Goes Seeking Immortality Bidding Him Look Nearer Home.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Too far afield thy search. Nay, turn. Nay, turn.<br />
<br />
At thine own elbow potent Memory stands,<br />
<br />
Thy double, and eternity is cupped<br />
<br />
In the pale hollow of those ghostly hands.</p>
