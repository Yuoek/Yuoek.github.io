<h1 class="title-poem">Kisses</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/07/strode.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Strode</h2>
<p>My love and I for kisses play'd,<br />
Shee would keepe stake, I was content,<br />
But when I wonne shee would be paid;<br />
This made mee aske her what she meant.<br />
Pray, since I see (quoth shee) your wrangling vayne,<br />
Take your owne kisses, give me myne againe.<br />
</p>
