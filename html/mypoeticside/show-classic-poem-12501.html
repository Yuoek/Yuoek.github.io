<h1 class="title-poem">T.t.t.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Put up in a place<br />
where it's easy to see<br />
the cryptic admonishment<br />
T.T.T.<br />
<br />
When you feel how depressingly<br />
slowly you climb,<br />
it's well to remember that<br />
Things Take Time.</p>
