<h1 class="title-poem">My Heart Is Heavy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>My heart is heavy with many a song<br />
Like ripe fruit bearing down the tree,<br />
But I can never give you one --<br />
My songs do not belong to me.<br />
<br />
Yet in the evening, in the dusk<br />
When moths go to and fro,<br />
In the gray hour if the fruit has fallen,<br />
Take it, no one will know.</p>
