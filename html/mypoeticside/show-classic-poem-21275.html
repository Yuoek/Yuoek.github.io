<h1 class="title-poem">On Being A Woman</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Why is it, when I am in Rome,<br />
I'd give an eye to be at home,<br />
But when on native earth I be,<br />
My soul is sick for Italy?<br />
<br />
And why with you, my love, my lord,<br />
Am I spectacularly bored,<br />
Yet do you up and leave me- then<br />
I scream to have you back again?</p>
