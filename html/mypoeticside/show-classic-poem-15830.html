<h1 class="title-poem">Separation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>THERE is a mountain and a wood between us,<br />
Where the lone shepherd and late bird have seen us<br />
 Morning and noon and eventide repass.<br />
Between us now the mountain and the wood<br />
Seem standing darker than last year they stood,<br />
 And say we must not cross--alas! alas!</p>
