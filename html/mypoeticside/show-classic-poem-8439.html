<h1 class="title-poem">The sweetest Heresy received</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>387<br />
<br />
The sweetest Heresy received<br />
That Man and Woman know—<br />
Each Other's Convert—<br />
Though the Faith accommodate but Two—<br />
<br />
The Churches are so frequent—<br />
The Ritual—so small—<br />
The Grace so unavoidable—<br />
To fail—is Infidel—</p>
