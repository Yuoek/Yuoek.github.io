<h1 class="title-poem">South Winds jostle them</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>86<br />
<br />
South Winds jostle them—<br />
Bumblebees come—<br />
Hover—hesitate—<br />
Drink, and are gone—<br />
<br />
Butterflies pause<br />
On their passage Cashmere—<br />
I—softly plucking,<br />
Present them here!</p>
