<h1 class="title-poem">An Immorality</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>Sing we for love and idleness,<br />
Naught else is worth the having.<br />
<br />
Though I have been in many a land,<br />
There is naught else in living.<br />
<br />
And I would rather have my sweet,<br />
Though rose-leaves die of grieving,<br />
<br />
Than do high deeds in Hungary<br />
To pass all men's believing.</p>
