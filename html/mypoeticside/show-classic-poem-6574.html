<h1 class="title-poem">When the prophet, a complacent fat man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>When the prophet, a complacent fat man,<br />
Arrived at the mountain-top,<br />
He cried: "Woe to my knowledge!<br />
I intended to see good white lands<br />
And bad black lands,<br />
But the scene is grey."</p>
