<h1 class="title-poem">Yes, I have a thousand tongues</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Yes, I have a thousand tongues,<br />
And nine and ninety-nine lie.<br />
Though I strive to use the one,<br />
It will make no melody at my will,<br />
But is dead in my mouth.</p>
