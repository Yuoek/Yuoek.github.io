<h1 class="title-poem">See, See, Mine Own Sweet Jewel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/04/morley.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Morley</h2>
<p>See, see, mine own sweet jewel,<br />
  See what I have here for my darling:<br />
  A robin-redbreast and a starling.<br />
  These I give both, in hope to move thee--<br />
  And yet thou say'st I do not love thee.</p>
