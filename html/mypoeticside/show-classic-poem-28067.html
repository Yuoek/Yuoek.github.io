<h1 class="title-poem">Poem 24</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Edmund-Spenser.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edmund Spenser</h2>
<p>SOng made in lieu of many ornaments,<br />
With which my loue should duly haue bene dect,<br />
Which cutting off through hasty accidents,<br />
Ye would not stay your dew time to expect,<br />
But promist both to recompens,<br />
Be vnto her a goodly ornament,<br />
And for short time an endlesse moniment.</p>
