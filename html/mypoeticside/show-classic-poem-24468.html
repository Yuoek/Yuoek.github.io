                    <h2 class="title-content">Sa di</h2>
<p>The teeth of all men are blunted by sourness, but those of the qazi by sweetness.<br />
<br />
            The qazi whom thou bribest with five cucumbers  <br />
            Will prove that ten melon-fields are due to thee.<br />
<br />
Comment? This poem is thought to be in the public domain.</p>
