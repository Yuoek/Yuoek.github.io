<h1 class="title-poem">All but Death, can be Adjusted</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>749<br />
<br />
All but Death, can be Adjusted—<br />
Dynasties repaired—<br />
Systems—settled in their Sockets—<br />
Citadels—dissolved—<br />
<br />
Wastes of Lives—resown with Colors<br />
By Succeeding Springs—<br />
Death—unto itself—Exception—<br />
Is exempt from Change—</p>
