<h1 class="title-poem">Valley Candle</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Wallace-Stevens.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wallace Stevens</h2>
<p>My candle burned alone in an immense valley.<br />
Beams of the huge night converged upon it,<br />
Until the wind blew.<br />
The beams of the huge night<br />
Converged upon its image,<br />
Until the wind blew.</p>
