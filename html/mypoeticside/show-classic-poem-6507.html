<h1 class="title-poem">The way your little finger moved</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>AH, God, the way your little finger moved<br />
As you thrust a bare arm backward<br />
And made play with your hair<br />
And a comb a silly gilt comb<br />
Ah, God--that I should suffer<br />
Because of the way a little finger moved.</p>
