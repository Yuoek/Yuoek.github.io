<h1 class="title-poem">Hug O'War</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/shel.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sheldon Allan Silverstein</h2>
<p>I will not play at tug o' war.<br />
I'd rather play at hug o' war,<br />
Where everyone hugs<br />
Instead of tugs,<br />
Where everyone giggles<br />
And rolls on the rug,<br />
Where everyone kisses,<br />
And everyone grins,<br />
And everyone cuddles,<br />
And everyone wins.</p>
