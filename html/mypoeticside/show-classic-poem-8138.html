<h1 class="title-poem">Too little way the House must lie</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>911<br />
<br />
Too little way the House must lie<br />
From every Human Heart<br />
That holds in undisputed Lease<br />
A white inhabitant—<br />
<br />
Too narrow is the Right between—<br />
Too imminent the chance—<br />
Each Consciousness must emigrate<br />
And lose its neighbor once—</p>
