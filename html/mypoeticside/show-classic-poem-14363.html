<h1 class="title-poem">A Map Of Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/donald.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Donald Justice</h2>
<p>Your face more than others' faces<br />
Maps the half-remembered places<br />
I have come to I while I slept—<br />
Continents a dream had kept<br />
Secret from all waking folk<br />
Till to your face I awoke,<br />
And remembered then the shore,<br />
And the dark interior.</p>
