<h1 class="title-poem">No Other can reduce</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>982<br />
<br />
No Other can reduce<br />
Our mortal Consequence<br />
Like the remembering it be nought<br />
A Period from hence<br />
But Contemplation for<br />
Contemporaneous Nought<br />
Our Single Competition<br />
Jehovah's Estimate.</p>
