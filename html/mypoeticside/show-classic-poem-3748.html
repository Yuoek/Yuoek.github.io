<h1 class="title-poem">When Death to Either Shall Come</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/RSB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Seymour Bridges</h2>
<p>When Death to either shall come,—  <br />
 I pray it be first to me,—  <br />
Be happy as ever at home,  <br />
 If so, as I wish, it be.  <br />
 <br />
Possess thy heart, my own;    <br />
 And sing to the child on thy knee,  <br />
Or read to thyself alone  <br />
 The songs that I made for thee.</p>
