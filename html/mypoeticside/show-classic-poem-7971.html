<h1 class="title-poem">Nature and God—I neither knew</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>835<br />
<br />
Nature and God—I neither knew<br />
Yet Both so well knew me<br />
They startled, like Executors<br />
Of My identity.<br />
<br />
Yet Neither told—that I could learn—<br />
My Secret as secure<br />
As Herschel's private interest<br />
Or Mercury's affair—</p>
