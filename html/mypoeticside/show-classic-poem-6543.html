<h1 class="title-poem">Two or three angels</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Two or three angels<br />
Came near to the earth.<br />
They saw a fat church.<br />
Little black streams of people<br />
Came and went in continually.<br />
And the angels were puzzled<br />
To know why the people went thus,<br />
And why they stayed so long within.</p>
