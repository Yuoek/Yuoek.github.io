<h1 class="title-poem">The Appeal</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>It I have given you delight<br />
   By aught that I have done,<br />
Let me lie quiet in that night<br />
   Which shall be yours anon:<br />
<br />
And for the little, little, span<br />
   The dead are born in mind,<br />
Seek not to question other than<br />
   The books I leave behind.</p>
