<h1 class="title-poem">Dawn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/vidyapati.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vidyapati</h2>
<p>Awake, Radha, awake,<br />
Calls the parrot and its love.<br />
For how long must you sleep,<br />
Clasped to the heart of your Dark-Stone?<br />
Listen. The dawn has come<br />
And the red shafts of the sun<br />
Are making us shudder.</p>
