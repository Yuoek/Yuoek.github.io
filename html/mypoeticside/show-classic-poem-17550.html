<h1 class="title-poem">In Virgilium. Pentadii</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/lovelace.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Lovelace</h2>
<p>IN VIRGILIUM.  PENTADII.<br />
<br />
Pastor, arator, eques; pavi, colui, superavi;<br />
Capras, rus, hostes; fronde, ligone, manu.<br />
<br />
                  IN ENGLISH.<br />
<br />
A swain, hind, knight: I fed, till'd, did command:<br />
Goats, fields, my foes: with leaves, a spade, my hand.</p>
