<h1 class="title-poem">A toad can die of light!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>A toad can die of light!<br />
   Death is the common right<br />
     Of toads and men,--<br />
   Of earl and midge<br />
   The privilege.<br />
     Why swagger then?<br />
   The gnat's supremacy<br />
   Is large as thine.</p>
