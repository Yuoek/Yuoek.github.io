<h1 class="title-poem">Maternity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/meynell.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alice Meynell</h2>
<p>One wept whose only child was dead,<br />
New-born, ten years ago.<br />
"Weep not; he is in bliss," they said.<br />
She answered, "Even so,<br />
<br />
"Ten years ago was born in pain<br />
A child, not now forlorn.<br />
But oh, ten years ago, in vain,<br />
A mother, a mother was born."</p>
