<h1 class="title-poem">A Reasonable Affliction</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Matthew-Prior.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Matthew Prior</h2>
<p>On his death-bed poor Lubin lies:<br />
His spouse is in despair:<br />
With frequent sobs, and mutual cries,<br />
They both express their care.<br />
<br />
A different cause, says Parson Sly,<br />
The same effect may give:<br />
Poor Lubin fears that he may die;<br />
His wife, that he may live.</p>
