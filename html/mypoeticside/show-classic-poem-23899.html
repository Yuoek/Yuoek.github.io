<h1 class="title-poem">There's Snow On The Fields</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>There's snow on the fields,<br />
And cold in the cottage,<br />
While I sit in the chimney nook<br />
Supping hot pottage.<br />
My clothes are soft and warm,<br />
Fold upon fold,<br />
But I'm so sorry for the poor<br />
Out in the cold.</p>
