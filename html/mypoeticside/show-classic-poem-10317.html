<h1 class="title-poem">I Am A Poet, My Thoughts Are Free</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Tev.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Tevfik Fikret</h2>
<p>I expect no gifts from any, nor beg for wing or feather<br />
In my own sky, in my own heavens, on my own I soar<br />
To bow beneath slavery's collar weighs heavy on my neck<br />
I'm a poet, my thoughts are free, wisdom free, conscience free</p>
