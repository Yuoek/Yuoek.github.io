<h1 class="title-poem">Morning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I went out on an April morning<br />
All alone, for my heart was high,<br />
I was a child of the shining meadow,<br />
I was a sister of the sky.<br />
<br />
There in the windy flood of morning<br />
Longing lifted its weight from me,<br />
Lost as a sob in the midst of cheering,<br />
Swept as a sea-bird out to sea.</p>
