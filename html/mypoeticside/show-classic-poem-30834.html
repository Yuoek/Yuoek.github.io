                    <h2 class="title-content">Theognis</h2>
<p>Not to be born is the best of all things for those who live on earth,<br />
   And not to gaze on the radiance of the keen-burning sun.<br />
Once born, however, it is best to pass with all possible speed through Hades' gates<br />
   And to lie beneath a great heap of earth.</p>
