<h1 class="title-poem">I Feel Horrible. She Doesn't</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>I feel horrible. She doesn't<br />
love me and I wander around<br />
like a sewing machine<br />
that's just finished sewing<br />
a turd to a garbage can lid.</p>
