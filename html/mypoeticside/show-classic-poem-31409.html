<h1 class="title-poem">Rondeau</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/traki.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Georg Trakl</h2>
<p>Gone and passed is the gold of day,<br />
And the evening’s brown and blue:<br />
Silenced the shepherd’s tender flute<br />
And the evening’s brown and blue<br />
Gone and passed as is the gold of day.</p>
