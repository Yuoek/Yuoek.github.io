<h1 class="title-poem">The Rout of the White Hussars</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>It was not in the open fight<br />
We threw away the sword,<br />
But in the lonely watching<br />
In the darkness by the ford.<br />
The waters lapped, the night-wind blew,<br />
Full-armed the Fear was born and grew,<br />
And we were flying ere we knew<br />
From panic in the night.</p>
