<h1 class="title-poem">The Sunset stopped on Cottages</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>950<br />
<br />
The Sunset stopped on Cottages<br />
Where Sunset hence must be<br />
For treason not of His, but Life's,<br />
Gone Westerly, Today—<br />
<br />
The Sunset stopped on Cottages<br />
Where Morning just begun—<br />
What difference, after all, Thou mak'st<br />
Thou supercilious Sun?</p>
