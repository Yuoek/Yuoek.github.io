<h1 class="title-poem">If it had no pencil</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>921<br />
<br />
If it had no pencil<br />
Would it try mine—<br />
Worn—now—and dull—sweet,<br />
Writing much to thee.<br />
If it had no word,<br />
Would it make the Daisy,<br />
Most as big as I was,<br />
When it plucked me?</p>
