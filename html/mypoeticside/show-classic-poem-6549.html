<h1 class="title-poem">There was set before me a mighty hill,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>There was set before me a mighty hill,<br />
And long days I climbed<br />
Through regions of snow.<br />
When I had before me the summit-view,<br />
It seemed that my labour<br />
Had been to see gardens<br />
Lying at impossible distances.</p>
