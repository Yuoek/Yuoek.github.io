<h1 class="title-poem">Gift</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>This is mint and here are three pinks<br />
I have brought you, Mother.<br />
They are wet with rain<br />
And shining with it.<br />
The pinks smell like more of them<br />
In a blue vase:<br />
The mint smells like summer<br />
In many gardens.</p>
