<h1 class="title-poem">What People May Think</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Some people cower<br />
and wince and shrink,<br />
owing to the fear of<br />
what people may think.<br />
There is one answer<br />
to worries like these:<br />
people may think<br />
what the devil they please.</p>
