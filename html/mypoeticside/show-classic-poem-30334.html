<h1 class="title-poem">It Will Not Change</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>It will not change now<br />
After so many years;<br />
Life has not broken it<br />
With parting or tears;<br />
Death will not alter it,<br />
It will live on<br />
In all my songs for you<br />
When I am gone.</p>
