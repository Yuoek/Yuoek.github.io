                    <h2 class="title-content">Theognis</h2>
<p>A boy and a horse are alike in mind, for the horse does not<br />
   Weep for its rider when he lies in the dust,<br />
But, fed full with barley, it carries the next man;<br />
   And in just this way the boy too loves whoever is at hand.</p>
