<h1 class="title-poem">At least—to pray—is left—is left</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>502<br />
<br />
At least—to pray—is left—is left—<br />
Oh Jesus—in the Air—<br />
I know not which thy chamber is—<br />
I'm knocking—everywhere—<br />
<br />
Thou settest Earthquake in the South—<br />
And Maelstrom, in the Sea—<br />
Say, Jesus Christ of Nazareth—<br />
Hast thou no Arm for Me?</p>
