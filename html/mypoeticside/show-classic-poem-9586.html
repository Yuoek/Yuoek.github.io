<h1 class="title-poem">Howdy, Honey, Howdy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>DO' a-stan'in' on a jar, fiah a-shinin'<br />
     thoo,<br />
Ol' folks drowsin' 'roun' de place,<br />
    wide awake is Lou,<br />
W'en I tap, she answah, an' I see<br />
    huh 'mence to grin,<br />
"Howdy, honey, howdy, won't you<br />
    step right in?"</p>
