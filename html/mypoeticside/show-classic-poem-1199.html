<h1 class="title-poem">Insomniac</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/04/Maya.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Maya Angelou</h2>
<p>There are some nights when <br />
sleep plays coy, <br />
aloof and disdainful. <br />
And all the wiles <br />
that I employ to win <br />
its service to my side <br />
are useless as wounded pride, <br />
and much more painful.</p>
