<h1 class="title-poem">The Least Of These</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/KLB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Katharine Lee Bates</h2>
<p>THE wolf of want is howling<br />
At doors no angel keeps.<br />
Young Mary smiled on her Holy Child,<br />
But many a mother weeps.<br />
The Kings of the East brought treasures<br />
Uncounted and unpriced.<br />
Who bears a gift to arms that lift<br />
A little famished Christ?</p>
