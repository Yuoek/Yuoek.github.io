<h1 class="title-poem">Indian Summer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>In youth, it was a way I had<br />
  To do my best to please,<br />
And change, with every passing lad,<br />
  To suit his theories.<br />
<br />
But now I know the things I know,<br />
  And do the things I do;<br />
And if you do not like me so,<br />
  To hell, my love, with you!</p>
