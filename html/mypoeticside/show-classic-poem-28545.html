<h1 class="title-poem">The Passions that We Fought With</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/Trumbull-Stickney.gif);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Trumbull Stickney</h2>
<p>The passions that we fought with and subdued<br />
  Never quite die. In some maimed serpent's coil<br />
  They lurk, ready to spring and vindicate<br />
  That power was once our torture and our lord.</p>
