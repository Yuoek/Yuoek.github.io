<h1 class="title-poem">To One denied the drink</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>490<br />
<br />
To One denied the drink<br />
To tell what Water is<br />
Would be acuter, would it not<br />
Than letting Him surmise?<br />
<br />
To lead Him to the Well<br />
And let Him hear it drip<br />
Remind Him, would it not, somewhat<br />
Of His condemned lip?</p>
