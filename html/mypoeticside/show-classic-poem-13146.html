<h1 class="title-poem">The Mystery</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Ralph-Hodgson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Hodgson</h2>
<p>He came and took me by the hand<br />
Up to a red rose tree,<br />
He kept His meaning to Himself<br />
But gave a rose to me.<br />
I did not pray Him to lay bare<br />
The mystery to me,<br />
Enough the rose was Heaven to smell,<br />
And His own face to see.</p>
