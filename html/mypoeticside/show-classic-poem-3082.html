<h1 class="title-poem">Hospital For Defectives</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/Thomas-Blackburn.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Blackburn</h2>
<p>By your unnumbered charities<br />
A miracle disclose,<br />
Lord of the Images, whose love<br />
The eyelids and the rose<br />
Takes for a language, and today<br />
Tell to me what is said<br />
By these men in a turnip field<br />
And their unleavened bread.</p>
