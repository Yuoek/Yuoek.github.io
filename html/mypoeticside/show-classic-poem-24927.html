<h1 class="title-poem">Margaret</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Many birds and the beating of wings<br />
Make a flinging reckless hum<br />
In the early morning at the rocks<br />
Above the blue pool<br />
Where the gray shadows swim lazy.<br />
<br />
In your blue eyes, O reckless child,<br />
I saw today many little wild wishes,<br />
Eager as the great morning.</p>
