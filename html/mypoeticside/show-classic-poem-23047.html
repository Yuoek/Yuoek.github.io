<h1 class="title-poem">On Being Challenged to Write an Epigram...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Walter Raleigh</h2>
<p>To Griggs, that learned man, in many a bygone session,<br />
    His kids were his delight, and physics his profession;<br />
    Now Griggs, grown old and glum, and less intent on knowledge,<br />
    Physics himself at home, and sends his kids to college.</p>
