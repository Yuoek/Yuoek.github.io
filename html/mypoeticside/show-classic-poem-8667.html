<h1 class="title-poem">Once more, my now bewildered Dove</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>48<br />
<br />
Once more, my now bewildered Dove<br />
Bestirs her puzzled wings<br />
Once more her mistress, on the deep<br />
Her troubled question flings—<br />
<br />
Thrice to the floating casement<br />
The Patriarch's bird returned,<br />
Courage! My brave Columba!<br />
There may yet be Land!</p>
