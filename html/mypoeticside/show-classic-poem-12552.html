<h1 class="title-poem">Meeting the Eye</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>You'll probably find<br />
that it suits your book<br />
to be a bit cleverer<br />
than you look.<br />
<br />
Observe that the easiest<br />
method by far<br />
is to look a bit stupider<br />
than you are.</p>
