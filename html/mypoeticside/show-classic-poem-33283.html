<h1 class="title-poem">Farewell to Hsin Chien at Hibiscus Pavilion</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>A cold rain mingled with the river<br />
      at evening, when I entered Wu;<br />
In the clear dawn I bid you farewell,<br />
      lonely as Ch'u Mountain.<br />
My kinsfolk in Loyang,<br />
      should they ask about me,<br />
Tell them: "My heart is a piece of ice<br />
      in a jade cup!"</p>
