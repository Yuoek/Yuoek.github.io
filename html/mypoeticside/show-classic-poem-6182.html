<h1 class="title-poem">Red Cross Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>When I heard the bees humming in the hive,<br />
they were so busy about their honey,<br />
I said to my mother,<br />
what can I give,<br />
what can I give to help the Red Cross?<br />
and Mother said to me:<br />
You can give honey too!<br />
Honey of smiles!<br />
Honey of love!</p>
