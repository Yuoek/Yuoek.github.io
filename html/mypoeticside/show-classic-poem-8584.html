<h1 class="title-poem">By a flower—By a letter</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>109<br />
<br />
By a flower—By a letter—<br />
By a nimble love—<br />
If I weld the Rivet faster—<br />
Final fast—above—<br />
<br />
Never mind my breathless Anvil!<br />
Never mind Repose!<br />
Never mind the sooty faces<br />
Tugging at the Forge!</p>
