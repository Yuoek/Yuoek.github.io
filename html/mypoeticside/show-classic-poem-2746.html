<h1 class="title-poem">In A Bath Teashop</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/John-Betjeman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir John Betjeman</h2>
<p>"Let us not speak, for the love we bear one another—<br />
Let us hold hands and look."<br />
She such a very ordinary little woman;<br />
He such a thumping crook;<br />
But both, for a moment, little lower than the angels<br />
In the teashop's ingle-nook.</p>
