<h1 class="title-poem">Venetian Interior</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/12/elin.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elinor Morton Hoyt Wylie</h2>
<p>Allegra, rising from her canopied dreams,<br />
Slides both white feet across the slanted beams<br />
Which lace the peacock jalousies: behold<br />
An idol of fine clay, with feet of gold</p>
