<h1 class="title-poem">Neither This Nor That</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>IF thou to be a slave shouldst will,<br />
Thou'lt get no pity, but fare ill;<br />
And if a master thou wouldst be,<br />
The world will view it angrily;<br />
And if in status quo thou stay,<br />
That thou art but a fool, they'll say.</p>
