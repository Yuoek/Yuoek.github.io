<h1 class="title-poem">Morning Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/12/rose.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rose Hawthorne Lathrop</h2>
<p>Turn thy face to me, my love,<br />
I come from out the morning;<br />
Give thy hand to me, my love,<br />
I'm dewy from the dawning.<br />
<br />
Touch my lips with thine, my love,<br />
I've tasted air at daybreak;<br />
Gaze into my eyes, my love,<br />
At the sky's waking they wake.</p>
