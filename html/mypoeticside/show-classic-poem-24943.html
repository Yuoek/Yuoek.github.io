<h1 class="title-poem">Uplands In May</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Wonder as of old things<br />
Fresh and fair come back<br />
Hangs over pasture and road.<br />
Lush in the lowland grasses rise<br />
And upland beckons to upland.<br />
The great strong hills are humble.</p>
