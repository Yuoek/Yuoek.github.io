<h1 class="title-poem">Who Giants know, with lesser Men</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>796<br />
<br />
Who Giants know, with lesser Men<br />
Are incomplete, and shy—<br />
For Greatness, that is ill at ease<br />
In minor Company—<br />
<br />
A Smaller, could not be perturbed—<br />
The Summer Gnat displays—<br />
Unconscious that his single Fleet<br />
Do not comprise the skies—</p>
