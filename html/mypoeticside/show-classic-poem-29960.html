<h1 class="title-poem">Forever Lost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>Forever lost–like birds forever flying,<br />
Searching bleak space,<br />
Circling, and with the south wind crying<br />
Across earth's face:<br />
<br />
Arrowed I fly, and like them lost forever,<br />
Having once seen<br />
Scarlet in a jungle, by a deep river–<br />
Scarlet and green.</p>
