<h1 class="title-poem">The Huntsmen</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/walter-d.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Walter de la Mare</h2>
<p>Three jolly gentlemen,<br />
In coats of red,<br />
Rode their horses<br />
Up to bed.<br />
<br />
Three jolly gentlemen<br />
Snored till morn,<br />
Their horses champing<br />
The golden corn.<br />
<br />
Three jolly gentlemen<br />
At break of day,<br />
Came clitter-clatter down the stairs<br />
And galloped away.</p>
