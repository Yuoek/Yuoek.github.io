<h1 class="title-poem">Las Seis Cuerdas</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/fredrico.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Federico Garcia Lorca</h2>
<p>La guitarra,<br />
hace llorar a los sueños.<br />
El sollozo de las almas<br />
perdidas,<br />
se escapa por su boca<br />
redonda.<br />
Y como la tarántula<br />
teje una gran estrella<br />
para cazar suspiros,<br />
que flotan en su negro<br />
aljibe de madera.</p>
