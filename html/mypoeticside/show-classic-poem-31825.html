<h1 class="title-poem">Vigil</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>A whole night long<br />
crouched close<br />
to one of our men<br />
butchered<br />
with his clenched<br />
mouth<br />
grinning at the full moon<br />
with the congestion<br />
of his hands<br />
thrust right<br />
into my silence<br />
I've written<br />
letters filled with love<br />
<br />
I have never been<br />
so<br />
coupled to life</p>
