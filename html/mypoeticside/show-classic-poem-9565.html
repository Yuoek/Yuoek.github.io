<h1 class="title-poem">Theology</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>There is a heaven, for ever, day by day,<br />
The upward longing of my soul doth tell me so.<br />
There is a hell, I'm quite as sure; for pray<br />
If there were not, where would my neighbours go?</p>
