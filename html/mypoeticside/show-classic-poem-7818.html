<h1 class="title-poem">'Tis Anguish grander than Delight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>'Tis Anguish grander than Delight<br />
'Tis Resurrection Pain—<br />
The meeting Bands of smitten Face<br />
We questioned to, again.<br />
<br />
'Tis Transport wild as thrills the Graves<br />
When Cerements let go<br />
And Creatures clad in Miracle<br />
Go up by Two and Two.</p>
