<h1 class="title-poem">Silent, Silent Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>Silent, silent night,<br />
Quench the holy light<br />
Of thy torches bright;<br />
<br />
For possessed of Day<br />
Thousand spirits stray<br />
That sweet joys betray.<br />
<br />
Why should joys be sweet<br />
Used with deceit,<br />
Nor with sorrows meet?<br />
<br />
But an honest joy<br />
Does itself destroy<br />
For a harlot coy.</p>
