<h1 class="title-poem">The Runner</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>ON a flat road runs the well-train'd runner;<br />
He is lean and sinewy, with muscular legs;<br />
He is thinly clothed--he leans forward as he runs,<br />
With lightly closed fists, and arms partially rais'd.</p>
