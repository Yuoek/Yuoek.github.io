<h1 class="title-poem">Moonrise</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/YW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yvor Winters</h2>
<p>The branches,<br />
jointed, pointing<br />
up and out, shine<br />
out like brass.<br />
<br />
Upon the heavy<br />
lip of earth<br />
the dog<br />
<br />
      at<br />
moments is<br />
possessed and screams:<br />
<br />
The rising moon draws<br />
up his blood and hair.</p>
