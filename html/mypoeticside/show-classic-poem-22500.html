<h1 class="title-poem">Bathed and Washed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>"Bathed in fragrance,<br />
do not brush your hat;<br />
Washed in perfume,<br />
do not shake your coat:<br />
<br />
"Knowing the world<br />
fears what is too pure,<br />
The wisest man<br />
prizes and stores light!"<br />
<br />
By Bluewater<br />
an old angler sat:<br />
You and I together,<br />
Let us go home.</p>
