<h1 class="title-poem">Could Man Be Drunk Forever</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>Could man be drunk for ever<br />
With liquor, love, or fights,<br />
Lief should I rouse at morning<br />
And lief lie down of nights.<br />
<br />
But men at whiles are sober<br />
And think by fits and starts,<br />
And if they think, they fasten<br />
Their hands upon their hearts.</p>
