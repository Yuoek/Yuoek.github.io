<h1 class="title-poem">Alone</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>The noon's greygolden meshes make<br />
All night a veil,<br />
The shorelamps in the sleeping lake<br />
Laburnum tendrils trail.<br />
<br />
The sly reeds whisper to the night<br />
A name-- her name-<br />
And all my soul is a delight,<br />
A swoon of shame.</p>
