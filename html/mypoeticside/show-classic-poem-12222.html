<h1 class="title-poem">Her Initials</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/hardy.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Hardy</h2>
<p>Upon a poet’s page I wrote<br />
 Of old two letters of her name;  <br />
Part seemed she of the effulgent thought  <br />
 Whence that high singer’s rapture came.  <br />
—When now I turn the leaf the same<br />
 Immortal light illumes the lay  <br />
But from the letters of her name  <br />
 The radiance has died away.</p>
