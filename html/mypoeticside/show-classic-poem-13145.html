<h1 class="title-poem">Stupidity Street</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Ralph-Hodgson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Hodgson</h2>
<p>I saw with open eyes<br />
Singing birds sweet<br />
Sold in the shops<br />
For people to eat,<br />
Sold in the shops of<br />
Stupidity Street.<br />
I saw in vision<br />
The worm in the wheat,<br />
And in the shops nothing<br />
For people to eat;<br />
Nothing for sale in<br />
Stupidity Street.</p>
