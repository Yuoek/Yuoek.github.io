<h1 class="title-poem">Harvester's Song"</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Reap, reap the grain and gather<br />
<br />
The sweet grapes from the vine;<br />
<br />
Our Lord's mother is weeping,<br />
<br />
She hath nor bread nor wine;<br />
<br />
She is weeping. The Queen of Heaven,<br />
<br />
She hath nor bread nor wine.</p>
