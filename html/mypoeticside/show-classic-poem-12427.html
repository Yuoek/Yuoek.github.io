<h1 class="title-poem">Could we as Mortals</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Charles_Harpur_photo.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Harpur</h2>
<p>Could we as mortals but our end foresee,<br />
How little in our minds the world would be;<br />
Could we as spirits but this life renew,<br />
   And be again incarnate as we were,<br />
How little might be done like what we do,<br />
   How little cared for that which now is most our care</p>
