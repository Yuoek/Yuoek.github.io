<h1 class="title-poem">The Iliad</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Tear forever the garland of Homer, and number the fathers<br />
 Of the immortal work, that through all time will survive!<br />
Yet it has but one mother, and bears that mother's own feature,<br />
 'Tis thy features it bears,--Nature,--thy features eterne!</p>
