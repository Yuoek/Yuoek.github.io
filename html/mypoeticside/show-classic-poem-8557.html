<h1 class="title-poem">Alone, I cannot be</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>298<br />
<br />
Alone, I cannot be—<br />
For Hosts—do visit me—<br />
Recordless Company—<br />
Who baffle Key—<br />
<br />
They have no Robes, nor Names—<br />
No Almanacs—nor Climes—<br />
But general Homes<br />
Like Gnomes—<br />
<br />
Their Coming, may be known<br />
By Couriers within—<br />
Their going—is not—<br />
For they've never gone—</p>
