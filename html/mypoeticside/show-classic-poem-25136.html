<h1 class="title-poem">To Evening</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>O HESPERUS! Thou bring'st all things home;<br />
All that the garish day hath scattered wide;<br />
The sheep, the goat, back to the welcome fold;<br />
Thou bring'st the child, too, to his mother's side.</p>
