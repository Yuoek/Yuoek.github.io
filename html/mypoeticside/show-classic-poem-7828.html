<h1 class="title-poem">A first Mute Coming</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>702<br />
<br />
A first Mute Coming—<br />
In the Stranger's House—<br />
A first fair Going—<br />
When the Bells rejoice—<br />
<br />
A first Exchange—of<br />
What hath mingled—been—<br />
For Lot—exhibited to<br />
Faith—alone—</p>
