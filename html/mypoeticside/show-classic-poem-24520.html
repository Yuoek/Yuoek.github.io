<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 33</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>To consult women brings on ruin and to be liberal to rebellious men crime.<br />
<br />
          To have mercy on sharp-toothed tigers  <br />
          Is to be tyrannical towards sheep.</p>
