<h1 class="title-poem">De Catone</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/lovelace.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Lovelace</h2>
<p>DE CATONE.<br />
<br />
Invictus victis in partibus omnia Caesar<br />
  Vincere qui potuit, te, Cato, non potuit.<br />
<br />
                  OF CATO.<br />
<br />
The world orecome, victorious Caesar, he<br />
That conquer'd all, great Cato, could not thee.</p>
