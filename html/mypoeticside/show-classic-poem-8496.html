<h1 class="title-poem">When Night is almost done</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>347<br />
<br />
When Night is almost done—<br />
And Sunrise grows so near<br />
That we can touch the Spaces—<br />
It's time to smooth the Hair—<br />
<br />
And get the Dimples ready—<br />
And wonder we could care<br />
For that old—faded Midnight—<br />
That frightened—but an Hour—</p>
