<h1 class="title-poem">The Agreement</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Both of us seek for truth--in the world without thou dost seek it,<br />
      I in the bosom within; both of us therefore succeed.<br />
If the eye be healthy, it sees from without the Creator;<br />
      And if the heart, then within doubtless it mirrors the world.</p>
