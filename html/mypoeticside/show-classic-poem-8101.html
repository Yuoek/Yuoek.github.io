<h1 class="title-poem">The Zeroes—taught us—Phosphorous</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>689<br />
<br />
The Zeroes—taught us—Phosphorous—<br />
We learned to like the Fire<br />
By playing Glaciers—when a Boy—<br />
And Tinder—guessed—by power<br />
Of Opposite—to balance Odd—<br />
If White—a Red—must be!<br />
Paralysis—our Primer—dumb—<br />
Unto Vitality!</p>
