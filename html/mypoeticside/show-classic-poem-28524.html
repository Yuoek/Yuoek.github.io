<h1 class="title-poem">Love, What Is Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>Love - what is love?  A great and aching heart;<br />
Wrung hands; and silence; and a long despair.<br />
Life - what is life?  Upon a moorland bare<br />
To see love coming and see love depart.</p>
