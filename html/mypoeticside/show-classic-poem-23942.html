<h1 class="title-poem">Clever Little Willie Wee</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Clever little Willie wee,<br />
Bright-eyed, blue-eyed little fellow;<br />
Merry little Margery<br />
With her hair all yellow.<br />
Little Willie in his heart<br />
Is a sailor on the sea,<br />
And he often cons a chart<br />
With sister Margery.</p>
