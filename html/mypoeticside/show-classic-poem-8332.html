<h1 class="title-poem">Must be a Woe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>571<br />
<br />
Must be a Woe—<br />
A loss or so—<br />
To bend the eye<br />
Best Beauty's way—<br />
<br />
But—once aslant<br />
It notes Delight<br />
As difficult<br />
As Stalactite<br />
<br />
A Common Bliss<br />
Were had for less—<br />
The price—is<br />
Even as the Grace—<br />
<br />
Our lord—thought no<br />
Extravagance<br />
To pay—a Cross—</p>
