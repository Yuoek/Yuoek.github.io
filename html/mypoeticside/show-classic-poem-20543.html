<h1 class="title-poem">Old Men</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>People expect old men to die,<br />
They do not really mourn old men.<br />
Old men are different. People look<br />
At them with eyes that wonder when…<br />
People watch with unshocked eyes;<br />
But the old men know when an old man dies.</p>
