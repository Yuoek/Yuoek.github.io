<h1 class="title-poem">An Epitaph Upon A Child</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Virgins promised when I died,<br />
That they would each primrose-tide<br />
Duly, morn and evening, come,<br />
And with flowers dress my tomb.<br />
--Having promised, pay your debts<br />
Maids, and here strew violets.</p>
