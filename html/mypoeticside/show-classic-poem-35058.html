<h1 class="title-poem">A Man Young And Old: III. The Mermaid</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>A mermaid found a swimming lad,<br />
Picked him for her own,<br />
Pressed her body to his body,<br />
Laughed; and plunging down<br />
Forgot in cruel happiness<br />
That even lovers drown.</p>
