<h1 class="title-poem">The Sea Took Pity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/gerardman.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gerard Manley Hopkins</h2>
<p>The sea took pity: it interposed with doom:  <br />
‘I have tall daughters dear that heed my hand:  <br />
Let Winter wed one, sow them in her womb,  <br />
And she shall child them on the New-world strand.’<br />
  .   .   .   .   .   .   .   .</p>
