<h1 class="title-poem">The Spirit is the Conscious Ear</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>733<br />
<br />
The Spirit is the Conscious Ear.<br />
We actually Hear<br />
When We inspect—that's audible—<br />
That is admitted—Here—<br />
<br />
For other Services—as Sound—<br />
There hangs a smaller Ear<br />
Outside the Castle—that Contain—<br />
The other—only—Hear—</p>
