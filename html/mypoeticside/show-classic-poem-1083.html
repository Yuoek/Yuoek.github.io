<h1 class="title-poem">An Evening</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/William-Allingham.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Allingham</h2>
<p>A sunset's mounded cloud; <br />
A diamond evening-star; <br />
Sad blue hills afar; <br />
Love in his shroud. <br />
<br />
Scarcely a tear to shed; <br />
Hardly a word to say; <br />
The end of a summer day; <br />
Sweet Love dead.</p>
