<h1 class="title-poem">Mouse</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>Little mouse in gray velvet,<br />
Have you had a cheese-breakfast?<br />
There are no crumbs on your coat,<br />
Did you use a napkin?<br />
I wonder what you had to eat,<br />
And who dresses you in gray velvet?</p>
