<h1 class="title-poem">Constitutional Point</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Power corrupts,<br />
whereas sound opposition<br />
builds up our free<br />
democratic tradition.<br />
One thing would make<br />
a democracy flower:<br />
having a strong opposition-<br />
in power.</p>
