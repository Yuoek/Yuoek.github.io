<h1 class="title-poem">A Caution To Everybody</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>Consider the auk;<br />
Becoming extinct because he forgot how to fly, and could only walk.<br />
Consider man, who may well become extinct<br />
Because he forgot how to walk and learned how to fly before he thinked.</p>
