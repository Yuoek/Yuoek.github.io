<h1 class="title-poem">I many times thought Peace had come</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>739<br />
<br />
I many times thought Peace had come<br />
When Peace was far away—<br />
As Wrecked Men—deem they sight the Land—<br />
At Centre of the Sea—<br />
<br />
And struggle slacker—but to prove<br />
As hopelessly as I—<br />
How many the fictitious Shores—<br />
Before the Harbor be—</p>
