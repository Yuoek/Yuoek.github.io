<h1 class="title-poem">It Isn't Enough</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>One paramount truth<br />
our society smothers<br />
in petty concern<br />
with position and pelf:<br />
It isn't enough<br />
to exasperate others;<br />
you've got to remember<br />
to gladden yourself.</p>
