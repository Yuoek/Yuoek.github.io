<h1 class="title-poem">Upon A Child That Died</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Here she lies, a pretty bud,<br />
Lately made of flesh and blood;<br />
Who as soon fell fast asleep,<br />
As her little eyes did peep.<br />
--Give her strewings, but not stir<br />
The earth, that lightly covers her.</p>
