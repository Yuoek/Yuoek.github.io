<h1 class="title-poem">I'll send the feather from my Hat!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>687<br />
<br />
I'll send the feather from my Hat!<br />
Who knows—but at the sight of that<br />
My Sovereign will relent?<br />
As trinket—worn by faded Child—<br />
Confronting eyes long—comforted—<br />
Blisters the Adamant!</p>
