<h1 class="title-poem">There is an arid Pleasure</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>782<br />
<br />
There is an arid Pleasure—<br />
As different from Joy—<br />
As Frost is different from Dew—<br />
Like element—are they—<br />
<br />
Yet one—rejoices Flowers—<br />
And one—the Flowers abhor—<br />
The finest Honey—curdled—<br />
Is worthless—to the Bee—</p>
