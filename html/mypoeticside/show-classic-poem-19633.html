<h1 class="title-poem">There Was a Young Lady Named Laura</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/monkhouse.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Cosmo Monkhouse</h2>
<p>There was a young lady named Laura,<br />
    Who went to the wilds of Angora,<br />
        She came back on a goat<br />
        With a beautiful coat,<br />
    And notes of the fauna and flora.</p>
