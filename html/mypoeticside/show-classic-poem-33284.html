<h1 class="title-poem">Remembrance</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>A red berry grows<br />
      in the south country --<br />
The boughs are full of them<br />
      when spring arrives.<br />
Gather some, I pray,<br />
      and fill your pockets --<br />
These are the best<br />
      forget-me-knots!</p>
