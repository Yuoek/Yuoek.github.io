<h1 class="title-poem">On the Lake (a child)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>A little child paddles a little boat,<br />
Drifting about, and picking white lotuses.<br />
He does not know how to hide his tracks,<br />
And duckweed's opened up along his path.</p>
