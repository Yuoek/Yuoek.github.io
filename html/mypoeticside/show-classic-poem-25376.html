<h1 class="title-poem">Wisdom And Prudence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Wouldst thou, my friend, mount up to the highest summit of wisdom,<br />
      Be not deterred by the fear, prudence thy course may deride<br />
That shortsighted one sees but the bank that from thee is flying,<br />
      Not the one which ere long thou wilt attain with bold flight.</p>
