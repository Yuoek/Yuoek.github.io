<h1 class="title-poem">My Birds That Fly No Longer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Have yet forgot, sweet birds,<br />
<br />
How near the heaven's lie?<br />
<br />
Drooping, sick-pinion'd, oh<br />
<br />
Have yet forgot the sky?<br />
<br />
<br />
The air that once I knew<br />
<br />
Whispered celestial things;<br />
<br />
I weep who hear no more<br />
<br />
Upward and rushing wings.</p>
