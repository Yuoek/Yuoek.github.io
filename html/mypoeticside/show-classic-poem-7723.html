<h1 class="title-poem">Old Black Jacko</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/09/CJD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clarence Michael James Dennis</h2>
<p>Old Black Jacko<br />
  Smokes tobacco<br />
  In his little pipe of clay.<br />
Puff, puff, puff,<br />
He never has enough<br />
  Though he smokes it all day.<br />
<br />
But his lubra says, "Mine tink dat Jacky<br />
Him shmoke plenty too much baccy."</p>
