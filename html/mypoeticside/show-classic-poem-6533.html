<h1 class="title-poem">I was in the darkness;</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>I was in the darkness;<br />
I could not see my words<br />
Nor the wishes of my heart.<br />
Then suddenly there was a great light --<br />
<br />
"Let me into the darkness again."</p>
