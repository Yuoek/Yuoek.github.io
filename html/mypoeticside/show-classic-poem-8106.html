<h1 class="title-poem">There is a Shame of Nobleness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>551<br />
<br />
There is a Shame of Nobleness—<br />
Confronting Sudden Pelf—<br />
A finer Shame of Ecstasy—<br />
Convicted of Itself—<br />
<br />
A best Disgrace—a Brave Man feels—<br />
Acknowledged—of the Brave—<br />
One More—"Ye Blessed"—to be told—<br />
But that's—Behind the Grave—</p>
