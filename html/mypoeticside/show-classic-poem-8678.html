<h1 class="title-poem">The morns are meeker than they were</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>12<br />
<br />
The morns are meeker than they were—<br />
The nuts are getting brown—<br />
The berry's cheek is plumper—<br />
The Rose is out of town.<br />
<br />
The Maple wears a gayer scarf—<br />
The field a scarlet gown—<br />
Lest I should be old fashioned<br />
I'll put a trinket on.</p>
