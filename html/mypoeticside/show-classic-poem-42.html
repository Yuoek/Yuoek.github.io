<h1 class="title-poem">Instructions From England</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/06/ackland.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Valentine Ackland</h2>
<p>Note nothing of why or how, enquire <br />
no deeper than you need <br />
into what set these veins on fire, <br />
note simply that they bleed. <br />
<br />
Spain fought before and fights again, <br />
better no question why; <br />
note churches burned and popes in pain <br />
but not the men who die.</p>
