<h1 class="title-poem">The Old Woman</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/josephc.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Campbell</h2>
<p>As a white candle<br />
   In a holy place,<br />
So is the beauty<br />
   Of an aged face.<br />
<br />
As the spent radience<br />
   Of the winter sun,<br />
So is a woman<br />
   With her travail done.<br />
<br />
Her brood gone from her,<br />
   And her thoughts as still<br />
As the waters<br />
   Under a ruined mill.</p>
