<h1 class="title-poem">Upon Julia's Hair Filled With Dew</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Dew sate on Julia's hair,<br />
And spangled too,<br />
Like leaves that laden are<br />
With trembling dew;<br />
Or glitter'd to my sight,<br />
As when the beams<br />
Have their reflected light<br />
Danced by the streams.</p>
