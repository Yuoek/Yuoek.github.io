<h1 class="title-poem">To my Dear Children.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/annebr.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anne Bradstreet</h2>
<p>This Book by Any yet vnread,<br />
I leaue for yov when I am dead,<br />
That, being gone, here yov may find<br />
What was your liueing mother's mind.<br />
Make vse of what I leaue in Loue<br />
And God shall blesse yov from above.</p>
