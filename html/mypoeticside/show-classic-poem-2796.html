<h1 class="title-poem">While His Body's Vigor Is Whole</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/gal-004a1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bhartrihari</h2>
<p>While his body's vigor is whole<br />
                 And old age is remote;<br />
                 While his sensuous powers are unimpaired<br />
                 And life not yet exhausted;<br />
                 Only then would a wise man<br />
                 Strive to perfect his soul.<br />
                 Why attempt to dig a well<br />
                 When the house is already burning?</p>
