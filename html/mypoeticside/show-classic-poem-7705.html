<h1 class="title-poem">Last Verse</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/09/CJD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clarence Michael James Dennis</h2>
<p>Now a stream may be a lady,<br />
  Or a gentleman serene,<br />
Who,  by sunlit ways and shady,<br />
  Graces many a sylvan scene,<br />
But that wild, wild woodman, Snowy<br />
  Crude, uncultured, swift to rage,<br />
He's a hill bloke, flash and showy<br />
  Roaring down in his rampage<br />
</p>
