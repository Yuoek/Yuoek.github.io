<h1 class="title-poem">Far Within Us #3</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>Unquiet you walk<br />
Along the rims of my eyes<br />
<br />
On the invisible grating<br />
Before your lips<br />
My naked words shiver<br />
<br />
We steal moments<br />
From the unheeding iron saws<br />
<br />
Your hands sadly<br />
Flow into mine<br />
The air is impassable</p>
