<h1 class="title-poem">Fame is a fickle food</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>1659<br />
<br />
Fame is a fickle food<br />
Upon a shifting plate<br />
Whose table once a<br />
Guest but not<br />
The second time is set.<br />
<br />
Whose crumbs the crows inspect<br />
And with ironic caw<br />
Flap past it to the<br />
Farmer's Corn—<br />
Men eat of it and die.</p>
