<h1 class="title-poem">Proximity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>I KNOW not, wherefore, dearest love,<br />
<br />
Thou often art so strange and coy<br />
When 'mongst man's busy haunts we move,<br />
<br />
Thy coldness puts to flight my joy.<br />
But soon as night and silence round us reign,<br />
I know thee by thy kisses sweet again!</p>
