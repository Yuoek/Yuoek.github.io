<h1 class="title-poem">Out of the Game</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Heberto-Padilla.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Heberto Padilla</h2>
<p>The poet! Kick him out!<br />
He has no business here.<br />
He doesn't play the game.<br />
He never gets excited<br />
Or speaks out clearly.<br />
He never even sees the miracles.</p>
