<h1 class="title-poem">As by the dead we love to sit</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>88<br />
<br />
As by the dead we love to sit,<br />
Become so wondrous dear—<br />
As for the lost we grapple<br />
Tho' all the rest are here—<br />
<br />
In broken mathematics<br />
We estimate our prize<br />
Vast—in its fading ration<br />
To our penurious eyes!</p>
