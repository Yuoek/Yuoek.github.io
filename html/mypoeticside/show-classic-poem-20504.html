<h1 class="title-poem">The Hunter</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>The hunter crouches in his blind<br />
'Neath camouflage of every kind<br />
And conjures up a quacking noise<br />
To lend allure to his decoys<br />
This grown-up man, with pluck and luck<br />
is hoping to outwit a duck</p>
