<h1 class="title-poem">If I should cease to bring a Rose</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>56<br />
<br />
If I should cease to bring a Rose<br />
Upon a festal day,<br />
'Twill be because beyond the Rose<br />
I have been called away—<br />
<br />
If I should cease to take the names<br />
My buds commemorate—<br />
'Twill be because Death's finger<br />
Claps my murmuring lip!</p>
