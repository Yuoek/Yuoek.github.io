<h1 class="title-poem">Heartsease In My Garden Bed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Heartsease in my garden bed,<br />
With sweetwilliam white and red,<br />
Honeysuckle on my wall: -<br />
Heartsease blossoms in my heart<br />
When sweet William comes to call,<br />
But it withers when we part,<br />
And the honey-trumpets fall.</p>
