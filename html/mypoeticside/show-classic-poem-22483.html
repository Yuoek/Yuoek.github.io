<h1 class="title-poem">To My Wife on Lu-shan Mountain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Visiting the nun Rise-In-Air,<br />
You must be near her place in those blue hills.<br />
The river’s force helps pound the mica,<br />
The wind washes rose bay tree flowers.<br />
If you find you can’t leave that refuge,<br />
Invite me there to see the sunset’s fire.</p>
