<h1 class="title-poem">O World, Be Nobler</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/binyon.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Laurence Binyon</h2>
<p>O WORLD, be nobler, for her sake!<br />
 If she but knew thee what thou art,<br />
What wrongs are borne, what deeds are done<br />
In thee, beneath thy daily sun,<br />
 Know'st thou not that her tender heart<br />
For pain and very shame would break?<br />
O World, be nobler, for her sake!</p>
