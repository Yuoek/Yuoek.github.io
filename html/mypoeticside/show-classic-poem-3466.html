<h1 class="title-poem">The Night has a Thousand Eyes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Francis-William-Bourdillon.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Francis William Bourdillon</h2>
<p>The night has a thousand eyes,<br />
   And the day but one;<br />
Yet the light of the bright world dies<br />
   With the dying sun.<br />
<br />
The mind has a thousand eyes,<br />
   And the heart but one:<br />
Yet the light of a whole life dies<br />
    When love is done.</p>
