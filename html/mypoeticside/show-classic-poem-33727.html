<h1 class="title-poem">Visor'd</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>A MASK--a perpetual natural disguiser of herself,<br />
Concealing her face, concealing her form,<br />
Changes and transformations every hour, every moment,<br />
Falling upon her even when she sleeps.</p>
