<h1 class="title-poem">Farewell to Meng Hao-jan</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>I took leave of you, old friend, at the<br />
Yellow Crane Pavilion;<br />
In the mist and bloom of March, you went<br />
down to Yang-chou:<br />
A lonely sail, distant shades, extinguished by blue--<br />
There, at the horizon, where river meets sky.</p>
