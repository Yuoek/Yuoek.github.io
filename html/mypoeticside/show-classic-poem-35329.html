<h1 class="title-poem">Symbols</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>A STORM BEATEN old watch-tower,<br />
A blind hermit rings the hour.<br />
All-destroying sword-blade still<br />
Carried by the wandering fool.<br />
Gold-sewn silk on the sword-blade,<br />
Beauty and fool together laid.</p>
