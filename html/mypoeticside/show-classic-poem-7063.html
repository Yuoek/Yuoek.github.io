<h1 class="title-poem">Hot and Cold</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/roald-dahl1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Roald Dahl</h2>
<p>A woman who my mother knows<br />
Came in and took off all her clothes.<br />
<br />
Said I, not being very old,<br />
'By golly gosh, you must be cold!'<br />
<br />
'No, no!' she cried. 'Indeed I'm not!<br />
I'm feeling devilishly hot!'</p>
