<h1 class="title-poem">Threshold</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nemerov.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Howard Nemerov</h2>
<p>When in still air and still in summertime<br />
A leaf has had enough of this, it seems<br />
To make up its mind to go; fine as a sage<br />
Its drifting in detachment down the road.</p>
