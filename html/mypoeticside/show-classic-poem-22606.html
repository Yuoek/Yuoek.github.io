<h1 class="title-poem">Far Within Us #6</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>From the wrinkle between my brows<br />
You watch till day breaks<br />
On my face<br />
<br />
The waxen night<br />
Is beginning to singe<br />
The fingers of dawn<br />
<br />
Black bricks<br />
Have already tiled<br />
The whole dome of the sky</p>
