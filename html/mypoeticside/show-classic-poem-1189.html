<h1 class="title-poem">A Conceit</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/04/Maya.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Maya Angelou</h2>
<p>Give me your hand <br />
<br />
Make room for me <br />
to lead and follow <br />
you <br />
beyond this rage of poetry. <br />
<br />
Let others have <br />
the privacy of <br />
touching words <br />
and love of loss <br />
of love. <br />
<br />
For me <br />
Give me your hand.</p>
