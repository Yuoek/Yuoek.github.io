<h1 class="title-poem">Alchemy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I lift my heart as spring lifts up<br />
A yellow daisy to the rain;<br />
My heart will be a lovely cup<br />
Altho' it holds but pain.<br />
<br />
For I shall learn from flower and leaf<br />
That color every drop they hold,<br />
To change the lifeless wine of grief<br />
To living gold.</p>
