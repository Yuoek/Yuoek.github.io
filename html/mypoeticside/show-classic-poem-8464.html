<h1 class="title-poem">To lose one's faith—surpass</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>377<br />
<br />
To lose one's faith—surpass<br />
The loss of an Estate—<br />
Because Estates can be<br />
Replenished—faith cannot—<br />
<br />
Inherited with Life—<br />
Belief—but once—can be—<br />
Annihilate a single clause—<br />
And Being's—Beggary—</p>
