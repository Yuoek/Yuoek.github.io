<h1 class="title-poem">The Sea And The Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/08/Annas.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anna Swirszczynska</h2>
<p>You will not tame this sea<br />
either by humility or rapture.<br />
But you can laugh<br />
in its face.<br />
<br />
Laughter<br />
was invented by those<br />
who live briefly<br />
as a burst of laughter.<br />
<br />
The eternal sea<br />
will never learn to laugh.</p>
