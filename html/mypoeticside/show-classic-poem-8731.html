<h1 class="title-poem">This is My Letter to the World</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>This is my letter to the World<br />
That never wrote to Me --<br />
The simple News that Nature told --<br />
With tender Majesty<br />
<br />
Her Message is committed<br />
To Hands I cannot see --<br />
For love of Her -- Sweet -- countrymen --<br />
Judge tenderly -- of Me</p>
