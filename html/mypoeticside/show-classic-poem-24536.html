<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 22</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Affairs succeed by patience and a hasty man fails.<br />
<br />
        I saw with my eyes in the desert  <br />
        That a slow man overtook a fast one.  <br />
        A galloping horse, fleet like the wind, fell back  <br />
        Whilst the camel-man continued slowly his progress.</p>
