<h1 class="title-poem">Love Thy Neighbor</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bjřrnstjerne Bjřrnson</h2>
<p>Love thy neighbor, to Christ be leal!<br />
Crush him never with iron-heel,<br />
 Though in the dust he's lying!<br />
All the living responsive await<br />
Love with power to recreate,<br />
 Needing alone the trying.</p>
