<h1 class="title-poem">Old Tom Again</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>Things out of perfection sail,<br />
And all their swelling canvas wear,<br />
Nor shall the self-begotten fail<br />
Though fantastic men suppose<br />
Building-yard and stormy shore,<br />
Winding-sheet and swaddling - clothes.</p>
