<h1 class="title-poem">Spleen</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Frank O'Hara</h2>
<p>I know so much<br />
about things, I accept<br />
so much, it's like<br />
vomiting. And I am<br />
nourished by the<br />
shabbiness of my<br />
knowing so much<br />
about others and what<br />
they do, and accepting<br />
so much that I hate<br />
as if I didn't know<br />
what it is, to me.<br />
And what it is to<br />
them I know, and hate.</p>
