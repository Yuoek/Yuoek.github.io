<h1 class="title-poem">Finding is the first Act</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>870<br />
<br />
Finding is the first Act<br />
The second, loss,<br />
Third, Expedition for<br />
The "Golden Fleece"<br />
<br />
Fourth, no Discovery—<br />
Fifth, no Crew—<br />
Finally, no Golden Fleece—<br />
Jason—sham—too.</p>
