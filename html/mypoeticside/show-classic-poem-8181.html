<h1 class="title-poem">At leisure is the Soul</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>618<br />
<br />
At leisure is the Soul<br />
That gets a Staggering Blow—<br />
The Width of Life—before it spreads<br />
Without a thing to do—<br />
<br />
It begs you give it Work—<br />
But just the placing Pins—<br />
Or humblest Patchwork—Children do—<br />
To Help its Vacant Hands—</p>
