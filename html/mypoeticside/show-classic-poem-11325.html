                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>THE mirror tells me, I am fair!<br />
<br />
Thou sayest, to grow old my fate will be.<br />
Nought in God's presence changeth e'er,--<br />
<br />
Love him, for this one moment, then, in me.</p>
