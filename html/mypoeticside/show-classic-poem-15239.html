<h1 class="title-poem">By Word of Mouth</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Not though you die to-night, O Sweet, and wail,<br />
A spectre at my door,<br />
Shall mortal Fear make Love immortal fail --<br />
I shall but love you more,<br />
Who, from Death's House returning, give me still<br />
One moment's comfort in my matchless ill.</p>
