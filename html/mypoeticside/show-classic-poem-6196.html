                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>I found the gold on the hill;<br />
I found the hid gold!<br />
The wicked queen<br />
stole the gold,<br />
hid it under a stone<br />
and never told.<br />
The selfish queen<br />
rolling away<br />
in her white limousine,<br />
never knew nor dreamed<br />
that I searched all day<br />
till I found the gold,<br />
the gold!</p>
