<h1 class="title-poem">Dirge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/felicia.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Felicia Hemans</h2>
<p>CALM on the bosom of thy God,<br />
 Fair spirit, rest thee now!<br />
E'en while with ours thy footsteps trod,<br />
 His seal was on thy brow.<br />
<br />
Dust, to its narrow house beneath!<br />
 Soul, to its place on high!<br />
They that have seen thy look in death<br />
 No more may fear to die.</p>
