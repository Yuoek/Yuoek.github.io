<h1 class="title-poem">The Bee is not afraid of me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>111<br />
<br />
The Bee is not afraid of me.<br />
I know the Butterfly.<br />
The pretty people in the Woods<br />
Receive me cordially—<br />
<br />
The Brooks laugh louder when I come—<br />
The Breezes madder play;<br />
Wherefore mine eye thy silver mists,<br />
Wherefore, Oh Summer's Day?</p>
