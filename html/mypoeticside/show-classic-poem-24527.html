<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Caution 02</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Who quarrels with great men sheds his own blood.<br />
<br />
       One who thinks that he is great  <br />
       Is truly said to be squinting.  <br />
       Thou wilt soon see thy forehead broken  <br />
       If thou buttest it in play against a ram.</p>
