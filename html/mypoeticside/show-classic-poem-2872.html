<h1 class="title-poem">The Woods Entry</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/binyon.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Laurence Binyon</h2>
<p>So old is the wood, so old,<br />
Old as Fear.<br />
Wrinkled roots; great stems; hushed leaves;<br />
No sound near.<br />
Shadows retreat into shadow,<br />
Deepening, crossed.<br />
Burning light singles a low leaf, a bough,<br />
Far within, lost.</p>
