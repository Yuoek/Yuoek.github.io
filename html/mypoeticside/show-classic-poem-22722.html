<h1 class="title-poem">Ité</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>Go, my songs, seek your praise from the young<br />
      and from the intolerant,<br />
Move among the lovers of perfection alone.<br />
Seek ever to stand in the hard Sophoclean light<br />
And take you wounds from it gladly.</p>
