<h1 class="title-poem">Rain-Songs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>THE rain streams down like harp-strings from the sky;<br />
The wind, that world-old harpist, sitteth by;<br />
And ever as he sings his low refrain,<br />
He plays upon the harp-strings of the rain.</p>
