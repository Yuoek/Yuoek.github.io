<h1 class="title-poem">Love Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Brown Thrush singing all day long<br />
In the leaves above me,<br />
Take my love this little song,<br />
"Love me, love me, love me!"<br />
<br />
When he harkens what you say,<br />
Bid him, lest he miss me,<br />
Leave his work or leave his play,<br />
And kiss me, kiss me, kiss me!</p>
