<h1 class="title-poem">The Proud Poet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Great Kings were dust and all their deeds forgot<br />
<br />
Did my harp's taut and burnished strings stand mute;<br />
<br />
The fragrance of dead ladies' lovely names<br />
<br />
Blew never down but for my lute.</p>
