<h1 class="title-poem">I Saw Myself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/lew.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lew Welch</h2>
<p>I saw myself<br />
a ring of bone<br />
in the clear stream<br />
of all of it<br />
<br />
and vowed<br />
always to be open to it<br />
that all of it<br />
might flow through<br />
<br />
and then heard<br />
"ring of bone" where<br />
ring is what a<br />
<br />
bell does</p>
