<h1 class="title-poem">Ebb</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>I know what my heart is like<br />
    Since your love died:<br />
  It is like a hollow ledge<br />
  Holding a little pool<br />
    Left there by the tide,<br />
    A little tepid pool,<br />
  Drying inward from the edge.</p>
