<h1 class="title-poem">Tell all the Truth but tell it slant</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Tell all the Truth but tell it slant—<br />
Success in Circuit lies<br />
Too bright for our infirm Delight<br />
The Truth's superb surprise<br />
<br />
As Lightning to the Children eased<br />
With explanation kind<br />
The Truth must dazzle gradually<br />
Or every man be blind—</p>
