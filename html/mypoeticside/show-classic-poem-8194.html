<h1 class="title-poem">How many Flowers fail in Wood</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>404<br />
<br />
How many Flowers fail in Wood—<br />
Or perish from the Hill—<br />
Without the privilege to know<br />
That they are Beautiful—<br />
<br />
How many cast a nameless Pod<br />
Upon the nearest Breeze—<br />
Unconscious of the Scarlet Freight—<br />
It bear to Other Eyes—</p>
