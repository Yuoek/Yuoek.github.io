<h1 class="title-poem">I like a look of Agony</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>241<br />
<br />
I like a look of Agony,<br />
Because I know it's true—<br />
Men do not sham Convulsion,<br />
Nor simulate, a Throe—<br />
<br />
The Eyes glaze once—and that is Death—<br />
Impossible to feign<br />
The Beads upon the Forehead<br />
By homely Anguish strung.</p>
