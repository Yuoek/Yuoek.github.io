<h1 class="title-poem">Joy, Shipmate, Joy!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>Joy! shipmate--joy!<br />
(Pleas'd to my Soul at death I cry<br />
Our life is closed--our life begins;<br />
The long, long anchorage we leave,<br />
The ship is clear at last--she leaps!<br />
She swiftly courses from the shore;<br />
Joy! shipmate--joy!</p>
