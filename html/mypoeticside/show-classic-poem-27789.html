<h1 class="title-poem">My Heart Goes Out</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>My heart goes out to my Creator in love<br />
Who gave me Death, as end and remedy.<br />
All living creatures come to quiet Death<br />
For him to eat up their activity<br />
And give them nothing, which is what they want although<br />
When they are living they do not think so.</p>
