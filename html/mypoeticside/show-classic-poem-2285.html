<h1 class="title-poem">Law</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/06/JB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Beattie</h2>
<p>Laws, as we read in ancient sages, <br />
Have been like cobwebs in all ages. <br />
Cobwebs for little flies are spread, <br />
And laws for little folks are made; <br />
But if an insect of renown, <br />
Hornet or beetle, wasp or drone, <br />
Be caught in quest of sport or plunder, <br />
The flimsy fetter flies in sunder.</p>
