<h1 class="title-poem">The Little Elf</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/10/jkb.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Kendrick Bangs</h2>
<p>I met a little Elf-man, once,   <br />
 Down where the lilies blow.   <br />
I asked him why he was so small,   <br />
 And why he didn't grow.   <br />
  <br />
He slightly frowned, and with his eye           <br />
 He looked me through and through.   <br />
"I'm quite as big for me," said he,   <br />
 "As you are big for you."</p>
