<h1 class="title-poem">Ferns</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>Small ferns up-coming through the mossy green,<br />
Up-curling and springing,<br />
See trees circling round them,<br />
And the straight brook like a lily-stem:<br />
Hear the water laughing<br />
At the stern old pine-tree<br />
Who keeps sighing to himself all day long<br />
What's the use! What's the use!</p>
