<h1 class="title-poem">The Leal</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>The friends I made have slipped and strayed,<br />
  And who's the one that cares?<br />
A trifling lot and best forgot-<br />
  And that's my tale, and theirs.<br />
<br />
Then if my friendships break and bend,<br />
  There's little need to cry<br />
The while I know that every foe<br />
  Is faithful till I die.</p>
