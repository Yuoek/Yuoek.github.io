<h1 class="title-poem">Nothing Stays</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/vandoren.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mark Van Doren</h2>
<p>Nothing stays<br />
not even change,<br />
That can grow tired<br />
of it's own name;<br />
The very thought<br />
too much for it.<br />
<br />
Somewhere in air<br />
a stillness is,<br />
So far, so thin-<br />
But let it alone.<br />
Whoever we are<br />
it is not for us</p>
