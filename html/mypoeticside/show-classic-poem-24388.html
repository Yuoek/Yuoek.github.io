<h1 class="title-poem">There is a life-force within your soul</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>There is a life-force within your soul, seek that life.<br />
There is a gem in the mountain of your body, seek that<br />
mine.<br />
O traveler, if you are in search of That<br />
Don't look outside, look inside yourself and seek That.</p>
