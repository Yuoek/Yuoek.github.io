<h1 class="title-poem">For P’ei Ti</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>We’ve not seen each other<br />
       for a long time now.<br />
       Each day above the stream<br />
       I see us arm in arm.<br />
       Memory. Painful goodbyes.<br />
       If it feels like this now,<br />
       What did it feel like then?</p>
