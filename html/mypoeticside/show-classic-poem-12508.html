<h1 class="title-poem">Prayer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Sun that givest all things birth<br />
Shine on everything on earth!<br />
<br />
If that's too much to demand<br />
Shine at least on this our land!<br />
<br />
If even that's too much for thee<br />
Shine at any rate on me.</p>
