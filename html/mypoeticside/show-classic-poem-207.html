<h1 class="title-poem">Vain Words</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/01/FPA.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Franklin P. Adams</h2>
<p>Humble, surely, mine ambition; <br />
  It is merely to construct <br />
Some occasion or condition <br />
  When I may say "usufruct."<br />
<br />
Ernest am I and assiduous; <br />
  Yet I'm certain that I shan't amount <br />
To a lot till I use "viduous," <br />
  "Indiscerptible," and "tantamount."</p>
