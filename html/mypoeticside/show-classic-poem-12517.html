<h1 class="title-poem">Thoughts on a Station Platform</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>It ought to be plain<br />
how little you gain<br />
by getting excited<br />
and vexed.<br />
<br />
You'll always be late<br />
for the previous train,<br />
and always on time<br />
for the next.</p>
