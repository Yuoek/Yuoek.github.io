<h1 class="title-poem">The Mountain sat upon the Plain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>975<br />
<br />
The Mountain sat upon the Plain<br />
In his tremendous Chair—<br />
His observation omnifold,<br />
His inquest, everywhere—<br />
<br />
The Seasons played around his knees<br />
Like Children round a sire—<br />
Grandfather of the Days is He<br />
Of Dawn, the Ancestor—</p>
