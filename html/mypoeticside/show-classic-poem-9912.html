<h1 class="title-poem">Romerico</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/09/encina.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Juan del Encina</h2>
<p>Romerico, tú que vienes<br />
De donde mi vida está,<br />
Las nuevas de ella me da,<br />
Dame nuevas de mi vida<br />
Así Dios te dé placer,<br />
Si tú me quieres hacer<br />
Alegre con tu venida.<br />
Que después de mi partida<br />
De mal en peor me va.<br />
Las nuevas de ella me da.</p>
