<h1 class="title-poem">Death and Fairies</h1>
                <div class="post-autor"><div style="background:url();background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Patrick MacGill</h2>
<p>Before I joined the Army  <br />
 I lived in Donegal,  <br />
Where every night the Fairies  <br />
 Would hold their carnival.  <br />
 <br />
But now I'm out in Flanders,          <br />
 Where men like wheat-ears fall,  <br />
And it's Death and not the Fairies  <br />
 Who is holding carnival.</p>
