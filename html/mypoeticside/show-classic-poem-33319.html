<h1 class="title-poem">The Spelling Lesson</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/carolyn.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carolyn Wells</h2>
<p>When Venus said: "Spell no for me,"  <br />
"N-O," Dan Cupid wrote with glee,  <br />
   And smiled at his success;  <br />
"Ah, child," said Venus, laughing low,  <br />
"We women do not spell it so,          <br />
   We spell it Y-E-S."</p>
