<h1 class="title-poem">I sing to use the Waiting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>850<br />
<br />
I sing to use the Waiting<br />
My Bonnet but to tie<br />
And shut the Door unto my House<br />
No more to do have I<br />
<br />
Till His best step approaching<br />
We journey to the Day<br />
And tell each other how We sung<br />
To Keep the Dark away.</p>
