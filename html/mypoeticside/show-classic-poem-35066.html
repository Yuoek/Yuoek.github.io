<h1 class="title-poem">A Deep Sworn Vow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>Others because you did not keep<br />
That deep-sworn vow have been friends of mine;<br />
Yet always when I look death in the face,<br />
When I clamber to the heights of sleep,<br />
Or when I grow excited with wine,<br />
Suddenly I meet your face.</p>
