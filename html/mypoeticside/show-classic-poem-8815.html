<h1 class="title-poem">Me! Come! My dazzled face</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Me! Come! My dazzled face<br />
In such a shining place!<br />
<br />
Me! Hear! My foreign ear<br />
The sounds of welcome near!<br />
<br />
The saints shall meet<br />
Our bashful feet.<br />
<br />
My holiday shall be<br />
That they remember me;<br />
<br />
My paradise, the fame<br />
That they pronounce my name.</p>
