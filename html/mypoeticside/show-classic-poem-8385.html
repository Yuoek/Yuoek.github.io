<h1 class="title-poem">So from the mould</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>66<br />
<br />
So from the mould<br />
Scarlet and Gold<br />
Many a Bulb will rise—<br />
Hidden away, cunningly, From sagacious eyes.<br />
<br />
So from Cocoon<br />
Many a Worm<br />
Leap so Highland gay,<br />
Peasants like me,<br />
Peasants like Thee<br />
Gaze perplexedly!</p>
