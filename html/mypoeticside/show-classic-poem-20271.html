<h1 class="title-poem">Carol</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Hector-Hugh-Munro.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hector Hugh Munro</h2>
<p>While shepherds watched their flocks by night<br />
All seated on the ground,<br />
A high explosive shell came down<br />
And mutton rained around.</p>
