<h1 class="title-poem">To a Lady</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/12/barber.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mary Barber</h2>
<p>WELL you Sincerity display, <br />
 A virtue wond'rous rare ! <br />
Nor value, tho' the world should say, <br />
 You're rude, so you're sincere. <br />
To be sincere, then, give me leave ; <br />
 And I will frankly own, <br />
Since you but this one virtue have, <br />
'Twere better you had none.</p>
