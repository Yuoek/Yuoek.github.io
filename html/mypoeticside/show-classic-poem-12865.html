<h1 class="title-poem">To Laurels</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>A funeral stone<br />
Or verse, I covet none;<br />
But only crave<br />
Of you that I may have<br />
A sacred laurel springing from my grave:<br />
Which being seen<br />
Blest with perpetual green,<br />
May grow to be<br />
Not so much call'd a tree,<br />
As the eternal monument of me.</p>
