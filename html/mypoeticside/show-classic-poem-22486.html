<h1 class="title-poem">Leaving White King City</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>White King City I left at dawn<br />
in the morning-glow of the clouds;<br />
The thousand miles to Chiang-ling<br />
we sailed in a single day.<br />
On either shore the gibbons' chatter<br />
sounded without pause<br />
While my light boat skimmed past<br />
ten thousand sombre crags.</p>
