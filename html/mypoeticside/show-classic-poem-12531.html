<h1 class="title-poem">An Ethical Grook</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>I see<br />
  and I hear<br />
     and I speak no evil;<br />
I carry<br />
  no malice<br />
     within my breast;<br />
yet quite without<br />
  wishing<br />
     a man to the Devil<br />
one may be<br />
  permitted<br />
     to hope for the best.</p>
