<h1 class="title-poem">God Scatters Beauty</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>God scatters beauty as he scatters flowers<br />
O'er the wide earth, and tells us all are ours.<br />
A hundred lights in every temple burn,<br />
And at each shrine I bend my knee in turn.</p>
