<h1 class="title-poem">Book Of Contemplation - Five Things</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>WHAT makes time short to me?<br />
<br />
Activity!<br />
What makes it long and spiritless?<br />
<br />
'Tis idleness!<br />
What brings us to debt?<br />
<br />
To delay and forget!<br />
What makes us succeed?<br />
<br />
Decision with speed<br />
How to fame to ascend?<br />
<br />
Oneself to defend!</p>
