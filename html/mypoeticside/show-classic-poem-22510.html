<h1 class="title-poem">To Tu Fu from Shantung</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>You ask how I spend my time--<br />
I nestle against a treetrunk<br />
and listen to autumn winds<br />
in the pines all night and day.<br />
<br />
Shantung wine can't get me drunk.<br />
The local poets bore me.<br />
My thoughts remain with you,<br />
like the Wen River, endlessly flowing.</p>
