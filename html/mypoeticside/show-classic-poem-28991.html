<h1 class="title-poem">She Does Not Remember</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/08/Annas.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anna Swirszczynska</h2>
<p>She was an evil stepmother.<br />
In her old age she is slowly dying<br />
in an empty hovel.<br />
<br />
She shudders<br />
like a clutch of burnt paper.<br />
She does not remember that she was evil.<br />
But she knows<br />
that she feels cold.</p>
