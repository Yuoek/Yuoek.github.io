<h1 class="title-poem">To Dr. Thomas Shearer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Sidney-Lanier.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sidney Lanier</h2>
<p>Presenting a portrait-bust of the author.<br />
<br />
<br />
<br />
Since you, rare friend! have tied my living tongue<br />
With thanks more large than man e'er said or sung,<br />
So let the dumbness of this image be<br />
My eloquence, and still interpret me.</p>
