<h1 class="title-poem">Growing In The Vale</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Growing in the vale<br />
By the uplands hilly,<br />
Growing straight and frail,<br />
Lady Daffadowndilly.<br />
In a golden crown,<br />
And a scant green gown<br />
While the spring blows chilly,<br />
Lady Daffadown,<br />
Sweet Daffadowndilly.</p>
