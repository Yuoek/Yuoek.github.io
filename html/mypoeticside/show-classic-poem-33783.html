<h1 class="title-poem">Locations And Times</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>LOCATIONS and times--what is it in me that meets them all, whenever<br />
        and wherever, and makes me at home?<br />
Forms, colors, densities, odors--what is it in me that corresponds<br />
        with them?</p>
