<h1 class="title-poem">Poem of Farewell</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Morning rain on Wei’s city<br />
Falls in the soft dust.<br />
Green. The courtyard willows.<br />
Green leaves. The newest.<br />
But you must drink deeper.<br />
Again, one more cup?<br />
Out west where you go<br />
What friendship there?</p>
