<h1 class="title-poem">To make One's Toilette—after Death</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>485<br />
<br />
To make One's Toilette—after Death<br />
Has made the Toilette cool<br />
Of only Taste we cared to please<br />
Is difficult, and still—<br />
<br />
That's easier—than Braid the Hair—<br />
And make the Bodice gay—<br />
When eyes that fondled it are wrenched<br />
By Decalogues—away—</p>
