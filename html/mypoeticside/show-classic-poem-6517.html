<h1 class="title-poem">There was a man who lived a life of fire</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>There was a man who lived a life of fire.<br />
Even upon the fabric of time,<br />
Where purple becomes orange<br />
And orange purple,<br />
This life glowed,<br />
A dire red stain, indelible;<br />
Yet when he was dead,<br />
He saw that he had not lived.</p>
