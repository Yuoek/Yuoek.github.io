<h1 class="title-poem">I stepped from plank to plank</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I stepped from plank to plank<br />
  So slow and cautiously;<br />
The stars about my head I felt,<br />
  About my feet the sea.<br />
<br />
I knew not but the next<br />
  Would be my final inch,--<br />
This gave me that precarious gait<br />
  Some call experience.</p>
