<h1 class="title-poem">To His Book</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Make haste away, and let one be<br />
A friendly patron unto thee;<br />
Lest, rapt from hence, I see thee lie<br />
Torn for the use of pastery;<br />
Or see thy injured leaves serve well<br />
To make loose gowns for mackarel;<br />
Or see the grocers, in a trice,<br />
Make hoods of thee to serve out spice.</p>
