<h1 class="title-poem">On this wondrous sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>4<br />
<br />
On this wondrous sea<br />
Sailing silently,<br />
Ho! Pilot, ho!<br />
Knowest thou the shore<br />
Where no breakers roar—<br />
Where the storm is o'er?<br />
<br />
In the peaceful west<br />
Many the sails at rest—<br />
The anchors fast—<br />
Thither I pilot thee—<br />
Land Ho! Eternity!<br />
Ashore at last!</p>
