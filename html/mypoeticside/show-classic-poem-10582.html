<h1 class="title-poem">Fair And Unfair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/robertfrancis.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Francis</h2>
<p>The beautiful is fair. The just is fair.<br />
Yet one is commonplace and one is rare,<br />
One everywhere, one scarcely anywhere.<br />
<br />
So fair unfair a world. Had we the wit<br />
To use the surplus for the deficit,<br />
We'd make a fairer fairer world of it.<br />
<br />
<br />
Anonymous submission.</p>
