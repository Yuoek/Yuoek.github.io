<h1 class="title-poem">On Torture: A Public Singer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>Torture will give a dozen pence or more<br />
To keep a drab from bawling at his door.<br />
The public taste is quite a different thing-<br />
Torture is positively paid to sing.</p>
