<h1 class="title-poem">The Cornel Grove</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Bear fruit red and green<br />
Again as if flower further open<br />
Hill at if remain guest<br />
Place here cornel cup  <br />
<br />
When bearing fruit it's red and green,<br />
As if the flowers were budding again.<br />
If a guest remains on the hill,<br />
Set a cup of cornel here.</p>
