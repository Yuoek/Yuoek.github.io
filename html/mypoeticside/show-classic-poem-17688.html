<h1 class="title-poem">Falling Snow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>The snow whispers around me<br />
And my wooden clogs<br />
Leave holes behind me in the snow.<br />
But no one will pass this way<br />
Seeking my footsteps,<br />
And when the temple bell rings again<br />
They will be covered and gone.</p>
