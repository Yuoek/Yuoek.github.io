<h1 class="title-poem">Lying On The Dune Sand</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/04/taku.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Takuboku Ishikawa</h2>
<p>Lying on the dune sand<br />
this day I recall<br />
remotely<br />
the anguish of my first love.</p>
