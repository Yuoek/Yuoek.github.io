<h1 class="title-poem">Owen Aherne And His Dancers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>A STRANGE thing surely that my Heart, when love had come unsought<br />
Upon the Norman upland or in that poplar shade,<br />
Should find no burden but itself and yet should be worn out.<br />
It could not bear that burden and therefore it went mad.<br />
</p>
