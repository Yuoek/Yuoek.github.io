<h1 class="title-poem">So much Summer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>651<br />
<br />
So much Summer<br />
Me for showing<br />
Illegitimate—<br />
Would a Smile's minute bestowing<br />
Too exorbitant<br />
<br />
To the Lady<br />
With the Guinea<br />
Look—if She should know<br />
Crumb of Mine<br />
A Robin's Larder<br />
Would suffice to stow—</p>
