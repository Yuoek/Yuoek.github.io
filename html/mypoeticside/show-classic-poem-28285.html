<h1 class="title-poem">Season Of Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/04/stesi.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stesichorus</h2>
<p>Forget the wars.<br />
It is time to sing.<br />
Take out the flute from Phrygia<br />
and recall the songs of our blond Graces.<br />
<br />
Clamor of babbling swallows:<br />
it is already spring.</p>
