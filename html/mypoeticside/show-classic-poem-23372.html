<h1 class="title-poem">The Postage Stamp</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Joachim-Ringelnatz.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joachim Ringelnatz</h2>
<p>A postage stamp, male, was elated<br />
With joy, before he was dated.<br />
A princess licked him, by Jove!<br />
Which did awaken his love.<br />
<br />
He wanted to kiss her back<br />
But had to go on a trek.<br />
His love was thus unavailing<br />
So sad is often life's failing.</p>
