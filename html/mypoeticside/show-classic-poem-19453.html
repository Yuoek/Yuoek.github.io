<h1 class="title-poem">Independence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/aamilne.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alan Alexander Milne</h2>
<p>I never did, I never did,<br />
I never did like "Now take care, dear!"<br />
I never did, I never did,<br />
I never did want "Hold-my-hand";<br />
I never did, I never did,<br />
I never did think much of "Not up there, dear!"<br />
It's no good saying it.<br />
They don't understand.</p>
