<h1 class="title-poem">Tonight I've watched</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>Tonight I've watched<br />
the moon and then<br />
the Pleiades<br />
go down<br />
<br />
The night is now<br />
half-gone; youth<br />
goes; I am<br />
<br />
in bed alone</p>
