<h1 class="title-poem">April's Lambs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/William-Henry-Davies.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Henry Davies</h2>
<p>Though I was born in April's prime,<br />
With many another lamb,<br />
Yet, thinking now of all my years,<br />
What am I but a tough old ram?<br />
<br />
"No woman thinks of years," said she,<br />
"Or any tough old rams,<br />
When she can hear a voice that bleats<br />
As tenderly as any lamb's."</p>
