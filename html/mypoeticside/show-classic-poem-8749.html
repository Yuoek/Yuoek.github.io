<h1 class="title-poem">Heart, We Will Forget Him</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Heart, we will forget him,<br />
You and I, tonight!<br />
You must forget the warmth he gave,<br />
I will forget the light.<br />
When you have done pray tell me,<br />
Then I, my thoughts, will dim.<br />
Haste! ‘lest while you’re lagging<br />
I may remember him!</p>
