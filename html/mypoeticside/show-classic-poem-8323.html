<h1 class="title-poem">Mama never forgets her birds</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>164<br />
<br />
Mama never forgets her birds,<br />
Though in another tree—<br />
She looks down just as often<br />
And just as tenderly<br />
As when her little mortal nest<br />
With cunning care she wove—<br />
If either of her "sparrows fall,"<br />
She "notices," above.</p>
