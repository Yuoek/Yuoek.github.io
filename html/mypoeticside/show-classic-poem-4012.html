<h1 class="title-poem">The Pool Players: Seven at the Golden Shovel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/gwendolyn-brooks-3.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gwendolyn Brooks</h2>
<p>We real cool. We<br />
Left School. We<br />
<br />
Lurk late. We<br />
Strike straight. We<br />
<br />
Sing sin. We<br />
Thin gin. We<br />
<br />
Jazz June. We<br />
Die soon.</p>
