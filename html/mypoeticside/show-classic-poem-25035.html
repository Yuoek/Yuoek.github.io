<h1 class="title-poem">June</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Paula is digging and shaping the loam of a salvia,<br />
    Scarlet Chinese talker of summer.<br />
Two petals of crabapple blossom blow fallen in Paula's<br />
           hair,<br />
    And fluff of white from a cottonwood.</p>
