<h1 class="title-poem">Hoar-Frost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>In the cloud gray mornings<br />
I heard the herons Flying<br />
And when I came into my garden,<br />
My silken outer-garment<br />
Trailed over withered leaves.<br />
A dried leaf crumbles at a touch,<br />
But I have seen many Autumns<br />
With herons blowing like smoke<br />
Across the sky.</p>
