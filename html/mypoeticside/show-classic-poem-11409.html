<h1 class="title-poem">The Rule Of Life</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>IF thou wouldst live unruffled by care,<br />
Let not the past torment thee e'er;<br />
As little as possible be thou annoy'd,<br />
And let the present be ever enjoy'd;<br />
Ne'er let thy breast with hate be supplied,<br />
And to God the future confide.</p>
