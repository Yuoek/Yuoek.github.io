<h1 class="title-poem">Moral</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/12/enella.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Menella Bute Smedley</h2>
<p>At the moral of this song<br />
Let no foolish fellow scoff;<br />
If your beard is thought too long,<br />
You had better cut it off.<br />
What the barber typifies<br />
Is so plain to honest eyes,<br />
That its meaning to define<br />
Never shall be act of mine.</p>
