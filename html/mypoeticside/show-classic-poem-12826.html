<h1 class="title-poem">Upon His Sister-in-law, Mistress Elizabeth Herrick</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>First, for effusions due unto the dead,<br />
My solemn vows have here accomplished;<br />
Next, how I love thee, that my grief must tell,<br />
Wherein thou liv'st for ever.--Dear, farewell!</p>
