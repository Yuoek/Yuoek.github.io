<h1 class="title-poem">As plan for Noon and plan for Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>960<br />
<br />
As plan for Noon and plan for Night<br />
So differ Life and Death<br />
In positive Prospective—<br />
The Foot upon the Earth<br />
<br />
At Distance, and Achievement, strains,<br />
The Foot upon the Grave<br />
Makes effort at conclusion<br />
Assisted faint of Love.</p>
