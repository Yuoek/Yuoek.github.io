<h1 class="title-poem">The Roaring Frost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/meynell.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alice Meynell</h2>
<p>A flock of winds came winging from the North,<br />
Strong birds with fighting pinions driving forth<br />
With a resounding call!<br />
<br />
Where will they close their wings and cease their cries -<br />
Between what warming seas and conquering skies -<br />
And fold, and fall?</p>
