<h1 class="title-poem">Midsummer, was it, when They died</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>962<br />
<br />
Midsummer, was it, when They died—<br />
A full, and perfect time—<br />
The Summer closed upon itself<br />
In Consummated Bloom—<br />
<br />
The Corn, her furthest kernel filled<br />
Before the coming Flail—<br />
When These—leaned unto Perfectness—<br />
Through Haze of Burial—</p>
