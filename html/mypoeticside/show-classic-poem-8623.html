<h1 class="title-poem">Give little Anguish</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>310<br />
<br />
Give little Anguish—<br />
Lives will fret—<br />
Give Avalanches—<br />
And they'll slant—<br />
Straighten—look cautious for their Breath—<br />
But make no syllable—like Death—<br />
Who only shows the Marble Disc—<br />
Sublimer sort—than Speech—</p>
