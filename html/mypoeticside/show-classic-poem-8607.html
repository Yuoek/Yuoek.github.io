<h1 class="title-poem">Endow the Living—with the Tears</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>521<br />
<br />
Endow the Living—with the Tears—<br />
You squander on the Dead,<br />
And They were Men and Women—now,<br />
Around Your Fireside—<br />
<br />
Instead of Passive Creatures,<br />
Denied the Cherishing<br />
Till They—the Cherishing deny—<br />
With Death's Ethereal Scron—</p>
