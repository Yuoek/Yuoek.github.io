<h1 class="title-poem">Babel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/loa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lola Ridge</h2>
<p>Oh, God did cunningly, there at Babel -<br />
Not mere tongues dividing, but soul from soul,<br />
So that never again should men be able<br />
To fashion one infinite, towering whole.</p>
