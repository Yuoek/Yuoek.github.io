<h1 class="title-poem">There was an Old Man of Calcutta</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>THERE WAS AN OLD MAN OF CALCUTTA, WHO PERPETUALLY ATE BREAD & BUTTER;<br />
  TILL A GREAT BIT OF MUFFIN ON WHICH HE WAS STUFFING,<br />
  CHOKED THAT HORRID OLD MAN OF CALCUTTA.</p>
