<h1 class="title-poem">The Prosperous Voyage</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>THE mist is fast clearing.<br />
And radiant is heaven,<br />
Whilst AEolus loosens<br />
Our anguish-fraught bond.<br />
The zephyrs are sighing,<br />
Alert is the sailor.<br />
Quick! nimbly be plying!<br />
The billows are riven,<br />
The distance approaches;<br />
I see land beyond!</p>
