<h1 class="title-poem">Nantucket</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>Flowers through the window<br />
lavender and yellow<br />
<br />
changed by white curtains –<br />
Smell of cleanliness –<br />
<br />
Sunshine of late afternoon –<br />
On the glass tray<br />
<br />
a glass pitcher, the tumbler<br />
turned down, by which<br />
<br />
a key is lying – And the<br />
immaculate white bed</p>
