<h1 class="title-poem">I keep my pledge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>46<br />
<br />
I keep my pledge.<br />
I was not called—<br />
Death did not notice me.<br />
I bring my Rose.<br />
I plight again,<br />
By every sainted Bee—<br />
By Daisy called from hillside—<br />
by Bobolink from lane.<br />
Blossom and I—<br />
Her oath, and mine—<br />
Will surely come again.</p>
