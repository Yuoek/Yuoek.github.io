<h1 class="title-poem">It's likely to be able to pass away</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/santoka.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Taneda Santoka</h2>
<p>It's likely to be able to pass away<br />
In a calm frame of mind<br />
In the fresh green grasses</p>
