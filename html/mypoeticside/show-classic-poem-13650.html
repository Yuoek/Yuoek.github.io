<h1 class="title-poem">Still Here</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>been scared and battered.<br />
My hopes the wind done scattered.<br />
  Snow has friz me,<br />
  Sun has baked me,<br />
<br />
Looks like between 'em they done<br />
  Tried to make me<br />
<br />
Stop laughin', stop lovin', stop livin'--<br />
  But I don't care!<br />
  I'm still here!</p>
