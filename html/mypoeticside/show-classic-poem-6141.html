<h1 class="title-poem">Fourth Station</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Padraic-Colum.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Padraic Colum</h2>
<p>Jesus His Mother meets:<br />
She looks on Him and sees<br />
The Savior in Her Son:<br />
The Angel's word comes back:<br />
Within her heart she says,<br />
"Unto me let this be done!"<br />
Still is she full of grace.<br />
By us, too be it one,<br />
That grace that brings us revelation!</p>
