<h1 class="title-poem">After Parting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Oh I have sown my love so wide<br />
That he will find it everywhere;<br />
It will awake him in the night,<br />
It will enfold him in the air.<br />
<br />
I set my shadow in his sight<br />
And I have winged it with desire,<br />
That it may be a cloud by day<br />
And in the night a shaft of fire.</p>
