<h1 class="title-poem">Star</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>Star, my only star,<br />
in the poverty of the night, alone,<br />
for me, alone, you shine,<br />
in loneliness you shine;<br />
But, for me, star<br />
that never will stop from lighting,<br />
a too short time is granted you,<br />
you lavish me a light<br />
that in me does nothing but<br />
sharpen my despair.</p>
