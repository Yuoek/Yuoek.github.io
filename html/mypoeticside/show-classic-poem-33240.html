<h1 class="title-poem">Night Hills</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Rain gone. Hills are void.<br />
       Night air. Autumn now.<br />
       Bright moon in the pines.<br />
       Clear stream on the stones.<br />
       A bamboo noise – who heads home?<br />
       The lotus stirs – who sets out?<br />
       Spring scents always go.<br />
       But you – you must always stay.</p>
