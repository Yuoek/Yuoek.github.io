<h1 class="title-poem">The Seed of David (For a Picture)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Dante-Gabriel-Rossetti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dante Gabriel Rossetti</h2>
<p>Christ sprang from David Shepherd, and even so<br />
From David King, being born of high and low.<br />
The Shepherd lays his crook, the King his crown,<br />
Here at Christ's feet, and high and low bow down.</p>
