<h1 class="title-poem">A Death blow is a Life blow to Some</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>816<br />
<br />
A Death blow is a Life blow to Some<br />
Who till they died, did not alive become—<br />
Who had they lived, had died but when<br />
They died, Vitality begun.</p>
