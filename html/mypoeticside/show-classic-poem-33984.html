<h1 class="title-poem">The Destroyer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>With care, and skill, and cunning art<br />
She parried Time's malicious dart,<br />
And kept the years at bay,<br />
Till passion entered in her heart<br />
And aged her in a day!</p>
