<h1 class="title-poem">Theory</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Into love and out again,<br />
 Thus I went, and thus I go.<br />
Spare your voice, and hold your pen-<br />
 Well and bitterly I know<br />
All the songs were ever sung,<br />
 All the words were ever said;<br />
Could it be, when I was young,<br />
 Some one dropped me on my head?</p>
