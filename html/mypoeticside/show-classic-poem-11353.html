<h1 class="title-poem">To The Husbandman</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>SMOOTHLY and lightly the golden seed by the furrow is cover'd;<br />
<br />
Yet will a deeper one, friend, cover thy bones at the last.<br />
Joyously plough'd and sow'd! Here food all living is budding,<br />
<br />
E'en from the side of the tomb Hope will not vanish away.</p>
