<h1 class="title-poem">Birds</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/Richh.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Henry Stoddard</h2>
<p>Birds are singing round my window,<br />
Tunes the sweetest ever heard,<br />
And I hang my cage there daily,<br />
But I never catch a bird.<br />
<br />
So with thoughts my brain is peopled,<br />
And they sing there all day long:<br />
But they will not fold their pinions<br />
In the little cage of Song!</p>
