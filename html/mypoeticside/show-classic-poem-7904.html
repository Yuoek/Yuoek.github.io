<h1 class="title-poem">From Us She wandered now a Year</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>890<br />
<br />
From Us She wandered now a Year,<br />
Her tarrying, unknown,<br />
If Wilderness prevent her feet<br />
Or that Ethereal Zone<br />
<br />
No eye hath seen and lived<br />
We ignorant must be—<br />
We only know what time of Year<br />
We took the Mystery.</p>
