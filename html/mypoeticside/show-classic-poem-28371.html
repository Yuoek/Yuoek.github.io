<h1 class="title-poem">At the Sea-Side</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>When I was down beside the sea<br />
A wooden spade they gave to me<br />
To dig the sandy shore.<br />
<br />
My holes were empty like a cup.<br />
In every hole the sea came up,<br />
Till it could come no more.</p>
