<h1 class="title-poem">The Bath-Tub</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>As a bathtub lined with white porcelain,<br />
When the hot water gives out or goes tepid,<br />
So is the slow cooling of our chivalrous passion,<br />
O my much praised but-not-altogether-satisfactory lady.</p>
