<h1 class="title-poem">Nine Things</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>It's night<br />
and a numbered beauty<br />
lapses at the wind,<br />
chortles with the<br />
branches of a tree,<br />
<br />
 giggles,<br />
<br />
plays shadow dance<br />
with a dead kite,<br />
cajoles affection<br />
from falling leaves,<br />
and knows four<br />
other things.<br />
One is the color<br />
of your hair.</p>
