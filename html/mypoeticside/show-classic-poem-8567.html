<h1 class="title-poem">As Children bid the Guest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>133<br />
<br />
As Children bid the Guest "Good Night"<br />
And then reluctant turn—<br />
My flowers raise their pretty lips—<br />
Then put their nightgowns on.<br />
<br />
As children caper when they wake<br />
Merry that it is Morn—<br />
My flowers from a hundred cribs<br />
Will peep, and prance again.</p>
