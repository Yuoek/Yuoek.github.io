<h1 class="title-poem">Come, come thou bleak December wind (fragment)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/coleridge.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel Taylor Coleridge</h2>
<p>Come, come thou bleak December wind,<br />
   And blow the dry leaves from the tree!<br />
   Flash, like a Love-thought, thro' me, Death<br />
   And take a Life that wearies me.</p>
