<h1 class="title-poem">Close Both My Eyes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Theodor-Storm.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Theodor Storm</h2>
<p>Close both my eyes<br />
with your beloved hands!<br />
For everything I suffer<br />
comes to rest under your hand.<br />
<br />
And as the pain,<br />
wave upon wave, gently lies down to sleep,<br />
as the last heartbeat stirs,<br />
you fill my whole heart.</p>
