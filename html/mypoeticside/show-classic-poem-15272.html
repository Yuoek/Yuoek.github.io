<h1 class="title-poem">False Dawn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>To-night, God knows what thing shall tide,<br />
The Earth is racked and fain--<br />
Expectant, sleepless, open-eyed;<br />
And we, who from the Earth were made,<br />
Thrill with our Mother's pain.</p>
