<h1 class="title-poem">Whether my bark went down at sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>52<br />
<br />
Whether my bark went down at sea—<br />
Whether she met with gales—<br />
Whether to isles enchanted<br />
She bent her docile sails—<br />
<br />
By what mystic mooring<br />
She is held today—<br />
This is the errand of the eye<br />
Out upon the Bay.</p>
