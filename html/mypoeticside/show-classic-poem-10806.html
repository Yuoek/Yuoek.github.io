<h1 class="title-poem">A S.S.T.'s Lament</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/10/fur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Furphy</h2>
<p>Would I were a profit monger,<br />
Buying cheap, and selling dear,<br />
Groceries, or something stronger,<br />
Toys, or pipes, or sporting gear,<br />
Wrong, maybe, but ain't it wronger<br />
That I should be stranded here,<br />
While my upper lip grow longer,<br />
Month by month, and year by year?</p>
