<h1 class="title-poem">Oh, My Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Nizar.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nizar Qabbani</h2>
<p>Oh, my love<br />
If you were at the level of my madness,<br />
You would cast away your jewelry,<br />
Sell all your bracelets,<br />
And sleep in my eyes.</p>
