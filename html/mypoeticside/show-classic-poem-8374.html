<h1 class="title-poem">Sexton! My Master's sleeping here</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>96<br />
<br />
Sexton! My Master's sleeping here.<br />
Pray lead me to his bed!<br />
I came to build the Bird's nest,<br />
And sow the Early seed—<br />
<br />
That when the snow creeps slowly<br />
From off his chamber door—<br />
Daisies point the way there—<br />
And the Troubadour.</p>
