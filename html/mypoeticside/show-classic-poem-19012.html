<h1 class="title-poem">Gold in the Mountain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/herm.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Herman Melville</h2>
<p>Gold in the mountain,<br />
And gold in the glen,<br />
And greed in the heart,<br />
Heaven having no part,<br />
And unsatisfied men.</p>
