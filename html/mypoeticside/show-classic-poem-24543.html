<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 16</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Unless an orator’s defects are mentioned by someone, his good points will not be praised.<br />
<br />
           Be not proud of the beauty of thy speech,  <br />
           Of the approbation of an ignoramus and of thy own opinion.</p>
