<h1 class="title-poem">Passage</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/paz.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Octavio Paz</h2>
<p>More than air<br />
More than water<br />
More than lips<br />
Light light<br />
 <br />
Your body is the trace of your body</p>
