<h1 class="title-poem">She Spins Silk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Far up river in Szechuan,<br />
waters rise as spring winds roar.<br />
<br />
How can I dare to meet her now,<br />
to brave the dangerous gorge?<br />
<br />
The grass grows green in the valley below<br />
where silk worms silently spin.<br />
<br />
Her hands work threads that never end,<br />
dawn to dusk when the cuckoo sings.</p>
