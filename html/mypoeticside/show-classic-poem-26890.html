<h1 class="title-poem">Love Quickly Is Pall'd</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shadwell.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Shadwell</h2>
<p>Love quickly is pall'd,<br />
Tho' with labour 'tis gain'd;<br />
Wine never does cloy<br />
Tho' with ease 'tis obtain'd.<br />
We sing while you sigh,<br />
We laugh while you weep;<br />
Love robs you of rest,<br />
Wine lulls us asleep.</p>
