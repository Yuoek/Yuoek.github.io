                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>When there is wine, no need to cry;<br />
Army of sorrows, no need to defy.<br />
Your lips are green, bring forth the wine.<br />
Drinking at the green, everyone must try.</p>
