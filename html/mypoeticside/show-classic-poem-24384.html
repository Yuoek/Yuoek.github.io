<h1 class="title-poem">In love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>In love, aside from sipping the wine of timelessness,<br />
  nothing else exists.<br />
There is no reason for living except for giving one's life.<br />
I said, "First I know you, then I die."<br />
He said, "For the one who knows Me, there is no dying."</p>
