<h1 class="title-poem">In the Waters of Purity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>In the waters of purity, I melted like salt<br />
Neither blasphemy, nor faith, nor conviction, nor<br />
   doubt remained.<br />
In the center of my heart a star has appeared<br />
And all the seven heavens have become lost in it.</p>
