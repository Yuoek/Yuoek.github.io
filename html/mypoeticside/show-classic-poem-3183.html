<h1 class="title-poem">Three Things to Remember</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>A Robin Redbreast in a cage,<br />
Puts all Heaven in a rage.<br />
<br />
A skylark wounded on the wing<br />
Doth make a cherub cease to sing.<br />
<br />
He who shall hurt the little wren<br />
Shall never be beloved by men.</p>
