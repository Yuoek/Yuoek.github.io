<h1 class="title-poem">Michael Scott’s Wooing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Dante-Gabriel-Rossetti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dante Gabriel Rossetti</h2>
<p>ROSE-SHEATHED beside the rosebud tongue<br />
Lurks the young adder's tooth;<br />
Milk-mild from new-born hemlock-bluth<br />
The earliest drops are wrung:<br />
And sweet the flower of his first youth<br />
When Michael Scott was young.</p>
