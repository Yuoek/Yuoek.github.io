<h1 class="title-poem">War</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Leon-Gellert.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Leon Gellert</h2>
<p>When my poor body died,--Alas!<br />
I watched it topple down a hill<br />
And sink beside a tuft of grass.<br />
........ I laughed like mad,<br />
.......  and laughing still<br />
I bowed and thanked the bit of shell<br />
That set me free and made me glad.<br />
Then quietly,<br />
I strolled to Hell.</p>
