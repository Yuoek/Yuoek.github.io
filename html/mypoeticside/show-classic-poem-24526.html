<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 29</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>To strike one’s fist on a lion, and to grasp the sharp edge of a sword with the hand, is not the part of an intelligent man.<br />
<br />
         Do not fight or try thy strength with a furious man.  <br />
         Hide thy hands in thy arm-pits to avoid his finger-nails.</p>
