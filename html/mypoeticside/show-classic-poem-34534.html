<h1 class="title-poem">Portsmouth's Looking Glass</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/John-Wilmot.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Wilmot</h2>
<p>Methinks I see you, newly risen<br />
From your embroider'd Bed and pissing,<br />
With studied mien and much grimace,<br />
Present yourself before your glass,<br />
To vanish and smooth o'er those graces,<br />
You rubb'd off in your Night Embraces.</p>
