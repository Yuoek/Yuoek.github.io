<h1 class="title-poem">They dropped like flakes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>They dropped like flakes, they dropped like stars,<br />
  Like petals from a rose,<br />
When suddenly across the lune<br />
  A wind with fingers goes.<br />
<br />
They perished in the seamless grass,--<br />
  No eye could find the place;<br />
But God on his repealless list<br />
  Can summon every face.</p>
