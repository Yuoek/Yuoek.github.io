<h1 class="title-poem">Little Tiger</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>Little Tiger, burning bright<br />
With a subtle Blakeish light,<br />
Tell what visions have their home<br />
In those eyes of flame and chrome!<br />
Children vex thee - thoughtless, gay -<br />
Holding when thou wouldst away:<br />
What dark lore is that which thou,<br />
Spitting, mixest with thy meow?</p>
