<h1 class="title-poem">To A Young Girl</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>MY dear, my dear, I know<br />
More than another<br />
What makes your heart beat so;<br />
Not even your own mother<br />
Can know it as I know,<br />
Who broke my heart for her<br />
When the wild thought,<br />
That she denies<br />
And has forgot,<br />
Set all her blood astir<br />
And glittered in her eyes.</p>
