<h1 class="title-poem">When the Astronomer stops seeking</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>851<br />
<br />
When the Astronomer stops seeking<br />
For his Pleiad's Face—<br />
When the lone British Lady<br />
Forsakes the Arctic Race<br />
<br />
When to his Covenant Needle<br />
The Sailor doubting turns—<br />
It will be amply early<br />
To ask what treason means.</p>
