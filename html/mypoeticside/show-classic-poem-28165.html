<h1 class="title-poem">Sign 12</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nichita-Stanescu.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nichita Stanescu</h2>
<p>Little by little she became a word,<br />
bundles of soul on the wind,<br />
a dolphin in the clutches of my eyebrows,<br />
a stone provoking rings in water,<br />
a star inside my knee,<br />
a sky inside my shoulder,<br />
and I inside I.</p>
