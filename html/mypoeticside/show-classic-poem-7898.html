<h1 class="title-poem">Fame of Myself, to justify</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>713<br />
<br />
Fame of Myself, to justify,<br />
All other Plaudit be<br />
Superfluous—An Incense<br />
Beyond Necessity—<br />
<br />
Fame of Myself to lack—Although<br />
My Name be else Supreme—<br />
This were an Honor honorless—<br />
A futile Diadem—</p>
