<h1 class="title-poem">The Veins of other Flowers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>811<br />
<br />
The Veins of other Flowers<br />
The Scarlet Flowers are<br />
Till Nature leisure has for Terms<br />
As "Branch," and "Jugular."<br />
<br />
We pass, and she abides.<br />
We conjugate Her Skill<br />
While She creates and federates<br />
Without a syllable.</p>
