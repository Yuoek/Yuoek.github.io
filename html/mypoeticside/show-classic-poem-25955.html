<h1 class="title-poem">To Frank Dodd</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Service.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert William Service</h2>
<p>Since four decades you've been to me<br />
                 Both Guide and Friend,<br />
I fondly hope you'll always be,<br />
                 Right to the end;<br />
And though my rhymes you rarely scan<br />
                 (Oh, small the blame!)<br />
I joy that on this Page I can<br />
                 Inscribe your name.</p>
