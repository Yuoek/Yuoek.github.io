<h1 class="title-poem">Snow flakes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>36<br />
<br />
         Snow flakes.<br />
<br />
I counted till they danced so<br />
Their slippers leaped the town,<br />
And then I took a pencil<br />
To note the rebels down.<br />
And then they grew so jolly<br />
I did resign the prig,<br />
And ten of my once stately toes<br />
Are marshalled for a jig!</p>
