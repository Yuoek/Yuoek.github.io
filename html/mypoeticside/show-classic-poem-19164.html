<h1 class="title-poem">I So Liked Spring</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/charlotte.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charlotte Mew</h2>
<p>I so liked Spring last year<br />
  Because you were here;-<br />
   The thrushes too-<br />
Because it was these you so liked to hear-<br />
   I so liked you.<br />
<br />
  This year's a different thing,-<br />
   I'll not think of you.<br />
But I'll like the Spring because it is simply spring<br />
   As the thrushes do.</p>
