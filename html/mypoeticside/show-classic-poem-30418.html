<h1 class="title-poem">Vox Corporis</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The beast to the beast is calling,<br />
And the soul bends down to wait;<br />
Like the stealthy lord of the jungle,<br />
The white man calls his mate.<br />
<br />
The beast to the beast is calling,<br />
They rush through the twilight sweet,<br />
But the soul is a wary hunter,<br />
He will not let them meet.</p>
