<h1 class="title-poem">Infant Sorrow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>My mother groaned, my father wept,<br />
Into the dangerous world I leapt;<br />
Helpless, naked, piping loud,<br />
Like a fiend hid in a cloud.<br />
<br />
Struggling in my father's hands,<br />
Striving against my swaddling bands,<br />
Bound and weary, I thought best<br />
To sulk upon my mother's breast.<br />
</p>
