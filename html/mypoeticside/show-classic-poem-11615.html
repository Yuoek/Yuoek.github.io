<h1 class="title-poem">Sound, Sweet Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>SOUND, sweet song, from some far land,<br />
Sighing softly close at hand,<br />
<br />
Now of joy, and now of woe!<br />
<br />
Stars are wont to glimmer so.<br />
<br />
Sooner thus will good unfold;<br />
Children young and children old<br />
Gladly hear thy numbers flow.</p>
