<h1 class="title-poem">A doubt if it be Us</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>859<br />
<br />
A doubt if it be Us<br />
Assists the staggering Mind<br />
In an extremer Anguish<br />
Until it footing find.<br />
<br />
An Unreality is lent,<br />
A merciful Mirage<br />
That makes the living possible<br />
While it suspends the lives.</p>
