<h1 class="title-poem">Best Things dwell out of Sight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>998<br />
<br />
Best Things dwell out of Sight<br />
The Pearl—the Just—Our Thought.<br />
<br />
Most shun the Public Air<br />
Legitimate, and Rare—<br />
<br />
The Capsule of the Wind<br />
The Capsule of the Mind<br />
<br />
Exhibit here, as doth a Burr—<br />
Germ's Germ be where?</p>
