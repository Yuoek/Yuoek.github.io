<h1 class="title-poem">It knew no lapse, nor Diminuation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>560<br />
<br />
It knew no lapse, nor Diminuation—<br />
But large—serene—<br />
Burned on—until through Dissolution—<br />
It failed from Men—<br />
<br />
I could not deem these Planetary forces<br />
Annulled—<br />
But suffered an Exchange of Territory—<br />
Or World—</p>
