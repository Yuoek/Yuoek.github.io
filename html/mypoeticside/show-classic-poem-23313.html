<h1 class="title-poem">Evening Love Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Rainer-Maria-Rilke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rainer Maria Rilke</h2>
<p>Ornamental clouds<br />
compose an evening love song;<br />
a road leaves evasively.<br />
The new moon begins<br />
<br />
a new chapter of our nights,<br />
of those frail nights<br />
we stretch out and which mingle<br />
with these black horizontals.</p>
