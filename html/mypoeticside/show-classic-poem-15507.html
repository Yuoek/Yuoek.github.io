<h1 class="title-poem">Herrings</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Srecko.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Srecko Kosovel</h2>
<p>A barrel of herrings<br />
came to Ljubljana.<br />
They were questioned<br />
about their political leaning:<br />
They explained<br />
they were from Iceland.<br />
A modern poet<br />
warns of decay.<br />
The herrings were<br />
held in the barrel for a week<br />
and started to stink.</p>
