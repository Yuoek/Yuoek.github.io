<h1 class="title-poem">if you like my poems let them</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>if you like my poems let them<br />
walk in the evening,a little behind you<br />
<br />
then people will say<br />
"Along this road i saw a princess pass<br />
on her way to meet her lover(it was<br />
toward nightfall)with tall and ignorant servants."</p>
