<h1 class="title-poem">"Butter And Eggs."</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2018/01/eland.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Margaret Deland</h2>
<p>In orange cap and yellow skirt<br />
She stands - this arrant farmer flirt!    <br />
She knows the thoughts he dare not utter,<br />
The while he buys her eggs and butter,<br />
He knows his fate!      <br />
And yet this silly lover begs,<br />
"Oh, will you sell A kiss, as well      <br />
As butter and eggs?"</p>
