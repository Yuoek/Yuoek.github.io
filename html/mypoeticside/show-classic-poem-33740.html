<h1 class="title-poem">To The Reader At Parting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>NOW, dearest comrade, lift me to your face,<br />
We must separate awhile--Here! take from my lips this kiss.<br />
Whoever you are, I give it especially to you;<br />
So long!--And I hope we shall meet again.</p>
