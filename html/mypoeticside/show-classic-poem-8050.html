<h1 class="title-poem">The Color of a Queen, is this</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>776<br />
<br />
The Color of a Queen, is this—<br />
The Color of a Sun<br />
At setting—this and Amber—<br />
Beryl—and this, at Noon—<br />
<br />
And when at night—Auroran widths<br />
Fling suddenly on men—<br />
'Tis this—and Witchcraft—nature keeps<br />
A Rank—for Iodine—</p>
