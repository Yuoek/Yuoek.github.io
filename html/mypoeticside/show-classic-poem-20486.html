<h1 class="title-poem">The Centipede</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>I objurgate the centipede,<br />
A bug we do not really need.<br />
At sleepy-time he beats a path<br />
Straight to the bedroom or the bath.<br />
You always wallop where he's not,<br />
Or, if he is, he makes a spot.</p>
