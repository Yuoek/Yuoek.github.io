<h1 class="title-poem">The End Of Harvest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/TT.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Tusser</h2>
<p>Come home, lord^, singing,            ["Harvest Lord," or foreman]<br />
Come home, corn bringing.<br />
'Tis merry in hall,<br />
Where beards wag all.<br />
Once had thy desire,<br />
Pay workman his hire:<br />
Let none be beguil'd,<br />
Man, woman, nor child.<br />
Thank God ye shall,<br />
And adieu for all.</p>
