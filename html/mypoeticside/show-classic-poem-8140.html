<h1 class="title-poem">Truth—is as old as God</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>836<br />
<br />
Truth—is as old as God—<br />
His Twin identity<br />
And will endure as long as He<br />
A Co-Eternity—<br />
<br />
And perish on the Day<br />
Himself is borne away<br />
From Mansion of the Universe<br />
A lifeless Deity.</p>
