<h1 class="title-poem">San Martino Del Carso</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>Of these houses<br />
nothing<br />
but fragments of memory<br />
<br />
Of all who<br />
would talk with me not<br />
one remains<br />
<br />
But in my heart<br />
no one's cross is missing<br />
My heart is<br />
the most tormented country of all</p>
