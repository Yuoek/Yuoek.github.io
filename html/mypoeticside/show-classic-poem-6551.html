<h1 class="title-poem">I saw a man pursuing the horizon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>I saw a man pursuing the horizon;<br />
Round and round they sped.<br />
I was disturbed at this;<br />
I accosted the man.<br />
"It is futile," I said,<br />
"You can never -- "<br />
<br />
"You lie," he cried,<br />
And ran on.</p>
