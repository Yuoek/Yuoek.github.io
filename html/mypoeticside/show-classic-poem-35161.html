<h1 class="title-poem">The Lover Mourns For The Loss Of Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>PALE brows, still hands and dim hair,<br />
I had a beautiful friend<br />
And dreamed that the old despair<br />
Would end in love in the end:<br />
She looked in my heart one day<br />
And saw your image was there;<br />
She has gone weeping away.</p>
