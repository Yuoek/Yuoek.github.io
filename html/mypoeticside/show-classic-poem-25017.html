<h1 class="title-poem">Troths</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Yellow dust on a bumble<br />
    bee's wing,<br />
Grey lights in a woman's<br />
    asking eyes,<br />
Red ruins in the changing<br />
    sunset embers:<br />
I take you and pile high<br />
    the memories.<br />
Death will break her claws<br />
    on some I keep.</p>
