<h1 class="title-poem">A Clear Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Karl-Wilson-Baker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Karle Wilson Baker</h2>
<p>I have worn this day as a fretting, ill-made garment,<br />
Impatient to be rid of it.<br />
And lo, as I drew it off over my shoulders<br />
This jewel caught in my hair.</p>
