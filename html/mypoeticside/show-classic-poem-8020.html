<h1 class="title-poem">Size circumscribes—it has no room</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>641<br />
<br />
Size circumscribes—it has no room<br />
For petty furniture—<br />
The Giant tolerates no Gnat<br />
For Ease of Gianture—<br />
<br />
Repudiates it, all the more—<br />
Because intrinsic size<br />
Ignores the possibility<br />
Of Calumnies—or Flies.</p>
