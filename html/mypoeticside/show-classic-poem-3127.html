<h1 class="title-poem">The Sick Rose</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>O Rose, thou art sick!<br />
The invisible worm<br />
That flies in the night,<br />
In the howling storm,<br />
Has found out thy bed<br />
Of crimson joy:<br />
And his dark secret love<br />
Does thy life destroy.</p>
