<h1 class="title-poem">Blackbird</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/gerrit.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gerrit Achterberg</h2>
<p>The morning blackbird gargles<br />
cupfuls of bitter wine,<br />
dream, that grows grainy with pain<br />
in the throats of birds<br />
because the day must be;<br />
because the great whole<br />
darkness no longer can remain closed.</p>
