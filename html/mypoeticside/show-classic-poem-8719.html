<h1 class="title-poem">The Brain, within its Groove</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>556<br />
<br />
The Brain, within its Groove<br />
Runs evenly—and true—<br />
But let a Splinter swerve—<br />
'Twere easier for You—<br />
<br />
To put a Current back—<br />
When Floods have slit the Hills—<br />
And scooped a Turnpike for Themselves—<br />
And trodden out the Mills—</p>
