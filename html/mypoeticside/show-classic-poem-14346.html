<h1 class="title-poem">Because Your Voice Was at My Side</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>Because your voice was at my side<br />
I gave him pain,<br />
Because within my hand I held<br />
Your hand again.<br />
<br />
There is no word nor any sign<br />
Can make amend -- -<br />
He is a stranger to me now<br />
Who was my friend.</p>
