<h1 class="title-poem">Canticle To Apollo</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Play, Phoebus, on thy lute,<br />
And we will sit all mute;<br />
By listening to thy lyre,<br />
That sets all ears on fire.<br />
<br />
Hark, hark!  the God does play!<br />
And as he leads the way<br />
Through heaven, the very spheres,<br />
As men, turn all to ears!</p>
