<h1 class="title-poem">For Hans Carossa</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Rainer-Maria-Rilke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rainer Maria Rilke</h2>
<p>Losing too is still ours; and even forgetting<br />
still has a shape in the kindgdom of transformation.<br />
When something's let go of, it circles; and though we are<br />
  rarely the center<br />
of the circle, it draws around us its unbroken, marvelous<br />
  curve.</p>
