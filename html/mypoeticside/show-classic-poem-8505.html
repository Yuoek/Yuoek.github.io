<h1 class="title-poem">Whose cheek is this?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>82<br />
<br />
Whose cheek is this?<br />
What rosy face<br />
Has lost a blush today?<br />
I found her—"pleiad"—in the woods<br />
And bore her safe away.<br />
<br />
Robins, in the tradition<br />
Did cover such with leaves,<br />
But which the cheek—<br />
And which the pall<br />
My scrutiny deceives.</p>
