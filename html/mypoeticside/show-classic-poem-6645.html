<h1 class="title-poem">Warning to the Mighty</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Ere the horne'd owl hoot<br />
<br />
Once and twice and thrice there shall<br />
<br />
Go among the blind brown worms<br />
<br />
News of thy great burial;<br />
<br />
When the pomp is passed away,<br />
<br />
"'Here's a King,' the worms shall say."</p>
