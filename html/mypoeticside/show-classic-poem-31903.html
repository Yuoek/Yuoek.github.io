<h1 class="title-poem">One World</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>"The worlds in which we live are two<br />
    The world 'I am' and the world 'I do.'"<br />
<br />
The worlds in which we live at heart are one,<br />
The world "I am," the fruit of "I have done";<br />
And underneath these worlds of flower and fruit,<br />
The world "I love,"--the only living root.</p>
