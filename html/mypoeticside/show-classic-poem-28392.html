<h1 class="title-poem">The Far-Farers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>THE broad sun,<br />
The bright day:<br />
White sails<br />
On the blue bay:<br />
The far-farers<br />
Draw away.<br />
<br />
Light the fires<br />
And close the door.<br />
To the old homes,<br />
To the loved shore,<br />
The far-farers<br />
Return no more.</p>
