                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/shelley-percy4.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Percy Bysshe Shelley</h2>
<p>Music, when soft voices die,<br />
Vibrates in the memory -<br />
Odours, when sweet violets sicken,<br />
Live within the sense they quicken.<br />
<br />
Rose leaves, when the rose is dead,<br />
Are heaped for the beloved's bed;<br />
And so thy thoughts, when thou art gone,<br />
Love itself shall slumber on.</p>
