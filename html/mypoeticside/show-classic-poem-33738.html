<h1 class="title-poem">What General Has A Good Army</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>WHAT General has a good army in himself, has a good army;<br />
He happy in himself, or she happy in herself, is happy,<br />
But I tell you you cannot be happy by others, any more than you can<br />
        beget or conceive a child by others.</p>
