<h1 class="title-poem">The Frightened Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/louisebogan.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Louise Bogan</h2>
<p>In fear of the rich mouth<br />
I kissed the thin,--<br />
Even that was a trap<br />
To snare me in.<br />
<br />
Even she, so long<br />
The frail, the scentless,<br />
Is become strong,<br />
And proves relentless.<br />
<br />
O, forget her praise,<br />
And how I sought her<br />
Through a hazardous maze<br />
By shafted water.</p>
