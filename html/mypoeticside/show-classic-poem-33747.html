<h1 class="title-poem">What Place Is Besieged?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>WHAT place is besieged, and vainly tries to raise the siege?<br />
Lo! I send to that place a commander, swift, brave, immortal;<br />
And with him horse and foot--and parks of artillery,<br />
And artillery-men, the deadliest that ever fired gun.</p>
