<h1 class="title-poem">Hinged To Forgetfulness Like A Door</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>Hinged to forgetfulness<br />
like a door,<br />
she slowly closed out of<br />
sight,<br />
and she was the woman I loved,<br />
but too many times she slept like<br />
a mechanical deer in my caresses,<br />
and I ached in the metal silence<br />
of her dreams.</p>
