<h1 class="title-poem">Conjecturing a Climate</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>562<br />
<br />
Conjecturing a Climate<br />
Of unsuspended Suns—<br />
Adds poignancy to Winter—<br />
The Shivering Fancy turns<br />
<br />
To a fictitious Country<br />
To palliate a Cold—<br />
Not obviated of Degree—<br />
Nor erased—of Latitude—</p>
