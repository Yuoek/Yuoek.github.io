<h1 class="title-poem">Bitter-Sweet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/George-Herbert.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">George Herbert</h2>
<p>Ah, my dear angry Lord,<br />
Since thou dost love, yet strike;<br />
Cast down, yet help afford;<br />
Sure I will do the like.<br />
<br />
I will complain, yet praise;<br />
I will bewail, approve;<br />
And all my sour-sweet days<br />
I will lament and love.</p>
