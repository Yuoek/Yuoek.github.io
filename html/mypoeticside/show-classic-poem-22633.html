<h1 class="title-poem">Lines on Curll</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/10/pope.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alexander Pope</h2>
<p>So when Curll's Stomach the strong Drench o'ercame,<br />
(Infus'd in Vengenance of insulted Fame)<br />
Th' Avenger sees, with a delighted Eye,<br />
His long Jaws open, and his Colour fly;<br />
And while his Guts the keen Emeticks urge,<br />
Smiles on the Vomit, and enjoys the Purge.</p>
