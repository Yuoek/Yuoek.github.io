<h1 class="title-poem">The Jewel Stairs' Grievance</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>The jewelled steps are already quite white with dew,<br />
It is so late that the dew soaks my gauze stockings,<br />
And I let down the crystal curtain<br />
And watch the moon through the clear autumn.</p>
