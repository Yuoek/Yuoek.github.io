<h1 class="title-poem">Death is a Dialogue between</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>976<br />
<br />
Death is a Dialogue between<br />
The Spirit and the Dust.<br />
"Dissolve" says Death—The Spirit "Sir<br />
I have another Trust"—<br />
<br />
Death doubts it—Argues from the Ground—<br />
The Spirit turns away<br />
Just laying off for evidence<br />
An Overcoat of Clay.</p>
