<h1 class="title-poem">To be alive—is Power</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>677<br />
<br />
To be alive—is Power—<br />
Existence—in itself—<br />
Without a further function—<br />
Omnipotence—Enough—<br />
<br />
To be alive—and Will!<br />
'Tis able as a God—<br />
The Maker—of Ourselves—be what—<br />
Such being Finitude!</p>
