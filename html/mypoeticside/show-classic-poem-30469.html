<h1 class="title-poem">Debt</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>What do I owe to you<br />
Who loved me deep and long?<br />
You never gave my spirit wings<br />
Or gave my heart a song.<br />
<br />
But oh, to him I loved<br />
Who loved me not at all,<br />
I owe the little open gate<br />
That led thru heaven's wall.</p>
