<h1 class="title-poem">the Noster was a ship of swank</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>the Noster was a ship of swank<br />
(as gallant as they come)<br />
until she hit a mine and sank<br />
just off the coast of Sum<br />
<br />
precisely where a craft of cost<br />
the Ergo perished later<br />
all hands(you may recall)being lost<br />
including captain Pater</p>
