<h1 class="title-poem">Rehearsal to Ourselves</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>379<br />
<br />
Rehearsal to Ourselves<br />
Of a Withdrawn Delight—<br />
Affords a Bliss like Murder—<br />
Omnipotent—Acute—<br />
<br />
We will not drop the Dirk—<br />
Because We love the Wound<br />
The Dirk Commemorate—Itself<br />
Remind Us that we died.</p>
