<h1 class="title-poem">For largest Woman's Hearth I knew</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>309<br />
<br />
For largest Woman's Hearth I knew—<br />
'Tis little I can do—<br />
And yet the largest Woman's Heart<br />
Could hold an Arrow—too—<br />
And so, instructed by my own,<br />
I tenderer, turn Me to.</p>
