<h1 class="title-poem">There is a Community of Spirit</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>There is a community of the spirit.<br />
Join it, and feel the delight<br />
of walking in the noisy street<br />
and being the noise.<br />
Drink all your passion,<br />
and be a disgrace.<br />
Close both eyes<br />
to see with the other eye.<br />
</p>
