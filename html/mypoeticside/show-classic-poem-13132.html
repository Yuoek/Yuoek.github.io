<h1 class="title-poem">The Swallow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Ralph-Hodgson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Hodgson</h2>
<p>The morning that my baby came<br />
They found a baby swallow dead,<br />
And saw a something, hard to name,<br />
Flit moth-like over baby's bed.<br />
My joy, my flower, my baby dear<br />
Sleeps on my bosom well, but Oh!<br />
If in the Autumn of the year<br />
When swallows gather round and go --</p>
