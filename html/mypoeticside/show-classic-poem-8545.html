<h1 class="title-poem">A Tooth upon Our Peace</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>459<br />
<br />
A Tooth upon Our Peace<br />
The Peace cannot deface—<br />
Then Wherefore be the Tooth?<br />
To vitalize the Grace—<br />
<br />
The Heaven hath a Hell—<br />
Itself to signalize—<br />
And every sign before the Place<br />
Is Gilt with Sacrifice—</p>
