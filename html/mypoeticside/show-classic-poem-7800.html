<h1 class="title-poem">Unfulfilled to Observation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>972<br />
<br />
Unfulfilled to Observation—<br />
Incomplete—to Eye—<br />
But to Faith—a Revolution<br />
In Locality—<br />
<br />
Unto Us—the Suns extinguish—<br />
To our Opposite—<br />
New Horizons—they embellish—<br />
Fronting Us—with Night.</p>
