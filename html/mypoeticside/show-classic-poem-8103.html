<h1 class="title-poem">There is a finished feeling</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>856<br />
<br />
There is a finished feeling<br />
Experienced at Graves—<br />
A leisure of the Future—<br />
A Wilderness of Size.<br />
<br />
By Death's bold Exhibition<br />
Preciser what we are<br />
And the Eternal function<br />
Enabled to infer.</p>
