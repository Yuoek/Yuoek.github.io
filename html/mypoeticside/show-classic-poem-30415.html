<h1 class="title-poem">When Love was Born</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>When Love was born I think he lay<br />
Right warm on Venus' breast,<br />
And whiles he smiled and whiles would play<br />
And whiles would take his rest.<br />
<br />
But always, folded out of sight,<br />
The wings were growing strong<br />
That were to bear him off in flight<br />
Erelong, erelong.</p>
