<h1 class="title-poem">Brotherhood</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>God, what a world, if men in street and mart,<br />
Felt that same kinship of the human heart,<br />
Which makes them, in the face of fire and flood,<br />
Rise to the meaning of True Brotherhood.</p>
