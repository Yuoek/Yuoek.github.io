<h1 class="title-poem">He Reproves The Curlew</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>O CURLEW, cry no more in the air,<br />
Or only to the water in the West;<br />
Because your crying brings to my mind<br />
passion-dimmed eyes and long heavy hair<br />
That was shaken out over my breast:<br />
There is enough evil in the crying of wind.</p>
