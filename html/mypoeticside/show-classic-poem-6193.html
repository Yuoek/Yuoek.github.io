<h1 class="title-poem">Water</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>The world turns softly<br />
not to spill its lakes and rivers.<br />
The water is held in its arms<br />
and the sky is held in the water.<br />
What is water,<br />
that pours silver,<br />
and can hold the sky?</p>
