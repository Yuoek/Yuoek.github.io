<h1 class="title-poem">The Coming Of Good LucK</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>So Good-Luck came, and on my roof did light,<br />
Like noiseless snow, or as the dew of night;<br />
Not all at once, but gently,--as the trees<br />
Are by the sun-beams, tickled by degrees.</p>
