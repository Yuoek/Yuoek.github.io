<h1 class="title-poem">The Thin Edge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>With you, my heart is quiet here,<br />
And all my thoughts are cool as rain.<br />
I sit and let the shifting year<br />
Go by before the windowpane,<br />
And reach my hand to yours, my dear . . .<br />
I wonder what it's like in Spain.</p>
