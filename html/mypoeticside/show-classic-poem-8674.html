<h1 class="title-poem">Summer for thee, grant I may be</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>31<br />
<br />
Summer for thee, grant I may be<br />
When Summer days are flown!<br />
Thy music still, when Whippoorwill<br />
And Oriole—are done!<br />
<br />
For thee to bloom, I'll skip the tomb<br />
And row my blossoms o'er!<br />
Pray gather me—<br />
Anemone—<br />
Thy flower—forevermore!</p>
