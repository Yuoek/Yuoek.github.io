<h1 class="title-poem">Death is potential to that Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>548<br />
<br />
Death is potential to that Man<br />
Who dies—and to his friend—<br />
Beyond that—unconspicuous<br />
To Anyone but God—<br />
<br />
Of these Two—God remembers<br />
The longest—for the friend—<br />
Is integral—and therefore<br />
Itself dissolved—of God—</p>
