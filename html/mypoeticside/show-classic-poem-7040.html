<h1 class="title-poem">No Images</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/WWC.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Waring Cuney</h2>
<p>She does not know<br />
Her beauty,<br />
She thinks her brown body<br />
Has no glory.<br />
If she could dance<br />
Naked<br />
Under palm trees<br />
And see her image in the river,<br />
She would know.<br />
<br />
But there are no palm trees<br />
On the street,<br />
And dish water gives back no images.</p>
