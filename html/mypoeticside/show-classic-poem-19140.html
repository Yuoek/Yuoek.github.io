<h1 class="title-poem">Wish</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/W-S-Merwin.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">W. S. Merwin</h2>
<p>The star in my<br />
Hand is falling<br />
<br />
All the uniforms know what's no use<br />
<br />
May I bow to Necessity not<br />
To her hirelings</p>
