<h1 class="title-poem">A Sake Barrel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/06/ihara.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ihara Saikaku</h2>
<p>A sake barrel,<br />
Born without hands, makes merry —<br />
Cherry blossom time.</p>
