<h1 class="title-poem">Other May Praise What They Like</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>OTHERS may praise what they like;<br />
But I, from the banks of the running Missouri, praise nothing, in<br />
        art, or aught else,<br />
Till it has well inhaled the atmosphere of this river--also the<br />
        western prairie-scent,<br />
And fully exudes it again.</p>
