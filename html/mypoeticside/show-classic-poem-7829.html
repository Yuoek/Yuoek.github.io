<h1 class="title-poem">A little Road—not made of Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>A little Road—not made of Man—<br />
Enabled of the Eye—<br />
Accessible to Thill of Bee—<br />
Or Cart of Butterfly—<br />
<br />
If Town it have—beyond itself—<br />
'Tis that—I cannot say—<br />
I only know—no Curricle that rumble there<br />
Bear Me—</p>
