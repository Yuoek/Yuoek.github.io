<h1 class="title-poem">Expectation—is Contentment</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>807<br />
<br />
Expectation—is Contentment—<br />
Gain—Satiety—<br />
But Satiety—Conviction<br />
Of Necessity<br />
<br />
Of an Austere trait in Pleasure—<br />
Good, without alarm<br />
Is a too established Fortune—<br />
Danger—deepens Sum—</p>
