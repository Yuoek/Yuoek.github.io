<h1 class="title-poem">The Sun is gay or stark</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>878<br />
<br />
The Sun is gay or stark<br />
According to our Deed.<br />
If Merry, He is merrier—<br />
If eager for the Dead<br />
<br />
Or an expended Day<br />
He helped to make too bright<br />
His mighty pleasure suits Us not<br />
It magnifies our Freight</p>
