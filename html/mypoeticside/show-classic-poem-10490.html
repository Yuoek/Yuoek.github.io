<h1 class="title-poem">Aspatia's Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/fetcher.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Fletcher</h2>
<p>LAY a garland on my hearse<br />
  Of the dismal yew;<br />
Maidens, willow branches bear;<br />
  Say, I died true.<br />
<br />
My love was false, but I was firm<br />
  From my hour of birth.<br />
Upon my buried body lie<br />
  Lightly, gentle earth!</p>
