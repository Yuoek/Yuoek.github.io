<h1 class="title-poem">Exeunt</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richardwilbur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Wilbur</h2>
<p>Piecemeal the summer dies;<br />
At the field's edge a daisy lives alone;<br />
A last shawl of burning lies<br />
On a gray field-stone.<br />
<br />
All cries are thin and terse;<br />
The field has droned the summer's final mass;<br />
A cricket like a dwindled hearse<br />
Crawls from the dry grass.</p>
