<h1 class="title-poem">Stars</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>Stars, I have seen them fall,<br />
But when they drop and die<br />
No star is lost at all<br />
From all the star-sown sky.<br />
The toil of all that be<br />
Helps not the primal fault;<br />
It rains into the sea,<br />
And still the sea is salt.</p>
