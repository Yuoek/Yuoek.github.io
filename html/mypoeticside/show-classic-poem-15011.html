<h1 class="title-poem">The Idiot Boy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>He wandered down the moutain grade<br />
 Beyond the speed assigned--<br />
A youth whom Justice often stayed<br />
 And generally fined.<br />
<br />
He went alone, that none might know<br />
 If he could drive or steer.<br />
Now he is in the ditch, and Oh!<br />
 The differential gear!</p>
