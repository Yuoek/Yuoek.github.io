<h1 class="title-poem">So has a Daisy vanished</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>28<br />
<br />
So has a Daisy vanished<br />
From the fields today—<br />
So tiptoed many a slipper<br />
To Paradise away—<br />
<br />
Oozed so in crimson bubbles<br />
Day's departing tide—<br />
Blooming—tripping—flowing<br />
Are ye then with God?</p>
