<h1 class="title-poem">Through the Dark Sod—as Education</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Through the Dark Sod—as Education—<br />
The Lily passes sure—<br />
Feels her white foot—no trepidation—<br />
Her faith—no fear—<br />
<br />
Afterward—in the Meadow—<br />
Swinging her Beryl Bell—<br />
The Mold-life—all forgotten—now—<br />
In Ecstasy—and Dell—</p>
