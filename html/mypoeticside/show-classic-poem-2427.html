<h1 class="title-poem">On Vital Statistics</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>Ill fares the land to hast'ning ills a prey (1)<br />
Where wealth accumulates and men decay.'<br />
But how much more unfortunate are those<br />
Where wealth declines and population grows!<br />
<br />
(1)This line is execrable; and I note it.<br />
I quote it as the faulty poet wrote it.</p>
