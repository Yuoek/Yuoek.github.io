<h1 class="title-poem">These tested Our Horizon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>886<br />
<br />
These tested Our Horizon—<br />
Then disappeared<br />
As Birds before achieving<br />
A Latitude.<br />
<br />
Our Retrospection of Them<br />
A fixed Delight,<br />
But our Anticipation<br />
A Dice—a Doubt—</p>
