<h1 class="title-poem">all fled</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/roberte.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert E. Howard</h2>
<p>All fled--all done, so lift me on the pyre;<br />
The feast is over, and the lamps expire.</p>
