<h1 class="title-poem">If I shouldn't be alive</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>182<br />
<br />
If I shouldn't be alive<br />
When the Robins come,<br />
Give the one in Red Cravat,<br />
A Memorial crumb.<br />
<br />
If I couldn't thank you,<br />
Being fast asleep,<br />
You will know I'm trying<br />
Why my Granite lip!</p>
