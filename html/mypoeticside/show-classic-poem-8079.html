<h1 class="title-poem">The Poets light but Lamps</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>883<br />
<br />
The Poets light but Lamps—<br />
Themselves—go out—<br />
The Wicks they stimulate—<br />
If vital Light<br />
<br />
Inhere as do the Suns—<br />
Each Age a Lens<br />
Disseminating their<br />
Circumference—</p>
