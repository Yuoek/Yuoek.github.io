<h1 class="title-poem">a total stranger one black day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>a total stranger one black day<br />
knocked living the hell out of me--<br />
<br />
who found forgiveness hard because<br />
my(as it happened)self he was<br />
<br />
-but now that fiend and i are such<br />
immortal friends the other's each</p>
