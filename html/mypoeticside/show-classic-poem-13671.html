<h1 class="title-poem">The Dream Keeper</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>Bring me all of your dreams,<br />
You dreamer,<br />
Bring me all your<br />
Heart melodies<br />
That I may wrap them<br />
In a blue cloud-cloth<br />
Away from the too-rough fingers<br />
Of the world.</p>
