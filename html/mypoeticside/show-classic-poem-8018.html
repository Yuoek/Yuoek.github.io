<h1 class="title-poem">She staked her Feathers—Gained an Arc</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>798<br />
<br />
She staked her Feathers—Gained an Arc—<br />
Debated—Rose again—<br />
This time—beyond the estimate<br />
Of Envy, or of Men—<br />
<br />
And now, among Circumference—<br />
Her steady Boat be seen—<br />
At home—among the Billows—As<br />
The Bough where she was born—</p>
