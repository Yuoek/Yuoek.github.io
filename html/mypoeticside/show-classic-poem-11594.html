<h1 class="title-poem">The Misanthrope</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>AT first awhile sits he,<br />
<br />
With calm, unruffled brow;<br />
His features then I see,<br />
Distorted hideously,--<br />
<br />
An owl's they might be now.<br />
<br />
What is it, askest thou?<br />
Is't love, or is't ennui?<br />
<br />
'Tis both at once, I vow.</p>
