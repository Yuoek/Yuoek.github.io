<h1 class="title-poem">Soul, Wilt thou toss again?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>139<br />
<br />
Soul, Wilt thou toss again?<br />
By just such a hazard<br />
Hundreds have lost indeed—<br />
But tens have won an all—<br />
<br />
Angel's breathless ballot<br />
Lingers to record thee—<br />
Imps in eager Caucus<br />
Raffle for my Soul!</p>
