<h1 class="title-poem">3</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nelly-Sachs.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nelly Sachs</h2>
<p>World, do not ask those snatched from death<br />
where they are going,<br />
they are always going to their graves.<br />
The pavements of the foreign city<br />
were not laid for the music of fugitive footsteps -</p>
