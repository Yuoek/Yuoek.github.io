<h1 class="title-poem">Lest I Learn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/witter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Witter Bynner</h2>
<p>Lest I learn, with clearer sight,<br />
     Such beauty cannot be --<br />
Tie a bandage, pull it tight,<br />
         Blind me, I would not see!<br />
<br />
     Lest I learn, with clearer will,<br />
     Such a wonder cannot be --<br />
Oh, kiss me nearer, nearer still,<br />
     And make a fool of me!</p>
