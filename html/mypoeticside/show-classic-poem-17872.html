<h1 class="title-poem">The Star-Shell</h1>
                <div class="post-autor"><div style="background:url();background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Patrick MacGill</h2>
<p>A star-shell holds the sky beyond<br />
Shell-shivered Loos, and drops<br />
In million sparkles on a pond<br />
That lies by Hulluch copse.<br />
<br />
A moment's brightness in the sky,<br />
To vanish at a breath,<br />
And die away, as soldiers die<br />
Upon the wastes of death.</p>
