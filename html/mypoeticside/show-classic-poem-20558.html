<h1 class="title-poem">The Germ</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>A mighty creature is the germ,<br />
Though smaller than the pachyderm.<br />
His customary dwelling place<br />
Is deep within the human race.<br />
His childish pride he often pleases<br />
By giving people strange diseases.<br />
Do you, my poppet, feel infirm?<br />
You probably contain a germ.</p>
