<h1 class="title-poem">Dear Joanne</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/lew.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lew Welch</h2>
<p>Dear Joanne,<br />
<br />
Last night Magda dreamed that she,<br />
you, Jack, and I were driving around<br />
Italy.<br />
<br />
We parked in Florence and left<br />
our dog to guard the car.<br />
<br />
She was worried because he<br />
doesn't understand Italian.</p>
