<h1 class="title-poem">We met as Sparks—Diverging Flints</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>958<br />
<br />
We met as Sparks—Diverging Flints<br />
Sent various—scattered ways—<br />
We parted as the Central Flint<br />
Were cloven with an Adze—<br />
Subsisting on the Light We bore<br />
Before We felt the Dark—<br />
A Flint unto this Day—perhaps—<br />
But for that single Spark.</p>
