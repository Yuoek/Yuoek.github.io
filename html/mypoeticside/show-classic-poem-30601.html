<h1 class="title-poem">Flower in the Crannied Wall</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/Alfred-Lord-Tennyson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alfred Lord Tennyson</h2>
<p>Flower in the crannied wall,<br />
I pluck you out of the crannies,<br />
I hold you here, root and all, in my hand,<br />
Little flower--but if I could understand<br />
What you are, root and all, all in all,<br />
I should know what God and man is.</p>
