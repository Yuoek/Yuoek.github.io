<h1 class="title-poem">On Dragon Hill</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Drunk on Dragon Hill tonight,<br />
the banished immortal, Great White,<br />
<br />
turns among yellow flowers,<br />
his smile wide,<br />
<br />
as his hat sails away on the wind<br />
and he dances away in the moonlight.<br />
</p>
