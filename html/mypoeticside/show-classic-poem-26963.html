<h1 class="title-poem">Ambition Over Adversity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/tupac.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Tupac Shakur</h2>
<p>Take one's adversity<br />
Learn from their misfortune<br />
Learn from their pain<br />
Believe in something<br />
Believe in yourself<br />
Turn adversity into ambition<br />
Now blossom into wealth</p>
