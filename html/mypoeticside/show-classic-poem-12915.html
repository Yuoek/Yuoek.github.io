<h1 class="title-poem">Barley-break; Or, Last In Hell</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>We two are last in hell; what may we fear<br />
To be tormented or kept pris'ners here I<br />
Alas!  if kissing be of plagues the worst,<br />
We'll wish in hell we had been last and first.</p>
