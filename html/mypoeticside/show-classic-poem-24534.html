<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Admonition 16</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Whenever a man disputes with one who is more learned than himself to make people know of his learning, they will know that he is ignorant.<br />
<br />
          If one better than thyself begins to speak,  <br />
          Although thou mayest know better, contradict him not.</p>
