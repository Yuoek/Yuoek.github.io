<h1 class="title-poem">Ianthe's Question</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>‘Do you remember me? or are you proud?’<br />
  Lightly advancing thro’ her star-trimm’d crowd,<br />
  Ianthe said, and look’d into my eyes.<br />
‘A yes, a yes to both: for Memory<br />
Where you but once have been must ever be,<br />
  And at your voice Pride from his throne must rise.’</p>
