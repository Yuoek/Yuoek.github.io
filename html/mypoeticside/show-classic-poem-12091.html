<h1 class="title-poem">Awake, my fair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/yehudah.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yehudah HaLevi</h2>
<p>Awake, my fair, my love, awake,<br />
So that I may gaze upon you!<br />
And if one is eager to kiss your lips,<br />
In your dreams this do you see,<br />
Lo, then I myself of your dream<br />
The interpreter will be.</p>
