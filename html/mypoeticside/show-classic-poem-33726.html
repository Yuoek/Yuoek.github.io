<h1 class="title-poem">As I Watche'd The Ploughman Ploughing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>AS I watch'd the ploughman ploughing,<br />
Or the sower sowing in the fields--or the harvester harvesting,<br />
I saw there too, O life and death, your analogies:<br />
(Life, life is the tillage, and Death is the harvest according.)</p>
