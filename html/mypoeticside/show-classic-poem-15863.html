<h1 class="title-poem">The Evening Star</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>Smiles soon abate; the boisterous throes<br />
Of anger long burst forth;<br />
Inconstantly the south-wind blows,<br />
But steadily the north.<br />
<br />
Thy star, O Venus! often changes<br />
Its radiant seat above,<br />
The chilling pole-star never ranges --<br />
'Tis thus with Hate and Love.</p>
