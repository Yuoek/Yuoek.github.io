<h1 class="title-poem">The Last Pieta, in Florence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/jameswright.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Wright</h2>
<p>The whole city  <br />
Is stone, even  <br />
Where stone  <br />
Doesn't belong.  <br />
What is that old  <br />
Man's public face  <br />
Doing sorrowing,  <br />
Secretly a little,  <br />
A little above and  <br />
A little back from  <br />
What is that stone  <br />
Doing sorrowing<br />
Where stone<br />
Doesn't belong?</p>
