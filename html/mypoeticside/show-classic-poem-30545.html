<h1 class="title-poem">Faults</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>They came to tell your faults to me,<br />
They named them over one by one;<br />
I laughed aloud when they were done,<br />
I knew them all so well before, --<br />
Oh, they were blind, too blind to see<br />
Your faults had made me love you more.</p>
