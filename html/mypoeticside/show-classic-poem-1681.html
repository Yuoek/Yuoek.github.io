<h1 class="title-poem">Base Words Are Uttered</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/05/auden.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">W.H. Auden</h2>
<p>Base words are uttered only by the base <br />
And can for such at once be understood, <br />
But noble platitudes:--ah, there's a case <br />
Where the most careful scrutiny is needed <br />
To tell a voice that's genuinely good <br />
From one that's base but merely has succeeded.</p>
