<h1 class="title-poem">If she had been the Mistletoe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>44<br />
<br />
If she had been the Mistletoe<br />
And I had been the Rose—<br />
How gay upon your table<br />
My velvet life to close—<br />
Since I am of the Druid,<br />
And she is of the dew—<br />
I'll deck Tradition's buttonhole—<br />
And send the Rose to you.</p>
