<h1 class="title-poem">Thursday</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>And if I loved you Wednesday,<br />
Well, what is that to you?<br />
I do not love you Thursday -<br />
So much is true.<br />
<br />
And why you come complaining<br />
Is more than I can see.<br />
I loved you Wednesday, - yes -but what<br />
Is that to me?</p>
