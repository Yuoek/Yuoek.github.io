<h1 class="title-poem">Song (Number 3)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/royall.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Royall Tyler</h2>
<p>Oh like a Storke among the Rush<br />
Or Bottle hung in Chimney high<br />
Or like an Owl in Ivy Bush<br />
Yea such a doleful wretch am I<br />
But he for aye shall sit secure<br />
Forever and eke ay for Aye<br />
Also likewise he shall endure<br />
More than a whole Eternity.</p>
