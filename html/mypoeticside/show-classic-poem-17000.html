<h1 class="title-poem">The Encyclopaedia</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Vachel-Lindsay.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vachel Lindsay</h2>
<p>"If I could set the moon upon<br />
This table," said my friend,<br />
"Among the standard poets<br />
And brouchures without end,<br />
And noble prints of old Japan,<br />
How empty they would seem,<br />
By that encyclopaedia<br />
Of whim and glittering dream."</p>
