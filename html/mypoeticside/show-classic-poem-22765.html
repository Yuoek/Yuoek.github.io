<h1 class="title-poem">A Girl</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>The tree has entered my hands,<br />
The sap has ascended my arms,<br />
The tree has grown in my breast -<br />
Downward,<br />
The branches grow out of me, like arms.<br />
<br />
Tree you are,<br />
Moss you are,<br />
You are violets with wind above them.<br />
A child - so high - you are,<br />
And all this is folly to the world.</p>
