<h1 class="title-poem">The King's Ankus</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>These are the Four that are never content, that have never be<br />
     filled since the Dews began--<br />
Jacala's mouth, and the glut of the Kite, and the hands of the<br />
     Ape, and the Eyes of Man.</p>
