<h1 class="title-poem">I felt a cleaving in my mind</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I felt a cleaving in my mind<br />
  As if my brain had split;<br />
I tried to match it, seam by seam,<br />
  But could not make them fit.<br />
<br />
The thought behind I strove to join<br />
  Unto the thought before,<br />
But sequence ravelled out of reach<br />
  Like balls upon a floor.</p>
