<h1 class="title-poem">They say that "Time assuages"—</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>They say that "Time assuages"—<br />
Time never did assuage—<br />
An actual suffering strengthens<br />
As Sinews do, with age—<br />
<br />
Time is a Test of Trouble—<br />
But not a Remedy—<br />
If such it prove, it prove too<br />
There was no Malady—</p>
