<h1 class="title-poem">The dying need but little, dear,--</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>The dying need but little, dear,--<br />
  A glass of water's all,<br />
A flower's unobtrusive face<br />
  To punctuate the wall,<br />
<br />
A fan, perhaps, a friend's regret,<br />
  And certainly that one<br />
No color in the rainbow<br />
  Perceives when you are gone.</p>
