<h1 class="title-poem">I know lives, I could miss</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>372<br />
<br />
I know lives, I could miss<br />
Without a Misery—<br />
Others—whose instant's wanting—<br />
Would be Eternity—<br />
<br />
The last—a scanty Number—<br />
'Twould scarcely fill a Two—<br />
The first—a Gnat's Horizon<br />
Could easily outgrow—</p>
