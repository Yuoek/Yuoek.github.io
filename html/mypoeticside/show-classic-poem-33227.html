<h1 class="title-poem">Tomorrow Is the Marriage Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/04/weelkes.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Weelkes</h2>
<p>Tomorrow is the marriage day<br />
Of Mopsus and fair Philida.<br />
Come shepherds, bring your garlands gay.<br />
<br />
O do not weep, fair Bellamour,<br />
Though he be gone there's many more.<br />
For love hath many loves in store.</p>
