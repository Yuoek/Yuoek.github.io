<h1 class="title-poem">She died at play</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>75<br />
<br />
She died at play,<br />
Gambolled away<br />
Her lease of spotted hours,<br />
Then sank as gaily as a Turn<br />
Upon a Couch of flowers.<br />
<br />
Her ghost strolled softly o'er the hill<br />
Yesterday, and Today,<br />
Her vestments as the silver fleece—<br />
Her countenance as spray.</p>
