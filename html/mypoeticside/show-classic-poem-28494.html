<h1 class="title-poem">Late, O Miller</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>LATE, O miller,<br />
The birds are silent,<br />
The darkness falls.<br />
In the house the lights are lighted.<br />
See, in the valley they twinkle,<br />
The lights of home.<br />
Late, O lovers,<br />
The night is at hand;<br />
Silence and darkness<br />
Clothe the land.</p>
