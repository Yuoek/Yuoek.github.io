<h1 class="title-poem">To Julia Marlowe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>Long had I loved this "Attic shape," the brede<br />
    Of marble maidens round this urn divine:<br />
But when your golden voice began to read,<br />
    The empty urn was filled with Chian wine.</p>
