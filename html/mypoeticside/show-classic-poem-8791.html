<h1 class="title-poem">For each ecstatic instant</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>For each ecstatic instant<br />
We must an anguish pay<br />
In keen and quivering ratio<br />
To the Ecstasy.<br />
<br />
For each beloved hour<br />
Sharp pittances of years,<br />
Bitter contested farthings<br />
And coffers heaped with tears.</p>
