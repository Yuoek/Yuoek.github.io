<h1 class="title-poem">On the Lake (two monks)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>Two monks sit facing, playing chess on the mountain,<br />
The bamboo shadow on the board is dark and clear.<br />
Not a person sees the bamboo's shadow,<br />
One sometimes hears the pieces being moved.</p>
