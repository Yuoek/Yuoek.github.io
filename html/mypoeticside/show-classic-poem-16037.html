<h1 class="title-poem">To Put One Brick Upon Another</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/philip_larkin.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Philip Larkin</h2>
<p>To put one brick upon another,<br />
Add a third and then a forth,<br />
Leaves no time to wonder whether<br />
What you do has any worth.<br />
<br />
But to sit with bricks around you<br />
While the winds of heaven bawl<br />
Weighing what you should or can do<br />
Leaves no doubt of it at all.</p>
