<h1 class="title-poem">The Interrogation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/R-S-Thomas.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">R. S. Thomas</h2>
<p>But the financiers will ask<br />
In that day: IS it not better<br />
To leave broken bank balances<br />
Behind than broken heads?<br />
<br />
And Christ recognizing the<br />
New warriors will feel breaching<br />
His healed side their terrible<br />
Pencil and the haemorrhage of its figures.</p>
