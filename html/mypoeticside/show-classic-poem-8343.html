<h1 class="title-poem">Nature—sometimes sears a Sapling</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>314<br />
<br />
Nature—sometimes sears a Sapling—<br />
Sometimes—scalps a Tree—<br />
Her Green People recollect it<br />
When they do not die—<br />
<br />
Fainter Leaves—to Further Seasons—<br />
Dumbly testify—<br />
We—who have the Souls—<br />
Die oftener—Not so vitally—</p>
