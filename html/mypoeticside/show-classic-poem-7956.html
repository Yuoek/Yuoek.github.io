<h1 class="title-poem">Just as He spoke it from his Hands</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>848<br />
<br />
Just as He spoke it from his Hands<br />
This Edifice remain—<br />
A Turret more, a Turret less<br />
Dishonor his Design—<br />
<br />
According as his skill prefer<br />
It perish, or endure—<br />
Content, soe'er, it ornament<br />
His absent character.</p>
