<h1 class="title-poem">Always Marry An April Girl</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>Praise the spells and bless the charms,<br />
I found April in my arms.<br />
April golden, April cloudy,<br />
Gracious, cruel, tender, rowdy;<br />
April soft in flowered languor,<br />
April cold with sudden anger,<br />
Ever changing, ever true --<br />
I love April, I love you.</p>
