                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>I said, your lips said, your lips we revive;<br />
I said, your mouth said, sweetness we derive;<br />
I said your words, he said, Hafiz said;<br />
May all sweet lips be joyous and alive.</p>
