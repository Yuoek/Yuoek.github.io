<h1 class="title-poem">Pig</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Go, stalk the red deer o'er the heather,<br />
Ride, follow the fox if you can!<br />
But, for pleasure and profit together,<br />
Allow me the hunting of Man--<br />
The chase of the Human, the search for the Soul<br />
To its ruin--the hunting of Man.</p>
