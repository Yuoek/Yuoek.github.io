<h1 class="title-poem">Is it true, dear Sue?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>218<br />
<br />
Is it true, dear Sue?<br />
Are there two?<br />
I shouldn't like to come<br />
For fear of joggling Him!<br />
If I could shut him up<br />
In a Coffee Cup,<br />
Or tie him to a pin<br />
Till I got in—<br />
Or make him fast<br />
To "Toby's" fist—<br />
Hist! Whist! I'd come!</p>
