<h1 class="title-poem">Sport</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Hamlin-Garland.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hamlin Garland</h2>
<p>Somewhere, in deeps<br />
 Of tangled, ripening wheat,<br />
A little prairie-chicken cries--<br />
Lost from its fellows, it pleads and weeps.<br />
Meanwhile, stained and mangled,<br />
 With dust-filled eyes,<br />
The unreplying mother lies<br />
Limp and bloody at the sportsman's feet.</p>
