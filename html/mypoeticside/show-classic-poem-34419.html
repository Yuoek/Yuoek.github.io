<h1 class="title-poem">Play</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>Subtle, clever brain, wiser than I am,<br />
by what devious means do you contrive<br />
to remain idle? Teach me, O master.</p>
