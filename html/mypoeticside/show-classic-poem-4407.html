<h1 class="title-poem">Oh Yes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>there are worse things than<br />
being alone<br />
but it often takes decades<br />
to realize this<br />
and most often<br />
when you do<br />
it's too late<br />
and there's nothing worse<br />
than<br />
too late.</p>
