<h1 class="title-poem">The Mask Of Evil</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/brecht.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bertolt Brecht</h2>
<p>On my wall hangs a Japanese carving,<br />
The mask of an evil demon, decorated with gold lacquer.<br />
Sympathetically I observe<br />
The swollen veins of the forehead, indicating<br />
What a strain it is to be evil.</p>
