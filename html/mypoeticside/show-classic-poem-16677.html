<h1 class="title-poem">Noel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/09/JJL.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Johnston Lee</h2>
<p>Christmas Eve, and a wind with a sting,<br />
We rode from Ypres through Elverdinghe.<br />
The ruined church rose gaunt on our right:<br />
With a turn of the head,<br />
The Q.M. said,<br />
"There will be no service tonight!"</p>
