<h1 class="title-poem">The Death Bed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/thomashood.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Hood</h2>
<p>We watch'd her breathing thro' the night,<br />
Her breathing soft and low,<br />
As in her breast the wave of life<br />
Kept heaving to and fro.<br />
<br />
But when the morn came dim and sad<br />
And chill with early showers,<br />
Her queit eyelids closed - she had<br />
Another morn than ours.</p>
