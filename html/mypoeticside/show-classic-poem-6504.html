<h1 class="title-poem">Unwind my riddle</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>UNWIND my riddle.<br />
Cruel as hawks the hours fly;<br />
Wounded men seldom come home to die;<br />
The hard waves see an arm flung high;<br />
Scorn hits strong because of a lie;<br />
Yet there exists a mystic tie.<br />
Unwind my riddle.</p>
