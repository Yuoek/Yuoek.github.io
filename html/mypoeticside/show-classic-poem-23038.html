<h1 class="title-poem">Harvest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/kathleen-Raine.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Kathleen Raine</h2>
<p>Day is the hero's shield,<br />
Achilles' field,<br />
The light days are the angels.<br />
We the seed.<br />
<br />
Against eternal light and gorgon's face<br />
Day is the shield<br />
And we the grass<br />
Native to fields of iron, and skies of brass.</p>
