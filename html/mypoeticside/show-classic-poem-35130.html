<h1 class="title-poem">A Coat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I MADE my song a coat<br />
Covered with embroideries<br />
Out of old mythologies<br />
From heel to throat;<br />
But the fools caught it,<br />
Wore it in the world's eyes<br />
As though they'd wrought it.<br />
Song, let them take it,<br />
For there's more enterprise<br />
In walking naked.</p>
