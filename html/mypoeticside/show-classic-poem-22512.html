<h1 class="title-poem">About Tu Fu</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>I met Tu Fu on a mountaintop<br />
in August when the sun was hot.<br />
<br />
Under the shade of his big straw hat<br />
his face was sad--<br />
<br />
in the years since we last parted,<br />
he'd grown wan, exhausted.<br />
<br />
Poor old Tu Fu, I thought then,<br />
he must be agonizing over poetry again.</p>
