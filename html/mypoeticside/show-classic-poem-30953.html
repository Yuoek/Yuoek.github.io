<h1 class="title-poem">In Memoriam</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-thomas.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Phillip Edward Thomas</h2>
<p>The flowers left thick at nightfall in the wood<br />
This Eastertide call into mind the men,<br />
Now far from home, who, with their sweethearts, should<br />
Have gathered them and will do never again.</p>
