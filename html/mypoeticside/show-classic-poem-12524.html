<h1 class="title-poem">A Maxim for Vikings</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Here is a fact<br />
that should help you fight a bit longer:<br />
Things that don’t actually kill you outright<br />
make you stronger.</p>
