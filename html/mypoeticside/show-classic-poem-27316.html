<h1 class="title-poem">Watching The Moon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Izumi-Shikibu.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Izumi Shikibu</h2>
<p>Watching the moon<br />
at midnight<br />
solitary, mid-sky,<br />
I knew myself completely,<br />
no part left out.</p>
