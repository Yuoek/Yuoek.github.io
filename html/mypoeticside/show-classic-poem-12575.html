<h1 class="title-poem">The Age Demanded</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Ernest-Hemingway.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ernest Hemingway</h2>
<p>The age demanded that we sing<br />
And cut away our tongue.<br />
<br />
The age demanded that we flow<br />
And hammered in the bung.<br />
<br />
The age demanded that we dance<br />
And jammed us into iron pants.<br />
<br />
And in the end the age was handed<br />
The sort of shit that it demanded.</p>
