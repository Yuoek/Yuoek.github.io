<h1 class="title-poem">For Beauty I Am Not a Star</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/woodrow.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Woodrow Wilson</h2>
<p>For beauty I am not a star,<br />
There are others more perfect by far,<br />
     But my face I don't mind it,<br />
     For I am behind it,<br />
It is those in front that I jar.</p>
