<h1 class="title-poem">Still, Though The One I Sing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>STILL, though the one I sing,<br />
(One, yet of contradictions made,) I dedicate to Nationality,<br />
I leave in him Revolt, (O latent right of insurrection! O quenchless,<br />
        indispensable fire!)</p>
