<h1 class="title-poem">Roc</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/Michael-Drayton.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Michael Drayton</h2>
<p>All feathered things yet ever known to men,<br />
From the huge Rucke, unto the little Wren;<br />
From Forrest, Fields, from Rivers and from Pons,<br />
All that have webs, or cloven-footed ones;<br />
To the Grand Arke, together friendly came,<br />
Whose several species were too long to name</p>
