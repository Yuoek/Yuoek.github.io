<h1 class="title-poem">Hurt No Living Thing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Hurt no living thing:<br />
Ladybird, nor butterfly,<br />
Nor moth with dusty wing,<br />
Nor cricket chirping cheerily,<br />
Nor grasshopper so light of leap,<br />
Nor dancing gnat, nor beetle fat,<br />
Nor harmless worms that creep.</p>
