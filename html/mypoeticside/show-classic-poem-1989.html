<h1 class="title-poem">In this world of ours,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th-1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Matsuo Basho</h2>
<p>Yo no naka wa kutte hako shite nete okite <br />
Sate sono ato wa shinuru bakari zo <br />
<br />
<br />
In this world of ours, <br />
We eat only to cast out, <br />
Sleep only to wake, <br />
And what comes after all that <br />
Is simply to die at last.</p>
