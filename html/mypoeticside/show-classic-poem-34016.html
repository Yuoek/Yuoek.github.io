<h1 class="title-poem">A Marine Etching</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>A yacht from its harbor ropes pulled free,<br />
And leaped like a steed o'er the race track blue,<br />
Then up behind her, the dust of the sea,<br />
A gray fog, drifted, and hid her from view.</p>
