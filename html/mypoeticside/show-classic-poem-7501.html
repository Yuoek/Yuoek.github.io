<h1 class="title-poem">The Pansy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2018/01/eland.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Margaret Deland</h2>
<p>O dainty Pansy! hooded all in blue,<br />
With chastely folding cloak of green,<br />
A maid whom Eros never knew,<br />
Nor Love has Seen!<br />
I yet must fancy, scarce dreamt by thee<br />
That 'neath thy most discreetest thought<br />
There lurks a will which may be taught        <br />
By Love - and me!</p>
