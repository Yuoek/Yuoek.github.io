<h1 class="title-poem">Cradle-Song at Twilight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/meynell.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alice Meynell</h2>
<p>The child not yet is lulled to rest.<br />
Too young a nurse, the slender Night<br />
So laxly holds him to her breast<br />
That throbs with flight.<br />
<br />
He plays with her, and will not sleep.<br />
For other playfellows she sighs;<br />
An unmaternal fondness keep<br />
Her alien eyes.</p>
