<h1 class="title-poem">Rules For Monarchs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>IF men are never their thoughts to employ,<br />
Take care to provide them a life full of joy;<br />
But if to some profit and use thou wouldst bend them,<br />
Take care to shear them, and then defend them.</p>
