<h1 class="title-poem">Christmastide</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>The cottage hearth beams warm and bright,<br />
  The candles gaily glow;<br />
The stars emit a kinder light<br />
  Above the drifted snow.<br />
<br />
Down from the sky a magic steals<br />
  To glad the passing year,<br />
And belfries sing with joyous peals,<br />
  For Christmastide is here!</p>
