<h1 class="title-poem">The Instructors</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>WHEN Diogenes quietly sunn'd himself in his barrel,<br />
When Calanus with joy leapt in the flame-breathing grave,<br />
Oh, what noble lessons were those for the rash son of Philip,<br />
Were not the lord of the world e'en for instruction too great!</p>
