<h1 class="title-poem">A Very Short Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Once, when I was young and true,<br />
 Someone left me sad-<br />
Broke my brittle heart in two;<br />
 And that is very bad.<br />
<br />
Love is for unlucky folk,<br />
 Love is but a curse.<br />
Once there was a heart I broke;<br />
 And that, I think, is worse.</p>
