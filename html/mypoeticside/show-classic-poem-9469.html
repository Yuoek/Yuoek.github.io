<h1 class="title-poem">Twilight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>'Twixt a smile and a tear,<br />
'Twixt a song and a sigh,<br />
'Twixt the day and the dark,<br />
When the night draweth nigh.<br />
Ah, sunshine may fade<br />
From the heavens above,<br />
No twilight have we<br />
To the day of our love.</p>
