<h1 class="title-poem">We'll pass without the parting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>996<br />
<br />
We'll pass without the parting<br />
So to spare<br />
Certificate of Absence—<br />
Deeming where<br />
<br />
I left Her I could find Her<br />
If I tried—<br />
This way, I keep from missing<br />
Those that died.</p>
