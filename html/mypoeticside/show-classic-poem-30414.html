<h1 class="title-poem">While I May</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Wind and hail and veering rain,<br />
Driven mist that veils the day,<br />
Soul's distress and body's pain,<br />
I would bear you while I may.<br />
<br />
I would love you if I might,<br />
For so soon my life will be<br />
Buried in a lasting night,<br />
Even pain denied to me.</p>
