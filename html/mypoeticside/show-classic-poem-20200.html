<h1 class="title-poem">Pomona</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/William-Morris.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Morris</h2>
<p>I am the ancient apple-queen,<br />
As once I was so am I now.<br />
For evermore a hope unseen,<br />
Betwixt the blossom and the bough.<br />
<br />
Ah, where's the river's hidden Gold!<br />
And where the windy grave of Troy?<br />
Yet come I as I came of old,<br />
From out the heart of Summer's joy.</p>
