<h1 class="title-poem">The Watch</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Man is a watch, wound up at first, but never<br />
Wound up again; Once down, he's down for ever.<br />
The watch once down, all motions then do cease;<br />
The man's pulse stopt, all passions sleep in peace.</p>
