<h1 class="title-poem">Chorus</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>Give away her gowns,<br />
Give away her shoes;<br />
She has no more use<br />
For her fragrant gowns;<br />
Take them all down,<br />
Blue, green, blue,<br />
Lilac, pink, blue,<br />
From their padded hangers;<br />
She will dance no more<br />
In her narrow shoes;<br />
Sweep her narrow shoes<br />
From the closet floor.</p>
