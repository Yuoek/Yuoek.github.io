<h1 class="title-poem">Tit for Tat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Christopher-Morley.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christopher Morley</h2>
<p>I OFTEN pass a gracious tree<br />
Whose name I can't identify,<br />
But still I bow, in courtesy<br />
It waves a bough, in kind reply.<br />
<br />
I do not know your name, O tree<br />
(Are you a hemlock or a pine?)<br />
But why should that embarrass me?<br />
Quite probably you don't know mine.</p>
