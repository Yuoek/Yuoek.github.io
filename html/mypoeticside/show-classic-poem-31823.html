<h1 class="title-poem">I Am A Creature</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>Like this stone of<br />
San Michele<br />
<br />
as cold<br />
as hard<br />
as thoroughly dried<br />
<br />
as refractory<br />
as deprived of spirit<br />
<br />
Like this stone<br />
is my weeping that can't<br />
be seen<br />
<br />
Living<br />
discounts death</p>
