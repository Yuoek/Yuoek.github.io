<h1 class="title-poem">If I can stop one heart from breaking,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>If I can stop one heart from breaking,<br />
I shall not live in vain;<br />
If I can ease one life the aching,<br />
Or cool one pain,<br />
Or help one fainting robin<br />
Unto his nest again,<br />
I shall not live in vain.</p>
