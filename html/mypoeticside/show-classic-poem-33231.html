<h1 class="title-poem">Living in the Hills</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Alone, at peace, I close the door.<br />
       Shut out the sky’s evening flame.<br />
       Cranes settle in the pines.<br />
       No one comes to try my gate.<br />
       Bamboo tender with new growth.<br />
       Red lotus shedding its old sleeves.<br />
       A light glows down by the ford.<br />
       Gathering water-chestnuts. They come home.</p>
