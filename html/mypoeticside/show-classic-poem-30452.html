<h1 class="title-poem">Dreams</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I gave my life to another lover,<br />
I gave my love, and all, and all--<br />
But over a dream the past will hover,<br />
Out of a dream the past will call.<br />
<br />
I tear myself from sleep with a shiver<br />
But on my breast a kiss is hot,<br />
And by my bed the ghostly giver<br />
Is waiting tho' I see him not.</p>
