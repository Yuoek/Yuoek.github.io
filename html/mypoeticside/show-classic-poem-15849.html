<h1 class="title-poem">On Catullus</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/walter.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walter Savage Landor</h2>
<p>Tell me not what too well I know<br />
  About the bard of Sirmio.<br />
  Yes, in Thalia’s son<br />
Such stains there are—as when a Grace<br />
Sprinkles another’s laughing face<br />
  With nectar, and runs on.</p>
