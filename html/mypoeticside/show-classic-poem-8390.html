<h1 class="title-poem">Some things that fly there be</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>89<br />
<br />
Some things that fly there be—<br />
Birds—Hours—the Bumblebee—<br />
Of these no Elegy.<br />
<br />
Some things that stay there be—<br />
Grief—Hills—Eternity—<br />
Nor this behooveth me.<br />
<br />
There are that resting, rise.<br />
Can I expound the skies?<br />
How still the Riddle lies!</p>
