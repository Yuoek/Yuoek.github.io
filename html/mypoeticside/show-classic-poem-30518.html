<h1 class="title-poem">May Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The spring is fresh and fearless<br />
And every leaf is new,<br />
The world is brimmed with moonlight,<br />
The lilac brimmed with dew.<br />
<br />
Here in the moving shadows<br />
I catch my breath and sing--<br />
My heart is fresh and fearless<br />
And over-brimmed with spring.</p>
