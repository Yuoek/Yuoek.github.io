<h1 class="title-poem">Red Faces</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/gertrude.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gertrude Stein</h2>
<p>Red flags the reason for pretty flags.<br />
And ribbons.<br />
Ribbons of flags<br />
And wearing material<br />
Reason for wearing material.<br />
Give pleasure.<br />
Can you give me the regions.<br />
The regions and the land.<br />
The regions and wheels.<br />
All wheels are perfect.<br />
Enthusiasm.</p>
