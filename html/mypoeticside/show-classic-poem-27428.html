<h1 class="title-poem">AntEater</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/shel.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sheldon Allan Silverstein</h2>
<p>"A genuine anteater,"<br />
The pet man told my dad.<br />
Turned out, it was an aunt eater,<br />
And now my uncle's mad!</p>
