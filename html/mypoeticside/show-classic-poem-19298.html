<h1 class="title-poem">Eel-Grass</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>No matter what I say,<br />
All that I really love<br />
Is the rain that flattens on the bay,<br />
And the eel-grass in the cove;<br />
The jingle-shells that lie and bleach<br />
At the tide-line, and the trace<br />
Of higher tides along the beach:<br />
Nothing in this place.</p>
