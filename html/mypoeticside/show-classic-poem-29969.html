<h1 class="title-poem">Beach Cabin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>I dreamed you were the sea;<br />
I dreamed you pounded<br />
With foamy fists, the sad face of the shore.<br />
Waking, I lay beneath you,<br />
And the room resounded<br />
With the hoarse fury of the mounting ocean's roar.</p>
