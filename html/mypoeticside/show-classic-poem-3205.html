<h1 class="title-poem">Infant Joy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>"I have no name;<br />
I am but two days old."<br />
What shall I call thee?<br />
"I happy am,<br />
Joy is my name."<br />
Sweet joy befall thee!<br />
<br />
Pretty joy!<br />
Sweet joy, but two days old.<br />
Sweet Joy I call thee:<br />
Thou dost smile,<br />
I sing the while;<br />
Sweet joy befall thee!</p>
