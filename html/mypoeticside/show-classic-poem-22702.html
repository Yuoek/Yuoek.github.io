<h1 class="title-poem">We have a Little Garden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Beatrix-Potter.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Beatrix Potter</h2>
<p>WE have a little garden,<br />
A garden of our own,<br />
And every day we water there<br />
The seeds that we have sown.<br />
<br />
WE love our little garden,<br />
And tend it with such care,<br />
You will not find a faced leaf<br />
Or blighted blossom there.</p>
