<h1 class="title-poem">Courage</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>CARELESSLY over the plain away,<br />
Where by the boldest man no path<br />
Cut before thee thou canst discern,<br />
Make for thyself a path!<br />
<br />
Silence, loved one, my heart!<br />
Cracking, let it not break!<br />
Breaking, break not with thee!</p>
