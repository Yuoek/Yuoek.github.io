<h1 class="title-poem">A Dead Lily</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ESPW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Stuart Phelps Ward</h2>
<p>O placid, fainted lily!<br />
You neither toiled nor spun;<br />
You neither thought nor wrought, or well or illy,--<br />
And now your day is done.<br />
<br />
<br />
You lived--to be a lily.<br />
And should I gain or miss<br />
My life's long purposes or well or illy,<br />
What could I, more than this?</p>
