<h1 class="title-poem">Daybreak</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/donne.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Donne</h2>
<p>STAY, O sweet and do not rise!<br />
The light that shines comes from thine eyes;<br />
The day breaks not: it is my heart,<br />
  Because that you and I must part.<br />
  Stay! or else my joys will die<br />
  And perish in their infancy.</p>
