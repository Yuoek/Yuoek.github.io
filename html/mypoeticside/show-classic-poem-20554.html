<h1 class="title-poem">The Praying Mantis</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>From whence arrived the praying mantis?<br />
From outer space, or lost Atlantis?<br />
glimpse the grin, green metal mug<br />
at masks the pseudo-saintly bug,<br />
Orthopterous, also carnivorous,<br />
And faintly whisper, Lord deliver us.</p>
