<h1 class="title-poem">Night Snow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>I was surprised my quilt and pillow were cold,<br />
I see that now the window's bright again.<br />
Deep in the night, I know the snow is thick,<br />
I sometimes hear the sound as bamboo snaps.</p>
