<h1 class="title-poem">I Want To Go With The One I Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/brecht.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bertolt Brecht</h2>
<p>I want to go with the one I love.<br />
I do not want to calculate the cost.<br />
I do not want to think about whether it's good.<br />
I do not want to know whether he loves me.<br />
I want to go with whom I love.</p>
