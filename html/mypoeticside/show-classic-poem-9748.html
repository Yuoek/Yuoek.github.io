<h1 class="title-poem">The Nakedness of Truth (I know it well)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Eluard</h2>
<p>Despair has no wings,<br />
Nor has love,<br />
No countenance:<br />
They do not speak.<br />
I do not stir,<br />
I do not behold them,<br />
I do not speak to them,<br />
But I am as real as my love and my despair.</p>
