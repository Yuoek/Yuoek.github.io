<h1 class="title-poem">Walkers with the Dawn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>Being walkers with the dawn and morning,<br />
Walkers with the sun and morning,<br />
We are not afraid of night,<br />
Nor days of gloom,<br />
Nor darkness--<br />
Being walkers with the sun and morning.</p>
