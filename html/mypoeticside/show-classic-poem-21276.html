<h1 class="title-poem">On Cheating The Fiddler</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>"Then we will have tonight!" we said.<br />
 "Tomorrow- may we not be dead?"<br />
The morrow touched our eyes, and found<br />
 Us walking firm above the ground,<br />
Our pulses quick, our blood alight.<br />
 Tomorrow's gone- we'll have tonight!</p>
