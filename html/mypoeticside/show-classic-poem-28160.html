<h1 class="title-poem">Rime 208</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/gaspara.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gaspara Stampa</h2>
<p>Love made me such that I live in fire<br />
like a new salamander on earth<br />
or like that other rare creature, the Phoenix,<br />
who expires and rises at the same time</p>
