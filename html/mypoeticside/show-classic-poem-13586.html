<h1 class="title-poem">Tomorrow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/WDH.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Dean Howells</h2>
<p>OLD fraud, I know you in that gay disguise,<br />
That air of hope, that promise of surprise:<br />
Beneath your bravery, as you come this way,<br />
I see the sordid presence of Today;<br />
And I shall see there, before you are gone,<br />
All the dull Yesterdays that I have known.</p>
