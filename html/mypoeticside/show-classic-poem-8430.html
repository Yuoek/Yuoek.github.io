<h1 class="title-poem">The rainbow never tells me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>97<br />
<br />
The rainbow never tells me<br />
That gust and storm are by,<br />
Yet is she more convincing<br />
Than Philosophy.<br />
<br />
My flowers turn from Forums—<br />
Yet eloquent declare<br />
What Cato couldn't prove me<br />
Except the birds were here!</p>
