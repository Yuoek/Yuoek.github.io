<h1 class="title-poem">Prayer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/R-S-Thomas.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">R. S. Thomas</h2>
<p>Baudelaire's grave<br />
not too far<br />
from the tree of science.<br />
Mine, too,<br />
since I sought and failed<br />
to steal from it,<br />
somewhere within sight<br />
of the tree of poetry<br />
that is eternity  wearing<br />
the green leaves of time.</p>
