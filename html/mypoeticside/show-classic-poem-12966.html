<h1 class="title-poem">The Fairies</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>If ye will with Mab find grace,<br />
Set each platter in his place;<br />
Rake the fire up, and get<br />
Water in, ere sun be set.<br />
Wash your pails and cleanse your dairies,<br />
Sluts are loathsome to the fairies;<br />
Sweep your house; Who doth not so,<br />
Mab will pinch her by the toe.</p>
