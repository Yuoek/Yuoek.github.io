<h1 class="title-poem">The Great Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>HURRAH for revolution and more cannon-shot!<br />
A beggar upon horseback lashes a beggar on foot.<br />
Hurrah for revolution and cannon come again!<br />
The beggars have changed places, but the lash goes on.</p>
