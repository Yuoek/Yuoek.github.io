<h1 class="title-poem">I Went</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Cavafy.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Constantine Cavafy</h2>
<p>I was not bound. I let myself go completely; went<br />
To those indulgences, half actual,<br />
And half were turned about in my own brain;<br />
Went into the illuminated night;<br />
And drank strong wines, as when<br />
The champions of pleasure drink strong wine.</p>
