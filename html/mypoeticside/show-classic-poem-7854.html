<h1 class="title-poem">As if the Sea should part</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>695<br />
<br />
As if the Sea should part<br />
And show a further Sea—<br />
And that—a further—and the Three<br />
But a presumption be—<br />
<br />
Of Periods of Seas—<br />
Unvisited of Shores—<br />
Themselves the Verge of Seas to be—<br />
Eternity—is Those—</p>
