<h1 class="title-poem">On the World</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Francis-Quarles.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Francis Quarles</h2>
<p>The world's an Inn; and I her guest.<br />
I eat; I drink; I take my rest.<br />
My hostess, nature, does deny me<br />
Nothing, wherewith she can supply me;<br />
Where, having stayed a while, I pay<br />
Her lavish bills, and go my way.</p>
