<h1 class="title-poem">Be Not Sad</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>Be not sad because all men<br />
Prefer a lying clamour before you:<br />
Sweetheart, be at peace again -- -<br />
Can they dishonour you?<br />
<br />
They are sadder than all tears;<br />
Their lives ascend as a continual sigh.<br />
Proudly answer to their tears:<br />
As they deny, deny.</p>
