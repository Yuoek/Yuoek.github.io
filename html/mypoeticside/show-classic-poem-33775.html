<h1 class="title-poem">I Am He That Aches With Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>I AM he that aches with amorous love;<br />
Does the earth gravitate? Does not all matter, aching, attract all<br />
        matter?<br />
So the Body of me, to all I meet, or know.</p>
