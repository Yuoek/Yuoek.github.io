<h1 class="title-poem">Rimer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Andrew-Bierce.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ambrose Bierce</h2>
<p>The rimer quenches his unheeded fires,<br />
  The sound surceases and the sense expires.<br />
  Then the domestic dog, to east and west,<br />
  Expounds the passions burning in his breast.<br />
  The rising moon o'er that enchanted land<br />
  Pauses to hear and yearns to understand.</p>
