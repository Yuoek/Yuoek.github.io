<h1 class="title-poem">red-rag and pink-flag</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>red-rag and pink-flag<br />
blackshirt and brown<br />
strut-mince and stink-brag<br />
have all come to town<br />
<br />
some like it shot<br />
and some like it hung<br />
and some like it in the twot<br />
nine months young</p>
