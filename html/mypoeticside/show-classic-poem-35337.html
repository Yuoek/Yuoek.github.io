<h1 class="title-poem">The Chambermaid's First Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>HOW came this ranger<br />
Now sunk in rest,<br />
Stranger with stranger.<br />
On my cold breast?<br />
What's left to Sigh for?<br />
Strange night has come;<br />
God's love has hidden him<br />
Out of all harm,<br />
Pleasure has made him<br />
Weak as a worm.</p>
