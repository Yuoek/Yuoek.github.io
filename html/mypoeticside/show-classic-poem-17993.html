<h1 class="title-poem">Epilogue</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Louis-MacNeice.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Louis Macneice</h2>
<p>Rows of books around me stand,<br />
Fence me in on either hand;<br />
Through that forest of dead words<br />
I would hunt the living birds -<br />
So I write these lines for you<br />
Who have felt the death-wish too,<br />
All the wires are cut, my friends<br />
Live beyond the severed ends.</p>
