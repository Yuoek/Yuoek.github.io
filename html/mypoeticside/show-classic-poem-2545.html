                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/06/wallance.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wallace Berman</h2>
<p>If only we can split<br />
Before the Curtain drops.<br />
<br />
The Man swings close   bust eyes<br />
Ace with dozen heads racked<br />
His funk his down home fink<br />
Im clean my   buzz has its base<br />
From the juice of the Czechoslovakian<br />
   Nectar: Tequila.</p>
