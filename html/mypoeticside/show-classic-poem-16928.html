<h1 class="title-poem">Look You, I'll Go Pray</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Vachel-Lindsay.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vachel Lindsay</h2>
<p>Look you, I'll go pray,<br />
My shame is crying,<br />
My soul is gray and faint,<br />
My faith is dying.<br />
Look you, I'll go pray —<br />
"Sweet Mary, make me clean,<br />
Thou rainstorm of the soul,<br />
Thou wine from worlds unseen."</p>
