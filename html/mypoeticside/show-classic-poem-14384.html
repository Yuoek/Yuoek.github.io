<h1 class="title-poem">Song of Sunset on the River</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>A strip of water's spread in the setting sun,<br />
Half the river's emerald, half is red.<br />
I love the third night of the ninth month,<br />
The dew is like pearl; the moon like a bow.</p>
