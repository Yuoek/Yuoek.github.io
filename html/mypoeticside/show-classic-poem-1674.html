<h1 class="title-poem">Three Short Poems</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/05/auden.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">W.H. Auden</h2>
<p>"The underground roads <br />
Are, as the dead prefer them, <br />
Always tortuous." <br />
<br />
"When he looked the cave in the eye, <br />
Hercules <br />
Had a moment of doubt." <br />
<br />
Leaning out over <br />
The dreadful precipice, <br />
One contemptuous tree."</p>
