<h1 class="title-poem">Nothing Gold can Stay</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>Nature's first green is gold,<br />
Her hardest hue to hold.<br />
<br />
Her early leaf's a flower;<br />
But only so an hour.<br />
<br />
Then leaf subsides to leaf.<br />
So Eden sank to grief,<br />
<br />
So dawn goes down to day.<br />
Nothing gold can stay.</p>
