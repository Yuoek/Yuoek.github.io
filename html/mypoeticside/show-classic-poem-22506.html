<h1 class="title-poem">Drinking With Someone In The Mountains</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>As the two of us drink<br />
together, while mountain<br />
flowers blossom beside, we<br />
down one cup after the other<br />
until I am drunk and sleepy<br />
so that you better go!<br />
Tomorrow if you feel like it<br />
do come and bring your lute<br />
along with you!</p>
