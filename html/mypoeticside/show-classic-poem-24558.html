<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Admonition 08</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>As long as an affair can be arranged with gold, it is not proper to endanger life.<br />
<br />
           When the hand is foiled in every stratagem  <br />
           It is licit to put the hand to the sword.</p>
