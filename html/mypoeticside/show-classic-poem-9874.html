<h1 class="title-poem">Let It Go</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/William-Empson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Empson</h2>
<p>It is this deep blankness is the real thing strange.<br />
   The more things happen to you the more you can't<br />
       Tell or remember even what they were.<br />
<br />
The contradictions cover such a range.<br />
   The talk would talk and go so far aslant.<br />
       You don't want madhouse and the whole thing there.</p>
