<h1 class="title-poem">The Price of Peace</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>Peace without Justice is a low estate,--<br />
A coward cringing to an iron Fate!<br />
But Peace through Justice is the great ideal,--<br />
We'll pay the price of war to make it real.</p>
