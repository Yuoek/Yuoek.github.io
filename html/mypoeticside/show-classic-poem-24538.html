<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 20</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Satan cannot conquer the righteous and the sultan the poor.<br />
<br />
        Lend nothing to a prayerless man  <br />
        Although his mouth may gasp from penury;  <br />
        Because he who neglects the commands of God  <br />
        Will also not care for what he may be indebted to thee.</p>
