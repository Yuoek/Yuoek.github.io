<h1 class="title-poem">Sunset at Night—is natural</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>415<br />
<br />
Sunset at Night—is natural—<br />
But Sunset on the Dawn<br />
Reverses Nature—Master—<br />
So Midnight's—due—at Noon.<br />
<br />
Eclipses be—predicted—<br />
And Science bows them in—<br />
But do one face us suddenly—<br />
Jehovah's Watch—is wrong.</p>
