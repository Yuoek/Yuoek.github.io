<h1 class="title-poem">Love walked alone.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Love walked alone.<br />
The rocks cut her tender feet,<br />
And the brambles tore her fair limbs.<br />
There came a companion to her,<br />
But, alas, he was no help,<br />
For his name was heart's pain. .</p>
