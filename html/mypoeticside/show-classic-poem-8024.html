<h1 class="title-poem">So the Eyes accost—and sunder</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>752<br />
<br />
So the Eyes accost—and sunder<br />
In an Audience—<br />
Stamped—occasionally—forever—<br />
So may Countenance<br />
<br />
Entertain—without addressing<br />
Countenance of One<br />
In a Neighboring Horizon—<br />
Gone—as soon as known—</p>
