<h1 class="title-poem">Good night, because we must</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>114<br />
<br />
Good night, because we must,<br />
How intricate the dust!<br />
I would go, to know!<br />
Oh incognito!<br />
Saucy, Saucy Seraph<br />
To elude me so!<br />
Father! they won't tell me,<br />
Won't you tell them to?</p>
