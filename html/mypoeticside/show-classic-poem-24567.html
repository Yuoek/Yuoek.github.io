<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 07</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>To have mercy upon the bad is to injure the good; to pardon tyrants is to do violence to dervishes.<br />
<br />
      If thou associatest and art friendly with a wretch  <br />
      He will commit sin with thy wealth and make thee his partner.</p>
