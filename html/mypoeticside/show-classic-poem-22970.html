<h1 class="title-poem">The Thrush</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Raymond-Queneau.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Raymond Queneau</h2>
<p>Killed by my cat, the thrush<br />
sits hard in my gloved hand.<br />
His feathers are his shape.<br />
<br />
Round my thought flutters<br />
a fluff of words, its shape;<br />
it lies hard inside.<br />
Feathers reveal and hide.</p>
