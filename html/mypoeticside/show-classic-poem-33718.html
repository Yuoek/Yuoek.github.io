<h1 class="title-poem">A Clear Midnight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>THIS is thy hour O Soul, thy free flight into the wordless,<br />
Away from books, away from art, the day erased, the lesson done,<br />
Thee fully forth emerging, silent, gazing, pondering the themes thou<br />
        lovest best.<br />
Night, sleep, death and the stars.</p>
