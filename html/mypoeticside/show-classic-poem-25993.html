<h1 class="title-poem">The Sceptic</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Service.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert William Service</h2>
<p>My Father Christmas passed away<br />
When I was barely seven.<br />
At twenty-one, alack-a-day,<br />
I lost my hope of heaven.<br />
<br />
Yet not in either lies the curse:<br />
The hell of it's because<br />
I don't know which loss hurt the worse --<br />
My God or Santa Claus.</p>
