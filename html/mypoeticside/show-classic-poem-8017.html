<h1 class="title-poem">She sped as Petals of a Rose</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>991<br />
<br />
She sped as Petals of a Rose<br />
Offended by the Wind—<br />
A frail Aristocrat of Time<br />
Indemnity to find—<br />
Leaving on nature—a Default<br />
As Cricket or as Bee—<br />
But Andes in the Bosoms where<br />
She had begun to lie—</p>
