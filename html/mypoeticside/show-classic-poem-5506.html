<h1 class="title-poem">Late Fragment</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/RCC.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Raymond Clevie Carver</h2>
<p>And did you get what<br />
you wanted from this life, even so?<br />
I did.<br />
And what did you want?<br />
To call myself beloved, to feel myself<br />
beloved on the earth.<br />
<br />
<br />
Anonymous submission.</p>
