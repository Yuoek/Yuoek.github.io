<h1 class="title-poem">The Oak</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/Alfred-Lord-Tennyson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alfred Lord Tennyson</h2>
<p>Live thy Life,<br />
    Young and old,<br />
Like yon oak,<br />
Bright in spring,<br />
    Living gold;<br />
<br />
Summer-rich<br />
    Then; and then<br />
Autumn-changed<br />
Soberer-hued<br />
    Gold again.<br />
<br />
All his leaves<br />
    Fall'n at length,<br />
Look, he stands,<br />
Trunk and bough<br />
    Naked strength.</p>
