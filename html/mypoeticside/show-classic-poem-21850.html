<h1 class="title-poem">The Kiss</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Coventry-Patmore.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Coventry Patmore</h2>
<p> "I saw you take his kiss!" "'Tis true."<br />
    "O, modesty!" "'Twas strictly kept:<br />
  "He thought me asleep; at least, I knew<br />
    "He thought I thought he thought I slept."</p>
