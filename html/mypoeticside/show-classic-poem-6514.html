<h1 class="title-poem">If I should cast off this tattered coat,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>If I should cast off this tattered coat,<br />
And go free into the mighty sky;<br />
If I should find nothing there<br />
But a vast blue,<br />
Echoless, ignorant --<br />
What then?</p>
