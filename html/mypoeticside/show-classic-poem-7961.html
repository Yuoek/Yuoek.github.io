<h1 class="title-poem">Light is sufficient to itself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>862<br />
<br />
Light is sufficient to itself—<br />
If Others want to see<br />
It can be had on Window Panes<br />
Some Hours in the Day.<br />
<br />
But not for Compensation—<br />
It holds as large a Glow<br />
To Squirrel in the Himmaleh<br />
Precisely, as to you.</p>
