<h1 class="title-poem">To My friends</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Lawson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Lawson</h2>
<p>These are songs of the Friends I neglected—<br />
   And the Foes, too, in part;<br />
These are songs that were mostly rejected—<br />
   But songs from my heart.<br />
           Yours truly,<br />
           HENRY LAWSON.<br />
<br />
Sydney, 19/9/’10.</p>
