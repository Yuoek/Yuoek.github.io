<h1 class="title-poem">Her Dream</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I dreamed as in my bed I lay,<br />
All night's fathomless wisdom come,<br />
That I had shorn my locks away<br />
And laid them on Love's lettered tomb:<br />
But something bore them out of sight<br />
In a great tumult of the air,<br />
And after nailed upon the night<br />
Berenice's burning hair.</p>
