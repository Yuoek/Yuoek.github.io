<h1 class="title-poem">Words</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/Shink.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shinkichi Takahashi</h2>
<p>I don't take your words<br />
Merely as words.<br />
Far from it.<br />
<br />
I listen<br />
To what makes you talk<br />
Whatever that is<br />
And me listen.</p>
