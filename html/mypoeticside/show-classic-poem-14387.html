<h1 class="title-poem">Remembering South of the River</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>South of the river is good,<br />
Long ago, I knew the landscape well.<br />
At sunrise, the river's flowers are red like fire,<br />
In spring, the river's water's green as lilies.<br />
How could I not remember south of the river?</p>
