<h1 class="title-poem">For A Lady I Know</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/countee.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Countee Cullen</h2>
<p>She even thinks that up in heaven<br />
   Her class lies late and snores<br />
<br />
While poor black cherubs rise at seven<br />
   To do celestial chores.</p>
