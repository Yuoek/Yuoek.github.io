<h1 class="title-poem">With a Book</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Andrew-Bierce.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ambrose Bierce</h2>
<p>Words shouting, singing, smiling, frowning--<br />
        Sense lacking.<br />
  Ah, nothing, more obscure than Browning,<br />
        Save blacking.</p>
