<h1 class="title-poem">I Caught A Little Ladybird</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>I caught a little ladybird<br />
That flies far away;<br />
I caught a little lady wife<br />
That is both staid and gay.<br />
Come back, my scarlet ladybird,<br />
Back from far away;<br />
I weary of my dolly wife,<br />
My wife that cannot play.</p>
