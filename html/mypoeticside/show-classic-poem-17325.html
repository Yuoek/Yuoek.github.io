<h1 class="title-poem">Adivinanza De La Guitarra</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/fredrico.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Federico Garcia Lorca</h2>
<p>En la redonda<br />
encrucijada,<br />
seis doncellas<br />
bailan.<br />
Tres de carne<br />
y tres de plata.<br />
Los sueños de ayer las buscan<br />
pero las tiene abrazadas<br />
un Polifemo de oro.<br />
¡La guitarra!</p>
