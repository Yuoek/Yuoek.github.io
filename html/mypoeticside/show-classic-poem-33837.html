<h1 class="title-poem">Debris</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>HE is wisest who has the most caution,<br />
He only wins who goes far enough.<br />
<br />
Any thing is as good as established, when that is established that<br />
        will produce it and continue it.</p>
