<h1 class="title-poem">Champs D'Honneur</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Ernest-Hemingway.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ernest Hemingway</h2>
<p>Soldiers never do die well;<br />
Crosses mark the places --<br />
Wooden crosses where they fell,<br />
Stuck above their faces.<br />
Soldiers pitch and cough and twitch --<br />
All the world roars red and black;<br />
Soldiers smother in a ditch,<br />
Choking through the whole attack.</p>
