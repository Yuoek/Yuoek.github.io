<h1 class="title-poem">Lachesis</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/06/daley.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Victor James Daley</h2>
<p>OVER a slow-dying fire,<br />
   Dreaming old dreams, I am sitting;<br />
The flames leap up and expire;<br />
   A woman sits opposite knitting.<br />
I’ve taken a Fate to wife;<br />
   She knits with a half-smile mocking<br />
Me, and my dreams, and my life,<br />
   All into a worsted stocking.</p>
