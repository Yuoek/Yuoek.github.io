<h1 class="title-poem">An Inscription</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Andrew-Bierce.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ambrose Bierce</h2>
<p>For a Statue of Napoleon<br />
   A conqueror as provident as brave,<br />
  He robbed the cradle to supply the grave.<br />
  His reign laid quantities of human dust:<br />
  He fell upon the just and the unjust.</p>
