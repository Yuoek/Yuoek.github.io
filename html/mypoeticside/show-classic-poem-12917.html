<h1 class="title-poem">Anacreontic</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Born I was to be old,<br />
And for to die here;<br />
After that, in the mould<br />
Long for to lie here.<br />
But before that day comes,<br />
Still I be bousing;<br />
For I know, in the tombs<br />
There's no carousing.</p>
