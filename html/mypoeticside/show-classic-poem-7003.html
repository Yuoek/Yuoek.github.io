<h1 class="title-poem">in spite of everything...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>in spite of everything<br />
which breathes and moves,since Doom<br />
(with white longest hands<br />
neatening each crease)<br />
will smooth entirely our minds<br />
-before leaving my room<br />
i turn,and(stooping<br />
through the morning)kiss<br />
this pillow,dear<br />
where our heads lived and were.</p>
