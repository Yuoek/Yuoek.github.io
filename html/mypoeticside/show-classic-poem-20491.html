<h1 class="title-poem">The Firefly</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>The firefly's flame<br />
Is something for which science has no name<br />
I can think of nothing eerier<br />
Than flying around with an unidentified glow on a<br />
person's posteerier.</p>
