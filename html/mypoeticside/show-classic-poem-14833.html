<h1 class="title-poem">Petrov and Kamarov</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/11/Kharms.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Daniil Ivanovich Kharms</h2>
<p>Petrov: Hey, Kamarov, old chap!<br />
Let's catch a few of these gnats!<br />
Kamarov: No, I'm not yet up to that;<br />
We'd do better to catch some tom-cats!</p>
