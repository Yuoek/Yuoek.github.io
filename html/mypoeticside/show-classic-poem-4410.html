                    <h2 class="title-content">Charles Bukowski</h2>
<p>it<br />
takes<br />
a lot of<br />
desperation<br />
dissatisfaction<br />
and<br />
disillusion<br />
to<br />
write<br />
a<br />
few<br />
good<br />
poems.<br />
it's not<br />
for<br />
everybody<br />
either to<br />
write<br />
it<br />
or even to<br />
read<br />
it.</p>
