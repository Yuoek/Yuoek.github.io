<h1 class="title-poem">I know 'tis but a Dream, yet feel more anguish (fragment)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/coleridge.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel Taylor Coleridge</h2>
<p>I know 'tis but a Dream, yet feel more anguish<br />
   Than if 'twere Truth. It has been often so:<br />
   Must I die under it? Is no one near?<br />
   Will no one hear these stifled groans and wake me?</p>
