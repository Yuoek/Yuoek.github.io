<h1 class="title-poem">Upon The Swallow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/John-Bunyan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Bunyan</h2>
<p>This pretty bird, O! how she flies and sings,<br />
But could she do so if she had not wings?<br />
Her wings bespeak my faith, her songs my peace;<br />
When I believe and sing my doubtings cease.</p>
