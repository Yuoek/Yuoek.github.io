<h1 class="title-poem">Indian Boyhood</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/MV5BMzIwMzc3Mjk2MV5BMl5BanBnXkFtZTcwNDQwNDMxOA@@._V1_SY317_CR30214317_.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Spike Milligan</h2>
<p>What happened to the boy I was?<br />
Why did he run away?<br />
And leave me old and thinking, like<br />
There'd been no yesterday?<br />
What happened then?<br />
Was I that boy?<br />
Who laughed and swam in the bund*<br />
I there no going back?<br />
No recompense?<br />
Is there nothing?<br />
No refund?</p>
