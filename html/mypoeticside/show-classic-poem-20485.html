<h1 class="title-poem">The Chipmunk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>My friends all know that I am shy,<br />
But the chipmunk is twice and shy and I.<br />
He moves with flickering indecision<br />
Like stripes across the television.<br />
He's like the shadow of a cloud,<br />
Or Emily Dickinson read aloud.</p>
