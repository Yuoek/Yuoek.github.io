<h1 class="title-poem">The Greatest Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/08/Annas.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anna Swirszczynska</h2>
<p>She is sixty.  She lives<br />
the greatest love of her life.<br />
<br />
She walks arm-in-arm with her dear one,<br />
her hair streams in the wind.<br />
Her dear one says:<br />
"You have hair like pearls."<br />
<br />
Her children say:<br />
"Old fool."</p>
