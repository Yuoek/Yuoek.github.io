<h1 class="title-poem">Superstites Rosae</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/12/rowe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Rowe</h2>
<p>The grass is green upon her grave,<br />
The west wind whispers low;<br />
"The corn is changed, come forth, come forth,<br />
Ere all the blossoms go!"<br />
<br />
In vain.  Her laughing eyes are sealed,<br />
And cold her sunny brow;<br />
Last year she smiled upon the flowers --<br />
They smile above her now!</p>
