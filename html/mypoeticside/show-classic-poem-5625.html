<h1 class="title-poem">Sensual Pleasures</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Cavafy.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Constantine Cavafy</h2>
<p>My life's joy and incense: recollection of those hours<br />
when I found and captured pleasure as I wanted it.<br />
My life's joy and incense: that I refused<br />
all indulgence in routine love affairs.</p>
