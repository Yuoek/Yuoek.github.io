<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Advice 01</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>If thou art aware of news which will grieve a heart, remain silent that others may convey it.<br />
<br />
          Nightingale, bring tidings of spring.  <br />
          Leave bad news to the owl.</p>
