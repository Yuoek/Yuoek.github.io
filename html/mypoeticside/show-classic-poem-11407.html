<h1 class="title-poem">Calm At Sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>SILENCE deep rules o'er the waters,<br />
<br />
Calmly slumb'ring lies the main,<br />
While the sailor views with trouble<br />
<br />
Nought but one vast level plain.<br />
<br />
Not a zephyr is in motion!<br />
<br />
Silence fearful as the grave!<br />
In the mighty waste of ocean<br />
<br />
Sunk to rest is ev'ry wave.</p>
