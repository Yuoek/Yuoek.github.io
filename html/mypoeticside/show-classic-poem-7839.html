<h1 class="title-poem">Absent Place—an April Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>927<br />
<br />
Absent Place—an April Day—<br />
Daffodils a-blow<br />
Homesick curiosity<br />
To the Souls that snow—<br />
<br />
Drift may block within it<br />
Deeper than without—<br />
Daffodil delight but<br />
Him it duplicate—</p>
