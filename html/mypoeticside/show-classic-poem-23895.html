<h1 class="title-poem">Margaret Has A Milking-Pail</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Margaret has a milking-pail,<br />
And she rises early;<br />
Thomas has a threshing-flail,<br />
And he's up betimes.<br />
Sometimes crossing through the grass<br />
Where the dew lies pearly,<br />
They say ‘Good morrow’ as they pass<br />
By the leafy limes.</p>
