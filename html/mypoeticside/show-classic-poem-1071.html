<h1 class="title-poem">Writing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/William-Allingham.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Allingham</h2>
<p>A man who keeps a diary, pays <br />
Due toll to many tedious days; <br />
But life becomes eventful--then <br />
His busy hand forgets the pen. <br />
Most books, indeed, are records less <br />
Of fulness than of emptiness.</p>
