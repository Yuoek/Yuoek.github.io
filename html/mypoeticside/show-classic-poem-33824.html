<h1 class="title-poem">Race Of Veterans</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>RACE of veterans! Race of victors!<br />
Race of the soil, ready for conflict! race of the conquering march!<br />
(No more credulity's race, abiding-temper'd race<br />
Race henceforth owning no law but the law of itself;<br />
Race of passion and the storm.</p>
