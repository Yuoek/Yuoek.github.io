<h1 class="title-poem">His Request To Julia</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Julia, if I chance to die<br />
Ere I print my poetry,<br />
I most humbly thee desire<br />
To commit it to the fire:<br />
Better 'twere my book were dead,<br />
Than to live not perfected.</p>
