<h1 class="title-poem">Paulo Post Futuri</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>WEEP ye not, ye children dear,<br />
<br />
That as yet ye are unborn:<br />
For each sorrow and each tear<br />
<br />
Makes the father's heart to mourn.<br />
<br />
Patient be a short time to it,<br />
<br />
Unproduced, and known to none;<br />
If your father cannot do it,<br />
<br />
By your mother 'twill be done.</p>
