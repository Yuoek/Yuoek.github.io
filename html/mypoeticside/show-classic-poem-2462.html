<h1 class="title-poem">Lord Finchley</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>Lord Finchley tried to mend the Electric Light<br />
Himself. It struck him dead: And serve him right!<br />
It is the business of the wealthy man<br />
To give employment to the artisan.</p>
