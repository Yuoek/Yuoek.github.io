<h1 class="title-poem">To A Couple Of Students Who Were Teasing Her</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Ho-Xuan-Huong.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ho Xuan Huong</h2>
<p>Where are you going, my dear little greenhorns?<br />
Here, I'll teach you how to turn a verse or two<br />
Young drones sucking at withered flowers,<br />
Little goats brushing horns against a fence.</p>
