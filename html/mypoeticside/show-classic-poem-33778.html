<h1 class="title-poem">Here, Sailor</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>WHAT ship, puzzled at sea, cons for the true reckoning?<br />
Or, coming in, to avoid the bars, and follow the channel, a perfect<br />
        pilot needs?<br />
Here, sailor! Here, ship! take aboard the most perfect pilot,<br />
Whom, in a little boat, putting off, and rowing, I, hailing you,<br />
        offer.</p>
