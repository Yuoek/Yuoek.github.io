<h1 class="title-poem">Pain—expands the Time</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>967<br />
<br />
Pain—expands the Time—<br />
Ages coil within<br />
The minute Circumference<br />
Of a single Brain—<br />
<br />
Pain contracts—the Time—<br />
Occupied with Shot<br />
Gamuts of Eternities<br />
Are as they were not—</p>
