<h1 class="title-poem">Why?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/walter-d.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Walter de la Mare</h2>
<p>Ever, ever<br />
Stir and shiver<br />
The reeds and rushes<br />
By the river:<br />
Ever, ever,<br />
As if in dream,<br />
The lone moon's silver<br />
Sleeks the stream.<br />
What old sorrow,<br />
What lost love,<br />
Moon, reeds, rushes,<br />
Dream you of?</p>
