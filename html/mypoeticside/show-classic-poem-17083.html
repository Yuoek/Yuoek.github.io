<h1 class="title-poem">Butterflies</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/haniel.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Haniel Long</h2>
<p>There will be butterflies,<br />
There will be summer skies<br />
And flowers upthrust,<br />
When all that Caesar bids,<br />
And all the pyramids<br />
Are dust.<br />
<br />
There will be gaudy wings<br />
Over the bones of things,<br />
And never grief:<br />
Who says that summer skies,<br />
Who says that butterflies,<br />
Are brief?</p>
