<h1 class="title-poem">Minstrel Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>Because my mouth<br />
Is wide with laughter<br />
And my throat<br />
Is deep with song,<br />
You do not think<br />
I suffer after<br />
I have held my pain<br />
So long?<br />
<br />
Because my mouth<br />
Is wide with laughter,<br />
You do not hear<br />
My inner cry?<br />
Because my feet<br />
Are gay with dancing,<br />
You do not know<br />
I die?</p>
