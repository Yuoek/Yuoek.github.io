<h1 class="title-poem">The Dewdrop</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/09/skip.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Skipsey</h2>
<p>AH, be not vain. In yon flower-bell,  <br />
 As rare a pearl, did I appear,  <br />
As ever grew in ocean shell,  <br />
 To dangle at a Helen’s ear.  <br />
 <br />
So was I till a cruel blast          <br />
 Arose and swept me to the ground,  <br />
When, in the jewel of the past,  <br />
 Earth but a drop of water found.</p>
