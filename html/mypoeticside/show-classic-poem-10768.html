<h1 class="title-poem">Fire and Ice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>Some say the world will end in fire,<br />
  Some say in ice.<br />
  From what I've tasted of desire<br />
  I hold with those who favor fire.<br />
  But if it had to perish twice,<br />
  I think I know enough of hate<br />
  To know that for destruction ice<br />
  Is also great<br />
  And would suffice.</p>
