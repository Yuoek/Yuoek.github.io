<h1 class="title-poem">Is The Moon Tired? She Looks So Pale</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Is the moon tired? she looks so pale<br />
Within her misty veil:<br />
She scales the sky from east to west,<br />
And takes no rest.<br />
Before the coming of the night<br />
The moon shows papery white;<br />
Before the dawning of the day<br />
She fades away.</p>
