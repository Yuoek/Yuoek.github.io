<h1 class="title-poem">Romeo and Juliet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>If you will die for me,<br />
I will die for you<br />
and our graves will be like two lovers washing<br />
their clothes together<br />
in a laundromat<br />
If you will bring the soap<br />
I will bring the bleach.</p>
