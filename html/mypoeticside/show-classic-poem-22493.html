<h1 class="title-poem">Ch'ing P'ing Tiao</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Clouds bring back to mind her dress, the flowers her face.<br />
Winds of spring caress the rail where sparkling dew-drops cluster.<br />
If you cannot see her by the jewelled mountain top,<br />
Maybe on the moonlit Jasper Terrance you will meet her.<br />
</p>
