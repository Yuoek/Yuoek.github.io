<h1 class="title-poem">Dust</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Here is dust remembers it was a rose<br />
one time and lay in a woman's hair.<br />
Here is dust remembers it was a woman<br />
one time and in her hair lay a rose.<br />
Oh things one time dust, what else now is it<br />
you dream and remember of old days?</p>
