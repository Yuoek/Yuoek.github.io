<h1 class="title-poem">Petition</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>OH thou sweet maiden fair,<br />
Thou with the raven hair,<br />
<br />
Why to the window go?<br />
<br />
While gazing down below,<br />
Art standing vainly there?<br />
<br />
Oh, if thou stood'st for me,<br />
And lett'st the latch but fly,<br />
<br />
How happy should I be!<br />
How soon would I leap high!</p>
