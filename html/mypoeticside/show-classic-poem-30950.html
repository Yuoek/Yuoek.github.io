<h1 class="title-poem">The Cherry Trees</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-thomas.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Phillip Edward Thomas</h2>
<p>The cherry trees bend over and are shedding,<br />
On the old road where all that passed are dead,<br />
Their petals, strewing the grass as for a wedding<br />
This early May morn when there is none to wed.</p>
