<h1 class="title-poem">Mowgli's Brothers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Now Chil the Kite brings home the night<br />
That Mang the Bat sets free--<br />
The herds are shut in byre and hut,<br />
For loosed till dawn are we.<br />
This is the hour of pride and power,<br />
Talon and tush and claw.<br />
Oh, hear the call!--Good hunting all<br />
That keep the Jungle Law!</p>
