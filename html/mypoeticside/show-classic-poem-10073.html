<h1 class="title-poem">Of Beauty</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/sirrich.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Richard Fanshawe</h2>
<p>Let us use it while we may<br />
Snatch those joys that haste away!<br />
Earth her winter coat may cast,<br />
And renew her beauty past:<br />
But, our winter come, in vain<br />
We solicit spring again;<br />
And when our furrows snow shall cover,<br />
Love may return but never lover.</p>
