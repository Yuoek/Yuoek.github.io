<h1 class="title-poem">Old Black Men</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/gdj.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Georgia Douglas Johnson</h2>
<p>They have dreamed as young men dream<br />
of glory, love and power;<br />
they have hoped as youth will hope<br />
of life's sun-minted hour.<br />
<br />
They have seen as others saw<br />
their bubbles burst in air,<br />
they have learned to live it down<br />
as though they did not care.</p>
