<h1 class="title-poem">Ninny Nanny Netticoat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Beatrix-Potter.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Beatrix Potter</h2>
<p>Ninny Nanny Netticoat,<br />
In a white petticoat,<br />
With a red nose, --<br />
The longer she stands,<br />
The shorter she grows.</p>
