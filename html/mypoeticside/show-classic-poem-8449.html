<h1 class="title-poem">They have not chosen me, he said,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>"They have not chosen me," he said,<br />
"But I have chosen them!"<br />
Brave—Broken hearted statement—<br />
Uttered in Bethlehem!<br />
<br />
I could not have told it,<br />
But since Jesus dared—<br />
Sovereign! Know a Daisy<br />
They dishonor shared!</p>
