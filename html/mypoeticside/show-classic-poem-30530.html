<h1 class="title-poem">Dooryard Roses</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I have come the selfsame path<br />
To the selfsame door,<br />
Years have left the roses there<br />
Burning as before<br />
<br />
While I watch them in the wind<br />
Quick the hot tears start--<br />
Strange so frail a flame outlasts<br />
Fire in the heart.</p>
