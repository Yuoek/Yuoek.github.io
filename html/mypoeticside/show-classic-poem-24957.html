<h1 class="title-poem">Subway</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Down between the walls of shadow<br />
Where the iron laws insist,<br />
    The hunger voices mock.<br />
<br />
The worn wayfaring men<br />
With the hunched and humble shoulders,<br />
    Throw their laughter into toil.</p>
