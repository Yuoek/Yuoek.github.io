<h1 class="title-poem">The difference between Despair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>305<br />
<br />
The difference between Despair<br />
And Fear—is like the One<br />
Between the instant of a Wreck<br />
And when the Wreck has been—<br />
<br />
The Mind is smooth—no Motion—<br />
Contented as the Eye<br />
Upon the Forehead of a Bust—<br />
That knows—it cannot see—</p>
