<h1 class="title-poem">Sleep, Darksome, Deep</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/paulv.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Verlaine</h2>
<p>Sleep, darksome, deep,<br />
  Doth on me fall:<br />
Vain hopes all, sleep,<br />
  Sleep, yearnings all!<br />
<br />
Lo, I grow blind!<br />
  Lo, right and wrong<br />
Fade to my mind....<br />
  O sorry song!<br />
<br />
A cradle, I,<br />
  Rocked in a grave:<br />
Speak low, pass by,<br />
  Silence I crave!</p>
