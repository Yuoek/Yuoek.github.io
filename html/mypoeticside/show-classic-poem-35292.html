<h1 class="title-poem">A Friend's Illness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>SICKNESS brought me this<br />
Thought, in that scale of his:<br />
Why should I be dismayed<br />
Though flame had burned the whole<br />
World, as it were a coal,<br />
Now I have seen it weighed<br />
Against a soul?</p>
