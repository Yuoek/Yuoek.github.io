<h1 class="title-poem">The Conversion of Aurelian McGoggin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Ride with an idle whip, ride with an unused heel,<br />
 But, once in a way, there will come a day<br />
 When the colt must be taught to feel<br />
 The lash that falls, and the curb that galls, and the sting<br />
of the rowelled steel.</p>
