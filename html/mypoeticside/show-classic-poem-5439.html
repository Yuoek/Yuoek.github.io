<h1 class="title-poem">How doth the little crocodile...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/carroll.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lewis Carroll</h2>
<p>How doth the little crocodile<br />
Improve his shining tail,<br />
And pour the waters of the Nile<br />
On every golden scale!<br />
<br />
How cheerfully he seems to grin<br />
How neatly spreads his claws,<br />
And welcomes little fishes in,<br />
With gently smiling jaws!</p>
