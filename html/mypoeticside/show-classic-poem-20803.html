<h1 class="title-poem">Risk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Anais Nin</h2>
<p>And then the day came,<br />
when the risk<br />
to remain tight<br />
in a bud<br />
was more painful<br />
than the risk<br />
it took<br />
to Blossom.</p>
