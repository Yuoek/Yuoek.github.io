<h1 class="title-poem">Book Of Suleika - Hatem 02</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>O, SAY, 'neath what celestial sign<br />
<br />
The day doth lie,<br />
When ne'er again this heart of mine<br />
<br />
Away will fly?<br />
And e'en though fled (what thought divine!)<br />
<br />
Would near me lie?--<br />
On the soft couch, on whose sweet shrine<br />
<br />
My heart near hers will lie!</p>
