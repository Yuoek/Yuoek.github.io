<h1 class="title-poem">The Traitor's Epitah</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/12/canning.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">George Canning</h2>
<p>May this dreary abode be for ever unknown,<br />
 For ever, by virtue, by Pity, untrod;<br />
Unbreathed be his name, and unhonor'd his stone;<br />
 The foe of his country, his monarch, his God.</p>
