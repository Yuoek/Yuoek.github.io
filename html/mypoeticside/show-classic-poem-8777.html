<h1 class="title-poem">A long, long sleep, a famous sleep</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>A long, long sleep, a famous sleep<br />
That makes no show for dawn<br />
By stretch of limb or stir of lid, --<br />
An independent one.<br />
<br />
Was ever idleness like this?<br />
Within a hut of stone<br />
To bask the centuries away<br />
Nor once look up for noon?</p>
