<h1 class="title-poem">Autumn River Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>The moon shimmers in green water.<br />
White herons fly through the moonlight.<br />
<br />
The young man hears a girl gathering water-chestnuts:<br />
into the night, singing, they paddle home together.<br />
<br />
                Li T'ai-po<br />
                tr. Hamil</p>
