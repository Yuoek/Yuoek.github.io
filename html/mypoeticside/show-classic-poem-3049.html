<h1 class="title-poem">GOOD-MORNING</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bjřrnstjerne Bjřrnson</h2>
<p>Day's coming up now, joy's returned,<br />
Sorrow's dark cloud-castles captured and burned;<br />
Over the mountain-tops glowing<br />
Light-king his armies is throwing.<br />
"Up now, up now!" calls the bird,<br />
"Up now, up now!" child-voice heard,<br />
Up now my hope in sunshine. "</p>
