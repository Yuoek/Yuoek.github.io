<h1 class="title-poem">I cannot be ashamed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>914<br />
<br />
I cannot be ashamed<br />
Because I cannot see<br />
The love you offer—<br />
Magnitude<br />
Reverses Modesty<br />
<br />
And I cannot be proud<br />
Because a Height so high<br />
Involves Alpine<br />
Requirements<br />
And Services of Snow.</p>
