<h1 class="title-poem">The Rock of Rubies and the Quarry of Pearls</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Some ask'd me where the Rubies grew:<br />
And nothing I did say,<br />
But with my finger pointed to<br />
The lips of Julia.<br />
Some ask'd how Pearls did grow, and where:<br />
Then spoke I to my girl,<br />
To part her lips, and shew me there<br />
The quarrelets of Pearl.</p>
