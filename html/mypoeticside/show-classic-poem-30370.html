<h1 class="title-poem">November</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The world is tired, the year is old,<br />
The little leaves are glad to die,<br />
The wind goes shivering with cold<br />
Among the rushes dry.<br />
<br />
Our love is dying like the grass,<br />
And we who kissed grow coldly kind,<br />
Half glad to see our poor love pass<br />
Like leaves along the wind.</p>
