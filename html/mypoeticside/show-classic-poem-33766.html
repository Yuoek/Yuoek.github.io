<h1 class="title-poem">I Thought I Was Not Alone</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>I THOUGHT I was not alone, walking here by the shore,<br />
But the one I thought was with me, as now I walk by the shore,<br />
As I lean and look through the glimmering light--that one has utterly<br />
        disappeared,<br />
And those appear that perplex me.</p>
