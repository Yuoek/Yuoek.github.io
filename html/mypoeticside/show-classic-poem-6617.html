<h1 class="title-poem">The Companions</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Three grey women walk with me<br />
<br />
Fate and Grief and Memory.<br />
<br />
<br />
My fate brought grief; my grief must be<br />
<br />
With me through Eternity,<br />
<br />
Such thy power, memory.<br />
<br />
<br />
Three grey women walk with me.</p>
