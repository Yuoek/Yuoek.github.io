<h1 class="title-poem">After Schiller</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/hardy.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Hardy</h2>
<p>Knight, a true sister-love<br />
  This heart retains;<br />
Ask me no other love,<br />
  That way lie pains!<br />
<br />
Calm must I view thee come,<br />
  Calm see thee go;<br />
Tale-telling tears of thine<br />
  I must not know!</p>
