<h1 class="title-poem">That I did always love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>549<br />
<br />
That I did always love<br />
I bring thee Proof<br />
That till I loved<br />
I never lived—Enough—<br />
<br />
That I shall love alway—<br />
I argue thee<br />
That love is life—<br />
And life hath Immortality—<br />
<br />
This—dost thou doubt—Sweet—<br />
Then have I<br />
Nothing to show<br />
But Calvary—</p>
