<h1 class="title-poem">Alone</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/YW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yvor Winters</h2>
<p>I, one who never speaks,<br />
Listened days in summer trees,<br />
Each day a rustling leaf.<br />
<br />
Then, in time, my unbelief<br />
Grew like my running -<br />
My own eyes did not exist,<br />
When I struck I never missed.<br />
<br />
Noon, felt and far away -<br />
My brain is a thousand bees.</p>
