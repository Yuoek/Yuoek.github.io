<h1 class="title-poem">Prospect</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/sylvia-plath.520.360.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sylvia Plath</h2>
<p>Among orange-tile rooftops<br />
and chimney pots<br />
the fen fog slips,<br />
gray as rats,<br />
<br />
while on spotted branch<br />
of the sycamore<br />
two black rooks hunch<br />
and darkly glare,<br />
<br />
watching for night,<br />
with absinthe eye<br />
cocked on the lone, late,<br />
passer-by.</p>
