<h1 class="title-poem">Summer Stars</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Bend low again, night of summer stars.<br />
So near you are, sky of summer stars,<br />
So near, a long-arm man can pick off stars,<br />
Pick off what he wants in the sky bowl,<br />
So near you are, summer stars,<br />
So near, strumming, strumming,<br />
So lazy and hum-strumming.</p>
