<h1 class="title-poem">Wedding</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>Each strips his own skin<br />
Each bares his own constellation<br />
Which has never seen the night<br />
<br />
Each fills his skin with rocks<br />
And plays with it<br />
Lit by his own stars<br />
<br />
Who doesn't stop till dawn<br />
Who doesn't bat an eyelid or fall<br />
Earns his own skin </p>
