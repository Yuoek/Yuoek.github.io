<h1 class="title-poem">Spring is the Period</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>844<br />
<br />
Spring is the Period<br />
Express from God.<br />
Among the other seasons<br />
Himself abide,<br />
<br />
But during March and April<br />
None stir abroad<br />
Without a cordial interview<br />
With God.</p>
