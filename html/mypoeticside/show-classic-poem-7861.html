<h1 class="title-poem">Banish Air from Air—</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>854<br />
<br />
Banish Air from Air—<br />
Divide Light if you dare—<br />
They'll meet<br />
While Cubes in a Drop<br />
Or Pellets of Shape<br />
Fit<br />
Films cannot annul<br />
Odors return whole<br />
Force Flame<br />
And with a Blonde push<br />
Over your impotence<br />
Flits Steam.</p>
