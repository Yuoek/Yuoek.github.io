<h1 class="title-poem">The Pledge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>White doves of Cytherea, by your quest<br />
<br />
Across the blue Heaven's bluest highest air,<br />
<br />
And by your certain homing to Love's breast,<br />
<br />
Still to be true and ever true -- I swear.</p>
