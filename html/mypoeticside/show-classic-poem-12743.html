<h1 class="title-poem">A Child's Grace</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>HERE a little child I stand<br />
Heaving up my either hand;<br />
Cold as paddocks though they be,<br />
Here I lift them up to Thee,<br />
For a benison to fall<br />
On our meat and on us all. Amen.</p>
