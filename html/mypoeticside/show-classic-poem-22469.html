<h1 class="title-poem">Lament for Mr Tai</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Wine-maker there by Yellow Fountains,<br />
‘Eternal Spring’  that’s still your vintage.<br />
Without Li Po on Night’s Terrace<br />
Who can there be to bring you custom?</p>
