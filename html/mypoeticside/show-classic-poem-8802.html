<h1 class="title-poem">I never hear the word</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I never hear the word "escape"<br />
Without a quicker blood,<br />
A sudden expectation,<br />
A flying attitude.<br />
<br />
I never hear of prisons broad<br />
By soldiers battered down,<br />
But I tug childish at my bars, --<br />
Only to fail again!</p>
