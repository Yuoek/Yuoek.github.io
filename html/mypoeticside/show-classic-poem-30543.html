<h1 class="title-poem">Message</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I heard a cry in the night,<br />
A thousand miles it came,<br />
Sharp as a flash of light,<br />
My name, my name!<br />
<br />
It was your voice I heard,<br />
You waked and loved me so --<br />
I send you back this word,<br />
I know, I know!</p>
