<h1 class="title-poem">The Horses Of The Sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>The horses of the sea<br />
Rear a foaming crest,<br />
But the horses of the land<br />
Serve us the best.<br />
The horses of the land<br />
Munch corn and clover,<br />
While the foaming sea-horses<br />
Toss and turn over.</p>
