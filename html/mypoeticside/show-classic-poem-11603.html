<h1 class="title-poem">Like And Like</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>A FAIR bell-flower<br />
<br />
Sprang tip from the ground;<br />
And early its fragrance<br />
<br />
It shed all around;<br />
A bee came thither<br />
<br />
And sipp'd from its bell;<br />
That they for each other<br />
<br />
Were made, we see well.</p>
