<h1 class="title-poem">Queen Elizabeth Speaks</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/joycekil.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joyce Kilmer</h2>
<p>My hands were stained with blood, my heart was proud and cold,<br />
My soul is black with shame . . . but I gave Shakespeare gold.<br />
So after aeons of flame, I may, by grace of God,<br />
Rise up to kiss the dust that Shakespeare's feet have trod.</p>
