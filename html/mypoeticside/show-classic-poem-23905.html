<h1 class="title-poem">Three Plum Buns</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Three plum buns<br />
To eat here at the stile<br />
In the clover meadow,<br />
For we have walked a mile.<br />
One for you, and one for me,<br />
And one left over:<br />
Give it to the boy who shouts<br />
To scare sheep from the clover.</p>
