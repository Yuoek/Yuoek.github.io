<h1 class="title-poem">Roaming In Thought</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>ROAMING in thought over the Universe, I saw the little that is Good<br />
        steadily hastening towards immortality,<br />
And the vast all that is call'd Evil I saw hastening to merge itself<br />
        and become lost and dead.</p>
