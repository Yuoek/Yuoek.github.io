<h1 class="title-poem">The Sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Who lay against the sea, and fled,<br />
 Who lightly loved the wave,<br />
Shall never know, when he is dead,<br />
 A cool and murmurous grave.<br />
<br />
But in a shallow pit shall rest<br />
  For all eternity,<br />
And bear the earth upon the breas<br />
  That once had worn the sea.</p>
