                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/jack-kerouac.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jack Kerouac</h2>
<p>Birds singing<br />
in the dark<br />
—Rainy dawn.</p>
