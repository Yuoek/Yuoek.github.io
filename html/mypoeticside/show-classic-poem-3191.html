<h1 class="title-poem">Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>The Sun arises in the East,<br />
Cloth'd in robes of blood and gold;<br />
Swords and spears and wrath increast<br />
All around his bosom roll'd<br />
Crown'd with warlike fires and raging desires.</p>
