<h1 class="title-poem">This Day, O Soul</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>THIS day, O Soul, I give you a wondrous mirror;<br />
Long in the dark, in tarnish and cloud it lay--But the cloud has<br />
        pass'd, and the tarnish gone;<br />
... Behold, O Soul! it is now a clean and bright mirror,<br />
Faithfully showing you all the things of the world.</p>
