<h1 class="title-poem">One sung of thee who left the tale untold</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/shelley-percy4.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Percy Bysshe Shelley</h2>
<p>One sung of thee who left the tale untold,<br />
        Like the false dawns which perish in the bursting;<br />
    Like empty cups of wrought and daedal gold,<br />
        Which mock the lips with air, when they are thirsting.</p>
