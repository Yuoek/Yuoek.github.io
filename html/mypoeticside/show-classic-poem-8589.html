<h1 class="title-poem">Come slowly—Eden!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Come slowly—Eden!<br />
Lips unused to Thee—<br />
Bashful—sip thy Jessamines—<br />
As the fainting Bee—<br />
<br />
Reaching late his flower,<br />
Round her chamber hums—<br />
Counts his nectars—<br />
Enters—and is lost in Balms.</p>
