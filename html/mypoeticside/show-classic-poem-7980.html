<h1 class="title-poem">None can experience sting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>771<br />
<br />
None can experience sting<br />
Who Bounty—have not known—<br />
The fact of Famine—could not be<br />
Except for Fact of Corn—<br />
<br />
Want—is a meagre Art<br />
Acquired by Reverse—<br />
The Poverty that was not Wealth—<br />
Cannot be Indigence.</p>
