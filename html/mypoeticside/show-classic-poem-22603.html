<h1 class="title-poem">Give Me Back My Rags #1</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>Give me back my rags<br />
<br />
My rags of pure dreaming<br />
Of silk smiling of striped foreboding<br />
Of my cloth of lace<br />
<br />
My rags of spotted hope<br />
Of burnished desire of chequered glances<br />
Of skin from my face<br />
<br />
Give me back my rags<br />
Give me when I ask you nicely</p>
