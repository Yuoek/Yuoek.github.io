<h1 class="title-poem">How the Rhinoceros got His Skin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>This Uninhabited Island<br />
              Is near Cape Gardafui;<br />
            But it's hot--too hot--of Suez<br />
              For the likes of you and me<br />
            Ever to go in a P. & O.<br />
              To call on the Cake Parsee.</p>
