<h1 class="title-poem">Epigram On The Death Of Edward Forbes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/dobell.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sydney Thompson Dobell</h2>
<p>NATURE, a jealous mistress, laid him low.  <br />
He woo’d and won her; and, by love made bold,  <br />
She show’d him more than mortal man should know,  <br />
Then slew him lest her secret should be told.</p>
