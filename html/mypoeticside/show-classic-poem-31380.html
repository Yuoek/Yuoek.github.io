<h1 class="title-poem">Silence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Charles-Hanson-Towne.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Hanson Towne</h2>
<p>I need not shout my faith. Thrice eloquent<br />
Are quiet trees and the green listening sod;<br />
Hushed are the stars, whose power is never spent;<br />
The hills are mute: yet how they speak of God!</p>
