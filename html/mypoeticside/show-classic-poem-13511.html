<h1 class="title-poem">With rue my heart is laden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>With rue my heart is laden<br />
 For golden friends I had,<br />
For many a rose-lipt maiden<br />
 And many a lightfoot lad.<br />
<br />
By brooks too broad for leaping<br />
 The lightfoot boys are laid;<br />
The rose-lipt girls are sleeping<br />
 In fields where roses fade.</p>
