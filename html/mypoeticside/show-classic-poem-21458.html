<h1 class="title-poem">Observation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>If I don't drive around the park,<br />
   I'm pretty sure to make my mark.<br />
   If I'm in bed each night by ten,<br />
   I may get back my looks again,<br />
   If I abstain from fun and such,<br />
   I'll probably amount to much,<br />
   But I shall stay the way I am,<br />
   Because I do not give a damn.</p>
