<h1 class="title-poem">Nature rarer uses yellow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Nature rarer uses yellow<br />
Than another hue;<br />
Saves she all of that for sunsets,--<br />
Prodigal of blue,<br />
<br />
Spending scarlet like a woman,<br />
Yellow she affords<br />
Only scantly and selectly,<br />
Like a lover's words.</p>
