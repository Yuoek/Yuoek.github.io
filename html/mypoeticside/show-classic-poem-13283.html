<h1 class="title-poem">November</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/thomashood.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Hood</h2>
<p>No sun - no moon!<br />
No morn - no noon -<br />
No dawn - no dusk - no proper time of day.<br />
No warmth, no cheerfulness, no healthful ease,<br />
No comfortable feel in any member -<br />
No shade, no shine, no butterflies, no bees,<br />
No fruits, no flowers, no leaves, no birds! -<br />
November!</p>
