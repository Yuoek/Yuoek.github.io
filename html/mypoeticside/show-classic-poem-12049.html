<h1 class="title-poem">Rubaiyat 25</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shams.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>O friend, from your foes your heart release,<br />
In pleasant company drink the good wine with ease.<br />
Confer with those who know, open your heart<br />
And from the ignorant fleas flee like the breeze.</p>
