<h1 class="title-poem">THE DAY-BREAKERS</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/arnabon.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Arna Wendell Bontemps</h2>
<p>We are not come to wage a strife<br />
 With swords upon this hill,<br />
It is not wise to waste the life<br />
 Against a stubborn will.<br />
Yet would we die as some have done.<br />
Beating a way for the rising sun.</p>
