<h1 class="title-poem">O Hymen! O Hymenee!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>O HYMEN! O hymenee!<br />
Why do you tantalize me thus?<br />
O why sting me for a swift moment only?<br />
Why can you not continue? O why do you now cease?<br />
Is it because, if you continued beyond the swift moment, you would<br />
        soon certainly kill me?</p>
