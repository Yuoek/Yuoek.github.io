<h1 class="title-poem">Upon Julia's Antics</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/09/bert.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bert Leston Taylor</h2>
<p>When as  galoshed my Julia goes,<br />
Unbuckled all from top to toes,<br />
How swift the poem becometh prose!<br />
And when I cast mine eyes and see<br />
Those arctics flopping each way free,<br />
Oh, how that flopping floppeth me!</p>
