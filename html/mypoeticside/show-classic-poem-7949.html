<h1 class="title-poem">Impossibility, like Wine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>838<br />
<br />
Impossibility, like Wine<br />
Exhilarates the Man<br />
Who tastes it; Possibility<br />
Is flavorless—Combine<br />
<br />
A Chance's faintest Tincture<br />
And in the former Dram<br />
Enchantment makes ingredient<br />
As certainly as Doom—</p>
