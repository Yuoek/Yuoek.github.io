<h1 class="title-poem">I can't abear</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/walter-d.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Walter de la Mare</h2>
<p>I can't abear a butcher,<br />
I can't abide his meat,<br />
The ugliest shop of all is his,<br />
The ugliest in the street;<br />
Bakers' are warm, cobblers' dark<br />
Chemists' burn watery lights;<br />
But oh, the sawdust butchers shop<br />
That ugliest of sights.</p>
