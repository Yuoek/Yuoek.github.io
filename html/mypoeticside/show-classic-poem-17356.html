<h1 class="title-poem">St. John</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>St. John, whose art sublimely shines<br />
In liquid odes and melting lines,<br />
Let Theobald his regard express<br />
In verse of lesser loveliness.<br />
As now in regal state appear<br />
The festive hours of Yuletide cheer,<br />
My strongest wish is that you may<br />
Feel ev'ry blessing of the day!</p>
