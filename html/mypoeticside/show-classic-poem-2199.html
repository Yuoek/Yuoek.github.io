<h1 class="title-poem">The Greatest Gift</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/09/blanche.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Blanche Edith Baughan</h2>
<p>IF of us two might only one be glad,   <br />
 Pain I’d pursue, and struggle to be sad.   <br />
If of us two one only might be great,   <br />
Safely obscure I’d triumph in my fate.   <br />
O Soul more dear than mine! if of us two           <br />
One only might love God, it should be you.</p>
