<h1 class="title-poem">Peach Blossom at Dalin Temple</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>Across the world this June, the petals all have fallen,<br />
But the mountain temple's peach blossom has just begun to bloom.<br />
I regretted so much that spring had gone without a trace,<br />
I didn't know that it had only moved up here.</p>
