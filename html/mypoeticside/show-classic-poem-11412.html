<h1 class="title-poem">The Way To Behave</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>THOUGH tempers are bad and peevish folks swear,<br />
Remember to ruffle thy brows, friend, ne'er;<br />
And let not the fancies of women so fair<br />
E'er serve thy pleasure in life to impair.</p>
