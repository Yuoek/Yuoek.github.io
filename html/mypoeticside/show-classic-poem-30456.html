<h1 class="title-poem">Deep in the Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Deep in the night the cry of a swallow,<br />
Under the stars he flew,<br />
Keen as pain was his call to follow<br />
Over the world to you.<br />
<br />
Love in my heart is a cry forever<br />
Lost as the swallow's flight,<br />
Seeking for you and never, never<br />
Stilled by the stars at night.</p>
