<h1 class="title-poem">Gentle Lady, Do Not Sing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>Gentle lady, do not sing<br />
Sad songs about the end of love;<br />
Lay aside sadness and sing<br />
How love that passes is enough.<br />
<br />
Sing about the long deep sleep<br />
Of lovers that are dead, and how<br />
In the grave all love shall sleep:<br />
Love is aweary now.</p>
