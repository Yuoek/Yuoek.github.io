<h1 class="title-poem">The Jew</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/isaac.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Isaac Rosenberg</h2>
<p>Moses, from whose loins I sprung,<br />
    Lit by a lamp in his blood<br />
    Ten immutable rules, a moon<br />
    For mutable lampless men.<br />
<br />
    The blonde, the bronze, the ruddy,<br />
    With the same heaving blood,<br />
    Keep tide to the moon of Moses.<br />
    Then why do they sneer at me?</p>
