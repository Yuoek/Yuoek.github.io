<h1 class="title-poem">Tube Station</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/ASJ-Tessimond.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A.S.J. Tessimond</h2>
<p>The tube lift mounts,<br />
                               sap in a stem,<br />
And blossoms its load,<br />
                                  a black, untidy rose.<br />
<br />
The fountain of the escalator<br />
                             curls at the crest,<br />
                                                  breaks and scatters<br />
A winnow of men,<br />
                          a sickle of dark spray.</p>
