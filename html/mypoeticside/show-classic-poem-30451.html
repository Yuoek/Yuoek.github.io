<h1 class="title-poem">Dusk in June</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Evening, and all the birds<br />
In a chorus of shimmering sound<br />
Are easing their hearts of joy<br />
For miles around.<br />
<br />
The air is blue and sweet,<br />
The few first stars are white,--<br />
Oh let me like the birds<br />
Sing before night.</p>
