<h1 class="title-poem">The Soul that hath a Guest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>674<br />
<br />
The Soul that hath a Guest<br />
Doth seldom go abroad—<br />
Diviner Crowd at Home—<br />
Obliterate the need—<br />
<br />
And Courtesy forbid<br />
A Host's departure when<br />
Upon Himself be visiting<br />
The Emperor of Men—</p>
