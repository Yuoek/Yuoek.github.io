<h1 class="title-poem">The Fever Monument</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>I walked across the park to the fever monument.<br />
It was in the center of a glass square surrounded<br />
by red flowers and fountains. The monument<br />
was in the shape of a sea horse and the plaque read<br />
We got hot and died.</p>
