<h1 class="title-poem">Summer in the Mountains</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Gently I stir a white feather fan,<br />
With open shirt sitting in a green wood.<br />
I take off my cap and hang it on a jutting stone;<br />
A wind from the pine-tree trickles on my bare head.</p>
