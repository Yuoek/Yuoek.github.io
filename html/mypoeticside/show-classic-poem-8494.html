<h1 class="title-poem">When Diamonds are a Legend</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>397<br />
<br />
When Diamonds are a Legend,<br />
And Diadems—a Tale—<br />
I Brooch and Earrings for Myself,<br />
Do sow, and Raise for sale—<br />
<br />
And tho' I'm scarce accounted,<br />
My Art, a Summer Day—had Patrons—<br />
Once—it was a Queen—<br />
And once—a Butterfly—</p>
