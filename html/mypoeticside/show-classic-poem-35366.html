<h1 class="title-poem">Maid Quiet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>WHERE has Maid Quiet gone to,<br />
Nodding her russet hood?<br />
The winds that awakened the stars<br />
Are blowing through my blood.<br />
O how could I be so calm<br />
When she rose up to depart?<br />
Now words that called up the lightning<br />
Are hurtling through my heart.</p>
