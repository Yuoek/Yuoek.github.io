<h1 class="title-poem">Haunts</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>There are places I go when I am strong.<br />
One is a marsh pool where I used to go<br />
with a long-ear hound-dog.<br />
One is a wild crabapple tree; I was there<br />
a moonlight night with a girl.<br />
The dog is gone; the girl is gone; I go to these<br />
places when there is no other place to go.</p>
