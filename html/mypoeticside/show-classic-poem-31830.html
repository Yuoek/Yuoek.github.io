<h1 class="title-poem">The beautiful night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>What chant has taken off this night<br />
that interwaves<br />
of crystalline echo of the heart<br />
the stars<br />
<br />
What spring feast<br />
of wedding heart<br />
<br />
I was<br />
a watertight of darkness<br />
<br />
Now I bite<br />
like a baby the breast<br />
the space<br />
<br />
Now I am drunk<br />
with universe.</p>
