<h1 class="title-poem">Summer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/William-Morris.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Morris</h2>
<p>Summer looked for long am I:<br />
Much shall change or e'er I die.<br />
Prithee take it not amiss<br />
Though I weary thee with bliss.</p>
