<h1 class="title-poem">Four Haiku</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th-1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Matsuo Basho</h2>
<p>Spring: <br />
A hill without a name <br />
Veiled in morning mist. <br />
<br />
The beginning of autumn: <br />
Sea and emerald paddy <br />
Both the same green. <br />
<br />
The winds of autumn <br />
Blow: yet still green <br />
The chestnut husks. <br />
<br />
A flash of lightning: <br />
Into the gloom <br />
Goes the heron's cry.</p>
