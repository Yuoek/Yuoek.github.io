<h1 class="title-poem">Huazi Ridge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Fly bird go no limit<br />
Join mountain again autumn colour<br />
Up down Huazi Ridge<br />
Melancholy feeling what extreme  <br />
<br />
<br />
A bird in flight goes on without limit,<br />
Joined hills are autumn's colours again.<br />
From top to bottom of Huazi Ridge,<br />
Melancholy feeling has no end.</p>
