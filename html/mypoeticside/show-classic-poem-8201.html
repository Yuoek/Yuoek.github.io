<h1 class="title-poem">I asked no other thing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>621<br />
<br />
I asked no other thing—<br />
No other—was denied—<br />
I offered Being—for it—<br />
The Mighty Merchant sneered—<br />
<br />
Brazil? He twirled a Button—<br />
Without a glance my way—<br />
"But—Madam—is there nothing else—<br />
That We can show—Today?"</p>
