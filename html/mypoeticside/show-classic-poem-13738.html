<h1 class="title-poem">The Jackfruit</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Ho-Xuan-Huong.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ho Xuan Huong</h2>
<p>I am like a jackfruit on the tree.<br />
To taste you must plug me quick, while fresh:<br />
the skin rough, the pulp thick, yes,<br />
but oh, I warn you against touching --<br />
the rich juice will gush and stain your hands</p>
