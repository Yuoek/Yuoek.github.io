<h1 class="title-poem">On Those That Hated The 'Playboy Of The Western World,' 1907</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>Once, when midnight smote the air,<br />
Eunuchs ran through Hell and met<br />
On every crowded street to stare<br />
Upon great Juan riding by:<br />
Even like these to rail and sweat<br />
Staring upon his sinewy thigh.</p>
