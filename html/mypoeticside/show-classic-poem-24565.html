<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Admonition 02</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Confide not to a friend every secret thou possessest. How knowest thou that he will not some time become thy foe? Inflict not every injury thou canst upon an enemy because it is possible that one day he may become thy friend.</p>
