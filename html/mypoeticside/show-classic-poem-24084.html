                    <h2 class="title-content">Dante Gabriel Rossetti</h2>
<p>CON manto d'oro, collana, ed anelli,<br />
Le piace aver con quelli<br />
Non altro che una rosa ai suoi capelli.<br />
WITH golden mantle, rings, and necklace fair,<br />
It likes her best to wear<br />
Only a rose within her golden hair.</p>
