<h1 class="title-poem">She went as quiet as the Dew</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>149<br />
<br />
She went as quiet as the Dew<br />
From an Accustomed flower.<br />
Not like the Dew, did she return<br />
At the Accustomed hour!<br />
<br />
She dropt as softly as a star<br />
From out my summer's Eve—<br />
Less skillful than Le Verriere<br />
It's sorer to believe!</p>
