<h1 class="title-poem">Suum Cuique</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/rwe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Waldo Emerson</h2>
<p>The rain has spoiled the farmer's day;<br />
Shall sorrow put my books away?<br />
Thereby are two days lost:<br />
Nature shall mind her own affairs,<br />
I will attend my proper cares,<br />
In rain, or sun, or frost.</p>
