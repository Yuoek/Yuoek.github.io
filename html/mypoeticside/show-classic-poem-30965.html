<h1 class="title-poem">Carol</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/R-S-Thomas.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">R. S. Thomas</h2>
<p>What is the Christmas without<br />
snow?  We need it<br />
as bread of a cold<br />
climate, ermine to trim<br />
<br />
our sins with, a brief<br />
sleeve for charity's<br />
scarecrow to wear its heart<br />
on, bold as a robin.</p>
