<h1 class="title-poem">Absolutely Clear</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shams.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>Don't surrender your loneliness<br />
So quickly.<br />
Let it cut more deep.<br />
<br />
Let it ferment and season you<br />
As few human<br />
Or even divine ingredients can.<br />
<br />
Something missing in my heart tonight<br />
Has made my eyes so soft,<br />
My voice<br />
So tender,<br />
<br />
My need of God<br />
Absolutely<br />
Clear.</p>
