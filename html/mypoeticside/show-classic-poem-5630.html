                    <h2 class="title-content">Madison Julius Cawein</h2>
<p>Who hath beheld the goddess face to face,<br />
Blind with her beauty, all his days shall go<br />
Climbing lone mountains towards her temple's place,<br />
Weighed with song's sweet, inexorable woe.</p>
