<h1 class="title-poem">Charity thou art a lie</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Charity thou art a lie,<br />
A toy of women,<br />
A pleasure of certain men.<br />
In the presence of justice,<br />
Lo, the walls of the temple<br />
Are visible<br />
Through thy form of sudden shadows.</p>
