<h1 class="title-poem">The Wind</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>A wind is blowing over my soul,<br />
I hear it cry the whole night thro' --<br />
Is there no peace for me on earth<br />
Except with you?<br />
<br />
Alas, the wind has made me wise,<br />
Over my naked soul it blew, --<br />
There is no peace for me on earth<br />
Even with you.</p>
