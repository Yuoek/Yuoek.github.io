<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 04</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>A learned man who is not abstinent resembles a torchbearer who guides others but does not guide himself.<br />
<br />
         Who has spent a profitless life  <br />
         Bought nothing and threw away his gold.</p>
