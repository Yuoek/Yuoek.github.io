<h1 class="title-poem">A Man may make a Remark</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>A Man may make a Remark—<br />
In itself—a quiet thing<br />
That may furnish the Fuse unto a Spark<br />
In dormant nature—lain—<br />
<br />
Let us deport—with skill—<br />
Let us discourse—with care—<br />
Powder exists in Charcoal—<br />
Before it exists in Fire.</p>
