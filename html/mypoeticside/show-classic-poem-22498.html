<h1 class="title-poem">Alone Looking at the Mountain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>All the birds have flown up and gone;<br />
A lonely cloud floats leisurely by.<br />
We never tire of looking at each other -<br />
Only the mountain and I.</p>
