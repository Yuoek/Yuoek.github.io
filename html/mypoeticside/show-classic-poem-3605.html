<h1 class="title-poem">I've Never Had It Done So Gently Before</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>The sweet juices of your mouth<br />
are like castles bathed in honey.<br />
I've never had it done so gently before.<br />
You have put a circle of castles<br />
around my penis and you swirl them<br />
like sunlight on the wings of birds.</p>
