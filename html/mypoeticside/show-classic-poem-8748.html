<h1 class="title-poem">Chartless</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I never saw a moor,  <br />
I never saw the sea;  <br />
Yet now I know how the heather looks,  <br />
And what a wave must be.  <br />
<br />
I never spoke with God,<br />
Nor visited in Heaven;  <br />
Yet certain am I of the spot  <br />
As if the chart were given.</p>
