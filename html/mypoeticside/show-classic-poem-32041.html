<h1 class="title-poem">What Is A Poet's Soul Like</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/ivan.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ivan Vazov</h2>
<p>A tight and chiming string<br />
that resounds to anything—<br />
a single stroke or evil blow—<br />
always by the same rondo.</p>
