<h1 class="title-poem">War</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/12/Geoff.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Geoffrey Anketell Studdert Kennedy</h2>
<p>There's a soul in the Eternal,<br />
Standing stiff before the King.<br />
There's a little English maiden<br />
Sorrowing.<br />
There's a proud and tearless woman,<br />
Seeing pictures in the fire.<br />
There's a broken battered body<br />
On the wire.</p>
