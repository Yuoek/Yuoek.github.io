<h1 class="title-poem">Out Beyond Ideas</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Out beyond ideas of wrongdoing and rightdoing,<br />
there is a field.  I'll meet you there.<br />
<br />
<br />
When the soul lies down in that grass,<br />
the world is too full to talk about.<br />
Ideas, language, even the phrase each other<br />
doesn't make any sense</p>
