<h1 class="title-poem">This Dust Was Once The Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>THIS dust was once the Man,<br />
Gentle, plain, just and resolute--under whose cautious hand,<br />
Against the foulest crime in history known in any land or age,<br />
Was saved the Union of These States.</p>
