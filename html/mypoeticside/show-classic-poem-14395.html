<h1 class="title-poem">An Invitation to Mr Liu</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>Green lees of beer that's newly brewed,<br />
A little stove of red clay burns.<br />
As evening comes, the sky's about to snow,<br />
Can you drink one cup with me?</p>
