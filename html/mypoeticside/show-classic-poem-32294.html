<h1 class="title-poem">Westward</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ESPW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Stuart Phelps Ward</h2>
<p>My thoughts like waves creep up, creep on,<br />
How patient is the sea!<br />
How shall we climb--the tide and I--<br />
Up to the hills and thee?<br />
<br />
<br />
Were waters free as winds, to go<br />
Where mood or need might be,<br />
They could but find the sky, above<br />
The cañon as the sea.</p>
