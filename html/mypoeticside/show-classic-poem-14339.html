<h1 class="title-poem">O Cool Is the Valley Now</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>O cool is the valley now<br />
And there, love, will we go<br />
For many a choir is singing now<br />
Where Love did sometime go.<br />
And hear you not the thrushes calling,<br />
Calling us away?<br />
O cool and pleasant is the valley<br />
And there, love, will we stay.</p>
