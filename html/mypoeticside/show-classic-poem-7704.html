<h1 class="title-poem">There once was a fellow called Croll</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/09/CJD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clarence Michael James Dennis</h2>
<p>There once was a fellow called Croll,<br />
Who loved to hear periods roll<br />
  On his musical tongue.<br />
  It is he who has sung,<br />
"Ev'n sev'n heav'ns giv'n buy not my soul".</p>
