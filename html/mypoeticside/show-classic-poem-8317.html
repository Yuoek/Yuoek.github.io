<h1 class="title-poem">Like her the Saints retire</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>60<br />
<br />
Like her the Saints retire,<br />
In their Chapeaux of fire,<br />
Martial as she!<br />
<br />
Like her the Evenings steal<br />
Purple and Cochineal<br />
After the Day!<br />
<br />
"Departed"—both—they say!<br />
i.e. gathered away,<br />
Not found,<br />
<br />
Argues the Aster still—<br />
Reasons the Daffodil<br />
Profound!</p>
