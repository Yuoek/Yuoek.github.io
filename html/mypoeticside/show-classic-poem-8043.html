<h1 class="title-poem">The Bird must sing to earn the Crumb</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>880<br />
<br />
The Bird must sing to earn the Crumb<br />
What merit have the Tune<br />
No Breakfast if it guaranty<br />
<br />
The Rose content may bloom<br />
To gain renown of Lady's Drawer<br />
But if the Lady come<br />
But once a Century, the Rose<br />
Superfluous become—</p>
