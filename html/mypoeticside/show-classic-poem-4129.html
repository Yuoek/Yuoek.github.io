<h1 class="title-poem">Parting At Morning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/browning.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Browning</h2>
<p>Round the cape of a sudden came the sea,<br />
And the sun looked over the mountain's rim:<br />
And straight was a path of gold for him,<br />
And the need of a world of men for me.</p>
