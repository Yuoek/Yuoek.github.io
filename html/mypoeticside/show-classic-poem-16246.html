<h1 class="title-poem">Birdcage Walk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/lawrence.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">D.H. Lawrence</h2>
<p>When the wind blows her veil<br />
 And uncovers her laughter<br />
I cease, I turn pale.<br />
When the wind blows her veil<br />
From the woes I bewail<br />
 Of love and hereafter:<br />
When the wind blows her veil<br />
I cease, I turn pale.</p>
