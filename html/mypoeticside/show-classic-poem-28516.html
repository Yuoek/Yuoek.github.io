<h1 class="title-poem">Light As The Linnet On My Way I Start</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>LIGHT as the linnet on my way I start,<br />
For all my pack I bear a chartered heart.<br />
Forth on the world without a guide or chart,<br />
Content to know, through all man's varying fates,<br />
The eternal woman by the wayside waits.</p>
