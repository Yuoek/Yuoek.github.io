<h1 class="title-poem">From My Last Years</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>FROM my last years, last thoughts I here bequeath,<br />
Scatter'd and dropt, in seeds, and wafted to the West,<br />
Through moisture of Ohio, prairie soil of Illinois--through Colorado,<br />
        California air,<br />
For Time to germinate fully.</p>
