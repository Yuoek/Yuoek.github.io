<h1 class="title-poem">In Wartime</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/steph.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephan G. Stephansson</h2>
<p>In Europe's reeking slaughter pen<br />
They mince the flesh of murdered men<br />
While swinish merchants, snout in trough<br />
Drink all the bloody profits off!</p>
