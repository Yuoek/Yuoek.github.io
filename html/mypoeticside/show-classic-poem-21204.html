<h1 class="title-poem">The Young Soldier</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/Wilfred-owen.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wilfred Owen</h2>
<p>It is not death<br />
Without hereafter<br />
To one in dearth<br />
Of life and its laughter,<br />
<br />
Nor the sweet murder<br />
Dealt slow and even<br />
Unto the martyr<br />
Smiling at heaven:<br />
<br />
It is the smile<br />
Faint as a (waning) myth,<br />
Faint, and exceeding small<br />
On a boy's murdered mouth.</p>
