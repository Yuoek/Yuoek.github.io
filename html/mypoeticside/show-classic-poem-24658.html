<h1 class="title-poem">Ch 03 On The Excellence Of Contentment Story 09</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>A sick man having been asked what his heart desired replied: ‘That it may not desire anything.’<br />
<br />
             When the bowels are full and the belly pains  <br />
             There is no use in all other things being right.</p>
