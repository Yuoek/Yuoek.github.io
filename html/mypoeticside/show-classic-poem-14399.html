<h1 class="title-poem">A Song of the Palace.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>Her tears are spent, but no dreams come.<br />
She can hear the others singing through the night.<br />
She has lost his love. Alone with her beauty,<br />
She leans till dawn on her incense-pillow.</p>
