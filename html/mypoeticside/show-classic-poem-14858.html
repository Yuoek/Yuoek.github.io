<h1 class="title-poem">Bo-beh-o-bi Sang The Lips</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/Velimir-Khlebnikov.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Velimir Khlebnikov</h2>
<p>Bo-beh-o-bi, sang the lips,<br />
Veh-eh-o-mi, sang the glances,<br />
Pi-eh-eh-o, sang the brows,<br />
Li-eh-eh-ey, sang the visage,<br />
Gzi-gzi-gzeh-o, sang the chain.<br />
Thus on a canvas of some correspondences<br />
Beyond dimension lived the face.</p>
