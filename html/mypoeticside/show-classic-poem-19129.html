<h1 class="title-poem">Song in the Songless</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/George-Meredith.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">George Meredith</h2>
<p>They have no song, the sedges dry,<br />
        And still they sing.<br />
    It is within my breast they sing,<br />
        As I pass by.<br />
    Within my breast they touch a string,<br />
        They wake a sigh.<br />
    There is but sound of sedges dry;<br />
        In me they sing.</p>
