<h1 class="title-poem">Two—were immortal twice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>800<br />
<br />
Two—were immortal twice—<br />
The privilege of few—<br />
Eternity—obtained—in Time—<br />
Reversed Divinity—<br />
<br />
That our ignoble Eyes<br />
The quality conceive<br />
Of Paradise superlative—<br />
Through their Comparative.</p>
