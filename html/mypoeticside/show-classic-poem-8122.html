<h1 class="title-poem">This was in the White of the Year</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>995<br />
<br />
This was in the White of the Year—<br />
That—was in the Green—<br />
Drifts were as difficult then to think<br />
As Daisies now to be seen—<br />
<br />
Looking back is best that is left<br />
Or if it be—before—<br />
Retrospection is Prospect's half,<br />
Sometimes, almost more.</p>
