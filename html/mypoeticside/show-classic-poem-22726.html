<h1 class="title-poem">Statement of Being</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>I am a grave poetic hen<br />
That lays poetic eggs<br />
And to enhance my temperament<br />
A little quiet begs.<br />
<br />
We make the yolk philosophy,<br />
True beauty the albumen.<br />
And then gum on a shell of form<br />
To make the screed sound human.</p>
