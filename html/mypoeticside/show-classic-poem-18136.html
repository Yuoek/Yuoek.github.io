<h1 class="title-poem">Firelight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Katherine-Mansfield.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Katherine Mansfield</h2>
<p>Playing in the fire and twilight together,<br />
My little son and I,<br />
Suddenly--woefully--I stoop to catch him.<br />
"Try, mother, try!"<br />
<br />
Old Nurse Silence lifts a silent finger:<br />
"Hush! cease your play!"<br />
What happened?  What in that tiny moment<br />
Flew away?</p>
