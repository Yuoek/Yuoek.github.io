                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Walter-Scott.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Walter Scott</h2>
<p>Sound, sound the clarion, fill the fife!  <br />
 To all the sensual world proclaim,  <br />
One crowded hour of glorious life  <br />
 Is worth an age without a name.</p>
