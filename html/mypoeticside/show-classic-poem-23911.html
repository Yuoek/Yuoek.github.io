<h1 class="title-poem">Baby Lies So Fast Asleep</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Baby lies so fast asleep<br />
That we cannot wake her:<br />
Will the angels clad in white<br />
Fly from heaven to take her?<br />
Baby lies so fast asleep<br />
That no pain can grieve her;<br />
Put a snowdrop in her hand,<br />
Kiss her once and leave her.</p>
