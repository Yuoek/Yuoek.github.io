<h1 class="title-poem">Papa above!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>61<br />
<br />
Papa above!<br />
Regard a Mouse<br />
O'erpowered by the Cat!<br />
Reserve within thy kingdom<br />
A "Mansion" for the Rat!<br />
<br />
Snug in seraphic Cupboards<br />
To nibble all the day<br />
While unsuspecting Cycles<br />
Wheel solemnly away!</p>
