<h1 class="title-poem">So Live, So Love, So Use That Fragile Hour</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>SO live, so love, so use that fragile hour,<br />
That when the dark hand of the shining power<br />
Shall one from other, wife or husband, take,<br />
The poor survivor may not weep and wake.</p>
