<h1 class="title-poem">The Jewel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/jameswright.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Wright</h2>
<p>There is this cave<br />
In the air behind my body<br />
That nobody is going to touch:<br />
A cloister, a silence<br />
Closing around a blossom of fire.<br />
When I stand upright in the wind,<br />
My bones turn to dark emeralds.</p>
