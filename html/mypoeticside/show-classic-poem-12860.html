<h1 class="title-poem">To Music</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Begin to charm, and as thou strok'st mine ears<br />
With thine enchantment, melt me into tears.<br />
Then let thy active hand scud o'er thy lyre,<br />
And make my spirits frantic with the fire;<br />
That done, sink down into a silvery strain,<br />
And make me smooth as balm and oil again.</p>
