<h1 class="title-poem">Halcyon Days</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/lovecraft.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">H.P. Lovecraft</h2>
<p>Once more the ancient feast returns,<br />
And the bright hearth domestic burns<br />
  With Yuletide's added blaze;<br />
So, too, may all your joys increase<br />
Midst floods of mem'ry, love, and peace,<br />
  And dreams of Halcyon days.</p>
