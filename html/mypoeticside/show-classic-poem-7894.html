<h1 class="title-poem">Experience is the Angled Road</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>910<br />
<br />
Experience is the Angled Road<br />
Preferred against the Mind<br />
By—Paradox—the Mind itself—<br />
Presuming it to lead<br />
<br />
Quite Opposite—How Complicate<br />
The Discipline of Man—<br />
Compelling Him to Choose Himself<br />
His Preappointed Pain—</p>
