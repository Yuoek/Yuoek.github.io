<h1 class="title-poem">Fairy Land IV</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/william-shakespeare.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Shakespeare</h2>
<p>WHERE the bee sucks, there suck I:<br />
In a cowslip's bell I lie;<br />
There I couch when owls do cry.<br />
On the bat's back I do fly<br />
After summer merrily:<br />
   Merrily, merrily, shall I live now,<br />
   Under the blossom that hangs on the bough.</p>
