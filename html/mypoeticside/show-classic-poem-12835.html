<h1 class="title-poem">Up Scoble</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Scobble for whoredom whips his wife and cries<br />
He'll slit her nose; but blubbering she replies,<br />
"Good sir, make no more cuts i' th' outward skin,<br />
One slit's enough to let adultery in.</p>
