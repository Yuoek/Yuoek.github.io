<h1 class="title-poem">Five Little Toes In The Morning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ellawhe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ella Wheeler Wilcox</h2>
<p>This little toe is hungry--<br />
This little toe is too,<br />
This toe lies abed like a sleepy head,<br />
And this toe cries "Boo-hoo."<br />
This toe big and tall is the smartest of all<br />
For he pops into stocking and shoe.</p>
