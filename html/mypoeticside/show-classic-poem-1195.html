<h1 class="title-poem">When You Come</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/04/Maya.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Maya Angelou</h2>
<p>When you come to me, unbidden, <br />
Beckoning me <br />
To long-ago rooms, <br />
Where memories lie. <br />
<br />
Offering me, as to a child, an attic, <br />
Gatherings of days too few. <br />
Baubles of stolen kisses. <br />
Trinkets of borrowed loves. <br />
Trunks of secret words, <br />
<br />
I CRY.</p>
