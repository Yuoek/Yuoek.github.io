<h1 class="title-poem">To Reformers in Despair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Vachel-Lindsay.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vachel Lindsay</h2>
<p>'Tis not too late to build our young land right,<br />
Cleaner than Holland, courtlier than Japan,<br />
Devout like early Rome, with hearths like hers,<br />
Hearths that will recreate the breed called man.</p>
