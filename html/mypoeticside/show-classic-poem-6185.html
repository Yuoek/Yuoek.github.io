<h1 class="title-poem">The Butterfly</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>Butterfly,<br />
I like the way you wear your wings.<br />
Show me their colors,<br />
for the light is going.<br />
Spread out their edges of gold,<br />
before the Sandman puts me to sleep<br />
and evening murmurs by.</p>
