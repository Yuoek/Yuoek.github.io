<h1 class="title-poem">What's the Railroad to Me?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Thoreau.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry David Thoreau</h2>
<p>What's the railroad to me?<br />
I never go to see<br />
Where it ends.<br />
It fills a few hollows,<br />
And makes banks for the swallows,<br />
It sets the sand a-blowing,<br />
And the blackberries a-growing.</p>
