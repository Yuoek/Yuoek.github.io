<h1 class="title-poem">If The Moon Came From Heaven</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>If the moon came from heaven,<br />
Talking all the way,<br />
What could she have to tell us,<br />
And what could she say?<br />
‘I've seen a hundred pretty things,<br />
And seen a hundred gay;<br />
But only think: I peep by night<br />
And do not peep by day!’</p>
