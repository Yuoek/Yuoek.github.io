<h1 class="title-poem">Late, by Myself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Late, by myself, in the boat of myself,<br />
no light and no land anywhere,<br />
cloudcover thick. I try to stay<br />
just above the surface,<br />
yet I'm already under<br />
and living with the ocean</p>
