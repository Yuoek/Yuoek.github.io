<h1 class="title-poem">Dialogue</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Nizar.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nizar Qabbani</h2>
<p>Do not say my love was<br />
A ring or a bracelet.<br />
My love is a siege,<br />
Is the daring and headstrong.<br />
Who, searching sail out to their death.<br />
<br />
Do not say my love was<br />
A moon.<br />
My love is a burst of sparks.</p>
