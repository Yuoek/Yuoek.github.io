<h1 class="title-poem">For Him I Sing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>FOR him I sing,<br />
I raise the Present on the Past,<br />
(As some perennial tree, out of its roots, the present on the past<br />
With time and space I him dilate--and fuse the immortal laws,<br />
To make himself, by them, the law unto himself.</p>
