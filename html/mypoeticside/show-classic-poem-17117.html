<h1 class="title-poem">There Was a Little Girl</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/longfellow.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Wadsworth Longfellow</h2>
<p>There was a little girl,<br />
    Who had a little curl,<br />
Right in the middle of her forehead.<br />
    When she was good,<br />
    She was very good indeed.</p>
