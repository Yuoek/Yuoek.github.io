<h1 class="title-poem">The Ant</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>The ant has made herself illustrious<br />
By constant industry industrious.<br />
So what? Would you be calm and placid<br />
If you were full of formic acid?</p>
