<h1 class="title-poem">A Patch of Old Snow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>There's a patch of old snow in a corner<br />
That I should have guessed<br />
Was a blow-away paper the rain<br />
Had brought to rest.<br />
<br />
It is speckled with grime as if<br />
Small print overspread it,<br />
The news of a day I've forgotten --<br />
If I ever read it.</p>
