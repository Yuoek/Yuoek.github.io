<h1 class="title-poem">Barcarola (#2)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Dante-Gabriel-Rossetti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dante Gabriel Rossetti</h2>
<p>OLTRE tomba<br />
Qualche cosa?<br />
E che ne dici?<br />
Saremo felici?<br />
Terra mai posa,<br />
E mar rimbomba.</p>
