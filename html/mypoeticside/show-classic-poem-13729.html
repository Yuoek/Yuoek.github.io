<h1 class="title-poem">Picking Flowers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Ho-Xuan-Huong.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ho Xuan Huong</h2>
<p>If you want to pick flowers, you have to hike.<br />
Climbing up, don't worry about your weary bones.<br />
Pluck the low branches, pull down the high.<br />
Enjoy alike the spent blossoms, the tight buds.</p>
