<h1 class="title-poem">Poplars</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>The poplars bow forward and back;<br />
They are like a fan waving very softly.<br />
They tremble,<br />
For they love the wind in their feathery branches.<br />
They love to look down at the shallows,<br />
At the mermaids<br />
On the sandy shore;<br />
They love to look into morning's face<br />
Cool in the water.</p>
