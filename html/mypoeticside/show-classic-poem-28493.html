<h1 class="title-poem">Early In The Morning I Hear On Your Piano</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>EARLY in the morning I hear on your piano<br />
You (at least, I guess it's you) proceed to learn to play.<br />
Mostly little minds should take and tackle their piano<br />
While the birds are singing in the morning of the day.</p>
