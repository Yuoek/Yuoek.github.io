<h1 class="title-poem">The Pacifist</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>Pale Ebenezer thought it wrong to fight,<br />
But Roaring Bill (who killed him) thought it right.</p>
