<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url();background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Crawford</h2>
<p>LOVE, love me only,  <br />
 Love me for ever;  <br />
My life’s been lonely,  <br />
 A joyless endeavour.  <br />
Though earth were heaven,          <br />
 I in it for ever,  <br />
Of thee bereaven—  <br />
 I’d love again never.</p>
