<h1 class="title-poem">On His Lady Denys</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/07/strode.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Strode</h2>
<p>Denys hath merited no slender praise,<br />
In that She well supplied the Formers daies.<br />
Conceive how Good she was, whose very worst<br />
Unto her Knight was This, that She dyed First.</p>
