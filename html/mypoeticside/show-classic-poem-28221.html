<h1 class="title-poem">Of F.W.H.M. to One that Smokes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/07/JKS.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Kenneth Stephen</h2>
<p>Spare us the hint of slightest desecration,<br />
        Spotless preserve us an untainted shrine;<br />
    Not for thy sake, oh goddess of creation,<br />
        Not for thy sake, oh woman, but for mine.</p>
