<h1 class="title-poem">There was a Young Lady Whose Eyes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>There was a young lady whose eyes,<br />
were unique as to colour and size;<br />
When she opened them wide,<br />
people all turned aside,<br />
and started away in surprise.</p>
