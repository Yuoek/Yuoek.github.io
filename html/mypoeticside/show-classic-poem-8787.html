<h1 class="title-poem">Delight becomes pictorial</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Delight becomes pictorial<br />
When viewed through pain,--<br />
More fair, because impossible<br />
That any gain.<br />
<br />
The mountain at a given distance<br />
In amber lies;<br />
Approached, the amber flits a little,--<br />
And that's the skies!</p>
