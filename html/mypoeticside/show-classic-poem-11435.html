<h1 class="title-poem">Royal Prayer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>HA, I am the lord of earth! The noble,<br />
<br />
Who're in my service, love me.<br />
Ha, I am the lord of earth! The noble,<br />
<br />
O'er whom my sway extendeth, love I.<br />
Oh, grant me, God in Heaven, that I may ne'er<br />
<br />
Dispense with loftiness and love!</p>
