<h1 class="title-poem">When Hope but made Tranquillity be felt (fragment)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/coleridge.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel Taylor Coleridge</h2>
<p>When Hope but made Tranquillity be felt--<br />
   A Flight of Hopes for ever on the wing<br />
   But made Tranquillity a conscious Thing--<br />
   And wheeling round and round in sportive coil<br />
   Fann'd the calm air upon the brow of Toil--</p>
