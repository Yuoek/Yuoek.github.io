<h1 class="title-poem">Halfway Down</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/aamilne.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alan Alexander Milne</h2>
<p>Halfway down the stairs<br />
is a stair<br />
where i sit.<br />
there isn't any<br />
other stair<br />
quite like<br />
it.<br />
i'm not at the bottom,<br />
i'm not at the top;<br />
so this is the stair<br />
where<br />
I always<br />
stop.</p>
