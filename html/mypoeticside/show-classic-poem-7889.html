<h1 class="title-poem">Each Second is the last</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>879<br />
<br />
Each Second is the last<br />
Perhaps, recalls the Man<br />
Just measuring unconsciousness<br />
The Sea and Spar between.<br />
<br />
To fail within a Chance—<br />
How terribler a thing<br />
Than perish from the Chance's list<br />
Before the Perishing!</p>
