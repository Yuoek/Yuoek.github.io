<h1 class="title-poem">Upon Julia's Ribbon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>As shews the air when with a rain-bow graced,<br />
So smiles that ribbon 'bout my Julia's waist;<br />
Or like----Nay, 'tis that Zonulet of love,<br />
Wherein all pleasures of the world are wove.</p>
