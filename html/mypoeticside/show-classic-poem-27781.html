<h1 class="title-poem">Conviction (IV)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>I like to get off with people,<br />
I like to lie in their arms<br />
I like to be held and lightly kissed,<br />
Safe from all alarms.<br />
<br />
I like to laugh and be happy<br />
With a beautiful kiss,<br />
I tell you, in all the world<br />
There is no bliss like this.</p>
