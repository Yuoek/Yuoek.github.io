<h1 class="title-poem">"Me from Myself—to banish"</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>642<br />
<br />
Me from Myself—to banish—<br />
Had I Art—<br />
Impregnable my Fortress<br />
Unto All Heart—<br />
<br />
But since Myself—assault Me—<br />
How have I peace<br />
Except by subjugating<br />
Consciousness?<br />
<br />
And since We're mutual Monarch<br />
How this be<br />
Except by Abdication—<br />
Me—of Me?</p>
