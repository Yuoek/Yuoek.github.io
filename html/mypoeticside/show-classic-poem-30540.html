<h1 class="title-poem">Riches</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I have no riches but my thoughts,<br />
Yet these are wealth enough for me;<br />
My thoughts of you are golden coins<br />
Stamped in the mint of memory;<br />
<br />
And I must spend them all in song,<br />
For thoughts, as well as gold, must be<br />
Left on the hither side of death<br />
To gain their immortality.</p>
