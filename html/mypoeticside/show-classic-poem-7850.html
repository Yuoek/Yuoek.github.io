<h1 class="title-poem">And this of all my Hopes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>913<br />
<br />
And this of all my Hopes<br />
This, is the silent end<br />
Bountiful colored, my Morning rose<br />
Early and sere, its end<br />
<br />
Never Bud from a Stem<br />
Stepped with so gay a Foot<br />
Never a Worm so confident<br />
Bored at so brave a Root</p>
