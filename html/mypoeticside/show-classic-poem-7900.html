<h1 class="title-poem">Finite—to fail, but infinite to Venture</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>847<br />
<br />
Finite—to fail, but infinite to Venture—<br />
For the one ship that struts the shore<br />
Many's the gallant—overwhelmed Creature<br />
Nodding in Navies nevermore—</p>
