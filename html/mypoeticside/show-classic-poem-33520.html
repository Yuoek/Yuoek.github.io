<h1 class="title-poem">What Am I After All</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>What am I after all but a child, pleas`d with the sound of my own name? repeating it over and over;<br />
I stand apart to hear - it never tires me.<br />
<br />
To you your name also;<br />
Did you think there was nothing but two or three<br />
pronunciations in the sound of your name?</p>
