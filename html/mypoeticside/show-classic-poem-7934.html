<h1 class="title-poem">I made slow Riches but my Gain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>843<br />
<br />
I made slow Riches but my Gain<br />
Was steady as the Sun<br />
And every Night, it numbered more<br />
Than the preceding One<br />
<br />
All Days, I did not earn the same<br />
But my perceiveless Gain<br />
Inferred the less by Growing than<br />
The Sum that it had grown.</p>
