<h1 class="title-poem">Wolfe demanded during dying</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>678<br />
<br />
Wolfe demanded during dying<br />
"Which obtain the Day"?<br />
"General, the British"—"Easy"<br />
Answered Wolfe "to die"<br />
<br />
Montcalm, his opposing Spirit<br />
Rendered with a smile<br />
"Sweet" said he "my own Surrender<br />
Liberty's beguile"</p>
