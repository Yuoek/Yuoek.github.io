<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 71</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>The Most High sees a fault and conceals it, and a neighbour sees it not, but shouts.<br />
<br />
           Let us take refuge with Allah.  <br />
           If people knew our faults  <br />
           No one could have rest from interference by others.</p>
