<h1 class="title-poem">With Whom is no Variableness, Neither Shadow of Turning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/arthur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Arthur Hugh Clough</h2>
<p>It fortifies my soul to know<br />
   That, though I perish, Truth is so:<br />
   That, howsoe'er I stray and range,<br />
   Whate'er I do, Thou dost not change.<br />
   I steadier step when I recall<br />
   That, if I slip, Thou dost not fall.</p>
