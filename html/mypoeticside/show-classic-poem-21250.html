<h1 class="title-poem">Pictures In The Smoke</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Oh, gallant was the first love, and glittering and fine;<br />
The second love was water, in a clear white cup;<br />
The third love was his, and the fourth was mine;<br />
And after that, I always get them all mixed up.</p>
