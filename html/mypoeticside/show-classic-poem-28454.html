<h1 class="title-poem">To Friends At Home</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/robert-louis-stevenson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Louis Stevenson</h2>
<p>TO friends at home, the lone, the admired, the lost<br />
The gracious old, the lovely young, to May<br />
The fair, December the beloved,<br />
These from my blue horizon and green isles,<br />
These from this pinnacle of distances I,<br />
The unforgetful, dedicate.</p>
