<h1 class="title-poem">Conversion</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Jean-Toomer.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jean Toomer</h2>
<p>African Guardian of Souls,<br />
Drunk with rum,<br />
Feasting on strange cassava,<br />
Yielding to new words and a weak palabra<br />
Of a white-faced sardonic god--<br />
Grins, cries<br />
Amen,<br />
Shouts hosanna.</p>
