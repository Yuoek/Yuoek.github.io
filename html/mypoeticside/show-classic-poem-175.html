<h1 class="title-poem">Rus. Vs. Urbs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/01/FPA.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Franklin P. Adams</h2>
<p>Whenever the penner of this pome <br />
Regards a lovely country home, <br />
He sighs, in words not insincere, <br />
"I think I'd like to live out here."<br />
<br />
And when the builder of this ditty <br />
Returns to this pulsating city, <br />
The perpetrator of this pome <br />
Yearns for a lovely country home.</p>
