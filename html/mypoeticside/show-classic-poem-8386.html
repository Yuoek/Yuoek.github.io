<h1 class="title-poem">So glad we are—a Stranger'd deem</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>329<br />
<br />
So glad we are—a Stranger'd deem<br />
'Twas sorry, that we were—<br />
For where the Holiday should be<br />
There publishes a Tear—<br />
Nor how Ourselves be justified—<br />
Since Grief and Joy are done<br />
So similar—An Optizan<br />
Could not decide between—</p>
