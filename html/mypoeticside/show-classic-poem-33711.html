<h1 class="title-poem">Thought</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>OF obedience, faith, adhesiveness;<br />
As I stand aloof and look, there is to me something profoundly<br />
        affecting in large masses of men, following the lead of those<br />
        who do not believe in men.</p>
