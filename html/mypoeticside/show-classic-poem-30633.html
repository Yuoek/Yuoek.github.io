<h1 class="title-poem">The Eagle (A Fragment )</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/Alfred-Lord-Tennyson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alfred Lord Tennyson</h2>
<p>He clasps the crag with crooked hands;<br />
Close to the sun in lonely lands,<br />
Ring'd with the azure world, he stands.<br />
<br />
The wrinkled sea beneath him crawls;<br />
He watches from his mountain walls,<br />
And like a thunderbolt he falls.</p>
