<h1 class="title-poem">I Have A Little Husband</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>I have a little husband<br />
And he is gone to sea,<br />
The winds that whistle round his ship<br />
Fly home to me.<br />
The winds that sigh about me<br />
Return again to him;<br />
So I would fly, if only I<br />
Were light of limb.</p>
