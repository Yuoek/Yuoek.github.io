<h1 class="title-poem">Upon A Maid</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Here she lies, in bed of spice,<br />
Fair as Eve in paradise;<br />
For her beauty, it was such,<br />
Poets could not praise too much.<br />
Virgins come, and in a ring<br />
Her supremest REQUIEM sing;<br />
Then depart, but see ye tread<br />
Lightly, lightly o'er the dead.</p>
