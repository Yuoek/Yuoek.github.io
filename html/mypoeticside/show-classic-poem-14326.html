<h1 class="title-poem">Rain Has Fallen All the Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>Rain has fallen all the day.<br />
O come among the laden trees:<br />
The leaves lie thick upon the way<br />
Of memories.<br />
<br />
Staying a little by the way<br />
Of memories shall we depart.<br />
Come, my beloved, where I may<br />
Speak to your heart.</p>
