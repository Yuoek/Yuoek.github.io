<h1 class="title-poem">Exeat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ESPW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Stuart Phelps Ward</h2>
<p>To the hope that he has taught,<br />
To the beauty he has wrought,<br />
To the comfort he has been;<br />
To the dream that poets tell,<br />
To the land where Gabriel<br />
Can not lose Evangeline;--<br />
Hush! let him go.</p>
