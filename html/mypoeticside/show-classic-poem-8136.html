<h1 class="title-poem">To this World she returned</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>830<br />
<br />
To this World she returned.<br />
But with a tinge of that—<br />
A Compound manner,<br />
As a Sod<br />
Espoused a Violet,<br />
That chiefer to the Skies<br />
Than to himself, allied,<br />
Dwelt hesitating, half of Dust,<br />
And half of Day, the Bride.</p>
