<h1 class="title-poem">Alter! When the Hills do</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>729<br />
<br />
Alter! When the Hills do—<br />
Falter! When the Sun<br />
Question if His Glory<br />
Be the Perfect One—<br />
<br />
Surfeit! When the Daffodil<br />
Doth of the Dew—<br />
Even as Herself—Sir—<br />
I will—of You—</p>
