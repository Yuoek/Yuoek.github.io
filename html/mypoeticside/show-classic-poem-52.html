<h1 class="title-poem">Sounding Board</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/gerrit.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gerrit Achterberg</h2>
<p>Against the sounding board of the night<br />
your words still move.<br />
Everything that you have said<br />
remains alive in the sound of chords<br />
that I encounter only in darkness<br />
when the silences hear<br />
that have been put up between us.</p>
