<h1 class="title-poem">Self-Abandonment</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>I sat srinking and did not notice the dusk,<br />
Till falling petals filled the folds of my dress.<br />
Drunken I rose and walked to the moonlit stream;<br />
The birds were gone, and men also few.</p>
