<h1 class="title-poem">The Blues</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>When the shoe strings break<br />
On both your shoes<br />
And you're in a hurry-<br />
That's the blues.<br />
<br />
When you go to buy a candy bar<br />
And you've lost the dime you had-<br />
Slipped through a hole in your pocket somewhere-<br />
That's the blues, too, and bad!</p>
