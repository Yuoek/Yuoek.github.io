<h1 class="title-poem">Minnie Bakes Oaten Cakes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Minnie bakes oaten cakes,<br />
Minnie brews ale,<br />
All because her Johnny's coming<br />
Home from sea.<br />
And she glows like a rose<br />
Who was so pale,<br />
And ‘Are you sure the church clock goes?’<br />
Says she.</p>
