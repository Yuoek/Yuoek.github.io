<h1 class="title-poem">Love's Last Resource</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Since nought avails let me rise and leave,<br />
Though down the way of swords I wounded crawl;<br />
Perchance I shall attain to touch her sleeve,<br />
And surely on her threshold dying fall.</p>
