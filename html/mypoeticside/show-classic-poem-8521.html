<h1 class="title-poem">"As if I asked a common Alms"</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>323<br />
<br />
As if I asked a common Alms,<br />
And in my wondering hand<br />
A Stranger pressed a Kingdom,<br />
And I, bewildered, stand—<br />
As if I asked the Orient<br />
Had it for me a Morn—<br />
And it should lift its purple Dikes,<br />
And shatter me with Dawn!</p>
