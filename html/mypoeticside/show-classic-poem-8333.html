<h1 class="title-poem">Mute thy Coronation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>151<br />
<br />
Mute thy Coronation—<br />
Meek my Vive le roi,<br />
Fold a tiny courtier<br />
In thine Ermine, Sir,<br />
There to rest revering<br />
Till the pageant by,<br />
I can murmur broken,<br />
Master, It was I—</p>
