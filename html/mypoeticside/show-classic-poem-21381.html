<h1 class="title-poem">Autumn Valentine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>In May my heart was breaking-<br />
 Oh, wide the wound, and deep!<br />
And bitter it beat at waking,<br />
 And sore it split in sleep.<br />
<br />
And when it came November,<br />
 I sought my heart, and sighed,<br />
"Poor thing, do you remember?"<br />
 "What heart was that?" it cried.</p>
