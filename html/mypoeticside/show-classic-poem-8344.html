<h1 class="title-poem">New feet within my garden go</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>99<br />
<br />
New feet within my garden go—<br />
New fingers stir the sod—<br />
A Troubadour upon the Elm<br />
Betrays the solitude.<br />
<br />
New children play upon the green—<br />
New Weary sleep below—<br />
And still the pensive Spring returns—<br />
And still the punctual snow!</p>
