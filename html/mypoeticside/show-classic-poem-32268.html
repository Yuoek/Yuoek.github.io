<h1 class="title-poem">To One Married to an Old Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Edmund-Waller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edmund Waller</h2>
<p>Since thou wouldst needs,<br />
Bewitched with some ill charms,<br />
Be buried in those monumental arms,<br />
All we can wish is, may that earth lie light<br />
Upon thy tender limbs, and so goodnight.</p>
