<h1 class="title-poem">Un Grand Sommeil Noir</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/paulv.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Verlaine</h2>
<p>Un grand sommeil noir<br />
Tombe sur ma vie:<br />
Dormez, tout espoir,<br />
Dormez, toute envie!<br />
<br />
Je ne vois plus rien,<br />
Je perds la mémoire<br />
Du mal et du bien...<br />
O la triste histoire!<br />
<br />
Je suis un berceau<br />
Qu'une main balance<br />
Au creux d'un caveau:<br />
Silence, silence!</p>
