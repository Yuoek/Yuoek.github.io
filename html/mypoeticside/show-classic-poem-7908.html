<h1 class="title-poem">Gratitude—is not the mention</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>989<br />
<br />
Gratitude—is not the mention<br />
Of a Tenderness,<br />
But its still appreciation<br />
Out of Plumb of Speech.<br />
<br />
When the Sea return no Answer<br />
By the Line and Lead<br />
Proves it there's no Sea, or rather<br />
A remoter Bed?</p>
