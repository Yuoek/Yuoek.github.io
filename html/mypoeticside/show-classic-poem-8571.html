<h1 class="title-poem">At last, to be identified!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>174<br />
<br />
At last, to be identified!<br />
At last, the lamps upon thy side<br />
The rest of Life to see!<br />
<br />
Past Midnight! Past the Morning Star!<br />
Past Sunrise!<br />
Ah, What leagues there were<br />
Between our feet, and Day!</p>
