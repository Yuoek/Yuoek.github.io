<h1 class="title-poem">Our Boat Starts At Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Ch'ing Chao</h2>
<p>Our boat starts at night<br />
from the beach of Yen Kuang.<br />
<br />
Great ships sail only for profit<br />
Only small boats come here because of your fame.<br />
The passers-by are embarrassed by your virtue.<br />
So in the night we steal by the place where you used to fish.</p>
