<h1 class="title-poem">To Be Written on the Mirror in Whitewash</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/bishop.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Bishop</h2>
<p>I live only here, between your eyes and you,<br />
But I live in your world. What do I do?<br />
--Collect no interest--otherwise what I can;<br />
Above all I am not that staring man.</p>
