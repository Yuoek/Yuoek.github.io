<h1 class="title-poem">Apparently with no Surprise</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Apparently with no surprise,<br />
       To any happy flower,<br />
       The frost beheads it at its play,<br />
       In accidental power.<br />
       The blond assassin passes on.<br />
       The sun proceeds unmoved,<br />
       To measure off another day,<br />
       For an approving God.</p>
