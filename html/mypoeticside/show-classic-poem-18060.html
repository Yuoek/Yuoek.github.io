<h1 class="title-poem">Rome</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/11/osip.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Osip Mandelstam</h2>
<p>Rome is but nature's twin, which has reflected Rome.<br />
We see its civic might, the signs of its decorum<br />
In the transparent air, the firmament's blue dome,<br />
The colonnades of groves and in the meadow's forum.</p>
