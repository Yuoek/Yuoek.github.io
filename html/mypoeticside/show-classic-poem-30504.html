<h1 class="title-poem">Joy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I am wild, I will sing to the trees,<br />
I will sing to the stars in the sky,<br />
I love, I am loved, he is mine,<br />
Now at last I can die!<br />
<br />
I am sandaled with wind and with flame,<br />
I have heart-fire and singing to give,<br />
I can tread on the grass or the stars,<br />
Now at last I can live!</p>
