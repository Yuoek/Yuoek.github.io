<h1 class="title-poem">Sweet Maid</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/gal-004a1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bhartrihari</h2>
<p>Sweet maid, you perform a singular feat<br />
                  With the archer's bow.<br />
                  You pierce hearts without arrows,<br />
                  But with strands of your beauty.</p>
