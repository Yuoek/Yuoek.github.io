<h1 class="title-poem">"In a dream, I saw a wedding..."</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Konstantin-Simonov.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Konstantin Simonov</h2>
<p>In a dream, I saw a wedding<br />
And I think the bride was you.<br />
You the bride and I a beggar<br />
At the porch - it may be true!<br />
<br />
Let it happen as I dreamed it!<br />
Only promise, as you stand<br />
At the porch, to have the kindness -<br />
Put no alms into my hand!</p>
