<h1 class="title-poem">Chaucer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/jeph.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sydney Wheeler Jephcott</h2>
<p>O gracious morning eglantine,<br />
Making the far old English ways divine!<br />
Though from thy stock our mateless rose was bred,<br />
Staining the world's skies with its red,<br />
Our garden gives no scent so fresh as thine,<br />
Sweet, thorny-seeming eglantine.</p>
