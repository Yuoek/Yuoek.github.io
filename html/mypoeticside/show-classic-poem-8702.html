<h1 class="title-poem">I never lost as much but twice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>49<br />
<br />
I never lost as much but twice,<br />
And that was in the sod.<br />
Twice have I stood a beggar<br />
Before the door of God!<br />
<br />
Angels—twice descending<br />
Reimbursed my store—<br />
Burglar! Banker—Father!<br />
I am poor once more!</p>
