<h1 class="title-poem">Captives</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Ernest-Hemingway.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ernest Hemingway</h2>
<p>Some came in chains<br />
Unrepentant but tired.<br />
Too tired but to stumble.<br />
Thinking and hating were finished<br />
Thinking and fighting were finished<br />
Retreating and hoping were finished.<br />
Cures thus a long campaign,<br />
Making death easy.</p>
