<h1 class="title-poem">Luck</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>once<br />
we were young<br />
at this<br />
machine. . .<br />
drinking<br />
smoking<br />
typing<br />
it was a most<br />
splendid<br />
miraculous<br />
time<br />
still<br />
is<br />
only now<br />
instead of<br />
moving toward<br />
time<br />
it<br />
moves toward<br />
us<br />
makes each word<br />
drill<br />
into the<br />
paper<br />
clear<br />
fast<br />
hard<br />
feeding a<br />
closing<br />
space.</p>
