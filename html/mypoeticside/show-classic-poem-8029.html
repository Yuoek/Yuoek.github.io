<h1 class="title-poem">Strong Draughts of Their Refreshing Minds</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>711<br />
<br />
Strong Draughts of Their Refreshing Minds<br />
To drink—enables Mine<br />
Through Desert or the Wilderness<br />
As bore it Sealed Wine—<br />
<br />
To go elastic—Or as One<br />
The Camel's trait—attained—<br />
How powerful the Stimulus<br />
Of an Hermetic Mind—</p>
