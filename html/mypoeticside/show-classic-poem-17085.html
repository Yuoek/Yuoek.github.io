<h1 class="title-poem">The Poet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/haniel.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Haniel Long</h2>
<p>I take what never can be taken,<br />
Touch what cannot be;<br />
I wake what never could awaken,<br />
But for me.<br />
<br />
I go where only winds are going,<br />
Kiss what fades away;<br />
I know a thing too strange for knowing,<br />
I, the clay.</p>
