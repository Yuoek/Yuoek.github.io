<h1 class="title-poem">Yellow Blight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Cemal Sureya</h2>
<p>My breath is a red bird<br />
In the auburn skies of your hair<br />
When I embrace you<br />
Your legs grow long beyond words<br />
<br />
My breath becomes a red horse<br />
I can tell from my burning cheeks<br />
We are destitute, our nights are snort<br />
Let's make love at full tilt</p>
