<h1 class="title-poem">A throe upon the features</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>71<br />
<br />
A throe upon the features—<br />
A hurry in the breath—<br />
An ecstasy of parting<br />
Denominated "Death"—<br />
<br />
An anguish at the mention<br />
Which when to patience grown,<br />
I've known permission given<br />
To rejoin its own.</p>
