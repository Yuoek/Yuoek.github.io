                    <h2 class="title-content">Richard Lovelace</h2>
<p>OUT OF THE ANTHOLOGIE.<br />
<br />
<<br />
  Daknomenos, lexas ouk eti me blepete.>><br />
<br />
            IN AN ENGLISH DISTICK.<br />
<br />
A fool, much bit by fleas, put out the light;<br />
You shall not see me now (quoth he); good night.</p>
