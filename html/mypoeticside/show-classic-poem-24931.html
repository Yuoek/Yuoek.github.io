<h1 class="title-poem">Hydrangeas</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Dragoons, I tell you the white hydrangeas<br />
    turn rust and go soon.<br />
Already mid September a line of brown runs<br />
    over them.<br />
One sunset after another tracks the faces, the<br />
    petals.<br />
Waiting, they look over the fence for what<br />
    way they go.</p>
