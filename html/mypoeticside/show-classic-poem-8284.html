<h1 class="title-poem">In rags mysterious as these</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>117<br />
<br />
In rags mysterious as these<br />
The shining Courtiers go—<br />
Veiling the purple, and the plumes—<br />
Veiling the ermine so.<br />
<br />
Smiling, as they request an alms—<br />
At some imposing door!<br />
Smiling when we walk barefoot<br />
Upon their golden floor!</p>
