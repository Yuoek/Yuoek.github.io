<h1 class="title-poem">Stone Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/gerrit.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gerrit Achterberg</h2>
<p>Words going backwards<br />
are on their way to you:<br />
so that you may hear<br />
your ears are gone.<br />
<br />
Sentences inside out<br />
because your knowing is gone.<br />
Song to surround you<br />
stone against stone.</p>
