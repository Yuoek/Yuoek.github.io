<h1 class="title-poem">Oppression</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>Now dreams<br />
Are not available<br />
To the dreamers,<br />
Nor songs<br />
To the singers.<br />
<br />
In some lands<br />
Dark night<br />
And  cold steel<br />
Prevail<br />
But the dream<br />
Will come back,<br />
And the song<br />
Break<br />
Its jail.</p>
