<h1 class="title-poem">The Red—Blaze—is the Morning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>469<br />
<br />
The Red—Blaze—is the Morning—<br />
The Violet—is Noon—<br />
The Yellow—Day—is falling—<br />
And after that—is none—<br />
<br />
But Miles of Sparks—at Evening—<br />
Reveal the Width that burned—<br />
The Territory Argent—that<br />
Never yet—consumed—</p>
