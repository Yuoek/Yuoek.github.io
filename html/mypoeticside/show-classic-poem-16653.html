<h1 class="title-poem">There was an old person of Nice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>There was an old person of Nice,<br />
  Whose associates were usually Geese.<br />
  They walked out together, in all sorts of weather.<br />
  That affable person of Nice!</p>
