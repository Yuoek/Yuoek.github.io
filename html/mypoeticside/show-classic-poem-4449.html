<h1 class="title-poem">A Pitcher of Mignonette</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/07/HCB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Cuyler Bunner</h2>
<p>A pitcher of mignonette<br />
In a tenement's highest casement,—<br />
Queer sort of flower-pot—yet<br />
That pitcher of mignonette<br />
Is a garden in heaven set,<br />
To the little sick child in the basement—<br />
The pitcher of mignonette,<br />
In a tenement's highest casement.</p>
