<h1 class="title-poem">He who in Himself believes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>969<br />
<br />
He who in Himself believes—<br />
Fraud cannot presume—<br />
Faith is Constancy's Result—<br />
And assumes—from Home—<br />
<br />
Cannot perish, though it fail<br />
Every second time—<br />
But defaced Vicariously—<br />
For Some Other Shame—</p>
