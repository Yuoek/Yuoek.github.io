<h1 class="title-poem">The Purple Cow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Gelett-Burgess.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gelett Burgess</h2>
<p>I never saw a purple cow,<br />
      I never hope to see one;<br />
  But I can tell you, anyhow,<br />
      I'd rather see than be one!</p>
