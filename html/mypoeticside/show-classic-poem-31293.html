<h1 class="title-poem">The Black Knight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/09/JTOD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Todhunter</h2>
<p>1.<br />
<br />
    A beaten and a baffled man,<br />
        My life drags lamely day by day,<br />
    Too young to die, too old to plan,<br />
            In failure grey.<br />
<br />
<br />
2.<br />
<br />
    The knights ride east, the knights ride west,<br />
        For ladyes' tokens blithe of cheer,<br />
    Each bound upon some gallant quest;<br />
            While I rust here.</p>
