<h1 class="title-poem">The Golf Links</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/cleg.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sarah Norcliffe Cleghorn</h2>
<p>The golf links lie so near the mill<br />
That almost every day<br />
The laboring children can look out<br />
And see the men at play.</p>
