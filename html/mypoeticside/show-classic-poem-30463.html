<h1 class="title-poem">Gifts</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I gave my first love laughter,<br />
I gave my second tears,<br />
I gave my third love silence<br />
Thru all the years.<br />
<br />
My first love gave me singing,<br />
My second eyes to see,<br />
But oh, it was my third love<br />
Who gave my soul to me.</p>
