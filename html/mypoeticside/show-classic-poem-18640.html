<h1 class="title-poem">The Dead Master</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/johnm.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John McCrae</h2>
<p>Amid earth's vagrant noises, he caught the note sublime:<br />
To-day around him surges from the silences of Time<br />
A flood of nobler music, like a river deep and broad,<br />
Fit song for heroes gathered in the banquet-hall of God.</p>
