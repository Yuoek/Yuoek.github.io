<h1 class="title-poem">Little Hamlet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>Over you, over you, over,<br />
I hang like a wave, like a lover,<br />
Like a scimitar edged with hate;<br />
Too heavy with grief to be straight<br />
And far,<br />
Too frail to ever discover<br />
How to fall like a wave or a lover–<br />
Or a blue-thin scimitar.</p>
