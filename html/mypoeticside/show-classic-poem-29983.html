<h1 class="title-poem">Foundations</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>Expand, accustomed world<br />
No longer mean and small,<br />
Tight code, mean mind, crude dream,<br />
With ghost pioneers we see<br />
Horizons<br />
<br />
          new and dim<br />
<br />
Horizons<br />
          dissolving, vast<br />
                                Horizons.<br />
<br />
We build<br />
With skull and heft and mass<br />
Our deep<br />
      Foundations<br />
                 Foundations<br />
                            Foundations</p>
