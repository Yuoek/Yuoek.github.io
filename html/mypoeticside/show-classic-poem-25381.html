<h1 class="title-poem">A Problem</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Let none resemble another; let each resemble the highest!<br />
      How can that happen?  let each be all complete in itself.</p>
