<h1 class="title-poem">Give me a doctor</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/05/auden.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">W.H. Auden</h2>
<p>Give me a doctor partridge-plump, <br />
Short in the leg and broad in the rump, <br />
An endomorph with gentle hands <br />
Who'll never make absurd demands <br />
That I abandon all my vices <br />
Nor pull a long face in a crisis, <br />
But with a twinkle in his eye <br />
Will tell me that I have to die.</p>
