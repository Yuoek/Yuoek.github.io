<h1 class="title-poem">Song of the Forge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>The forge-fire sets a glow in the heavens,<br />
the hammer thunders, showering the smoke with sparks.<br />
<br />
A ruddy smithy, the white face of the moon,<br />
and the hammer, ringing down cold dark canyons.</p>
