<h1 class="title-poem">Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>SILENCE, and whirling worlds afar<br />
Through all encircling skies.<br />
What floods come o'er the spirit's bar,<br />
What wondrous thoughts arise.<br />
The earth, a mantle falls away,<br />
And, winged, we leave the sod;<br />
Where shines in its eternal sway<br />
The majesty of God.</p>
