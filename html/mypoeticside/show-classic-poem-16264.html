<h1 class="title-poem">Green</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/lawrence.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">D.H. Lawrence</h2>
<p>The dawn was apple-green,<br />
The sky was green wine held up in the sun,<br />
The moon was a golden petal between.<br />
<br />
She opened her eyes, and green<br />
They shone, clear like flowers undone,<br />
For the first time, now for the first time seen.</p>
