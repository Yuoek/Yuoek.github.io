<h1 class="title-poem">Fireflies in the Garden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>Here come real stars to fill the upper skies,<br />
And here on earth come emulating flies,<br />
That though they never equal stars in size,<br />
(And they were never really stars at heart)<br />
Achieve at times a very star-like start.<br />
Only, of course, they can't sustain the part.</p>
