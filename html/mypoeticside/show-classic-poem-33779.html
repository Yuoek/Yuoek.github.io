<h1 class="title-poem">Here The Frailest Leaves Of Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>HERE the frailest leaves of me, and yet my strongest-lasting:<br />
Here I shade and hide my thoughts--I myself do not expose them,<br />
And yet they expose me more than all my other poems.</p>
