<h1 class="title-poem">The Faery Forest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The faery forest glimmered<br />
Beneath an ivory moon,<br />
The silver grasses shimmered<br />
Against a faery tune.<br />
<br />
Beneath the silken silence<br />
The crystal branches slept,<br />
And dreaming thro' the dew-fall<br />
The cold white blossoms wept.</p>
