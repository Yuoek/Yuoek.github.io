<h1 class="title-poem">His Feet are shod with Gauze</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>916<br />
<br />
His Feet are shod with Gauze—<br />
His Helmet, is of Gold,<br />
His Breast, a Single Onyx<br />
With Chrysophrase, inlaid.<br />
<br />
His Labor is a Chant—<br />
His Idleness—a Tune—<br />
Oh, for a Bee's experience<br />
Of Clovers, and of Noon!</p>
