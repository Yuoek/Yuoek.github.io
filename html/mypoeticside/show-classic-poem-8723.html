<h1 class="title-poem">Perhaps I Asked Too Large</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Perhaps I asked too large --<br />
I take -- no less than skies --<br />
For Earths, grow thick as<br />
Berries, in my native town --<br />
<br />
My Basked holds -- just -- Firmaments --<br />
Those -- dangle easy -- on my arm,<br />
But smaller bundles -- Cram.</p>
