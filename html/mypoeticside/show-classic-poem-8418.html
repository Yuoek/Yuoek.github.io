<h1 class="title-poem">The Lamp burns sure—within</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>233<br />
<br />
The Lamp burns sure—within—<br />
Tho' Serfs—supply the Oil—<br />
It matters not the busy Wick—<br />
At her phosphoric toil!<br />
<br />
The Slave—forgets—to fill—<br />
The Lamp—burns golden—on—<br />
Unconscious that the oil is out—<br />
As that the Slave—is gone.</p>
