<h1 class="title-poem">The Grey Hair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/yehudah.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yehudah HaLevi</h2>
<p>One day I observed a grey hair in my head;<br />
I plucked it right out, when it thus to me said:<br />
"You may smile, if you wish, at your treatment of me,<br />
But a score of my friends soon will make a mockery of you."</p>
