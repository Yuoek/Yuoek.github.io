<h1 class="title-poem">To my quick ear the Leaves—conferred</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>To my quick ear the Leaves—conferred—<br />
The Bushes—they were Bells—<br />
I could not find a Privacy<br />
From Nature's sentinels—<br />
<br />
In Cave if I presumed to hide<br />
The Walls—begun to tell—<br />
Creation seemed a mighty Crack—<br />
To make me visible—</p>
