<h1 class="title-poem">Escaping backward to perceive</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>867<br />
<br />
Escaping backward to perceive<br />
The Sea upon our place—<br />
Escaping forward, to confront<br />
His glittering Embrace—<br />
<br />
Retreating up, a Billow's height<br />
Retreating blinded down<br />
Our undermining feet to meet<br />
Instructs to the Divine.</p>
