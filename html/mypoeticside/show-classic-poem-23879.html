<h1 class="title-poem">Our Little Baby Fell Asleep</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Our little baby fell asleep,<br />
And may not wake again<br />
For days and days, and weeks and weeks;<br />
But then he'll wake again,<br />
And come with his own pretty look,<br />
And kiss Mamma again.</p>
