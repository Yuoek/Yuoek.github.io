<h1 class="title-poem">On Donne's Poetry</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/coleridge.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel Taylor Coleridge</h2>
<p>``With Donne, whose muse on dromedary trots,<br />
Wreathe iron pokers into true-love knots ;<br />
Rhyme's sturdy cripple, fancy's maze and clue,<br />
Wit's forge and fire-blast, meaning's press and screw.''</p>
