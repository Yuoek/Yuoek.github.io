<h1 class="title-poem">April</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The roofs are shining from the rain.<br />
The sparrows tritter as they fly,<br />
And with a windy April grace<br />
The little clouds go by.<br />
<br />
Yet the back-yards are bare and brown<br />
With only one unchanging tree--<br />
I could not be so sure of Spring<br />
Save that it sings in me.</p>
