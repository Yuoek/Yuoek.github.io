<h1 class="title-poem">As Adam, Early In The Morning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>AS Adam, early in the morning,<br />
Walking forth from the bower, refresh'd with sleep;<br />
Behold me where I pass--hear my voice--approach,<br />
Touch me--touch the palm of your hand to my Body as I pass;<br />
Be not afraid of my Body.</p>
