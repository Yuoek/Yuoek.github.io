<h1 class="title-poem">Desire</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/coleridge.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel Taylor Coleridge</h2>
<p>Where true Love burns Desire is Love's pure flame ;<br />
It is the reflex of our earthly frame,<br />
That takes its meaning from the nobler part,<br />
And but translates the language of the heart.</p>
