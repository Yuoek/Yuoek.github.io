<h1 class="title-poem">Pippa's Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/browning.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Browning</h2>
<p>The year's at the spring,<br />
And day's at the morn;<br />
Morning's at seven;<br />
The hill-side's dew-pearl'd;<br />
The lark's on the wing;<br />
The snail's on the thorn;<br />
God's in His heaven--<br />
All's right with the world!</p>
