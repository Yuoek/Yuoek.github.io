<h1 class="title-poem">On Seeing a Rose in a Glass of Water, with the Motto…</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/12/acton.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Eliza Acton</h2>
<p>"Je vis,--mais dans les larmes!" <br />
<br />
Such is the heart whose treasur'd store<br />
Of sweet, and early hope is gone:<br />
It withers to revive no more,<br />
Or lives, like thee, in tears alone!</p>
