<h1 class="title-poem">Habba Khatoon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/habba-khatoon.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Habba Khatoon</h2>
<p>I left my home for play<br />
Nor yet again<br />
Returned, although the day<br />
Sank in the West.<br />
The name I made is hailed<br />
On lips of men,<br />
Habba Khatun ! though veiled,<br />
I found no rest.<br />
Through crowds I found my way,<br />
From forests, then,<br />
The sages came, when day<br />
Sank in the West.</p>
