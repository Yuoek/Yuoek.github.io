<h1 class="title-poem">It can't be</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>It can't be "Summer"!<br />
That—got through!<br />
It's early—yet—for "Spring"!<br />
There's that long town of White—to cross—<br />
Before the Blackbirds sing!<br />
It can't be "Dying"!<br />
It's too Rouge—<br />
The Dead shall go in White—<br />
So Sunset shuts my question down<br />
With Cuffs of Chrysolite!</p>
