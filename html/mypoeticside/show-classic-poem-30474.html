<h1 class="title-poem">After Death</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Now while my lips are living<br />
Their words must stay unsaid,<br />
And will my soul remember<br />
To speak when I am dead?<br />
<br />
Yet if my soul remembered<br />
You would not heed it, dear,<br />
For now you must not listen,<br />
And then you could not hear.</p>
