<h1 class="title-poem">It is a lonesome Glee</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>774<br />
<br />
It is a lonesome Glee—<br />
Yet sanctifies the Mind—<br />
With fair association—<br />
Afar upon the Wind<br />
<br />
A Bird to overhear<br />
Delight without a Cause—<br />
Arrestless as invisible—<br />
A matter of the Skies.</p>
