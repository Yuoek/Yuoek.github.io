<h1 class="title-poem">Love is the Water of Life</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Everything other than love for the most beautiful God<br />
though it be sugar- eating.  <br />
What is agony of the spirit?  <br />
To advance toward death without seizing  <br />
hold of the Water of Life.</p>
