<h1 class="title-poem">The Irish Colonel</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/SACD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Arthur Conan Doyle</h2>
<p>Said the king to the colonel, 'The complaints are eternal, That you Irish give more trouble Than any other corps.'<br />
<br />
Said the colonel to the king, 'This complaint is no new thing, For your foemen, sire, have made it A hundred times before.'</p>
