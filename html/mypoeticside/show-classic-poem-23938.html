<h1 class="title-poem">Dead In The Cold, A Song-Singing Thrush</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Dead in the cold, a song-singing thrush,<br />
Dead at the foot of a snowberry bush, -<br />
Weave him a coffin of rush,<br />
Dig him a grave where the soft mosses grow,<br />
Raise him a tombstone of snow.</p>
