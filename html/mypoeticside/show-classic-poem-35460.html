<h1 class="title-poem">Having Misidentified a Wild-Flower</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richardwilbur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Wilbur</h2>
<p>A thrush, because I'd been wrong,<br />
Burst rightly into song<br />
In a world not vague, not lonely,<br />
Not governed by me only.</p>
