<h1 class="title-poem">She dwelleth in the Ground</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>671<br />
<br />
She dwelleth in the Ground—<br />
Where Daffodils—abide—<br />
Her Maker—Her Metropolis—<br />
The Universe—Her Maid—<br />
<br />
To fetch Her Grace—and Hue—<br />
And Fairness—and Renown—<br />
The Firmament's—To Pluck Her—<br />
And fetch Her Thee—be mine—</p>
