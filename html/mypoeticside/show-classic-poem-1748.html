<h1 class="title-poem">The Massacre of MacPherson</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/aytoun.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Edmondstoune Aytoun</h2>
<p>Fhairshon had a son, <br />
Who married Noah's daughter, <br />
And nearly spoiled ta Flood <br />
By trinking up ta water: <br />
<br />
Which he would have done, <br />
I at least pelieve it, <br />
Had the mixture peen <br />
Only half Glenlivet.</p>
