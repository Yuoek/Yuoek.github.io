<h1 class="title-poem">Divine Epigrams: On the Miracle of the Multiplied Loaves</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/richard-crashaw.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Crashaw</h2>
<p>See here an easy feast that knows no wound,<br />
       That under hunger's teeth will needs be sound;<br />
   A subtle harvest of unbounded bread,<br />
       What would ye more? Here food itself is fed.</p>
