<h1 class="title-poem">The hallowing of Pain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>772<br />
<br />
The hallowing of Pain<br />
Like hallowing of Heaven,<br />
Obtains at a corporeal cost—<br />
The Summit is not given<br />
<br />
To Him who strives severe<br />
At middle of the Hill—<br />
But He who has achieved the Top—<br />
All—is the price of All—</p>
