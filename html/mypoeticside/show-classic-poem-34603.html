<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/YW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yvor Winters</h2>
<p>Where I walk out<br />
to meet you on the<br />
cloth of burning<br />
fields<br />
<br />
the goldfinches<br />
leap up about my<br />
feet like angry<br />
dandelions<br />
<br />
quiver like a<br />
heartbeat in the<br />
air and are<br />
no more</p>
