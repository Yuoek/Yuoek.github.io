<h1 class="title-poem">Floridi. De Ebrioso</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/lovelace.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Lovelace</h2>
<p>FLORIDI. DE EBRIOSO.<br />
<br />
Phoebus me in somnis vetuit potare Lyaeum,<br />
  Pareo praeceptis: tunc bibo cum vigilo.<br />
<br />
                OF A DRUNKARD.<br />
<br />
Phoebus asleep forbad me wine to take:<br />
I yield; and now am only drunk awake.</p>
