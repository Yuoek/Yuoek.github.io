<h1 class="title-poem">O Love! Thou Makest All Things Even</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Sarah-Flower-Adams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sarah Flower Adams</h2>
<p>O Love! thou makest all things even <br />
In earth or heaven; <br />
Finding thy way through prison-bars <br />
Up to the stars; <br />
Or, true to the Almighty plan, <br />
That out of dust created man, <br />
Thou lookest in a grave,--to see <br />
Thine immortality!</p>
