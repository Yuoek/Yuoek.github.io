<h1 class="title-poem">When Roses cease to bloom, Sir</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>32<br />
<br />
When Roses cease to bloom, Sir,<br />
And Violets are done—<br />
When Bumblebees in solemn flight<br />
Have passed beyond the Sun—<br />
The hand that paused to gather<br />
Upon this Summer's day<br />
Will idle lie—in Auburn—<br />
Then take my flowers—pray!</p>
