<h1 class="title-poem">The Rainbow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/05/wordsworth.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Wordsworth</h2>
<p>My heart leaps up when I behold<br />
              A Rainbow in the sky:<br />
So was it when my life began;<br />
So be it when I shall grow old,<br />
               Or let me die!<br />
The Child is father of the man;<br />
And I wish my days to be<br />
Bound each to each by natural piety.</p>
