<h1 class="title-poem">A Charm invests a face</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>421<br />
<br />
A Charm invests a face<br />
Imperfectly beheld—<br />
The Lady date not lift her Veil<br />
For fear it be dispelled—<br />
<br />
But peers beyond her mesh—<br />
And wishes—and denies—<br />
Lest Interview—annul a want<br />
That Image—satisfies—</p>
