<h1 class="title-poem">Never Again-</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>Never again will I weep<br />
And wring my hands<br />
And beat my head against the wall<br />
Because<br />
Me nolentem fata trahunt<br />
But<br />
When I have had enough<br />
I will arise<br />
And go unto my Father<br />
And I will say to Him:<br />
Father, I have had enough.</p>
