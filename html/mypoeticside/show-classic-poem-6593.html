<h1 class="title-poem">Should the wide world roll away</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>X<br />
  Should the wide world roll away<br />
  Leaving black terror<br />
  Limitless night,<br />
  Nor God, nor man, nor place to stand<br />
  Would be to me essential<br />
  If thou and thy white arms were there<br />
  And the fall to doom a long way.</p>
