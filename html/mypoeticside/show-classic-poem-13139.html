<h1 class="title-poem">The Beggar</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Ralph-Hodgson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Hodgson</h2>
<p>He begged and shuffled on;<br />
Sometimes he stopped to throw<br />
A bit and benison<br />
To sparrows in the snow,<br />
And clap a frozen ear<br />
And curse the bitter cold.<br />
God send the good man cheer<br />
And quintal hundredfold.</p>
