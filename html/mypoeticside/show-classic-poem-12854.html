<h1 class="title-poem">To Perenna</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>When I thy parts run o'er, I can't espy<br />
In any one, the least indecency;<br />
But every line and limb diffused thence<br />
A fair and unfamiliar excellence;<br />
So that the more I look, the more I prove<br />
There's still more cause why I the more should love.</p>
