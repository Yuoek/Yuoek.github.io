<h1 class="title-poem">Much Madness is divinest Sense</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Much Madness is divinest Sense -<br />
To a discerning Eye -<br />
Much Sense - the starkest Madness -<br />
`Tis the Majority<br />
In this, as All, prevail -<br />
Assent - and you are sane -<br />
Demur - you`re straightaway dangerous -<br />
And handled with a Chain -</p>
