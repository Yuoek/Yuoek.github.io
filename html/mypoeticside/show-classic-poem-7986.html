<h1 class="title-poem">Of Consciousness, her awful Mate</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>894<br />
<br />
Of Consciousness, her awful Mate<br />
The Soul cannot be rid—<br />
As easy the secreting her<br />
Behind the Eyes of God.<br />
<br />
The deepest hid is sighted first<br />
And scant to Him the Crowd—<br />
What triple Lenses burn upon<br />
The Escapade from God—</p>
