<h1 class="title-poem">The Guarded Wound</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>If it<br />
Were lighter touch<br />
Than petal of flower resting<br />
On grass, oh still too heavy it were,<br />
Too heavy!</p>
