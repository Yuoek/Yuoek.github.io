<h1 class="title-poem">My Autograph</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/SSM.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Susanna Strickland Moodie</h2>
<p>What -- write my name!<br />
            How vain the feeble trust,<br />
            To be remembered<br />
        When the hand is dust --<br />
    Grieve rather that the talents freely given<br />
    Were used for earth -- not treasured up for Heaven!</p>
