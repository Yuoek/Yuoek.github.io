<h1 class="title-poem">Bless God, he went as soldiers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>147<br />
<br />
Bless God, he went as soldiers,<br />
His musket on his breast—<br />
Grant God, he charge the bravest<br />
Of all the martial blest!<br />
<br />
Please God, might I behold him<br />
In epauletted white—<br />
I should not fear the foe then—<br />
I should not fear the fight!</p>
