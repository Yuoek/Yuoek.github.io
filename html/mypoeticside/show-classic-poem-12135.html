<h1 class="title-poem">The Style of the Times</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jonas Hallgrimsson</h2>
<p>Here, over heathland pathways<br />
harried by dismal blizzards,<br />
the girded hero hurried<br />
to hug his brocaded lady.<br />
That peerless age has perished.<br />
No prickstaff-shoving lover<br />
crosses these modern meadows<br />
to meet his tucked-up sweetheart.</p>
