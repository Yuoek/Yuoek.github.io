<h1 class="title-poem">Opal</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>You are ice and fire,<br />
The touch of you burns my hands like snow.<br />
You are cold and flame.<br />
You are the crimson of amaryllis,<br />
The silver of moon-touched magnolias.<br />
When I am with you,<br />
My heart is a frozen pond<br />
Gleaming with agitated torches.</p>
