<h1 class="title-poem">Arrival</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>And yet one arrives somehow,<br />
finds himself loosening the hooks of<br />
her dress<br />
in a strange bedroom--<br />
feels the autumn<br />
dropping its silk and linen leaves<br />
about her ankles.<br />
The tawdry veined body emerges<br />
twisted upon itself<br />
like a winter wind . . . !</p>
