<h1 class="title-poem">Epitaph For Our Children</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/ASJ-Tessimond.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A.S.J. Tessimond</h2>
<p>Blame us for these who were cradled and rocked in our chaos;<br />
Watching our sidelong watching, fearing our fear;<br />
Playing their blind-man's-bluff in our gutted mansions,<br />
Their follow-my-leader on a stair that ended in air.</p>
