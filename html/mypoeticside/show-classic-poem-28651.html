<h1 class="title-poem">Epitaph On Mr. Bridgeman</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/07/strode.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Strode</h2>
<p>One pitt containes him now that could not dye<br />
Before a thousand pitts in him did lye;<br />
Soe many spotts upon his flesh were shewne<br />
'Cause on his soule sinne fastned almost none.</p>
