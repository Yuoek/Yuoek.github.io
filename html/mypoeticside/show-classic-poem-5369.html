<h1 class="title-poem">Little Things</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/JAFC.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Julia Abigail Fletcher Carney</h2>
<p>Little drops of water,<br />
Little grains of sand,<br />
Make the mighty ocean<br />
And the pleasant land.<br />
<br />
Little deeds of kindness,<br />
Little words of love,<br />
Make our world an Eden<br />
Like the Heaven above.</p>
