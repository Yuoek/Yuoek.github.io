<h1 class="title-poem">A Song at Weicheng</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>A morning-rain has settled the dust in Weicheng;<br />
Willows are green again in the tavern dooryard....<br />
Wait till we empty one more cup --<br />
West of Yang Gate there'll be no old friends.</p>
