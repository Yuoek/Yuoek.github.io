<h1 class="title-poem">Aubade</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>As I would free the white almond from the green husk<br />
So I would strip your trappings off,<br />
Beloved.<br />
And fingering the smooth and polished kernel<br />
I should see that in my hands glittered a gem beyond counting.</p>
