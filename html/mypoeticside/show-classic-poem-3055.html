<h1 class="title-poem">For a charity fair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bjřrnstjerne Bjřrnson</h2>
<p>Some poor man in need<br />
To bless and to feed,<br />
I bring at its worth,<br />
This day of my birth,<br />
A book,--from my youth I must own.<br />
But Who in His power<br />
Gave bud and gave flower,<br />
To bread can transform<br />
In want's winter-storm<br />
Each leaf that my Springtime has grown.</p>
