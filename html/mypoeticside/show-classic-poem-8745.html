<h1 class="title-poem">A Book</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>There is no frigate like a book<br />
To take us lands away,<br />
Nor any coursers like a page<br />
Of prancing poetry.<br />
This traverse may the poorest take<br />
Without oppress of toll;<br />
How frugal is the chariot<br />
That bears a human soul!</p>
