<h1 class="title-poem">The Lion</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>The Lion, the Lion, he dwells in the Waste,<br />
He has a big head and a very small waist;<br />
But his shoulders are stark, and his jaws they are grim,<br />
And a good little child will not play with him.</p>
