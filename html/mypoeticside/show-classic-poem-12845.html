<h1 class="title-poem">Upon The Detracter</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>I ask'd thee oft what poets thou hast read,<br />
And lik'st the best?  Still thou repli'st, The dead.<br />
--I shall, ere long, with green turfs cover'd be;<br />
Then sure thou'lt like, or thou wilt envy, me.</p>
