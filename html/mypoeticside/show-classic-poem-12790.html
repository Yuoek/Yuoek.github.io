<h1 class="title-poem">To Heaven</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Open thy gates<br />
To him who weeping waits,<br />
And might come in,<br />
But that held back by sin.<br />
Let mercy be<br />
So kind, to set me free,<br />
And I will straight<br />
Come in, or force the gate.</p>
