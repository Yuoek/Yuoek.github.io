<h1 class="title-poem">Girl's Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I went out alone<br />
To sing a song or two,<br />
My fancy on a man,<br />
And you know who.<br />
<br />
Another came in sight<br />
That on a stick relied<br />
To hold himself upright;<br />
I sat and cried.<br />
<br />
And that was all my song -<br />
When everything is told,<br />
Saw I an old man young<br />
Or young man old?</p>
