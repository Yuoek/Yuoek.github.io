<h1 class="title-poem">A Planted Life—diversified</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>806<br />
<br />
A Planted Life—diversified<br />
With Gold and Silver Pain<br />
To prove the presence of the Ore<br />
In Particles—'tis when<br />
<br />
A Value struggle—it exist—<br />
A Power—will proclaim<br />
Although Annihilation pile<br />
Whole Chaoses on Him—</p>
