<h1 class="title-poem">A White Hen Sitting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>A white hen sitting<br />
On white eggs three:<br />
Next, three speckled chickens<br />
As plump as plump can be.<br />
An owl, and a hawk,<br />
And a bat come to see:<br />
But chicks beneath their mother's wing<br />
Squat safe as safe can be.</p>
