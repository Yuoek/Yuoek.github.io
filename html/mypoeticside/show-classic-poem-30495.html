<h1 class="title-poem">May</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The wind is tossing the lilacs,<br />
The new leaves laugh in the sun,<br />
And the petals fall on the orchard wall,<br />
But for me the spring is done.<br />
<br />
Beneath the apple blossoms<br />
I go a wintry way,<br />
For love that smiled in April<br />
Is false to me in May.</p>
