<h1 class="title-poem">Perhaps you think me stooping</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>833<br />
<br />
Perhaps you think me stooping<br />
I'm not ashamed of that<br />
Christ—stooped until He touched the Grave—<br />
Do those at Sacrament<br />
<br />
Commemorative Dishonor<br />
Or love annealed of love<br />
Until it bend as low as Death<br />
Redignified, above?</p>
