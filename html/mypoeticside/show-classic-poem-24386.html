<h1 class="title-poem">In the End</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>In the end, the mountains of imagination were nothing<br />
  but a house.<br />
And this grand life of mine was nothing but an excuse.<br />
You've been hearing my story so patiently for a lifetime<br />
Now hear this: it was nothing but a fairy tale.</p>
