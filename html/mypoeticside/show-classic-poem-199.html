<h1 class="title-poem">On Profiteering</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/01/FPA.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Franklin P. Adams</h2>
<p>Although I hate <br />
 A profiteer <br />
With unabat- <br />
 Ed loathing; <br />
Though I detest <br />
 The price they smear <br />
On pants and vest <br />
 And clothing;<br />
<br />
Yet I admit <br />
 My meed of crime, <br />
Nor do one whit <br />
 Regret it; <br />
I'd triple my <br />
 Price for a rhyme, <br />
If I thought I <br />
 Could get it.</p>
