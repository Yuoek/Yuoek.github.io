<h1 class="title-poem">Passion makes the old medicine new</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Passion makes the old medicine new:<br />
Passion lops off the bough of weariness.<br />
Passion is the elixir that renews:<br />
how can there be weariness<br />
when passion is present?<br />
Oh, don't sigh heavily from fatigue:<br />
seek passion, seek passion, seek passion!</p>
