<h1 class="title-poem">Uncertain lease—develops lustre</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>857<br />
<br />
Uncertain lease—develops lustre<br />
On Time<br />
Uncertain Grasp, appreciation<br />
Of Sum—<br />
<br />
The shorter Fate—is oftener the chiefest<br />
Because<br />
Inheritors upon a tenure<br />
Prize—</p>
