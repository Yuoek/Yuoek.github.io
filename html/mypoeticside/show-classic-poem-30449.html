<h1 class="title-poem">Enough</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>It is enough for me by day<br />
To walk the same bright earth with him;<br />
Enough that over us by night<br />
The same great roof of stars is dim.<br />
<br />
I have no care to bind the wind<br />
Or set a fetter on the sea--<br />
It is enough to feel his love<br />
Blow by like music over me.</p>
