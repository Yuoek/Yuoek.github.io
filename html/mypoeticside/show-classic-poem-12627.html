<h1 class="title-poem">To My Wife</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/williame.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Ernest Henley</h2>
<p>Take, dear, my little sheaf of songs,<br />
  For, old or new,<br />
All that is good in them belongs<br />
  Only to you;<br />
<br />
And, singing as when all was young,<br />
  They will recall<br />
Those others, lived but left unsung –<br />
  The best of all</p>
