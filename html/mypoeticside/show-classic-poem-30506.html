<h1 class="title-poem">Less Than the Cloud to the Wind</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Less than the cloud to the wind,<br />
Less than the foam to the sea,<br />
Less than the rose to the storm,<br />
Am I to thee.<br />
<br />
More than the star to the night,<br />
More than the rain to the tree,<br />
More than heaven to earth<br />
Art thou to me.</p>
