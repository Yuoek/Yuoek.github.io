<h1 class="title-poem">All I may, if small</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>819<br />
<br />
All I may, if small,<br />
Do it not display<br />
Larger for the Totalness—<br />
'Tis Economy<br />
<br />
To bestow a World<br />
And withhold a Star—<br />
Utmost, is Munificence—<br />
Less, tho' larger, poor.</p>
