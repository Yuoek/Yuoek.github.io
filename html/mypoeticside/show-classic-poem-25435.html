<h1 class="title-poem">To Proselytizers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>"Give me only a fragment of earth beyond the earth's limits,"--<br />
      So the godlike man said,--"and I will move it with ease."<br />
Only give me permission to leave myself for one moment,<br />
      And without any delay I will engage to be yours.</p>
