<h1 class="title-poem">Weep No More For What Is Past</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/wilda.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Davenant</h2>
<p>WEEP no more for what is past,<br />
For time in motion makes such haste<br />
He hath no leisure to descry<br />
Those errors which he passeth by.<br />
If we consider accident,<br />
And how repugnant unto sense<br />
It pays desert with bad event,<br />
We shall disparage Providence.</p>
