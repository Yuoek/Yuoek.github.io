<h1 class="title-poem">Impromptu. To Kate Carol</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/04/Edgar_Allan_Poe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edgar Allan Poe</h2>
<p>When from your gems of thought I turn<br />
To those pure orbs, your heart to learn,<br />
I scarce know which to prize most high —<br />
The bright i-dea, or the bright dear-eye.</p>
