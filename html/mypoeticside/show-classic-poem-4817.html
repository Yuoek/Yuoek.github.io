<h1 class="title-poem">Calligraphy of geese</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/yosa-buson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yosa Buson</h2>
<p>Calligraphy of geese<br />
against the sky--<br />
   the moon seals it.<br />
<br />
<br />
Translated by Robert Hass</p>
