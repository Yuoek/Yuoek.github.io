<h1 class="title-poem">Mother Shake The Cherry-Tree</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Mother shake the cherry-tree,<br />
Susan catch a cherry;<br />
Oh how funny that will be,<br />
Let's be merry!<br />
One for brother, one for sister,<br />
Two for mother more,<br />
Six for father, hot and tired,<br />
Knocking at the door.</p>
