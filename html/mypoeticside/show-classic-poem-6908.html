<h1 class="title-poem">love is a place</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>love is a place<br />
& through this place of<br />
love move<br />
(with brightness of peace)<br />
all places<br />
<br />
yes is a world<br />
& in this world of<br />
yes live<br />
(skilfully curled)<br />
all worlds</p>
