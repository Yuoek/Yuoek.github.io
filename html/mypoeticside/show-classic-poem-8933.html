<h1 class="title-poem">Fall of a Wall</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/donne.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Donne</h2>
<p>Under an undermined and shot-bruised wall<br />
A too-bold captain perish'd by the fall,<br />
Whose brave misfortune happiest men envied,<br />
That had a town for tomb, his bones to hide.</p>
