<h1 class="title-poem">Eros</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/rwe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Waldo Emerson</h2>
<p>The sense of the world is short, -<br />
Long and various the report, -<br />
To love and be beloved;<br />
Men and gods have not outlearned it;<br />
And, how oft soe'er they've turned it,<br />
'Tis not to be improved.</p>
