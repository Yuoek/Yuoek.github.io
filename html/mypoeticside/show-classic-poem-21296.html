<h1 class="title-poem">The Small Hours</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>No more my little song comes back;<br />
 And now of nights I lay<br />
My head on down, to watch the black<br />
 And wait the unfailing gray.<br />
<br />
Oh, sad are winter nights, and slow;<br />
 And sad's a song that's dumb;<br />
And sad it is to lie and know<br />
 Another dawn will come.</p>
