<h1 class="title-poem">A Musical</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>OUTSIDE the rain upon the street,<br />
The sky all grim of hue,<br />
Inside, the music-painful sweet,<br />
And yet I heard but you<br />
As is a thrilling violin,<br />
So is your voice to me,<br />
And still above the other strains,<br />
It sang in ecstasy.</p>
