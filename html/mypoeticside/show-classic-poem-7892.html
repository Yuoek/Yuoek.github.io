<h1 class="title-poem">Essential Oils—are wrung</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>675<br />
<br />
Essential Oils—are wrung—<br />
The Attar from the Rose<br />
Be not expressed by Suns—alone—<br />
It is the gift of Screws—<br />
<br />
The General Rose—decay—<br />
But this—in Lady's Drawer<br />
Make Summer—When the Lady lie<br />
In Ceaseless Rosemary—</p>
