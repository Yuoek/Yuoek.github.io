<h1 class="title-poem">A Farm-Picture</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>THROUGH the ample open door of the peaceful country barn,<br />
A sun-lit pasture field, with cattle and horses feeding;<br />
And haze, and vista, and the far horizon, fading away.</p>
