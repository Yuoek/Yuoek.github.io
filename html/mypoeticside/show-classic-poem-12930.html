<h1 class="title-poem">Eternity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>O years!  and age!  farewell:<br />
Behold I go,<br />
Where I do know<br />
Infinity to dwell.<br />
<br />
And these mine eyes shall see<br />
All times, how they<br />
Are lost i' th' sea<br />
Of vast eternity:--<br />
<br />
Where never moon shall sway<br />
The stars; but she,<br />
And night, shall be<br />
Drown'd in one endless day.</p>
