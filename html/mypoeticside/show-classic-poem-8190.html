<h1 class="title-poem">He found my Being—set it up</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>603<br />
<br />
He found my Being—set it up—<br />
Adjusted it to place—<br />
Then carved his name—upon it—<br />
And bade it to the East<br />
<br />
Be faithful—in his absence—<br />
And he would come again—<br />
With Equipage of Amber—<br />
That time—to take it Home—</p>
