<h1 class="title-poem">Thinking of My Brothers...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Alone now in a strange country,<br />
      feeling myself a stranger,<br />
On this bright festival day<br />
      I doubly pine for my kinsfolk.<br />
Far away, I know my brothers<br />
      will be climbing the heights<br />
With dogwood sprays in their jackets,<br />
      and one man missing!</p>
