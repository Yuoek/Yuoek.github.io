<h1 class="title-poem">8</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nelly-Sachs.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nelly Sachs</h2>
<p>When sleep enters the body like smoke<br />
and man journeys into the abyss<br />
like an extinguished star that is lighted elsewhere,<br />
then all quarrel ceases,<br />
overworked nag that has tossed the nightmare grip<br />
of its rider.</p>
