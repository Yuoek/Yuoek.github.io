<h1 class="title-poem">Blizu Polnoci</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Srecko.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Srecko Kosovel</h2>
<p>Blizu polnoci.<br />
Muhe v casi umirajo.<br />
Ogenj je ugasnil.<br />
Lepa Vida, bridkost je<br />
v tvojem spominu.<br />
Stravinski v avtomobilu.<br />
Bucanje morja.<br />
O biti 5 minut sam.<br />
Srce-Trst je bolno.<br />
Zato je Trst lep.<br />
Bolecina cvete v lepoti.</p>
