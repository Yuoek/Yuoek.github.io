<h1 class="title-poem">Impromptu, On A Long-Nosed Friend</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/thomaspaine.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Paine</h2>
<p>Going along the other day,<br />
Upon a certain plan;<br />
I met a nose upon the way,<br />
Behind it was a man.<br />
<br />
I called unto the nose to stop,<br />
And when it had done so -<br />
The man behind it - he came up;<br />
They made Zenobio.</p>
