<h1 class="title-poem">The first meeting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bjřrnstjerne Bjřrnson</h2>
<p>The first fond meeting holy<br />
Is like the woodbirds' trilling,<br />
Is like a sea-song thrilling,<br />
When red the sun sinks slowly,--<br />
Is like a horn on mountain,<br />
That wakes time's sleep thereunder<br />
And summons to life's fountain<br />
To meet in nature's wonder.</p>
