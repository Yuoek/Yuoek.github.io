<h1 class="title-poem">There Was a Young Lady of Wilts</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/monkhouse.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Cosmo Monkhouse</h2>
<p>There was a young lady of Wilts,<br />
Who walked up to Scotland on stilts;<br />
When they said it was shocking<br />
To show so much stocking<br />
She answered: "Then what about kilts?"</p>
