<h1 class="title-poem">And their feet move</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>And their feet move<br />
rhythmically, as tender<br />
feet of Cretan girls<br />
danced once around an<br />
<br />
altar of love, crushing<br />
a circle in the soft<br />
smooth flowering grass</p>
