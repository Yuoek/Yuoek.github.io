<h1 class="title-poem">Birdsong</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Birdsong brings relief<br />
to my longing<br />
I'm just as ecstatic as they are,<br />
but with nothing to say!<br />
Please universal soul, practice<br />
some song or something through me!</p>
