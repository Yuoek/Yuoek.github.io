<h1 class="title-poem">Cyprian, in my dream</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>Cyprian, in my dream<br />
the folds of a purple<br />
kerchief shadowed<br />
your cheeks --- the one<br />
<br />
Timas one time sent,<br />
a timid gift, all<br />
the way from Phocaea</p>
