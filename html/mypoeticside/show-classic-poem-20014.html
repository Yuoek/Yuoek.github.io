<h1 class="title-poem">To an Intra-mural Rat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/mariannem.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Marianne Moore</h2>
<p>You make me think of many men<br />
  Once met, to be forgot again<br />
    Or merely resurrected<br />
  In a parenthesis of wit<br />
  That found them hastening through it<br />
    Too brisk to be inspected.</p>
