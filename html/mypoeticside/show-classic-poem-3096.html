<h1 class="title-poem">The Blossom</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>Merry, merry sparrow!<br />
Under leaves so green<br />
A happy blossom<br />
Sees you, swift as arrow,<br />
Seek your cradle narrow,<br />
Near my bosom.<br />
Pretty, pretty robin!<br />
Under leaves so green<br />
A happy blossom<br />
Hears you sobbing, sobbing,<br />
Pretty, pretty robin,<br />
Near my bosom.</p>
