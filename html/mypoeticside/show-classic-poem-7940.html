<h1 class="title-poem">I sometimes drop it, for a Quick</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>708<br />
<br />
I sometimes drop it, for a Quick—<br />
The Thought to be alive—<br />
Anonymous Delight to know—<br />
And Madder—to conceive—<br />
<br />
Consoles a Woe so monstrous<br />
That did it tear all Day,<br />
Without an instant's Respite—<br />
'Twould look too far—to Die—</p>
