<h1 class="title-poem">To Bacchus: A Canticle</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Whither dost thou hurry me,<br />
Bacchus, being full of thee?<br />
This way, that way, that way, this,--<br />
Here and there a fresh Love is;<br />
That doth like me, this doth please;<br />
--Thus a thousand mistresses<br />
I have now:  yet I alone,<br />
Having all, enjoy not one!</p>
