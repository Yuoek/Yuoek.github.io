<h1 class="title-poem">Boxed City</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/06/wallance.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wallace Berman</h2>
<p>My beautiful wife<br />
Rearranges deaf photographs   talk<br />
Rococo & dances off four walls<br />
Son Tosh pencils the faithful<br />
Image & ignores the subtle rama<br />
<br />
Stoned in black corduroy I continue<br />
To separate seeds<br />
   From the bulk.</p>
