<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 47</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>What is not placed cannot be reached by the hand and whatever is placed will be reached wherever it is.<br />
<br />
        Hast thou heard that Alexander went into the darkness  <br />
        And after all his efforts could not taste the water of immortality?</p>
