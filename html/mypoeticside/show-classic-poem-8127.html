<h1 class="title-poem">Time feels so vast that were it not</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>802<br />
<br />
Time feels so vast that were it not<br />
For an Eternity—<br />
I fear me this Circumference<br />
Engross my Finity—<br />
<br />
To His exclusion, who prepare<br />
By Processes of Size<br />
For the Stupendous Vision<br />
Of his diameters—</p>
