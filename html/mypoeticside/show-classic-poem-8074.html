<h1 class="title-poem">The Mountains—grow unnoticed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>757<br />
<br />
The Mountains—grow unnoticed—<br />
Their Purple figures rise<br />
Without attempt—Exhaustion—<br />
Assistance—or Applause—<br />
<br />
In Their Eternal Faces<br />
The Sun—with just delight<br />
Looks long—and last—and golden—<br />
For fellowship—at night—</p>
