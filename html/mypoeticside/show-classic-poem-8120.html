<h1 class="title-poem">This Merit hath the worst</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>979<br />
<br />
This Merit hath the worst—<br />
It cannot be again—<br />
When Fate hath taunted last<br />
And thrown Her furthest Stone—<br />
<br />
The Maimed may pause, and breathe,<br />
And glance securely round—<br />
The Deer attracts no further<br />
Than it resists—the Hound—</p>
