<h1 class="title-poem">The Imitator</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Good from the good,--to the reason this is not hard of conception;<br />
  But the genius has power good from the bad to evoke.<br />
'Tis the conceived alone, that thou, imitator, canst practise;<br />
  Food the conceived never is, save to the mind that conceives.</p>
