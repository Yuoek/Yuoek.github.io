                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/Vincent-Starrett.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vincent Starrett</h2>
<p>Brown for the autumn leaves,<br />
     Green for the tree;<br />
White for the flying sail,<br />
         Blue for the sea.<br />
<br />
Grey for the solemn priest,<br />
     Red for the lass;<br />
Black for the silent boy<br />
     Dead in the grass.</p>
