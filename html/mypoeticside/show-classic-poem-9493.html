<h1 class="title-poem">Compensation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>BECAUSE I had loved so deeply,<br />
Because I had loved so long,<br />
God in His great compassion<br />
Gave me the gift of song.<br />
Because I have loved so vainly,<br />
And sung with such faltering breath,<br />
The Master in infinite mercy<br />
Offers the boon of Death.</p>
