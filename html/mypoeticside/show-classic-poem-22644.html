<h1 class="title-poem">Epigram Engraved on the Collar of a Dog...</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/10/pope.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alexander Pope</h2>
<p>I am his Highness' dog at Kew;<br />
Pray tell me, sir, whose dog are you?</p>
