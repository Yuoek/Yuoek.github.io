<h1 class="title-poem">There was an old man on the Border</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>There was an old man on the Border,<br />
  Who lived in the utmost disorder;<br />
  He danced with the cat, and made tea in his hat,<br />
  Which vexed all the folks on the Border.</p>
