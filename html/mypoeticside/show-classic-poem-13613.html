<h1 class="title-poem">Theology</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/thughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ted Hughes</h2>
<p>"No, the serpent did not<br />
Seduce Eve to the apple.<br />
All that's simply<br />
Corruption of the facts.<br />
<br />
Adam ate the apple.<br />
Eve ate Adam.<br />
The serpent ate Eve.<br />
This is the dark intestine.<br />
<br />
The serpent, meanwhile,<br />
Sleeps his meal off in Paradise -<br />
Smiling to hear<br />
God's querulous calling."</p>
