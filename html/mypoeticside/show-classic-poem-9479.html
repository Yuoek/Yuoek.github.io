<h1 class="title-poem">The Unlucky Apple</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>'TWAS the apple that in Eden<br />
Caused our father's primal fall;<br />
And the Trojan War, remember —<br />
'Twas an apple caused it all.<br />
So for weeks I've hesitated,<br />
You can guess the reason why,<br />
For I want to tell my darling<br />
She's the apple of my eye.</p>
