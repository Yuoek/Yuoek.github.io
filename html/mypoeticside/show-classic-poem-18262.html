<h1 class="title-poem">An Epilogue</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/john-masefield.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Masefield</h2>
<p>I had seen flowers come in stony places<br />
And kind things done by men with ugly faces,<br />
And the gold cup won by the worst horse at the races,<br />
Ao I trust, too.</p>
