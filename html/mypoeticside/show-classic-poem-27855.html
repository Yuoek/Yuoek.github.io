<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/soutar.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Soutar</h2>
<p>End is in beginning;<br />
And in beginning end:<br />
Death is not loss, nor life winning;<br />
But each and to each is friend.<br />
<br />
The hands which give are taking;<br />
And the hands which take bestow:<br />
Always the bough is breaking<br />
Heavy with fruit or snow.</p>
