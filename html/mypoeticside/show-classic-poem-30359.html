<h1 class="title-poem">It Is Not a Word</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>It is not a word spoken,<br />
Few words are said;<br />
Nor even a look of the eyes<br />
Nor a bend of the head,<br />
<br />
But only a hush of the heart<br />
That has too much to keep,<br />
Only memories waking<br />
That sleep so light a sleep.</p>
