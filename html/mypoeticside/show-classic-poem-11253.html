<h1 class="title-poem">Nationality</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Dame-Mary-Gilmore.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dame Mary Gilmore</h2>
<p>I have grown past hate and bitterness,<br />
I see the world as one;<br />
But though I can no longer hate,<br />
My son is still my son.<br />
<br />
All men at God's round table sit,<br />
and all men must be fed;<br />
But this loaf in my hand,<br />
This loaf is my son's bread.</p>
