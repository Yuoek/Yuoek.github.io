<h1 class="title-poem">Theatre Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Hilda-Conkling.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilda Conkling</h2>
<p>Eagles were flying over the sky<br />
And mermaids danced in the gold waters.<br />
Eagles were calling over the sky<br />
And the water was the color of blue flowers.<br />
Sunshine was 'flected in the waves<br />
Like meadows of white buds.<br />
This is what I saw<br />
On a morning long ago . . .</p>
