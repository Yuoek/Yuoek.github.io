<h1 class="title-poem">To own the Art within the Soul</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>855<br />
<br />
To own the Art within the Soul<br />
The Soul to entertain<br />
With Silence as a Company<br />
And Festival maintain<br />
<br />
Is an unfurnished Circumstance<br />
Possession is to One<br />
As an Estate perpetual<br />
Or a reduceless Mine.</p>
