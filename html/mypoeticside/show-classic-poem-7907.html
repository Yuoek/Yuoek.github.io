<h1 class="title-poem">Good to hide, and hear 'em hunt!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>842<br />
<br />
Good to hide, and hear 'em hunt!<br />
Better, to be found,<br />
If one care to, that is,<br />
The Fox fits the Hound—<br />
<br />
Good to know, and not tell,<br />
Best, to know and tell,<br />
Can one find the rare Ear<br />
Not too dull—</p>
