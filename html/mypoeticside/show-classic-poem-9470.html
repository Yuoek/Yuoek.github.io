<h1 class="title-poem">To J.Q.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>WHAT are the things that make life bright?<br />
A star gleam in the night.<br />
What hearts us for the coming fray?<br />
The dawn tints of the day.<br />
What helps to speed the weary mile?<br />
A brother's friendly smile.<br />
What turns o' gold the evening gray?<br />
A flower beside the way.</p>
