<h1 class="title-poem">It is an honorable thought,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>It is an honorable thought,<br />
  And makes one lift one's hat,<br />
As one encountered gentlefolk<br />
  Upon a daily street,<br />
<br />
That we've immortal place,<br />
  Though pyramids decay,<br />
And kingdoms, like the orchard,<br />
  Flit russetly away.</p>
