<h1 class="title-poem">Lambs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/katharine.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Katharine Tynan</h2>
<p>He sleeps as a lamb sleeps,<br />
Beside his mother.<br />
Somewhere in yon blue deeps<br />
His tender brother<br />
Sleeps like a lamb and leaps.<br />
<br />
He feeds as a lamb might,<br />
Beside his mother.<br />
Somewhere in fields of light<br />
A lamb, his brother,<br />
Feeds, and is clothed in white.</p>
