<h1 class="title-poem">Understanding</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I understood the rest too well,<br />
And all their thoughts have come to be<br />
Clear as grey sea-weed in the swell<br />
Of a sunny shallow sea.<br />
<br />
But you I never understood,<br />
Your spirit's secret hides like gold<br />
Sunk in a Spanish galleon<br />
Ages ago in waters cold.</p>
