<h1 class="title-poem">Listening to a Flute in Yellow Crane Pavillion</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>I came here a wanderer<br />
thinking of home,<br />
remembering my far away Ch'ang-an.<br />
And then, from deep in Yellow Crane Pavillion,<br />
I heard a beautiful bamboo flute<br />
play "Falling Plum Blossoms."<br />
It was late spring in a city by the river.</p>
