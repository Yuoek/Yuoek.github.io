<h1 class="title-poem">From Blank to Blank</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>761<br />
<br />
From Blank to Blank—<br />
A Threadless Way<br />
I pushed Mechanic feet—<br />
To stop—or perish—or advance—<br />
Alike indifferent—<br />
<br />
If end I gained<br />
It ends beyond<br />
Indefinite disclosed—<br />
I shut my eyes—and groped as well<br />
'Twas lighter—to be Blind—</p>
