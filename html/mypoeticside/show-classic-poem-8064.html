<h1 class="title-poem">The Lady feeds Her little Bird</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>941<br />
<br />
The Lady feeds Her little Bird<br />
At rarer intervals—<br />
The little Bird would not dissent<br />
But meekly recognize<br />
<br />
The Gulf between the Hand and Her<br />
And crumbless and afar<br />
And fainting, on Her yellow Knee<br />
Fall softly, and adore—</p>
