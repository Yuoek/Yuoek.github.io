<h1 class="title-poem">To my small Hearth His fire came</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>638<br />
<br />
To my small Hearth His fire came—<br />
And all my House aglow<br />
Did fan and rock, with sudden light—<br />
'Twas Sunrise—'twas the Sky—<br />
<br />
Impanelled from no Summer brief—<br />
With limit of Decay—<br />
'Twas Noon—without the News of Night—<br />
Nay, Nature, it was Day—</p>
