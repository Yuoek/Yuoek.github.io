<h1 class="title-poem">Dust of Snow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>The way a crow<br />
Shook down on me<br />
The dust of snow<br />
From a hemlock tree<br />
Has given my heart<br />
A change of mood<br />
And saved some part<br />
Of a day I had rued.</p>
