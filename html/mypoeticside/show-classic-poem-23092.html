<h1 class="title-poem">The Cat of Cats</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/wbr.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Brighty Rands</h2>
<p>I am the cat of cats. I am<br />
The everlasting cat!<br />
Cunning, and old, and sleek as jam,<br />
The everlasting cat!<br />
I hunt vermin in the night-<br />
The everlasting cat!<br />
For I see best without the light-<br />
The everlasting cat!</p>
