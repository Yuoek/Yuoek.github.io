<h1 class="title-poem">The Same</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>HUSH'D on the hill<br />
<br />
 Is the breeze;<br />
<br />
Scarce by the zephyr<br />
<br />
 The trees<br />
<br />
Softly are press'd;<br />
The woodbird's asleep on the bough.<br />
Wait, then, and thou<br />
<br />
Soon wilt find rest.</p>
