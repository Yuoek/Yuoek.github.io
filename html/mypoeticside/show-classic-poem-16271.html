<h1 class="title-poem">In Possum Land</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Lawson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Lawson</h2>
<p>In Possum Land the nights are fair,<br />
the streams are fresh and clear;<br />
no dust is in the moonlit air;<br />
no traffic jars the ear.<br />
<br />
With Possums gambolling overhead,<br />
'neath western stars so grand,<br />
Ah! would that we could make our bed<br />
tonight in Possum Land.</p>
