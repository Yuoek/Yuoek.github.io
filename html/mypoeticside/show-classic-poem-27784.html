<h1 class="title-poem">Happiness-</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>Happiness is silent, or speaks equivocally for friends,<br />
Grief is explicit and her song never ends,<br />
Happiness is like England, and will not state a case,<br />
Grief, like Guilt, rushes in and talks apace.</p>
