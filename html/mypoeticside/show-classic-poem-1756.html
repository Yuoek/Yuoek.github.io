<h1 class="title-poem">In The Storm Of Roses</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Ingeborg-Bachmann.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ingeborg Bachmann</h2>
<p>Wherever we turn in the storm of roses, <br />
the night is lit up by thorns, and the thunder <br />
of leaves, once so quiet within the bushes, <br />
rumbling at our heels.</p>
