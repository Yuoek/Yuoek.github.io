<h1 class="title-poem">Despair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>LET me close the eyes of my soul<br />
That I may not see<br />
What stands between thee and me.<br />
Let me shut the ears of my heart<br />
That I may not hear<br />
A voice that drowns yours, my dear.<br />
Let me cut the cords of my life,<br />
Of my desolate being,<br />
Since cursed is my hearing and seeing.</p>
