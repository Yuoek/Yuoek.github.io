<h1 class="title-poem">The Monk in the Garden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>He comes from Mass early in the morning<br />
<br />
<br />
<br />
The sky's the very blue Madonna wears;<br />
<br />
The air's alive with gold! Mark you the way<br />
<br />
The birds sing and the dusted shimmer of dew<br />
<br />
On leaf and fruit?..Per Bacco, what a day!</p>
