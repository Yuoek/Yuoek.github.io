<h1 class="title-poem">Palestine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/loa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lola Ridge</h2>
<p>Old plant of Asia -<br />
Mutilated vine<br />
Holding earth's leaping sap<br />
In every stem and shoot<br />
That lopped off, sprouts again -<br />
Why should you seek a plateau walled about,<br />
Whose garden is the world?</p>
