<h1 class="title-poem">Far Within Us #4</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>Green gloves rustle<br />
On the avenue's branches<br />
<br />
The evening carries us under its arm<br />
By a path which leaves no trace<br />
<br />
The rain falls on its knees<br />
Before the fugitive windows<br />
<br />
The yards come out of their gates<br />
And stand looking after us</p>
