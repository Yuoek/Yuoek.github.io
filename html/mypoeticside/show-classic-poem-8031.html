<h1 class="title-poem">Such is the Force of Happiness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>787<br />
<br />
Such is the Force of Happiness—<br />
The Least—can lift a Ton<br />
Assisted by its stimulus—<br />
<br />
Who Misery—sustain—<br />
No Sinew can afford—<br />
The Cargo of Themselves—<br />
Too infinite for Consciousness'<br />
Slow capabilities.</p>
