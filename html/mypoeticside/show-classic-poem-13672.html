<h1 class="title-poem">Children's Rhymes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>By what sends<br />
the white kids<br />
I ain't sent:<br />
I know I can't<br />
be President.<br />
What don't bug<br />
them white kids<br />
sure bugs me:<br />
We know everybody<br />
ain't free.<br />
<br />
Lies written down<br />
for white folks<br />
ain't for us a-tall:<br />
Liberty And Justice--<br />
Huh!--For All?</p>
