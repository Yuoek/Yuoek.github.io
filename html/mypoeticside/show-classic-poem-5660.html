<h1 class="title-poem">Last Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Ch'ing Chao</h2>
<p>Last<br />
night<br />
thin<br />
rain,<br />
gusty<br />
wind.<br />
<br />
Dense<br />
sleep<br />
doesn't<br />
fade<br />
a wine<br />
hangover.<br />
<br />
I'm talking<br />
to her<br />
who<br />
rolled up<br />
the curtains.<br />
<br />
Are you<br />
blind!<br />
I<br />
say.<br />
<br />
By now<br />
they're<br />
fat<br />
green<br />
and skimpy<br />
red.</p>
