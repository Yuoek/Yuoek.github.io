<h1 class="title-poem">Denial—is the only fact</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>965<br />
<br />
Denial—is the only fact<br />
Perceived by the Denied—<br />
Whose Will—a numb significance—<br />
The Day the Heaven died—<br />
<br />
And all the Earth strove common round—<br />
Without Delight, or Beam—<br />
What Comfort was it Wisdom—was—<br />
The spoiler of Our Home?</p>
