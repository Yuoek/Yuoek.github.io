<h1 class="title-poem">If recollecting were forgetting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>33<br />
<br />
If recollecting were forgetting,<br />
Then I remember not.<br />
And if forgetting, recollecting,<br />
How near I had forgot.<br />
And if to miss, were merry,<br />
And to mourn, were gay,<br />
How very blithe the fingers<br />
That gathered this, Today!</p>
