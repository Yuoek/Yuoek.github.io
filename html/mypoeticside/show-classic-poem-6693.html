<h1 class="title-poem">Oh Lady, Let the Sad Tears Fall</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Oh Lady, let the sad tears fall<br />
<br />
To speak thy pain,<br />
<br />
Gently as through the silver dusk<br />
<br />
The silver rain.<br />
<br />
<br />
Oh, let thy bosom breathe its grief<br />
<br />
In such soft sigh<br />
<br />
As hath the wind in gardens where<br />
<br />
Pale roses die.</p>
