<h1 class="title-poem">On The Lady Manchester</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Joseph-Addison.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Addison</h2>
<p>While haughty Gallia's dames, that pread<br />
O'er their pale cheeks, an artful red,<br />
Beheld this beauteous stranger there<br />
In native charms, divinely fair;<br />
Confusion in their  looks they show'd;<br />
And with unborrow'd blushes glow'd.</p>
