<h1 class="title-poem">What Was Lost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I SING what was lost and dread what was won,<br />
I walk in a battle fought over again,<br />
My king a lost king, and lost soldiers my men;<br />
Feet to the Rising and Setting may run,<br />
They always beat on the same small stone.</p>
