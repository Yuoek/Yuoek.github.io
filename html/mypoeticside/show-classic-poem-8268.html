<h1 class="title-poem">I've seen a Dying Eye</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>547<br />
<br />
I've seen a Dying Eye<br />
Run round and round a Room—<br />
In search of Something—as it seemed—<br />
Then Cloudier become—<br />
And then—obscure with Fog—<br />
And then—be soldered down<br />
Without disclosing what it be<br />
'Twere blessed to have seen—</p>
