<h1 class="title-poem">Birth-Day Ode 01</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Robert-Southey.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Southey</h2>
<p>O my faithful Friend!<br />
O early chosen, ever found the same,<br />
And trusted and beloved! once more the verse<br />
Long destin'd, always obvious to thine ear,<br />
Attend indulgent.</p>
