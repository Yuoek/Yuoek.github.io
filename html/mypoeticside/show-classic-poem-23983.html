<h1 class="title-poem">O Wind, Where Have You Been</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>O wind, where have you been,<br />
That you blow so sweet?<br />
Among the violets<br />
Which blossom at your feet.<br />
The honeysuckle waits<br />
For Summer and for heat.<br />
But violets in the chilly Spring<br />
Make the turf so sweet.</p>
