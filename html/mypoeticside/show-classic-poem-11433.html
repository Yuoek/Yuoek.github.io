<h1 class="title-poem">On The Divan</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>HE who knows himself and others<br />
<br />
Here will also see,<br />
That the East and West, like brothers,<br />
<br />
Parted ne'er shall be.<br />
<br />
Thoughtfully to float for ever<br />
<br />
'Tween two worlds, be man's endeavour!<br />
So between the East and West<br />
<br />
To revolve, be my behest!</p>
