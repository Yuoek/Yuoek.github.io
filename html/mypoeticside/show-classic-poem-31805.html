<h1 class="title-poem">El cuerpo canta</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/miguel.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Miguel de Unamuno</h2>
<p>El cuerpo canta;<br />
la sangre aúlla;<br />
la tierra charla;<br />
la mar murmura;<br />
el cielo calla<br />
y el hombre escucha.</p>
