<h1 class="title-poem">Until You've Found Pain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Until you've found pain, you won't reach the cure<br />
Until you've given up life, you won't unite with<br />
   the supreme soul<br />
Until you've found fire inside yourself, like the Friend,<br />
You won't reach the spring of life, like Khezr.</p>
