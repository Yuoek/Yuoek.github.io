<h1 class="title-poem">At the California Institute of Technology</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/richard-brautigan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Brautigan</h2>
<p>I don't care how God-damn smart<br />
these guys are:     I'm bored.<br />
<br />
It's been raining like hell all day long<br />
and there's nothing to do.<br />
<br />
Written January 24, 1967<br />
while poet-in-residence at<br />
the California Institute of<br />
Technology.</p>
