<h1 class="title-poem">We Waves</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/08/Augs.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">August Strindberg</h2>
<p>WE, we waves,<br />
That are rocking the winds<br />
To rest--<br />
Green cradles, we waves!<br />
 <br />
Wet are we, and salty;<br />
Leap like flames of fire--<br />
Wet flames are we:<br />
Burning, extinguishing;<br />
Cleansing, replenishing;<br />
Bearing, engendering.<br />
 <br />
We, we waves,<br />
That are rocking the winds<br />
To rest!</p>
