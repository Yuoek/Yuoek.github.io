<h1 class="title-poem">Departed to the judgment,</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Departed to the judgment,<br />
A mighty afternoon;<br />
Great clouds like ushers leaning,<br />
Creation looking on.<br />
<br />
The flesh surrendered, cancelled<br />
The bodiless begun;<br />
Two worlds, like audiences, disperse<br />
And leave the soul alone.</p>
