<h1 class="title-poem">Ribbons of the Year</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>873<br />
<br />
Ribbons of the Year—<br />
Multitude Brocade—<br />
Worn to Nature's Party once<br />
<br />
Then, as flung aside<br />
As a faded Bead<br />
Or a Wrinkled Pearl<br />
Who shall charge the Vanity<br />
Of the Maker's Girl?</p>
