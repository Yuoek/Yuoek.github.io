<h1 class="title-poem">If there is a witness to my little life</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>If there is a witness to my little life,<br />
To my tiny throes and struggles,<br />
He sees a fool;<br />
And it is not fine for gods to menace fools.</p>
