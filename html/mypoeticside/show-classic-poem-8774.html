<h1 class="title-poem">A door just opened on a street</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>A door just opened on a street--<br />
  I, lost, was passing by--<br />
An instant's width of warmth disclosed<br />
  And wealth, and company.<br />
<br />
The door as sudden shut, and I,<br />
  I, lost, was passing by,--<br />
Lost doubly, but by contrast most,<br />
  Enlightening misery.</p>
