<h1 class="title-poem">The Wind Has Such A Rainy Sound</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>The wind has such a rainy sound<br />
Moaning through the town,<br />
The sea has such a windy sound, -<br />
Will the ships go down?<br />
The apples in the orchard<br />
Tumble from their tree. -<br />
Oh will the ships go down, go down,<br />
In the windy sea?</p>
