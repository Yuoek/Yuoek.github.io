<h1 class="title-poem">The Fitful Alternations of the Rain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/shelley-percy4.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Percy Bysshe Shelley</h2>
<p>The fitful alternations of the rain,<br />
When the chill wind, languid as with pain<br />
Of its own heavy moisture, here and there<br />
Drives through the gray and beamless atmosphere</p>
