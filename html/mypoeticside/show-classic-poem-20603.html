<h1 class="title-poem">A Life</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nemerov.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Howard Nemerov</h2>
<p>Innocence?<br />
In a sense.<br />
In no sense!<br />
<br />
Was that it?<br />
Was that it?<br />
Was that it?<br />
<br />
That was it.</p>
