<h1 class="title-poem">An Emerald Is As Green As Grass</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>An emerald is as green as grass;<br />
A ruby red as blood;<br />
A sapphire shines as blue as heaven;<br />
A flint lies in the mud.<br />
A diamond is a brilliant stone,<br />
To catch the world's desire;<br />
An opal holds a fiery spark;<br />
But a flint holds fire.</p>
