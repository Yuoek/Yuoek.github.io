<h1 class="title-poem">I Have Moved West</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>I have moved west, I travel with the sun;<br />
You cannot hold, you cannot hinder me.<br />
There are no ends for what I have begun–<br />
There are no resting places where I run,<br />
Until I am surrendered to the sea.</p>
