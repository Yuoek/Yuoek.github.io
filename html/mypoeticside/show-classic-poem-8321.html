<h1 class="title-poem">Low at my problem bending</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>69<br />
<br />
Low at my problem bending,<br />
Another problem comes—<br />
Larger than mine—Serener—<br />
Involving statelier sums.<br />
<br />
I check my busy pencil,<br />
My figures file away.<br />
Wherefore, my baffled fingers<br />
They perplexity?</p>
