<h1 class="title-poem">Like Mighty Foot Lights—burned the Red</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>595<br />
<br />
Like Mighty Foot Lights—burned the Red<br />
At Bases of the Trees—<br />
The far Theatricals of Day<br />
Exhibiting—to These—<br />
<br />
'Twas Universe—that did applaud—<br />
While Chiefest—of the Crowd—<br />
Enabled by his Royal Dress—<br />
Myself distinguished God—</p>
