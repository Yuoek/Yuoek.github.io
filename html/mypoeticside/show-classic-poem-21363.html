<h1 class="title-poem">Iseult Of Brittany</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>So delicate my hands, and long,<br />
 They might have been my pride.<br />
And there were those to make them song<br />
 Who for their touch had died.<br />
<br />
Too frail to cup a heart within,<br />
 Too soft to hold the free-<br />
How long these lovely hands have been<br />
 A bitterness to me!</p>
