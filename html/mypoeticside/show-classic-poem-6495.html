<h1 class="title-poem">Black Riders Came From the Sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Black riders came from the sea.<br />
There was clang and clang of spear and shield,<br />
And clash and clash of hoof and heel,<br />
Wild shouts and the wave of hair<br />
In the rush upon the wind:<br />
Thus the ride of sin.</p>
