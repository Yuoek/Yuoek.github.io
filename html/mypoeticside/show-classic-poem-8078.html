<h1 class="title-poem">The Only News I know</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>827<br />
<br />
The Only News I know<br />
Is Bulletins all Day<br />
From Immortality.<br />
<br />
The Only Shows I see—<br />
Tomorrow and Today—<br />
Perchance Eternity—<br />
<br />
The Only One I meet<br />
Is God—The Only Street—<br />
Existence—This traversed<br />
<br />
If Other News there be—<br />
Or Admirable Show—<br />
I'll tell it You—</p>
