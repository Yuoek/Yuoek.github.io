<h1 class="title-poem">Undue Significance a starving man attaches</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>439<br />
<br />
Undue Significance a starving man attaches<br />
To Food—<br />
Far off—He sighs—and therefore—Hopeless—<br />
And therefore—Good—<br />
<br />
Partaken—it relieves—indeed—<br />
But proves us<br />
That Spices fly<br />
In the Receipt—It was the Distance—<br />
Was Savory—</p>
