<h1 class="title-poem">On the moon and springtime</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/ariwara.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ariwara no Narihira</h2>
<p>Is this not that moon?<br />
And Spring: is as the Spring of old<br />
Is it not?<br />
Only this body of mine<br />
Is as it ever was...</p>
