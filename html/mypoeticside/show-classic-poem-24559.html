<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Admonition 07</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>When thou art uncertain in transacting an affair, select that portion of it which will entail no danger to thee.<br />
<br />
       Speak not harshly to a man of gentle speech.  <br />
       Seek not to fight with him who knocks at the door of peace.</p>
