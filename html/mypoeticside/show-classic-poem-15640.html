<h1 class="title-poem">If A Dark Wretch E'er Stray'd</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/lcl.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lady Caroline Lamb</h2>
<p>If a dark wretch e'er stray'd,<br />
 Worse than the first fell slayer,<br />
'Tis he that wooes a maid,<br />
 To rifle and betray her!<br />
For wealth may be retriev'd,<br />
 And friends long doom'd to sever,<br />
But the fond heart deceiv'd,<br />
 Hath lost its peace for ever!</p>
