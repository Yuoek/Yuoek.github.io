<h1 class="title-poem">My River runs to thee</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>162<br />
<br />
My River runs to thee—<br />
Blue Sea! Wilt welcome me?<br />
My River wait reply—<br />
Oh Sea—look graciously—<br />
I'll fetch thee Brooks<br />
From spotted nooks—<br />
Say—Sea—Take Me!</p>
