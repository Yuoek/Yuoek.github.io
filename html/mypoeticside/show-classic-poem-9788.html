<h1 class="title-poem">Painting And Sculpture</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/rwe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Waldo Emerson</h2>
<p>The sinful painter drapes his goddess warm,<br />
Because she still is naked, being drest;<br />
The godlike sculptor will not so deform<br />
Beauty, which bones and flesh enough invest.</p>
