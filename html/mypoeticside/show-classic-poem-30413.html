<h1 class="title-poem">Wild Asters</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>In the spring I asked the daisies<br />
 If his words were true,<br />
And the clever, clear-eyed daisies<br />
 Always knew.<br />
<br />
Now the fields are brown and barren,<br />
 Bitter autumn blows,<br />
And of all the stupid asters<br />
 Not one knows.</p>
