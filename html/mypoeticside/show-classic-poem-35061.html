<h1 class="title-poem">To A Squirrel At Kyle-Na-No</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>Come play with me;<br />
Why should you run<br />
Through the shaking tree<br />
As though I'd a gun<br />
To strike you dead?<br />
When all I would do<br />
Is to scratch your head<br />
And let you go.</p>
