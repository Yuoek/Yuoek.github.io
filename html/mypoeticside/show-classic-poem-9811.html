<h1 class="title-poem">Compensation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/rwe.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Waldo Emerson</h2>
<p>Why should I keep holiday,<br />
When other men have none?<br />
Why but because when these are gay,<br />
I sit and mourn alone.<br />
<br />
And why when mirth unseals all tongues<br />
Should mine alone be dumb?<br />
Ah! late I spoke to silent throngs,<br />
And now their hour is come.</p>
