<h1 class="title-poem">There was a man with tongue of wood</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>There was a man with tongue of wood<br />
Who essayed to sing,<br />
And in truth it was lamentable.<br />
But there was one who heard<br />
The clip-clapper of this tongue of wood<br />
And knew what the man<br />
Wished to sing,<br />
And with that the singer was content.</p>
