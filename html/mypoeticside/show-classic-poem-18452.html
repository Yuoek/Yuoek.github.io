<h1 class="title-poem">Ace Shaw</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Edgar-Lee-Masters.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edgar Lee Masters</h2>
<p>I never saw any difference<br />
Between playing cards for money<br />
And selling real estate,<br />
Practicing law, banking, or anything else.<br />
For everything is chance.<br />
Nevertheless<br />
Seest thou a man diligent in business?<br />
He shall stand before Kings!</p>
