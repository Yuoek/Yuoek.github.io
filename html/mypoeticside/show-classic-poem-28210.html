<h1 class="title-poem">Negligible Old Star</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/gertrude.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gertrude Stein</h2>
<p>NEGLIGIBLE old star.<br />
Pour even.<br />
It was a sad per cent.<br />
Does on sun day.<br />
Watch or water.<br />
So soon a moon or a old heavy press.</p>
