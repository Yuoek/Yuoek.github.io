<h1 class="title-poem">You Smile Upon Your Friend To-Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>You smile upon your friend to-day,<br />
To-day his ills are over;<br />
You hearken to the lover's say,<br />
And happy is the lover.<br />
<br />
'Tis late to hearken, late to smile,<br />
But better late than never;<br />
I shall have lived a little while<br />
Before I die for ever.</p>
