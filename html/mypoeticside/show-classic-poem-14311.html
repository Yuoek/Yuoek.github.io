<h1 class="title-poem">A Flower Given to My Daughter</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>Frail the white rose and frail are<br />
Her hands that gave<br />
Whose soul is sere and paler<br />
Than time's wan wave.<br />
<br />
Rosefrail and fair -- yet frailest<br />
A wonder wild<br />
In gentle eyes thou veilest,<br />
My blueveined child.</p>
