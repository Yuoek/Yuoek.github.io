<h1 class="title-poem">Epitaph Of La Fontaine Made By Himself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Jean-de-La-Fontaine.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jean de La Fontaine</h2>
<p>JOHN, as he came, so went away,<br />
 Consuming capital and pay,<br />
 Holding superfluous riches cheap;<br />
The trick of spending time he knew,<br />
Dividing it in portions two,<br />
 For idling one, and one for sleep.</p>
