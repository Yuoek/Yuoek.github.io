<h1 class="title-poem">You constituted Time</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>765<br />
<br />
You constituted Time—<br />
I deemed Eternity<br />
A Revelation of Yourself—<br />
'Twas therefore Deity<br />
<br />
The Absolute—removed<br />
The Relative away—<br />
That I unto Himself adjust<br />
My slow idolatry—</p>
