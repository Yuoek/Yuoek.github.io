<h1 class="title-poem">Clarence Darrow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Edgar-Lee-Masters.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edgar Lee Masters</h2>
<p>This is Darrow,<br />
Inadequately scrawled, with his young, old heart,<br />
And his drawl, and his infinite paradox<br />
And his sadness, and kindness,<br />
And his artist sense that drives him to shape his life<br />
To something harmonious, even against the schemes of God.</p>
