<h1 class="title-poem">Flora</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/William-Morris.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Morris</h2>
<p>am the handmaid of the earth,<br />
I broider fair her glorious gown,<br />
And deck her on her days of mirth<br />
With many a garland of renown.<br />
<br />
And while Earth's little ones are fain<br />
And play about the Mother's hem,<br />
I scatter every gift I gain<br />
From sun and wind to gladden them.</p>
