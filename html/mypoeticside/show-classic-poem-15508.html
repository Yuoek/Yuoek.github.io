<h1 class="title-poem">Slaniki</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Srecko.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Srecko Kosovel</h2>
<p>Vprašali so jih<br />
po politicnem prepricanju.<br />
Povedali so,<br />
da so z Islandije.<br />
Moderni pesnik<br />
opozarja na propad.<br />
Slaniki so bili<br />
zaprti ves teden. v sodu.<br />
in se usmradili.</p>
