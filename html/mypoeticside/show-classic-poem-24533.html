                    <h2 class="title-content">Sa di</h2>
<p>Whoever associates with bad people will see no good.<br />
<br />
       If an angel associates with a demon  <br />
       He will learn from him fear, fraud and hypocrisy.  <br />
       Of the wicked thou canst learn only wickedness.  <br />
       A wolf will not take to sewing jackets.</p>
