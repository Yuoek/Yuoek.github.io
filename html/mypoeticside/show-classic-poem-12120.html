<h1 class="title-poem">Öxnadalur</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jonas Hallgrimsson</h2>
<p>Hillocks steep and stately<br />
stride across the valley.<br />
Dimly and sedately<br />
dawn begins to rally:<br />
sunlight rakes the summits ---<br />
smoking darkness plummets<br />
down into the deep<br />
dreaming its green sleep.</p>
