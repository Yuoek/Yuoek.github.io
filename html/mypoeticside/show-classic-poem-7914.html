<h1 class="title-poem">He outstripped Time with but a Bout</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>865<br />
<br />
He outstripped Time with but a Bout,<br />
He outstripped Stars and Sun<br />
And then, unjaded, challenged God<br />
In presence of the Throne.<br />
<br />
And He and He in mighty List<br />
Unto this present, run,<br />
The larger Glory for the less<br />
A just sufficient Ring.</p>
