<h1 class="title-poem">February Twilight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I stood beside a hill<br />
Smooth with new-laid snow,<br />
A single star looked out<br />
From the cold evening glow.<br />
<br />
There was no other creature<br />
That saw what I could see--<br />
I stood and watched the evening star<br />
As long as it watched me.</p>
