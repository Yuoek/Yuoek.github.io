<h1 class="title-poem">Over and over, like a Tune</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>367<br />
<br />
Over and over, like a Tune—<br />
The Recollection plays—<br />
Drums off the Phantom Battlements<br />
Cornets of Paradise—<br />
<br />
Snatches, from Baptized Generations—<br />
Cadences too grand<br />
But for the Justified Processions<br />
At the Lord's Right hand.</p>
