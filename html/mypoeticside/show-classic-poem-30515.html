<h1 class="title-poem">Immortal</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>So soon my body will have gone<br />
Beyond the sound and sight of men,<br />
And tho' it wakes and suffers now,<br />
Its sleep will be unbroken then;<br />
But oh, my frail immortal soul<br />
That will not sleep forevermore,<br />
A leaf borne onward by the blast,<br />
A wave that never finds the shore.</p>
