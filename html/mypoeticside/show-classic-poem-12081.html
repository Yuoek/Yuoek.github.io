                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>Since the flower withers in the dark,<br />
The bud blooms to leave its mark,<br />
Happy is the heart, light as a bubble,<br />
At the tavern is naked, stark.</p>
