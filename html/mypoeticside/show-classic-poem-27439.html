<h1 class="title-poem">Epitaph At Thermopylae</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/simonides.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Simonides</h2>
<p>Four thousand of us fought three million.<br />
When you visit Sparta, tell them:<br />
Here, the soldiers kept their word.</p>
