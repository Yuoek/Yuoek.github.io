<h1 class="title-poem">2 little whos</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>2 little whos<br />
(he and she)<br />
under are this<br />
wonderful tree<br />
<br />
smiling stand<br />
(all realms of where<br />
and when beyond)<br />
now and here<br />
<br />
(far from a grown<br />
-up i&you-<br />
ful world of known)<br />
who and who<br />
<br />
(2 little ams<br />
and over them this<br />
aflame with dreams<br />
incredible is)</p>
