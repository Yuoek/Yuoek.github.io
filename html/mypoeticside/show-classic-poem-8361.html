<h1 class="title-poem">Over the fence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>251<br />
<br />
Over the fence—<br />
Strawberries—grow—<br />
Over the fence—<br />
I could climb—if I tried, I know—<br />
Berries are nice!<br />
<br />
But—if I stained my Apron—<br />
God would certainly scold!<br />
Oh, dear,—I guess if He were a Boy—<br />
He'd—climb—if He could!</p>
