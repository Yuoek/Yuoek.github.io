<h1 class="title-poem">An Epitaph For Keats</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Dante-Gabriel-Rossetti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dante Gabriel Rossetti</h2>
<p>THROUGH one, years since hanged and forgot<br />
Who stabbed backs by the Quarter,<br />
Here lieth one who—while Time's stream<br />
Runneth, as God hath taught her,<br />
Bearing man's fame to men,—will have<br />
His great name writ in water.</p>
