<h1 class="title-poem">Discontents In Devon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>More discontents I never had<br />
   Since I was born, than here;<br />
Where I have been, and still am, sad,<br />
   In this dull Devonshire.<br />
Yet justly too I must confess,<br />
   I ne'er invented such<br />
Ennobled numbers for the press,<br />
   Than where I loath'd so much.</p>
