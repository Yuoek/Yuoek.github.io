<h1 class="title-poem">I'm nobody! Who are you?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>I'm nobody! Who are you?<br />
Are you nobody, too?<br />
Then there's a pair of us -- don't tell!<br />
They'd advertise -- you know!<br />
<br />
How dreary to be somebody!<br />
How public like a frog<br />
To tell one's name the livelong day<br />
To an admiring bog!</p>
