<h1 class="title-poem">The bustle in a house</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>The bustle in a house<br />
The morning after death<br />
Is solemnest of industries<br />
Enacted upon earth,--<br />
<br />
The sweeping up the heart,<br />
And putting love away<br />
We shall not want to use again<br />
Until eternity.</p>
