<h1 class="title-poem">Should E'er The Loveless Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>SHOULD e'er the loveless day remain<br />
Obscured by storms of hail and rain,<br />
<br />
Thy charms thou showest never;<br />
I tap at window, tap at door:<br />
Come, lov'd one, come! appear once more!<br />
<br />
Thou art as fair as ever!</p>
