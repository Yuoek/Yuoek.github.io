<h1 class="title-poem">Epitaph on Charles II</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/John-Wilmot.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Wilmot</h2>
<p>Here lies a great and mighty King,<br />
Whose promise none relied on;<br />
He never said a foolish thing,<br />
Nor ever did a wise one.</p>
