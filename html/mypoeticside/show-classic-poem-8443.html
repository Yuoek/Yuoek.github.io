<h1 class="title-poem">There are two Ripenings—one—of sight</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>332<br />
<br />
There are two Ripenings—one—of sight—<br />
Whose forces Spheric wind<br />
Until the Velvet product<br />
Drop spicy to the ground—<br />
A homelier maturing—<br />
A process in the Bur—<br />
That teeth of Frosts alone disclose<br />
In far October Air.</p>
