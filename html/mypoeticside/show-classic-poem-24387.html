<h1 class="title-poem">This Aloneness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>This aloneness is worth more than a thousand lives.<br />
This freedom is worth more than all the lands on earth.<br />
To be one with the truth for just a moment,<br />
Is worth more than the world and life itself.</p>
