<h1 class="title-poem">Life's Uncertain Day</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/TLP.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Love Peacock</h2>
<p>The briefest part of life's uncertain day,<br />
Youth's lovely blossom, hastes to swift decay:<br />
While love, wine, song, enhance our gayest mood<br />
Old age creeps on, nor thought, nor understood.</p>
