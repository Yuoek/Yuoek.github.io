<h1 class="title-poem">Old Age</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>OLD age is courteous--no one more:<br />
For time after time he knocks at the door,<br />
But nobody says, "Walk in, sir, pray!"<br />
Yet turns he not from the door away,<br />
But lifts the latch, and enters with speed.<br />
And then they cry "A cool one, indeed!"</p>
