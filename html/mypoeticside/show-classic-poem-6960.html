<h1 class="title-poem">Doveglion</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>he isn't looking at anything<br />
he isn't looking for something<br />
he isn't looking<br />
he is seeing<br />
<br />
what<br />
<br />
not something outside himself<br />
not anything inside himself<br />
but himself<br />
<br />
himself how<br />
<br />
not as some anyone<br />
not as any someone<br />
<br />
only as a noone(who is everyone)</p>
