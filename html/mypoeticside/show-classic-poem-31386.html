<h1 class="title-poem">Waiting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/Charles-Hanson-Towne.jpeg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Hanson Towne</h2>
<p>I thought my heart would break<br />
Because the Spring was slow.<br />
I said, "How long young April sleeps<br />
Beneath the snow!"<br />
<br />
But when at last she came<br />
And buds broke in the dew,<br />
I dreamed of my lost love,<br />
And my heart broke, too!</p>
