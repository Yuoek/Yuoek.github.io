<h1 class="title-poem">There was an Old Man of Thermopylae</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>There was an old man of Thermopylæ,<br />
Who never did anything properly;<br />
But they said, "If you choose, To boil eggs in your shoes,<br />
You shall never remain in Thermopylæ."</p>
