<h1 class="title-poem">Vanity</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>Suddenly<br />
the limpid<br />
stupor<br />
of the immensity<br />
towers<br />
above the debris<br />
<br />
And the man<br />
bent<br />
over the water<br />
surprised<br />
by the sun<br />
discovers<br />
a shadow<br />
<br />
Wafting in pieces and<br />
gently<br />
floating away</p>
