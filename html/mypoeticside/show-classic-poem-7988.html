<h1 class="title-poem">Of Silken Speech and Specious Shoe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>896<br />
<br />
Of Silken Speech and Specious Shoe<br />
A Traitor is the Bee<br />
His service to the newest Grace<br />
Present continually<br />
<br />
His Suit a chance<br />
His Troth a Term<br />
Protracted as the Breeze<br />
Continual Ban propoundeth He<br />
Continual Divorce.</p>
