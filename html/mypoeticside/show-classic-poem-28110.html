<h1 class="title-poem">Poem 91</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Edmund-Spenser.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edmund Spenser</h2>
<p>I Saw in secret to my Dame,<br />
How little Cupid humbly came:<br />
and sayd to her All hayle my mother.<br />
But when he saw me laugh, for shame:<br />
His face with bashfull blood did flame,<br />
not knowing Venus from the other,<br />
Then neuer blush Cupid (quoth I)<br />
for many haue err'd in this beauty.</p>
