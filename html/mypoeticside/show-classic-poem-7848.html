<h1 class="title-poem">Ample make this Bed</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Ample make this Bed—<br />
Make this Bed with Awe—<br />
In it wait till Judgment break<br />
Excellent and Fair.<br />
<br />
Be its Mattress straight—<br />
Be its Pillow round—<br />
Let no Sunrise' yellow noise<br />
Interrupt this Ground—</p>
