<h1 class="title-poem">Heaven is so far of the Mind</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>370<br />
<br />
Heaven is so far of the Mind<br />
That were the Mind dissolved—<br />
The Site—of it—by Architect<br />
Could not again be proved—<br />
<br />
'Tis vast—as our Capacity—<br />
As fair—as our idea—<br />
To Him of adequate desire<br />
No further 'tis, than Here—</p>
