<h1 class="title-poem">Who Has Seen The Wind?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Who has seen the wind?<br />
Neither I nor you:<br />
But when the leaves hang trembling<br />
The wind is passing through.<br />
Who has seen the wind?<br />
Neither you nor I:<br />
But when the trees bow down their heads<br />
The wind is passing by.</p>
