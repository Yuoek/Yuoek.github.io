<h1 class="title-poem">Reverse cannot befall</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>395<br />
<br />
Reverse cannot befall<br />
That fine Prosperity<br />
Whose Sources are interior—<br />
As soon—Adversity<br />
<br />
A Diamond—overtake<br />
In far—Bolivian Ground—<br />
Misfortune hath no implement<br />
Could mar it—if it found—</p>
