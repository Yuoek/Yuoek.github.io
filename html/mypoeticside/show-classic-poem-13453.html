<h1 class="title-poem">When I Came Last to Ludlow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>When I came last to Ludlow<br />
Amidst the moonlight pale,<br />
Two friends kept step beside me,<br />
Two honest friends and hale.<br />
<br />
Now Dick lies long in the churchyard,<br />
And Ned lies long in jail,<br />
And I come home to Ludlow<br />
Amidst the moonlight pale.</p>
