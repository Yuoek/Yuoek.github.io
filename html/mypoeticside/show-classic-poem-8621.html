<h1 class="title-poem">Funny—to be a Century</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>345<br />
<br />
Funny—to be a Century—<br />
And see the People—going by—<br />
I—should die of the Oddity—<br />
But then—I'm not so staid—as He—<br />
<br />
He keeps His Secrets safely—very—<br />
Were He to tell—extremely sorry<br />
This Bashful Globe of Ours would be—<br />
So dainty of Publicity—</p>
