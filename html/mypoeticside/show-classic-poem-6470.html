<h1 class="title-poem">A Marriage Ring</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/crabbe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">George Crabbe</h2>
<p>THE ring, so worn as you behold,<br />
So thin, so pale, is yet of gold:<br />
The passion such it was to prove—<br />
Worn with life’s care, love yet was love.</p>
