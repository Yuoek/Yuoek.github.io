<h1 class="title-poem">I've nothing else—to bring, You know</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>224<br />
<br />
I've nothing else—to bring, You know—<br />
So I keep bringing These—<br />
Just as the Night keeps fetching Stars<br />
To our familiar eyes—<br />
<br />
Maybe, we shouldn't mind them—<br />
Unless they didn't come—<br />
Then—maybe, it would puzzle us<br />
To find our way Home—</p>
