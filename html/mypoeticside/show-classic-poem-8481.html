<h1 class="title-poem">We play at Paste</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>We play at Paste—<br />
Till qualified, for Pearl—<br />
Then, drop the Paste—<br />
And deem ourself a fool—<br />
<br />
The Shapes—though—were similar—<br />
And our new Hands<br />
Learned Gem-Tactics—<br />
Practicing Sands—</p>
