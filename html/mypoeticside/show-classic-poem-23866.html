<h1 class="title-poem">If The Sun Could Tell Us Half</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>If the sun could tell us half<br />
That he hears and sees,<br />
Sometimes he would make us laugh,<br />
Sometimes make us cry:<br />
Think of all the birds that make<br />
Homes among the trees;<br />
Think of cruel boys who take<br />
Birds that cannot fly.</p>
