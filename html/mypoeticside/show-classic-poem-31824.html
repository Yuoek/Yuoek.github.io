<h1 class="title-poem">Brothers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Giuseppe-Ungaretti.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Giuseppe Ungaretti</h2>
<p>What regiment d'you belong to<br />
brothers?<br />
<br />
Word shaking<br />
in the night<br />
<br />
Leaf barely born<br />
<br />
In the simmering air<br />
involuntary revolt<br />
of the man present at his<br />
brittleness<br />
<br />
Brothers</p>
