<h1 class="title-poem">Father And Child</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>She hears me strike the board and say<br />
That she is under ban<br />
Of all good men and women,<br />
Being mentioned with a man<br />
That has the worst of all bad names;<br />
And thereupon replies<br />
That his hair is beautiful,<br />
Cold as the March wind his eyes.</p>
