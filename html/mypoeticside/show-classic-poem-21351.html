<h1 class="title-poem">Distance</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Were you to cross the world, my dear,<br />
 To work or love or fight,<br />
I could be calm and wistful here,<br />
 And close my eyes at night.<br />
<br />
It were a sweet and gallant pain<br />
 To be a sea apart;<br />
But, oh, to have you down the lane<br />
 Is bitter to my heart.</p>
