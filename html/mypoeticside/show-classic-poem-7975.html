<h1 class="title-poem">No Bobolink—reverse His Singing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>755<br />
<br />
No Bobolink—reverse His Singing<br />
When the only Tree<br />
Ever He minded occupying<br />
By the Farmer be—<br />
<br />
Clove to the Root—<br />
His Spacious Future—<br />
Best Horizon—gone—<br />
Whose Music be His<br />
Only Anodyne—<br />
Brave Bobolink—</p>
