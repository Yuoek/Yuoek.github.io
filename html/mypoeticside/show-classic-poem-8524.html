<h1 class="title-poem">A feather from the Whippoorwill</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>161<br />
<br />
A feather from the Whippoorwill<br />
That everlasting—sings!<br />
Whose galleries—are Sunrise—<br />
Whose Opera—the Springs—<br />
Whose Emerald Nest the Ages spin<br />
Of mellow—murmuring thread—<br />
Whose Beryl Egg, what Schoolboys hunt<br />
In "Recess"—Overhead!</p>
