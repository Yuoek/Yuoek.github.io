<h1 class="title-poem">Militia Women</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/maozedong.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mao Zedong</h2>
<p>Inscription on a Photograph<br />
<br />
How bright and brave they look, shouldering five-foot rifles<br />
On the parade ground lit up by the first gleams of day.<br />
China's daughters have high-aspiring minds,<br />
They love their battle array, not silks and satins.</p>
