<h1 class="title-poem">The Birdcatcher</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Ralph-Hodgson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ralph Hodgson</h2>
<p>When flighting time is on I go<br />
With clap-net and decoy,<br />
A-fowling after goldfinches<br />
And other birds of joy;<br />
I lurk among the thickets of<br />
The Heart where they are bred,<br />
And catch the twittering beauties as<br />
They fly into my Head.</p>
