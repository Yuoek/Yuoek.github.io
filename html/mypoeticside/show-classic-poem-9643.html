<h1 class="title-poem">Diogenes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/12/eastman.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Max Eastman</h2>
<p>A hut, and a tree,  <br />
   And a hill for me,  <br />
And a piece of weedy meadow.  <br />
   I'll ask no thing,  <br />
   Of God or king,          <br />
But to clear away his shadow.</p>
