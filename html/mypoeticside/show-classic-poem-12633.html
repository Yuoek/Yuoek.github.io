<h1 class="title-poem">Kate-a-Whimsies, John-a-Dream</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/williame.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Ernest Henley</h2>
<p>Kate-a-Whimsies, John-a-Dream<br />
  Still debating, still delay,<br />
And the world’s a ghost that gleams –<br />
  Wavers – vanishes away!<br />
<br />
We must live while live we can;<br />
  We should love while love we may.<br />
Dread in women, doubt in men…<br />
  So the Infinite runs away.</p>
