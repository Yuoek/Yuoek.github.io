<h1 class="title-poem">Optimist</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/aleister.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Aleister Crowley</h2>
<p>Kill off mankind,<br />
And give the Earth a chance!<br />
Nature might find<br />
In her inheritance<br />
The seedlings of a race<br />
Less infinitely base.</p>
