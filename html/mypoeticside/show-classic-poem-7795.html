<h1 class="title-poem">Twice had Summer her fair Verdure</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>846<br />
<br />
Twice had Summer her fair Verdure<br />
Proffered to the Plain—<br />
Twice a Winter's silver Fracture<br />
On the Rivers been—<br />
<br />
Two full Autumns for the Squirrel<br />
Bounteous prepared—<br />
Nature, Had'st thou not a Berry<br />
For thy wandering Bird?</p>
