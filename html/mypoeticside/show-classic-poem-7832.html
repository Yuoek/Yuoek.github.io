<h1 class="title-poem">A Moth the hue of this</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>841<br />
<br />
A Moth the hue of this<br />
Haunts Candles in Brazil.<br />
Nature's Experience would make<br />
Our Reddest Second pale.<br />
<br />
Nature is fond, I sometimes think,<br />
Of Trinkets, as a Girl.</p>
