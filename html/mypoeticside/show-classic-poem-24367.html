<h1 class="title-poem">The beauty of the heart</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>The beauty of the heart<br />
is the lasting beauty:<br />
its lips give to drink<br />
of the water of life.<br />
Truly it is the water,<br />
that which pours,<br />
and the one who drinks.<br />
All three become one when<br />
your talisman is shattered.<br />
That oneness you can't know<br />
by reasoning.</p>
