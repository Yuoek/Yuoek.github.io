<h1 class="title-poem">The Statue of Sherman by St. Gaudens</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>This is the soldier brave enough to tell<br />
The glory-dazzled world that `war is hell':<br />
Lover of peace, he looks beyond the strife,<br />
And rides through hell to save his country's life.</p>
