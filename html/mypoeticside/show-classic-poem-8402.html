<h1 class="title-poem">Teach Him—When He makes the names</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>227<br />
<br />
Teach Him—When He makes the names—<br />
Such an one—to say—<br />
On his babbling—Berry—lips—<br />
As should sound—to me—<br />
Were my Ear—as near his nest—<br />
As my thought—today—<br />
As should sound—<br />
"Forbid us not"—<br />
Some like "Emily."</p>
