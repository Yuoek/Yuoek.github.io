<h1 class="title-poem">But Not to Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The April night is still and sweet<br />
With flowers on every tree;<br />
Peace comes to them on quiet feet,<br />
  But not to me.<br />
<br />
My peace is hidden in his breast<br />
Where I shall never be,<br />
Love comes to-night to all the rest,<br />
  But not to me.</p>
