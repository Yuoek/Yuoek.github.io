<h1 class="title-poem">Make Bright The Arrows</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>Make bright the arrows<br />
Gather the shields:<br />
Conquest narrows<br />
The peaceful fields.<br />
<br />
Stock well the quiver<br />
With arrows bright:<br />
The bowman feared<br />
Need never fight.<br />
<br />
Make bright the arrows,<br />
O peaceful and wise!<br />
Gather the shields<br />
Against surprise.</p>
