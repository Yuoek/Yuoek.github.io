<h1 class="title-poem">Love song--heine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Eugene-Field.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Eugene Field</h2>
<p>Many a beauteous flower doth spring<br />
 From the tears that flood my eyes,<br />
And the nightingale doth sing<br />
 In the burthen of my sighs.<br />
<br />
If, O child, thou lovest me,<br />
 Take these flowerets fair and frail,<br />
And my soul shall waft to thee<br />
 Love songs of the nightingale.</p>
