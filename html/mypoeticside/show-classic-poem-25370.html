<h1 class="title-poem">My Antipathy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>I have a heartfelt aversion for crime,--a twofold aversion,<br />
 Since 'tis the reason why man prates about virtue so much.<br />
"What! thou hatest, then, virtue?"--I would that by all it were practised,<br />
 So that, God willing, no man ever need speak of it more.</p>
