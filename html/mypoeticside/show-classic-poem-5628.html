<h1 class="title-poem">The Stars</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2018/01/cawain.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Madison Julius Cawein</h2>
<p>These--the bright symbols of man's hope and fame,<br />
In which he reads his blessing or his curse--<br />
Are syllables with which God speaks His name<br />
In the vast utterance of the universe</p>
