<h1 class="title-poem">I had the Glory—that will do</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>349<br />
<br />
I had the Glory—that will do—<br />
An Honor, Thought can turn her to<br />
When lesser Fames invite—<br />
With one long "Nay"—<br />
Bliss' early shape<br />
Deforming—Dwindling—Gulfing up—<br />
Time's possibility.</p>
