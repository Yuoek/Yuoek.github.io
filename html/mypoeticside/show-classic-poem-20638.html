<h1 class="title-poem">Tell Me, Is The Rose Naked?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/05/Pablo-Neruda.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Pablo Neruda</h2>
<p>Tell me, is the rose naked<br />
Or is that her only dress?.<br />
<br />
Why do trees conceal<br />
The splendor of their roots?.<br />
<br />
Who hears the regrets<br />
Of the thieving automobile?.<br />
<br />
Is there anything in the world sadder<br />
Than a train standing in the rain?.</p>
