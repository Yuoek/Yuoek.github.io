<h1 class="title-poem">The Unimaginative</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2018/01/cawain.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Madison Julius Cawein</h2>
<p>Each form of beauty's but the new disguise<br />
Of thoughts more beautiful than forms can be:<br />
Sceptics, who search with unanointed eyes,<br />
Never the Earth's wild fairy-dance shall see.</p>
