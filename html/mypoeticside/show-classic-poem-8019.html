<h1 class="title-poem">Shells from the Coast mistaking</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>693<br />
<br />
Shells from the Coast mistaking—<br />
I cherished them for All—<br />
Happening in After Ages<br />
To entertain a Pearl—<br />
<br />
Wherefore so late—I murmured—<br />
My need of Thee—be done—<br />
Therefore—the Pearl responded—<br />
My Period begin</p>
