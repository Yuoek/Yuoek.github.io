<h1 class="title-poem">The Saying of Il Haboul</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>Guardian Of The Treasure Of Solomon<br />
<br />
And Keeper Of the Prophet's Armour<br />
<br />
<br />
My tent<br />
<br />
A vapour that<br />
<br />
The wind dispels and but<br />
<br />
As dust before the wind am I<br />
<br />
Myself.</p>
