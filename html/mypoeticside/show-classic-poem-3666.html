<h1 class="title-poem">Parting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/brecht.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bertolt Brecht</h2>
<p>We embrace.<br />
Rich cloth under my fingers<br />
While yours touch poor fabric.<br />
A quick embrace<br />
You were invited for dinner<br />
While the minions of law are after me.<br />
We talk about the weather and our<br />
Lasting friendship. Anything else<br />
Would be too bitter.</p>
