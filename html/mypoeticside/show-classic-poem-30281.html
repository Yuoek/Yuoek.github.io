<h1 class="title-poem">Aprilly</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/09/bert.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bert Leston Taylor</h2>
<p>Whan that Aprilly with hise shoures soote<br />
The droghte of March had perced to the roote,<br />
I druv a motor thro' Aprilly's bliz<br />
Somme forty mile, and dam neere lyke to friz.</p>
