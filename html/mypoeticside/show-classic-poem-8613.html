<h1 class="title-poem">For Death—or rather</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>382<br />
<br />
For Death—or rather<br />
For the Things 'twould buy—<br />
This—put away<br />
Life's Opportunity—<br />
<br />
The Things that Death will buy<br />
Are Room—<br />
Escape from Circumstances—<br />
And a Name—<br />
<br />
With Gifts of Life<br />
How Death's Gifts may compare—<br />
We know not—<br />
For the Rates—lie Here—</p>
