<h1 class="title-poem">The Waning Moon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/shelley-percy4.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Percy Bysshe Shelley</h2>
<p>And like a dying lady, lean and pale,<br />
Who totters forth, wrapped in a gauzy veil,<br />
Out of her chamber, led by the insane<br />
And feeble wanderings of her fading brain,<br />
The moon arose up in the murky east,<br />
A white and shapeless mass.</p>
