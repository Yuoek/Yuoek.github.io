<h1 class="title-poem">Healed of My Hurt</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/herm.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Herman Melville</h2>
<p>Healed of my hurt, I laud the inhuman Sea--<br />
Yea, bless the Angels Four that there convene;<br />
For healed I am even by the pitiless breath<br />
Distilled in wholesome dew named rosmarine.</p>
