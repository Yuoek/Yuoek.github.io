<h1 class="title-poem">We can but follow to the Sun</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>920<br />
<br />
We can but follow to the Sun—<br />
As oft as He go down<br />
He leave Ourselves a Sphere behind—<br />
'Tis mostly—following—<br />
<br />
We go no further with the Dust<br />
Than to the Earthen Door—<br />
And then the Panels are reversed—<br />
And we behold—no more.</p>
