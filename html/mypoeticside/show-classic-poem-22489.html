<h1 class="title-poem">Green Mountain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>You ask me why I dwell in the green mountain;<br />
I smile and make no reply for my heart is free of care.<br />
As the peach-blossom flows down stream and is gone into the unknown,<br />
I have a world apart that is not among men.</p>
