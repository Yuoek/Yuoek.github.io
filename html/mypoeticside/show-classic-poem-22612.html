<h1 class="title-poem">Anne Pennington</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>Until her last breath she enlarges<br />
Her Oxford house<br />
Built in Slavonic<br />
Vowels and consonants<br />
<br />
She polishes the corner-stones<br />
Until their Anglo-Saxon shine<br />
Begins to sing<br />
<br />
Her death is like a short breath-stop<br />
Under the distant limetrees of her friends</p>
