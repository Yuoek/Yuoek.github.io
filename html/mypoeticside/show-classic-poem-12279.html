<h1 class="title-poem">Epitaph on a pessimist</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/hardy.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Hardy</h2>
<p>I'm Smith of Stoke aged sixty odd<br />
I've lived without a dame all my life<br />
And wish to God<br />
My dad had done the same.</p>
