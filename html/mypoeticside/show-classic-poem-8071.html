<h1 class="title-poem">The Missing All—prevented Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>985<br />
<br />
The Missing All—prevented Me<br />
From missing minor Things.<br />
If nothing larger than a World's<br />
Departure from a Hinge—<br />
Or Sun's extinction, be observed—<br />
'Twas not so large that I<br />
Could lift my Forehead from my work<br />
For Curiosity.</p>
