<h1 class="title-poem">The rainy Pleiads wester</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>The rainy Pleiads wester,<br />
Orion plunges prone,<br />
The stroke of midnight ceases<br />
And I lie down alone.<br />
<br />
The rainy Pleiads wester,<br />
And seek beyond the sea<br />
The head that I shall dream of<br />
That will not dream of me.</p>
