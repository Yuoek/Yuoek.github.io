<h1 class="title-poem">Poem 13</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Kabir.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Kabir</h2>
<p>O MY heart! the Supreme Spirit, the great Master, is near you: wake, oh wake!<br />
Run to the feet of your Beloved: for<br />
your Lord stands near to your head.<br />
You have slept for unnumbered ages; this morning will you not wake?</p>
