<h1 class="title-poem">Working Out</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>Van Gogh cut off his ear<br />
gave it to a<br />
prostitute<br />
who flung it away in<br />
extreme<br />
disgust.<br />
Van, whores don't want<br />
ears<br />
they want<br />
money.<br />
I guess that's why you were<br />
such a great<br />
painter: you<br />
didn't understand<br />
much<br />
else.</p>
