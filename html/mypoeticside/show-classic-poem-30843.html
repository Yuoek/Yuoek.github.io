                    <h2 class="title-content">Theognis</h2>
<p>O lord, son of Leto, child of Zeus, you I shall never<br />
   Forget, either beginning or coming to an end,<br />
But always, first and last and in the middle,<br />
   I shall sing of you. And you, hear me and grant good things.</p>
