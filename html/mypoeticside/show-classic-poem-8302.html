<h1 class="title-poem">It was too late for Man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>623<br />
<br />
It was too late for Man—<br />
But early, yet, for God—<br />
Creation—impotent to help—<br />
But Prayer—remained—Our Side—<br />
<br />
How excellent the Heaven—<br />
When Earth—cannot be had—<br />
How hospitable—then—the face<br />
Of our Old Neighbor—God—</p>
