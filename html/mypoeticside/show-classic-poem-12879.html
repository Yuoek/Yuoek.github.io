<h1 class="title-poem">To Sapho</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Sapho, I will chuse to go<br />
Where the northern winds do blow<br />
Endless ice, and endless snow;<br />
Rather than I once would see<br />
But a winter's face in thee,--<br />
To benumb my hopes and me.</p>
