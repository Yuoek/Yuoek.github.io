<h1 class="title-poem">Cock-crow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Bell-man of night, if I about shall go<br />
For to deny my Master, do thou crow!<br />
Thou stop'st Saint Peter in the midst of sin;<br />
Stay me, by crowing, ere I do begin;<br />
Better it is, premonish'd, for to shun<br />
A sin, than fall to weeping when 'tis done.</p>
