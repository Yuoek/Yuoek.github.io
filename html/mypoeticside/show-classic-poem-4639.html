                    <h2 class="title-content">Gelett Burgess</h2>
<p>Ah, Yes! I Wrote the "Purple Cow" --<br />
  I'm Sorry, now, I Wrote it!<br />
  But I can Tell you Anyhow,<br />
  I'll Kill you if you Quote it!</p>
