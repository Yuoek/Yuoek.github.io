<h1 class="title-poem">On Julia's Voice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>So smooth, so sweet, so silv'ry is thy voice,<br />
As, could they hear, the Damned would make no noise,<br />
But listen to thee (walking in thy chamber)<br />
melting melodious words to Lutes of Amber.</p>
