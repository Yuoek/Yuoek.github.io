<h1 class="title-poem">O You Whom I Often And Silently Come</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>O YOU whom I often and silently come where you are, that I may be<br />
        with you;<br />
As I walk by your side, or sit near, or remain in the same room with<br />
        you,<br />
Little you know the subtle electric fire that for your sake is<br />
        playing within me.</p>
