<h1 class="title-poem">It Dropped So Low -- In My Regard --</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>It dropped so low -- in my Regard --<br />
I heard it hit the Ground --<br />
And go to pieces on the Stones<br />
At bottom of my Mind --<br />
<br />
Yet blamed the Fate that flung it -- less<br />
Than I denounced Myself,<br />
For entertaining Plated Wares<br />
Upon My Silver Shelf --</p>
