<h1 class="title-poem">Four Things</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>Four things a man must learn to do<br />
If he would make his record true:<br />
To think without confusion clearly;<br />
To love his fellow man sincerely;<br />
To act from honest motives purely;<br />
To trust in God and Heaven securely.</p>
