<h1 class="title-poem">Castles in the Air</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/TLP.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Love Peacock</h2>
<p>My thoughts by night are often filled<br />
 With visions false as fair:<br />
For in the past alone I build<br />
 My castles in the air.<br />
<br />
I dwell not now on what may be:<br />
 Night shadows o'er the scene:<br />
But still my fancy wanders free<br />
 Through that which might have been.</p>
