<h1 class="title-poem">My Father</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/yehuda.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yehuda Amichai</h2>
<p>The memory of my father is wrapped up in <br />
white paper, like sandwiches taken for a day at work. <br />
<br />
Just as a magician takes towers and rabbits <br />
out of his hat, he drew love from his small body, <br />
<br />
and the rivers of his hands <br />
overflowed with good deeds.</p>
