<h1 class="title-poem">Rose Leaves</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Austin-Dobson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Austin Dobson</h2>
<p>I intended an Ode,<br />
And it turned to a Sonnet.<br />
It began à la mode,<br />
I intended an Ode;<br />
But Rose cross'd the road<br />
In her latest new bonnet; I intended an Ode;<br />
And it turned to a Sonnet.</p>
