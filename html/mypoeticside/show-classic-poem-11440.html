<h1 class="title-poem">The Remembrance Of The Good</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>THE remembrance of the Good<br />
Keep us ever glad in mood.<br />
<br />
The remembrance of the Fair<br />
Makes a mortal rapture share.<br />
<br />
The remembrance of one's Love<br />
Blest Is, if it constant prove.<br />
<br />
The remembrance of the One<br />
Is the greatest joy that's known.</p>
