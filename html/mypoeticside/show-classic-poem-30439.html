<h1 class="title-poem">The Song for Colin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>I sang a song at dusking time<br />
Beneath the evening star,<br />
And Terence left his latest rhyme<br />
To answer from afar.<br />
<br />
Pierrot laid down his lute to weep,<br />
And sighed, "She sings for me,"<br />
But Colin slept a careless sleep<br />
Beneath an apple tree.</p>
