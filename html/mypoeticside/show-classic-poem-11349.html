<h1 class="title-poem">Warning</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>WAKEN not Amor from sleep! The beauteous urchin still slumbers;<br />
Go, and complete thou the task, that to the day is assign'd!<br />
Thus doth the prudent mother with care turn time to her profit,<br />
While her babe is asleep, for 'twill awake but too soon.</p>
