<h1 class="title-poem">Laggard</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Marg.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Margaret Widdemer</h2>
<p>My mind is very swift and gay;<br />
She flutters to and fro,<br />
She knows a thousand things to play,<br />
A thousand roads to go;<br />
 <br />
But oh, my heart will never play--<br />
She sits and watches still<br />
A stone she saw them set one day<br />
Beside a low green hill.</p>
