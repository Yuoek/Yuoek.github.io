<h1 class="title-poem">Autumn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/04/TEH.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Ernest Hulme</h2>
<p>A touch of cold in the Autumn night --<br />
<br />
  I walked abroad,<br />
  And saw the ruddy moon lean over a hedge<br />
  Like a red-faced farmer.<br />
  I did not stop to speak, but nodded,<br />
  And round about were the wistful stars<br />
  With white faces like town children.</p>
