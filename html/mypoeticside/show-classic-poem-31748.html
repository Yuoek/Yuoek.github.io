<h1 class="title-poem">Slow Spring</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/katharine.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Katharine Tynan</h2>
<p>O year, grow slowly. Exquisite, holy,<br />
   The days go on<br />
With almonds showing the pink stars blowing<br />
   And birds in the dawn.<br />
<br />
Grow slowly, year, like a child that is dear,<br />
   Or a lamb that is mild,<br />
By little steps, and by little skips,<br />
   Like a lamb or a child.</p>
