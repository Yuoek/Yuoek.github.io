<h1 class="title-poem">Who Court obtain within Himself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>803<br />
<br />
Who Court obtain within Himself<br />
Sees every Man a King—<br />
And Poverty of Monarchy<br />
Is an interior thing—<br />
<br />
No Man depose<br />
Whom Fate Ordain—<br />
And Who can add a Crown<br />
To Him who doth continual<br />
Conspire against His Own</p>
