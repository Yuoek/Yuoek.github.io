<h1 class="title-poem">Remember me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/french.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Percy French</h2>
<p>Remember me is all I ask,<br />
      And yet<br />
If the remembrance prove a task,<br />
       Forget.</p>
