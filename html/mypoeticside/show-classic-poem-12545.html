<h1 class="title-poem">A Word to the Wise</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>Let the world pass in its time-ridden race;<br />
never get caught in its snare.<br />
Remember, the only acceptable case<br />
for being in any particular place<br />
is having no business there.</p>
