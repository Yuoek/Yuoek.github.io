<h1 class="title-poem">The Bloom is not a Bloom</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>The bloom is not a bloom, the mist not mist,<br />
At midnight she comes, and goes again at dawn.<br />
She comes like a spring dream- how long will she stay?<br />
She goes like morning cloud, without a trace.</p>
