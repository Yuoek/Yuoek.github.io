<h1 class="title-poem">This that would greet—an hour ago</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>778<br />
<br />
This that would greet—an hour ago—<br />
Is quaintest Distance—now—<br />
Had it a Guest from Paradise—<br />
Nor glow, would it, nor bow—<br />
<br />
Had it a notice from the Noon<br />
Nor beam would it nor warm—<br />
Match me the Silver Reticence—<br />
Match me the Solid Calm—</p>
