<h1 class="title-poem">Song (Number 4)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/royall.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Royall Tyler</h2>
<p>Our old Moll has got a trick<br />
Working always makes her sick<br />
Play the Jade a jigish tune<br />
And sh'll frisk round like Jumping Joan<br />
Some may boast of Beer and Wine<br />
Sling, Grog, Punch and ale so fine<br />
But to make a Cobler skip<br />
Hand a Mug of foaming Flip.</p>
