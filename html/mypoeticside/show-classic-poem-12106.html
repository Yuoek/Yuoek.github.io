<h1 class="title-poem">Spring and Fall</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jonas Hallgrimsson</h2>
<p>Brimming springtime brings from sleep<br />
brooks with jaunty prattle,<br />
shaping life anew in sheep ---<br />
shepherds too! --- and cattle.<br />
<br />
Thrushes warble, throats aglow,<br />
through the plains and islands ---<br />
I like roundup, even so,<br />
when autumn fills the highlands.</p>
