<h1 class="title-poem">Heaven is what I cannot reach!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Heaven is what I cannot reach!<br />
  The apple on the tree,<br />
Provided it do hopeless hang,<br />
  That "heaven" is, to me.<br />
<br />
The color on the cruising cloud,<br />
  The interdicted ground<br />
Behind the hill, the house behind, --<br />
  There Paradise is found!</p>
