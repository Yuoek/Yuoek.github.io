<h1 class="title-poem">No Sourdough</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Service.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert William Service</h2>
<p>To be a bony feed Sourdough<br />
You must, by Yukon Law,<br />
Have killed a moose,<br />
And robbed a sluice,<br />
AND BUNKED UP WITH A SQUAW. . . .<br />
<br />
Alas! Sourdough I'll never be.<br />
Oh, sad is my excuse:<br />
My shooting's so damn bad, you see . . .<br />
I've never killed a moose.</p>
