<h1 class="title-poem">First Fig</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>My candle burns at both ends;<br />
    It will not last the night;<br />
  But ah, my foes, and oh, my friends --<br />
    It gives a lovely light!</p>
