<h1 class="title-poem">Is it dead—Find it</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>417<br />
<br />
Is it dead—Find it—<br />
Out of sound—Out of sight—<br />
"Happy"? Which is wiser—<br />
You, or the Wind?<br />
"Conscious"? Won't you ask that—<br />
Of the low Ground?<br />
<br />
"Homesick"? Many met it—<br />
Even through them—This<br />
Cannot testify—<br />
Themself—as dumb—</p>
