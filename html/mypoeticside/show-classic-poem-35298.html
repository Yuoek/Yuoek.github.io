<h1 class="title-poem">A Cradle Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>THE angels are stooping<br />
Above your bed;<br />
They weary of trooping<br />
With the whimpering dead.<br />
God's laughing in Heaven<br />
To see you so good;<br />
The Sailing Seven<br />
Are gay with His mood.<br />
I sigh that kiss you,<br />
For I must own<br />
That I shall miss you<br />
When you have grown.</p>
