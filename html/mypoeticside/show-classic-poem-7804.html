<h1 class="title-poem">We miss Her, not because We see</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>993<br />
<br />
We miss Her, not because We see—<br />
The Absence of an Eye—<br />
Except its Mind accompany<br />
Abridge Society<br />
<br />
As slightly as the Routes of Stars—<br />
Ourselves—asleep below—<br />
We know that their superior Eyes<br />
Include Us—as they go—</p>
