<h1 class="title-poem">Alexander Throckmorton</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Edgar-Lee-Masters.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edgar Lee Masters</h2>
<p>In youth my wings were strong and tireless,<br />
But I did not know the mountains.<br />
In age I knew the mountains<br />
But my weary wings could not follow my vision --<br />
Genius is wisdom and youth.</p>
