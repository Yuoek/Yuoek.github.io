<h1 class="title-poem">There Was an Old Man with a Beard</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>There was an Old Man with a beard,<br />
 Who said, "It is just as I feared! --<br />
 Two Owls and a Hen, four Larks and a Wren,<br />
 Have all built their nests in my beard.</p>
