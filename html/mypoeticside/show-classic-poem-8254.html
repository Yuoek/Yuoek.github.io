<h1 class="title-poem">I took my Power in my Hand</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>540<br />
<br />
I took my Power in my Hand—<br />
And went against the World—<br />
'Twas not so much as David—had—<br />
But I—was twice as bold—<br />
<br />
I aimed by Pebble—but Myself<br />
Was all the one that fell—<br />
Was it Goliath—was too large—<br />
Or was myself—too small?</p>
