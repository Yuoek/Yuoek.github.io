<h1 class="title-poem">Prayer is the little implement</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>437<br />
<br />
Prayer is the little implement<br />
Through which Men reach<br />
Where Presence—is denied them.<br />
They fling their Speech<br />
<br />
By means of it—in God's Ear—<br />
If then He hear—<br />
This sums the Apparatus<br />
Comprised in Prayer—</p>
