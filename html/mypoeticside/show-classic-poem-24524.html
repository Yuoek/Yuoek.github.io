<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 30</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Whoever does not listen to advice will have occasion to hear reproof.<br />
<br />
            If admonition enters not thy ear  <br />
            Be silent when I blame thee.</p>
