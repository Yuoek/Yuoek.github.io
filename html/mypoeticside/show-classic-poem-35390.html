<h1 class="title-poem">Fragrant orchids in the valley</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/yihwang.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yi Hwang</h2>
<p>Fragrant orchids in the valley lend enchantment to the air;<br />
those puffy clouds over the mountain are also delightful.<br />
Amid pleasures such as these, I still long for my dear one.</p>
