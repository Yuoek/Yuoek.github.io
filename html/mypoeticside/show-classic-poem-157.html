                    <h2 class="title-content">Franklin P. Adams</h2>
<p>"Militis in galea nidum fecere columbæ,"--<br />
<br />
              PETRONIUS<br />
<br />
<br />
Within the soldier's helmet see <br />
The nesting dove; <br />
Venus and Mars, it seems to me, <br />
In love.</p>
