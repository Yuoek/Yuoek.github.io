<h1 class="title-poem">Pain--has an Element of Blank--</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Pain--has an Element of Blank--<br />
It cannot recollect<br />
When it begun--or if there were<br />
A time when it was not--<br />
<br />
It has no Future--but itself--<br />
Its Infinite Contain<br />
Its Past--enlightened to perceive<br />
New Periods--of Pain.</p>
