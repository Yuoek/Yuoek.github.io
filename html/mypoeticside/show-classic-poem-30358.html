<h1 class="title-poem">The Dreams of My Heart</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>The dreams of my heart and my mind pass,<br />
Nothing stays with me long,<br />
But I have had from a child<br />
The deep solace of song;<br />
<br />
If that should ever leave me,<br />
Let me find death and stay<br />
With things whose tunes are played out and forgotten<br />
Like the rain of yesterday.</p>
