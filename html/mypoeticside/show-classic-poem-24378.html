<h1 class="title-poem">Any Lifetime</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Any lifetime that is spent without seeing the master<br />
Is either death in disguise or a deep sleep.<br />
The water that pollutes you is poison;<br />
The poison that purifies you is water.</p>
