<h1 class="title-poem">Song of the Palace</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>Her handkerchief all soaked in tears, she cannot dream,<br />
In deepest night before the palace voices sing.<br />
Her rosy cheeks aren't old, but first love has been cut,<br />
Leaning, wreathed in smoke, she sits until the dawn.</p>
