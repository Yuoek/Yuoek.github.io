<h1 class="title-poem">Fragments</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I<br />
LOCKE sank into a swoon;<br />
The Garden died;<br />
God took the spinning-jenny<br />
Out of his side.<br />
<br />
II<br />
Where got I that truth?<br />
Out of a medium's mouth.<br />
Out of nothing it came,<br />
Out of the forest loam,<br />
Out of dark night where lay<br />
The crowns of Nineveh.</p>
