<h1 class="title-poem">The power to be true to You</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>464<br />
<br />
The power to be true to You,<br />
Until upon my face<br />
The Judgment push his Picture—<br />
Presumptuous of Your Place—<br />
<br />
Of This—Could Man deprive Me—<br />
Himself—the Heaven excel—<br />
Whose invitation—Yours reduced<br />
Until it showed too small—</p>
