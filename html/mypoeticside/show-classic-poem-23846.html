<h1 class="title-poem">If Hope Grew On A Bush</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>If hope grew on a bush,<br />
And joy grew on a tree,<br />
What a nosegay for the plucking<br />
There would be!<br />
But oh! in windy autumn,<br />
When frail flowers wither,<br />
What should we do for hope and joy,<br />
Fading together?</p>
