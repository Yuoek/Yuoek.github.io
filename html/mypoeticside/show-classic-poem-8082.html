<h1 class="title-poem">The Service without Hope</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>779<br />
<br />
The Service without Hope—<br />
Is tenderest, I think—<br />
Because 'tis unsustained<br />
By stint—Rewarded Work—<br />
<br />
Has impetus of Gain—<br />
And impetus of Goal—<br />
There is no Diligence like that<br />
That knows not an Until—</p>
