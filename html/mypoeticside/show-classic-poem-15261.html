<h1 class="title-poem">Lispeth</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Look, you have cast out Love!  What Gods are these<br />
You bid me please?<br />
The Three in One, the One in Three? Not so!<br />
To my own Gods I go.<br />
It may be they shall give me greater ease<br />
Than your cold Christ and tangled Trinities.</p>
