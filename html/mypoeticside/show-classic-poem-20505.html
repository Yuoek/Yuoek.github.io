<h1 class="title-poem">The Hippopotamus</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/220px-Ogden_Nash.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ogden Nash</h2>
<p>Behold the hippopotamus!<br />
We laugh at how he looks to us,<br />
And yet in moments dank and grim,<br />
I wonder how we look to him.<br />
Peace, peace, thou hippopotamus!<br />
We really look all right to us,<br />
As you no doubt delight the eye<br />
Of other hippopotami.</p>
