<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 74</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>When a wise man encounters obstacles, he leaps away and casts anchor at the proper opportunity, for thus he will be in the former instance safe on shore, and in the latter he will enjoy himself.</p>
