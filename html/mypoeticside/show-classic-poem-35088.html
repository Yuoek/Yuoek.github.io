<h1 class="title-poem">To A Poet, Who Would Have Me Praise Certain Bad Poets</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>You say, as I have often given tongue<br />
In praise of what another's said or sung,<br />
'Twere politic to do the like by these;<br />
But was there ever dog that praised his fleas?</p>
