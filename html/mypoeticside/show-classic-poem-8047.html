<h1 class="title-poem">The Body grows without</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>578<br />
<br />
The Body grows without—<br />
The more convenient way—<br />
That if the Spirit—like to hide<br />
Its Temple stands, alway,<br />
<br />
Ajar—secure—inviting—<br />
It never did betray<br />
The Soul that asked its shelter<br />
In solemn honesty</p>
