<h1 class="title-poem">Melancholy Breakfast</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Frank O'Hara</h2>
<p>Melancholy breakfast<br />
blue overhead blue underneath<br />
<br />
the silent egg thinks<br />
and the toaster's electrical<br />
         ear waits<br />
<br />
the stars are in<br />
"that cloud is hid"<br />
<br />
the elements of disbelief are<br />
 very strong in the morning</p>
