<h1 class="title-poem">And The Moon And The Stars And The World</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>Long walks at night--<br />
that's what good for the soul:<br />
peeking into windows<br />
watching tired housewives<br />
trying to fight off<br />
their beer-maddened husbands.</p>
