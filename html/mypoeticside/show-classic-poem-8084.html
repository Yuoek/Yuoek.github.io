<h1 class="title-poem">The Soul unto itself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>683<br />
<br />
The Soul unto itself<br />
Is an imperial friend—<br />
Or the most agonizing Spy—<br />
An Enemy—could send—<br />
<br />
Secure against its own—<br />
No treason it can fear—<br />
Itself—its Sovereign—of itself<br />
The Soul should stand in Awe—</p>
