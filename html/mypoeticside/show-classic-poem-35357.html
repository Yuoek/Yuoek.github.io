<h1 class="title-poem">Oil And Blood</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>IN tombs of gold and lapis lazuli<br />
Bodies of holy men and women exude<br />
Miraculous oil, odour of violet.<br />
But under heavy loads of trampled clay<br />
Lie bodies of the vampires full of blood;<br />
Their shrouds are bloody and their lips are wet.</p>
