<h1 class="title-poem">5</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Nelly-Sachs.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nelly Sachs</h2>
<p>We orphans we lament to the world:<br />
World, why have you taken our soft mothers from us<br />
And the fathers who say: My child, you are like me!<br />
We orphans are like no one in this world any more!<br />
O world<br />
We accuse you!</p>
