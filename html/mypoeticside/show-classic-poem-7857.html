<h1 class="title-poem">As Sleigh Bells seem in summer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>981<br />
<br />
As Sleigh Bells seem in summer<br />
Or Bees, at Christmas show—<br />
So fairy—so fictitious<br />
The individuals do<br />
Repealed from observation—<br />
A Party that we knew—<br />
More distant in an instant<br />
Than Dawn in Timbuctoo.</p>
