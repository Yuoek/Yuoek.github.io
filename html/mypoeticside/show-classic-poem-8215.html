<h1 class="title-poem">I fear a Man of frugal Speech</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>543<br />
<br />
I fear a Man of frugal Speech—<br />
I fear a Silent Man—<br />
Haranguer—I can overtake—<br />
Or Babbler—entertain—<br />
<br />
But He who weigheth—While the Rest—<br />
Expend their furthest pound—<br />
Of this Man—I am wary—<br />
I fear that He is Grand—</p>
