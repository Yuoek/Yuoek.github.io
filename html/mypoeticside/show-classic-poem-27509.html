<h1 class="title-poem">Get Up!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/09/skip.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Skipsey</h2>
<p>Get up!" the caller calls, "Get up!"<br />
        And in the dead of night,<br />
    To win the bairns their bite and sup,<br />
        I rise a weary wight.<br />
<br />
    My flannel dudden donn'd, thrice o'er<br />
        My birds are kiss'd, and then<br />
    I with a whistle shut the door,<br />
        I may not ope again.</p>
