<h1 class="title-poem">On His Lady Marie</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/07/strode.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Strode</h2>
<p>Marie, Incarnate Virtue, Soule and Skin<br />
Both pure, whom Death not Life convincd of Sin,<br />
Had Daughters like seven Pleiades; but She<br />
Was a prime Star of greatest Claritie.</p>
