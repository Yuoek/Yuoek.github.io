<h1 class="title-poem">In the Train</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Fields beneath a quilt of snow<br />
From which the rocks and stubble sleep,<br />
And in the west a shy white star<br />
That shivers as it wakes from deep.<br />
<br />
The restless rumble of the train,<br />
The drowsy people in the car,<br />
Steel blue twilight in the world,<br />
And in my heart a timid star.</p>
