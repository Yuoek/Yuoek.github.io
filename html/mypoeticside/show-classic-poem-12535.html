<h1 class="title-poem">A Reproof</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Piet-Hein.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Piet Hein</h2>
<p>In view of your manner<br />
of spending your days<br />
I hope you may learn,<br />
before ending them,<br />
that the effort you spend<br />
on defending your ways<br />
could be better spent<br />
on amending them.</p>
