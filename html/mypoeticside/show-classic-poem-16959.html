<h1 class="title-poem">What the Rattlesnake Said</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Vachel-Lindsay.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vachel Lindsay</h2>
<p>The moon's a little prairie-dog.<br />
He shivers through the night.<br />
He sits upon his hill and cries<br />
For fear that I will bite.<br />
<br />
The sun's a broncho. He's afraid<br />
Like every other thing,<br />
And trembles, morning, noon and night,<br />
Lest I should spring, and sting.</p>
