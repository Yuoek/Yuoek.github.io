<h1 class="title-poem">I Planted A Hand</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>I planted a hand<br />
And there came up a palm,<br />
I planted a heart<br />
And there came up balm.<br />
Then I planted a wish,<br />
But there sprang a thorn,<br />
While heaven frowned with thunder<br />
And earth sighed forlorn.</p>
