<h1 class="title-poem">The heart asks pleasure first</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>The heart asks pleasure first<br />
And then, excuse from pain-<br />
And then, those little anodynes<br />
That deaden suffering;<br />
<br />
And then, to go to sleep;<br />
And then, if it should be<br />
The will of its Inquisitor,<br />
The liberty to die.</p>
