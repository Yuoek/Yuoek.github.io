<h1 class="title-poem">I Met A Genius</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>I met a genius on the train<br />
today<br />
about 6 years old,<br />
he sat beside me<br />
and as the train<br />
ran down along the coast<br />
we came to the ocean<br />
and then he looked at me<br />
and said,<br />
it's not pretty.<br />
<br />
it was the first time I'd<br />
realized<br />
that.</p>
