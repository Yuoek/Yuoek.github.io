<h1 class="title-poem">The Lion</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Vachel-Lindsay.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vachel Lindsay</h2>
<p>The Lion is a kingly beast.<br />
 He likes a Hindu for a feast.<br />
 And if no Hindu he can get,<br />
 The lion-family is upset.<br />
 He cuffs his wife and bites her ears<br />
 Till she is nearly moved to tears.<br />
 Then some explorer finds the den<br />
 And all is family peace again.</p>
