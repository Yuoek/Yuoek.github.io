<h1 class="title-poem">Any Soul That Drank the Nectar</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>Any soul that drank the nectar of your passion was lifted.<br />
From that water of life he is in a state of elation.<br />
Death came, smelled me, and sensed your fragrance instead.<br />
From then on, death lost all hope of me.</p>
