<h1 class="title-poem">Ride to Kandahar</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Then we brought the lances down--then the trumpets blew--<br />
When we went to Kandahar, ridin' two an' two.<br />
      Ridin'--ridin'--ridin' two an' two!<br />
             Ta-ra-ra-ra-ra-ra-a!<br />
             All the way to Kandahar,<br />
      Ridin' two an' two.</p>
