<h1 class="title-poem">To One who Loved not Poetry</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>THOU liest dead, and there will be no memory left behind<br />
Of thee or thine in all the earth, for never didst thou bind<br />
The roses of Pierian streams upon thy brow; thy doom<br />
Is now to flit with unknown ghosts in cold and nameless gloom.</p>
