<h1 class="title-poem">What Will You Give Me For My Pound?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>What will you give me for my pound?<br />
Full twenty shillings round.<br />
What will you give me for my shilling?<br />
Twelve pence to give I'm willing.<br />
What will you give me for my penny?<br />
Four farthings, just so many.</p>
