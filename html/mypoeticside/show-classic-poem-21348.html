<h1 class="title-poem">Daylight Saving</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>My answers are inadequate<br />
To those demanding day and date<br />
And ever set a tiny shock<br />
Through strangers asking what's o'clock;<br />
Whose days are spent in whittling rhyme-<br />
What's time to her, or she to Time?</p>
