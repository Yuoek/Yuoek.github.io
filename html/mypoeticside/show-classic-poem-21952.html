<h1 class="title-poem">Love is Essential</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/fernandopessoa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Fernando Pessoa</h2>
<p>Love is essential.<br />
Sex, mere accident.<br />
Can be equal<br />
Or different.<br />
A man's not an animal:<br />
Is a flesh intelligent,<br />
Although sometimes ill.</p>
