<h1 class="title-poem">To Carnations: A Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Stay while ye will, or go,<br />
And leave no scent behind ye:<br />
Yet trust me, I shall know<br />
The place where I may find ye.<br />
<br />
Within my Lucia's cheek,<br />
(Whose livery ye wear)<br />
Play ye at hide or seek,<br />
I'm sure to find ye there.</p>
