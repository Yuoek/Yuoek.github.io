<h1 class="title-poem">Pan Learns Music</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>Limber-limbed, lazy god, stretched on the rock,<br />
Where is sweet Echo, and where is your flock?<br />
What are you making here? "Listen," said Pan, --<br />
"Out of a river-reed music for man!"</p>
