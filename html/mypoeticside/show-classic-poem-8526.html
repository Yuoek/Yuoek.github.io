<h1 class="title-poem">A happy lip—breaks sudden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>353<br />
<br />
A happy lip—breaks sudden—<br />
It doesn't state you how<br />
It contemplated—smiling—<br />
Just consummated—now—<br />
But this one, wears its merriment<br />
So patient—like a pain—<br />
Fresh gilded—to elude the eyes<br />
Unqualified, to scan—</p>
