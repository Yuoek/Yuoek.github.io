<h1 class="title-poem">You love the Lord—you cannot see</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>487<br />
<br />
You love the Lord—you cannot see—<br />
You write Him—every day—<br />
A little note—when you awake—<br />
And further in the Day.<br />
<br />
An Ample Letter—How you miss—<br />
And would delight to see—<br />
But then His House—is but a Step—<br />
And Mine's—in Heaven—You see.</p>
