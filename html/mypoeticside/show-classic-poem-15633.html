<h1 class="title-poem">The Sacred Lore O'weel-Plac'd Love</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/lcl.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lady Caroline Lamb</h2>
<p>The sacred lore o'weel-plac'd love,<br />
 Luxuriantly indulge it;<br />
But never tempt th' illicit rove,<br />
 Tho' naething should divulge it:<br />
I wave the quantum o' the sin,<br />
 The hazard of concealing;<br />
But och! it hardens a' within,<br />
 And petrifies the feeling.</p>
