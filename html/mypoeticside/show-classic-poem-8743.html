<h1 class="title-poem">Abraham to Kill Him</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Abraham to kill him<br />
Was distinctly told—<br />
Isaac was an Urchin—<br />
Abraham was old—<br />
<br />
Not a hesitation—<br />
Abraham complied—<br />
Flattered by Obeisance<br />
Tyranny demurred—<br />
<br />
Isaac—to his children<br />
Lived to tell the tale—<br />
Moral—with a mastiff<br />
Manners may prevail.</p>
