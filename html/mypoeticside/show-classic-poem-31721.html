<h1 class="title-poem">A Stanza to His Wife</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/01/royall.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Royall Tyler</h2>
<p>Long be thy life!--and richly crown'd,<br />
With every blessing, earth can give!--<br />
And, when thy youthfull charms are flown,<br />
May thy endearing Virtues live!</p>
