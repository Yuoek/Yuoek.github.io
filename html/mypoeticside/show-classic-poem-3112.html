<h1 class="title-poem">The Wild Flower's Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/blake-tyger.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Blake</h2>
<p>As I wandered the forest,<br />
The green leaves among,<br />
I heard a Wild Flower<br />
Singing a song.<br />
<br />
"I slept in the earth<br />
In the silent night,<br />
I murmured my fears<br />
And I felt delight.<br />
<br />
"In the morning I went<br />
As rosy as morn,<br />
To seek for new joy;<br />
But oh! met with scorn."</p>
