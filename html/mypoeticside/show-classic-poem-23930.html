<h1 class="title-poem">Endure Hardness</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>A cold wind stirs the blackthorn<br />
To burgeon and to blow,<br />
Besprinkling half-green hedges<br />
With flakes and sprays of snow.<br />
<br />
<br />
Through coldness and through keenness,<br />
Dear hearts, take comfort so:<br />
Somewhere or other doubtless<br />
These make the blackthorn blow.</p>
