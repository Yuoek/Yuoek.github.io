<h1 class="title-poem">I See so Deeply Within Myself</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>I see so deeply within myself.<br />
Not needing my eyes, I can see everything clearly.<br />
Why would I want to bother my eyes again<br />
Now that I see the world through His eyes?</p>
