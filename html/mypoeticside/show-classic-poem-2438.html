<h1 class="title-poem">Is there any reward?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>Is there any reward?<br />
 I'm beginning to doubt it.<br />
 I am broken and bored,<br />
 Is there any reward<br />
 Reassure me, Good Lord,<br />
 And inform me about it.<br />
 Is there any reward?<br />
 I'm beginning to doubt it.</p>
