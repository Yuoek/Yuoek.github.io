<h1 class="title-poem">Henry Clay</h1>

                    <h2 class="title-content">James McAuley</h2>
<p>He needs no monument, no marble pile,<br />
'Tis vain thus to commemorate a name<br />
That must endure in noble grandeur while<br />
His country lives,--the temple of his fame.</p>
