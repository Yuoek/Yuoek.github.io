<h1 class="title-poem">Appeal</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/nesbit.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edith Nesbit</h2>
<p>Daphnis dearest, wherefore weave me<br />
Webs of lies lest truth should grieve me?<br />
I could pardon much, believe me:<br />
Dower me, Daphnis, or bereave me,<br />
Kiss me, kill me, love me, leave me,-<br />
Damn me, dear, but don't deceive me!</p>
