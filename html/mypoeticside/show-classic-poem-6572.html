<h1 class="title-poem">Ay, workman, make me a dream</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Ay, workman, make me a dream,<br />
A dream for my love.<br />
Cunningly weave sunlight,<br />
Breezes, and flowers.<br />
Let it be of the cloth of meadows.<br />
And -- good workman --<br />
And let there be a man walking thereon.</p>
