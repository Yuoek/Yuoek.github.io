<h1 class="title-poem">This Libation, Cupid, Take</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ernest.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ernest Christopher Dowson</h2>
<p>This libation, Cupid, take,<br />
With the lilies at thy feet;<br />
Cherish Pierrot for their sake<br />
Send him visions strange and sweet,<br />
While he slumbers at thy feet.<br />
Only love kiss him awake!<br />
Only love kiss him awake!</p>
