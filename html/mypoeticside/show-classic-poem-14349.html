<h1 class="title-poem">He Who Hath Glory Lost</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/james-joyce.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Joyce</h2>
<p>He who hath glory lost, nor hath<br />
Found any soul to fellow his,<br />
Among his foes in scorn and wrath<br />
Holding to ancient nobleness,<br />
That high unconsortable one ---<br />
His love is his companion.</p>
