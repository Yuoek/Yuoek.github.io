<h1 class="title-poem">The Hollows round His eager Eyes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>955<br />
<br />
The Hollows round His eager Eyes<br />
Were Pages where to read<br />
Pathetic Histories—although<br />
Himself had not complained.<br />
Biography to All who passed<br />
Of Unobtrusive Pain<br />
Except for the italic Face<br />
Endured, unhelped—unknown.</p>
