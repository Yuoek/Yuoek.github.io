<h1 class="title-poem">Crimson</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Crimson is the slow smolder of the cigar end I hold,<br />
Gray is the ash that stiffens and covers all silent the fire.<br />
(A great man I know is dead and while he lies in his<br />
    coffin a gone flame I sit here in cumbering shadows<br />
    and smoke and watch my thoughts come and go.)</p>
