<h1 class="title-poem">once like a spark</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>(once like a spark)<br />
<br />
if strangers meet<br />
life begins-<br />
not poor not rich<br />
(only aware)<br />
kind neither<br />
nor cruel<br />
(only complete)<br />
i not not you<br />
not possible;<br />
only truthful<br />
-truthfully,once<br />
if strangers(who<br />
deep our most are<br />
selves)touch:<br />
forever<br />
<br />
(and so to dark)</p>
