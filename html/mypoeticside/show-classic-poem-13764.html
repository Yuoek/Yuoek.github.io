<h1 class="title-poem">My Heart Thinks as The Sun Comes Up</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shlo.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shlomo ibn Gabirol</h2>
<p>My heart thinks as the sun comes up<br />
that what it does is wise:<br />
as earth borrows its light,<br />
as pledge it takes the stars.</p>
