<h1 class="title-poem">There is a pain—so utter</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>599<br />
<br />
There is a pain—so utter—<br />
It swallows substance up—<br />
Then covers the Abyss with Trance—<br />
So Memory can step<br />
Around—across—upon it—<br />
As one within a Swoon—<br />
Goes safely—where an open eye—<br />
Would drop Him—Bone by Bone.</p>
