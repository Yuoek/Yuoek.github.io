<h1 class="title-poem">Bluebeard</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/sylvia-plath.520.360.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sylvia Plath</h2>
<p>I am sending back the key<br />
that let me into bluebeard's study;<br />
because he would make love to me<br />
I am sending back the key;<br />
in his eye's darkroom I can see<br />
my X-rayed heart, dissected body :<br />
I am sending back the key<br />
that let me into bluebeard's study.</p>
