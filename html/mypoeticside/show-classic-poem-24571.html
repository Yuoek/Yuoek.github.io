<h1 class="title-poem">Ch 08 On Rules For Conduct In Life - Maxim 03</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sa-di.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sa di</h2>
<p>Knowledge is for the cherishing of religion, not for amassing wealth.<br />
<br />
        Who sold abstinence, knowledge and piety  <br />
        Filled a granary but burnt it clean away.</p>
