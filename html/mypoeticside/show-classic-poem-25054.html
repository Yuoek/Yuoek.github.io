<h1 class="title-poem">Monosyllabic</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Let me be monosyllabic to-day, O Lord.<br />
Yesterday I loosed a snarl of words on a fool, on a child.<br />
To-day, let me be monosyllabic . . . . a crony of old men who wash sunlight in their fingers and enjoy slow-pacing clocks.</p>
