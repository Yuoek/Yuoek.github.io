<h1 class="title-poem">Sixteen Months</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>On the lips of the child Janet float changing dreams.<br />
It is a thin spiral of blue smoke,<br />
A morning campfire at a mountain lake.<br />
<br />
On the lips of the child Janet,<br />
Wisps of haze on ten miles of corn,<br />
Young light blue calls to young light gold of morning.</p>
