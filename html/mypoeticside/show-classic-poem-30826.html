                    <h2 class="title-content">Theognis</h2>
<p>No longer do I love a boy. I have kicked aside harsh torments;<br />
   From grievous hardships I have gladly escaped;<br />
I am set loose from longing by fair-wreathed Kythereia.<br />
   As for you, my boy, you have no attractiveness in my eyes.</p>
