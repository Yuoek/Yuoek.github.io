<h1 class="title-poem">My Garden</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/ThomasEB.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Thomas Edward Brown</h2>
<p>A garden is a lovesome thing, God wot!<br />
        Rose plot,<br />
        Fringed pool,<br />
    Ferned grot--<br />
        The veriest school<br />
        Of peace; and yet the fool<br />
    Contends that God is not--<br />
    Not God! in gardens! when the eve is cool?<br />
        Nay, but I have a sign;<br />
       'Tis very sure God walks in mine.</p>
