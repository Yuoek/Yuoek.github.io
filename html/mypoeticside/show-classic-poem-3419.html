<h1 class="title-poem">Knowledge</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/louisebogan.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Louise Bogan</h2>
<p>Now that I know<br />
How passion warms little<br />
Of flesh in the mould,<br />
And treasure is brittle,--<br />
<br />
I'll lie here and learn<br />
How, over their ground<br />
Trees make a long shadow<br />
And a light sound.</p>
