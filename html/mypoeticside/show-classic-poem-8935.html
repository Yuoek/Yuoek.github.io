<h1 class="title-poem">Pyramus and Thisbe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/donne.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Donne</h2>
<p>Two, by themselves, each other, love and fear,<br />
Slain, cruel friends, by parting have join'd here.</p>
