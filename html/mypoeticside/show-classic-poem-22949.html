<h1 class="title-poem">In The Summer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Nizar.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Nizar Qabbani</h2>
<p>In the summer<br />
I stretch out on the shore<br />
And think of you<br />
Had I told the sea<br />
What I felt for you,<br />
It would have left its shores,<br />
Its shells,<br />
Its fish,<br />
And followed me.</p>
