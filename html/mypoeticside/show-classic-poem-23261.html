<h1 class="title-poem">The Future</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Rainer-Maria-Rilke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rainer Maria Rilke</h2>
<p>The future: time's excuse<br />
to frighten us; too vast<br />
a project, too large a morsel<br />
for the heart's mouth.<br />
<br />
Future, who won't wait for you?<br />
Everyone is going there.<br />
It suffices you to deepen<br />
the absence that we are.<br />
</p>
