<h1 class="title-poem">The morning sky is perfectly clear</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/santoka.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Taneda Santoka</h2>
<p>The morning sky is perfectly clear<br />
A gently flowing cloud is in a straight line<br />
<br />
The color of sunset is very beautiful<br />
I have just spent modestly my times of today</p>
