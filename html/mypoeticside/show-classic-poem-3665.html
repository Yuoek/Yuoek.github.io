<h1 class="title-poem">Send Me a Leaf</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/brecht.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bertolt Brecht</h2>
<p>Send me a leaf, but from a bush<br />
That grows at least one half hour<br />
Away from your house, then<br />
You must go and will be strong, and I<br />
Thank you for the pretty leaf.</p>
