<h1 class="title-poem">On A Bird</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/gav.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gavrila Derzhavin</h2>
<p>A sweet-voiced bird's been caught.<br />
They squeeze it in a vice-like grip.<br />
The poor thing squeaks and warbles not<br />
But they insist: "O, birdie, sing!"</p>
