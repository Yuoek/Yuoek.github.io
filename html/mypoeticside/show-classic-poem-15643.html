<h1 class="title-poem">To William Lamb</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/lcl.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lady Caroline Lamb</h2>
<p>Yes, I adore thee, William Lamb,<br />
But hate to hear thee say God d---:<br />
Frenchmen, say English cry d--- d---<br />
But why swear'st thou?--thou art a Lamb!</p>
