<h1 class="title-poem">An Answer to Frances Cornford</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/G-K-Chesterton.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gilbert Keith Chesterton</h2>
<p>Why do you rush through the fields in trains,<br />
 Guessing so much and so much.<br />
 Why do you flash through the flowery meads,<br />
 Fat-head poet that nobody reads;<br />
 And why do you know such a frightful lot<br />
 About people in gloves and such?</p>
