<h1 class="title-poem">At a Poetry Party I Am Given the Rhyme Chih</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Ch'ing Chao</h2>
<p>Although I've studied poetry for thirty years<br />
I try to keep my mouth shut and avoid reputation.<br />
Now who is this nosy gentleman talking about my poetry<br />
Like Yang Ching-chih<br />
Who spoke of Hsiang Ssu everywhere he went.</p>
