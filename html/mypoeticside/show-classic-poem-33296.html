<h1 class="title-poem">Deer Enclosure</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>Empty hill not see person<br />
Yet hear person voice sound<br />
Return scene enter deep forest<br />
Duplicate light green moss on<br />
<br />
<br />
Hills are empty, no man is seen,<br />
Yet the sound of people's voices is heard.<br />
Light is cast into the deep forest,<br />
And shines again on green moss.</p>
