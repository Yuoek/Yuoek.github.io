<h1 class="title-poem">The Pleasures of Friendship</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>The pleasures of friendship are exquisite,<br />
How pleasant to go to a friend on a visit!<br />
I go to my friend, we walk on the grass,<br />
And the hours and moments like minutes pass.</p>
