<h1 class="title-poem">Human Feelings</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>AH, ye gods! ye great immortals<br />
In the spacious heavens above us!<br />
Would ye on this earth but give us<br />
Steadfast minds and dauntless courage<br />
We, oh kindly ones, would leave you<br />
All your spacious heavens above us!</p>
