<h1 class="title-poem">Kookoorookoo! Kookoorookoo!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>‘Kookoorookoo! kookoorookoo!’<br />
Crows the cock before the morn;<br />
‘Kikirikee! kikirikee!’<br />
Roses in the east are born.<br />
‘Kookoorookoo! kookoorookoo!’<br />
Early birds begin their singing;<br />
‘Kikirikee! kikirikee!’<br />
The day, the day, the day is springing.</p>
