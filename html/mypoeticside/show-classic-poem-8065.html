<h1 class="title-poem">The Leaves like Women interchange</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>987<br />
<br />
The Leaves like Women interchange<br />
Exclusive Confidence—<br />
Somewhat of nods and somewhat<br />
Portentous inference.<br />
<br />
The Parties in both cases<br />
Enjoining secrecy—<br />
Inviolable compact<br />
To notoriety.</p>
