<h1 class="title-poem">'Tis little I—could care for Pearls</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>466<br />
<br />
'Tis little I—could care for Pearls—<br />
Who own the ample sea—<br />
Or Brooches—when the Emperor—<br />
With Rubies—pelteth me—<br />
<br />
Or Gold—who am the Prince of Mines—<br />
Or Diamonds—when have I<br />
A Diadem to fit a Dom—<br />
Continual upon me—</p>
