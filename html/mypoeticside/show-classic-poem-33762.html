<h1 class="title-poem">Look Down, Fair Moon</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>LOOK down, fair moon, and bathe this scene;<br />
Pour softly down night's nimbus floods, on faces ghastly, swollen,<br />
        purple;<br />
On the dead, on their backs, with their arms toss'd wide,<br />
Pour down your unstinted nimbus, sacred moon.</p>
