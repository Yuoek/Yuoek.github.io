<h1 class="title-poem">Never for Society</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>746<br />
<br />
Never for Society<br />
He shall seek in vain—<br />
Who His own acquaintance<br />
Cultivate—Of Men<br />
Wiser Men may weary—<br />
But the Man within<br />
<br />
Never knew Satiety—<br />
Better entertain<br />
Than could Border Ballad—<br />
Or Biscayan Hymn—<br />
Neither introduction<br />
Need You—unto Him—</p>
