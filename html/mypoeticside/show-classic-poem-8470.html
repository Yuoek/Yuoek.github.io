<h1 class="title-poem">Twas such a little—little boat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>107<br />
<br />
'Twas such a little—little boat<br />
That toddled down the bay!<br />
'Twas such a gallant—gallant sea<br />
That beckoned it away!<br />
<br />
'Twas such a greedy, greedy wave<br />
That licked it from the Coast—<br />
Nor ever guessed the stately sails<br />
My little craft was lost!</p>
