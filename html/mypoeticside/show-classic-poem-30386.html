<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>You bound strong sandals on my feet,<br />
You gave me bread and wine,<br />
And sent me under sun and stars,<br />
For all the world was mine.<br />
<br />
Oh, take the sandals off my feet,<br />
You know not what you do;<br />
For all my world is in your arms,<br />
My sun and stars are you.</p>
