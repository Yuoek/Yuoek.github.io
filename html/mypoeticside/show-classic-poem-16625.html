<h1 class="title-poem">Regret</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/RLG.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Le Gallienne</h2>
<p>ONE asked of regret,  <br />
 And I made reply:  <br />
To have held the bird,  <br />
 And let it fly;  <br />
To have seen the star          <br />
 For a moment nigh,  <br />
And lost it  <br />
 Through a slothful eye;  <br />
To have plucked the flower  <br />
 And cast it by;    <br />
To have one only hope—  <br />
 To die.</p>
