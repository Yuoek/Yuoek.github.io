<h1 class="title-poem">Strike, Churl</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/gerardman.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gerard Manley Hopkins</h2>
<p>Strike, churl; hurl, cheerless wind, then; heltering hail  <br />
May’s beauty massacre and wispèd wild clouds grow  <br />
Out on the giant air; tell Summer No,  <br />
Bid joy back, have at the harvest, keep Hope pale.</p>
