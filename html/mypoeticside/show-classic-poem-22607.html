<h1 class="title-poem">Far Within Us #5</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/popa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Vasko Popa</h2>
<p>The nights are running out of darkness<br />
<br />
Steel branches grasp<br />
The arms of passers-by<br />
<br />
Only anonymour chimneys<br />
Are free to walk the streets<br />
Which slice across our sleeplessness<br />
<br />
In the gutters our stars decay<br />
</p>
