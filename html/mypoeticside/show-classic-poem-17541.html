<h1 class="title-poem">De Puero Et Praecone. Catul</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/lovelace.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Lovelace</h2>
<p>DE PUERO ET PRAECONE.  CATUL.<br />
<br />
Cum puero bello praeconem qui videt esse,<br />
  Quid credat, nisi se vendere discupere?<br />
<br />
<br />
                    CATUL.<br />
<br />
With a fair boy a cryer we behold,<br />
What should we think, but he would not be sold?</p>
