<h1 class="title-poem">Geniality</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>How does the genius make itself known?  In the way that in nature<br />
 Shows the Creator himself,--e'en in the infinite whole.<br />
Clear is the ether, and yet of depth that ne'er can be fathomed;<br />
 Seen by the eye, it remains evermore closed to the sense.</p>
