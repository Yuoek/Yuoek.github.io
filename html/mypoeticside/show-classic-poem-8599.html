<h1 class="title-poem">Did we disobey Him?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>267<br />
<br />
Did we disobey Him?<br />
Just one time!<br />
Charged us to forget Him—<br />
But we couldn't learn!<br />
<br />
Were Himself—such a Dunce—<br />
What would we—do?<br />
Love the dull lad—best—<br />
Oh, wouldn't you?</p>
