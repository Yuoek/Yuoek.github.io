<h1 class="title-poem">You Personify God's Message</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>You personify God's message.<br />
You reflect the King's face.<br />
There is nothing in the universe that you are not<br />
Everything you want, look for it within yourself--<br />
  you are that.</p>
