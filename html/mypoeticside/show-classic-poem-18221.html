<h1 class="title-poem">Upon An Eunuch; A Poet. Fragment</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Andrew-Marvell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Andrew Marvell</h2>
<p>Nec sterilem te crede; Licet, mulieribus exul,<br />
Falcem virginiae nequeas immitere messi,<br />
Et nostro peccare modo. Tibi Fama perenne<br />
Praegnabit; rapiesque novem de monse Sorores;<br />
Et pariet modulos Echo repetita Nepotes.</p>
