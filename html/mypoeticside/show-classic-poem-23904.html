<h1 class="title-poem">All The Bells Were Ringing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>All the bells were ringing<br />
And all the birds were singing,<br />
When Molly sat down crying<br />
For her broken doll:<br />
O you silly Moll!<br />
Sobbing and sighing<br />
For a broken doll,<br />
When all the bells are ringing<br />
And all the birds are singing.</p>
