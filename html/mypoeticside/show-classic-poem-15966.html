<h1 class="title-poem">Control</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Sidney-Lanier.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sidney Lanier</h2>
<p>O Hunger, Hunger, I will harness thee<br />
And make thee harrow all my spirit's glebe.<br />
Of old the blind bard Herve sang so sweet<br />
He made a wolf to plow his land.</p>
