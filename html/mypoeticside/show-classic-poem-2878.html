<h1 class="title-poem">A Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/binyon.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Laurence Binyon</h2>
<p>For Mercy, Courage, Kindness, Mirth,  <br />
There is no measure upon earth.  <br />
Nay, they wither, root and stem,  <br />
If an end be set to them.  <br />
 <br />
Overbrim and overflow,          <br />
If you own heart you would know;  <br />
For the spirit born to bless  <br />
Lives but in its own excess</p>
