<h1 class="title-poem">The Guest Book</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Joachim-Ringelnatz.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joachim Ringelnatz</h2>
<p>Dragged to a Guest Book sans pardon<br />
You are non-plussed<br />
You feel locked up into the john<br />
Needlessly. You feel disgust.<br />
<br />
For many guests in passing by<br />
Want not to leave their writ<br />
And throw their ink dabs, on the sly<br />
Unseen, where they may fit.</p>
