<h1 class="title-poem">Pisces</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/R-S-Thomas.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">R. S. Thomas</h2>
<p>Who said to the trout,<br />
You shall die on Good Friday<br />
To be food for a man<br />
And his pretty lady?<br />
<br />
It was I, said God,<br />
Who formed the roses<br />
In the delicate flesh<br />
And the tooth that bruises.</p>
