<h1 class="title-poem">Sir, say no more</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/Trumbull-Stickney.gif);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Trumbull Stickney</h2>
<p>  Sir, say no more.<br />
  Within me 't is as if<br />
  The green and climbing eyesight of a cat<br />
  Crawled near my mind's poor birds.</p>
