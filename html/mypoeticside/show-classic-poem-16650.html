<h1 class="title-poem">There was an Old Man of New York</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>THERE WAS AN OLD MAN OF NEW YORK, WHO MURDERED HIMSELF WITH A FORK;<br />
  BUT NOBODY CRIED THOUGH HE VERY SOON DIED, --<br />
  FOR THAT SILLY OLD MAN OF NEW YORK.</p>
