<h1 class="title-poem">The Watcher</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Put forth to watch, unschooled, alone,<br />
                'Twixt hostile earth and sky;<br />
              The mottled lizard 'neath the stone<br />
                 Is wiser here than I.<br />
<br />
               What stir across the haze of heat?<br />
                  What omen down the wind?<br />
              The buck that break before my feet--<br />
                  They know, but I am blind!</p>
