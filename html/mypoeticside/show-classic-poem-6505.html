<h1 class="title-poem">I heard thee laugh</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>I HEARD thee laugh,<br />
And in this merriment<br />
I defined the measure of my pain;<br />
I knew that I was alone,<br />
Alone with love,<br />
Poor shivering love,<br />
And he, little sprite,<br />
Came to watch with me,<br />
And at midnight<br />
We were like two creatures by a dead camp-fire.</p>
