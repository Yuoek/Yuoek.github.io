                    <h2 class="title-content">Dante Gabriel Rossetti</h2>
<p>ROBE d'or, mais rien ne veut<br />
Qu'une rose à ses cheveux.<br />
A golden robe, yet will she wear<br />
Only a rose in her golden hair.</p>
