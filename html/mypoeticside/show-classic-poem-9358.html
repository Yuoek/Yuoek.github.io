<h1 class="title-poem">Elegy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/dugan.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Alan Dugan</h2>
<p>I know but will not tell<br />
you, Aunt Irene, why there<br />
are soap suds in the whiskey:<br />
Uncle Robert had to have<br />
A drink while shaving.</p>
