<h1 class="title-poem">Men at Forty</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/donald.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Donald Justice</h2>
<p>Men at forty<br />
Learn to close softly<br />
The doors to rooms they will not be<br />
Coming back to</p>
