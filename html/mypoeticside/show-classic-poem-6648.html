<h1 class="title-poem">You Nor I Nor Nobody Knows</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/adelaide.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Adelaide Crapsey</h2>
<p>You nor I nor nobody knows<br />
<br />
Where our daily-taken breath<br />
<br />
Vanisheth and vanisheth:<br />
<br />
Where our lost breath's flying goes<br />
<br />
You nor I nor nobody knows.</p>
