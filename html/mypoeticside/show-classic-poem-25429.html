<h1 class="title-poem">The Sower</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Sure of the spring that warms them into birth,<br />
The golden seeds thou trustest to the earth;<br />
And dost thou doubt the eternal spring sublime,<br />
For deeds--the seeds which wisdom sows in time.</p>
