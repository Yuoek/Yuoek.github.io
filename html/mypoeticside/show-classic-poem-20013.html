<h1 class="title-poem">He Made This Screen</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/mariannem.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Marianne Moore</h2>
<p>not of silver nor of coral,<br />
but of weatherbeaten laurel.<br />
<br />
here, he introduced a sea<br />
uniform like tapestry;<br />
<br />
here, a fig-tree; there, a face;<br />
there, a dragon circling space --<br />
<br />
designating here, a bower;<br />
there, a pointed passion-flower.</p>
