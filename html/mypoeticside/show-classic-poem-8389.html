<h1 class="title-poem">Some such Butterfly be seen</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>541<br />
<br />
Some such Butterfly be seen<br />
On Brazilian Pampas—<br />
Just at noon—no later—Sweet—<br />
Then—the License closes—<br />
<br />
Some such Spice—express and pass—<br />
Subject to Your Plucking—<br />
As the Stars—You knew last Night—<br />
Foreigners—This Morning—</p>
