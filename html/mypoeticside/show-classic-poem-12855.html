<h1 class="title-poem">To Pansies</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Ah, Cruel Love!  must I endure<br />
Thy many scorns, and find no cure?<br />
Say, are thy medicines made to be<br />
Helps to all others but to me?<br />
I'll leave thee, and to Pansies come:<br />
Comforts you'll afford me some:<br />
You can ease my heart, and do<br />
What Love could ne'er be brought unto.</p>
