<h1 class="title-poem">Winter Trees</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>All the complicated details<br />
of the attiring and<br />
the disattiring are completed!<br />
A liquid moon<br />
moves gently among<br />
the long branches.<br />
Thus having prepared their buds<br />
against a sure winter<br />
the wise trees<br />
stand sleeping in the cold.</p>
