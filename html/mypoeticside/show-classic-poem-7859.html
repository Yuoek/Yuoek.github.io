<h1 class="title-poem">Autumn—overlooked my Knitting</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>748<br />
<br />
Autumn—overlooked my Knitting—<br />
Dyes—said He—have I—<br />
Could disparage a Flamingo—<br />
Show Me them—said I—<br />
<br />
Cochineal—I chose—for deeming<br />
It resemble Thee—<br />
And the little Border—Dusker—<br />
For resembling Me—</p>
