<h1 class="title-poem">Wet Evening in April</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/patrickka.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Patrick Kavanagh</h2>
<p>The birds sang in the wet trees<br />
And I listened to them it was a hundred years from now<br />
And I was dead and someone else was listening to them.<br />
But I was glad I had recorded for him<br />
The melancholy.</p>
