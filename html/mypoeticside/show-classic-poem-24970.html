<h1 class="title-poem">Blacklisted</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/carl-sandburg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Carl Sandburg</h2>
<p>Why shall I keep the old name?<br />
What is a name anywhere anyway?<br />
A name is a cheap thing all fathers and mothers leave<br />
    each child:<br />
A job is a job and I want to live, so<br />
Why does God Almighty or anybody else care whether<br />
    I take a new name to go by?</p>
