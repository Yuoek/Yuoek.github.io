<h1 class="title-poem">Upon the path of dreams</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Ono-no-Komachi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ono no Komachi</h2>
<p>Upon the path of dreams<br />
My feet don't rest,<br />
Constantly trailing to you, yet<br />
In reality, a single glimpse:<br />
Not even that have I had of you.</p>
