<h1 class="title-poem">Impromptu, to a Young Lady Singing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/ladym.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lady Mary Wortley Montagu</h2>
<p>Sing, gentle maid -- reform my breast,<br />
And soften all my care;<br />
Thus may I be some moments blest,<br />
And easy in despair.<br />
The pow'r of Orpheus lives in you;<br />
You can the passions of my soul subdue,<br />
And tame the lions and the tigers there.</p>
