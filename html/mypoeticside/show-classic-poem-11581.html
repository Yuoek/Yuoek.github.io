<h1 class="title-poem">Apparent Death</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>WEEP, maiden, weep here o'er the tomb of Love;<br />
<br />
He died of nothing--by mere chance was slain.<br />
But is he really dead?--oh, that I cannot prove:<br />
<br />
A nothing, a mere chance, oft gives him life again.</p>
