<h1 class="title-poem">A Hint</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/06/AAW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Albery Allson Whitman</h2>
<p>Who seeks to show another's fault will find<br />
In self a greater shown,<br />
But he that is to faults of others blind,<br />
But covers thus his own.</p>
