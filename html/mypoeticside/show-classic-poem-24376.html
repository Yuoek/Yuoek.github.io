<h1 class="title-poem">If You Show Patience</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/th.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jalaluddin Rumi</h2>
<p>If you show patience, I'll rid you of this virtue.<br />
If you fall asleep, I'll rub the sleep from your eyes.<br />
If you become a mountain, I'll melt you in fire.<br />
And if you become an ocean, I'll drink all your water.</p>
