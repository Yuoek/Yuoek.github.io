<h1 class="title-poem">Tell me why</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>TELL me why, behind thee,<br />
I see always the shadow of another lover?<br />
Is it real<br />
Or is this the thrice-damned memory of a better happiness?<br />
Plague on him if he be dead<br />
Plague on him if he be alive<br />
A swinish numbskull<br />
To intrude his shade<br />
Always between me and my peace.</p>
