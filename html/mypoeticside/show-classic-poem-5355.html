<h1 class="title-poem">If Death be Good</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/10/bliss.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Bliss Carman</h2>
<p>(Sappho LXXIV)<br />
  If death be good,<br />
  Why do the gods not die?<br />
  If life be ill,<br />
  Why do the gods still live?<br />
  If love be naught,<br />
  Why do the gods still love?<br />
  If love be all,<br />
  What should men do but love?</p>
