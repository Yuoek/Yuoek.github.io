<h1 class="title-poem">An Etching</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/11/ESPW.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elizabeth Stuart Phelps Ward</h2>
<p>A true knight! Knowing neither worldly fear,<br />
Nor yet reproach of her unworldly faith;<br />
Fine eyes shall see, yet see not, on this page,<br />
A man, who from a woman's heart of hearts<br />
Could earn, and keep, the sacred name of Friend.</p>
