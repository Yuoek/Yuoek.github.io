<h1 class="title-poem">Rubaiyat 37</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shams.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>Let not your thoughts constantly be fought,<br />
Let thoughts in patience and joy be caught.<br />
What patience? Cause what they call the heart<br />
Is a drop of blood, and a thousand thought.</p>
