<h1 class="title-poem">The Cat and the Sea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/R-S-Thomas.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">R. S. Thomas</h2>
<p>It is a matter of a black cat<br />
On a bare cliff top in March<br />
Whose eyes anticipate<br />
The gorse petals;<br />
<br />
The formal equation of<br />
A domestic purr<br />
With the cold interiors<br />
Of the sea's mirror.</p>
