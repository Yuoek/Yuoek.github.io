<h1 class="title-poem">Me, change! Me, alter!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Me, change! Me, alter!<br />
Then I will, when on the Everlasting Hill<br />
A Smaller Purple grows—<br />
At sunset, or a lesser glow<br />
Flickers upon Cordillera—<br />
At Day's superior close!</p>
