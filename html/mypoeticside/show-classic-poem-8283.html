<h1 class="title-poem">In lands I never saw—they say</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>124<br />
<br />
In lands I never saw—they say<br />
Immortal Alps look down—<br />
Whose Bonnets touch the firmament—<br />
Whose Sandals touch the town—<br />
<br />
Meek at whose everlasting feet<br />
A Myriad Daisy play—<br />
Which, Sir, are you and which am I<br />
Upon an August day?</p>
