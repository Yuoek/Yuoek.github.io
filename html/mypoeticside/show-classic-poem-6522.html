<h1 class="title-poem">With eye and with gesture</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>With eye and with gesture<br />
You say you are holy.<br />
I say you lie;<br />
For I did see you<br />
Draw away your coats<br />
From the sin upon the hands<br />
Of a little child.<br />
Liar!</p>
