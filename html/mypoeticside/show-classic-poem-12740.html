<h1 class="title-poem">Divination By A Daffodil</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>When a daffodil I see,<br />
Hanging down his head towards me,<br />
Guess I may what I must be:<br />
First, I shall decline my head;<br />
Secondly, I shall be dead;<br />
Lastly, safely buried.</p>
