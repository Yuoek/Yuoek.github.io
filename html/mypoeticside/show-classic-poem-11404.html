<h1 class="title-poem">My Own Property</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>I FEEL that I'm possess'd of nought,<br />
Saving the free unfetterd thought<br />
Which from my bosom seeks to flow,<br />
And each propitious passing hour<br />
That suffers me in all its power<br />
A loving fate with truth to know.</p>
