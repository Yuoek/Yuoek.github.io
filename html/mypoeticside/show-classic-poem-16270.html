<h1 class="title-poem">Dreams</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/lawrence.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">D.H. Lawrence</h2>
<p>All people dream, but not equally.<br />
Those who dream by night in the dusty recesses of their mind,<br />
Wake in the morning to find that it was vanity.<br />
<br />
But the dreamers of the day are dangerous people,<br />
For they dream their dreams with open eyes,<br />
And make them come true.</p>
