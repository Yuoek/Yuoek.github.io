<h1 class="title-poem">To be Carved on a Stone at Ballylee</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>I, the poet William Yeats,<br />
With old mill boards and sea-green slates,<br />
And smithy work from the Gort forge,<br />
Restored this tower for my wife George;<br />
And may these characters remain<br />
When all is ruin once again.</p>
