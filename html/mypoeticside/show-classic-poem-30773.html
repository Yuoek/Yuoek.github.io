<h1 class="title-poem">Birch Tree</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/ASJ-Tessimond.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A.S.J. Tessimond</h2>
<p>The birch tree in winter<br />
Leaning over the secret pool<br />
Is Narcissus in love<br />
With the slight white branches,<br />
The slim trunk,<br />
In the dark glass;<br />
But,<br />
Spring coming on,<br />
Is afraid,<br />
And scarfs the white limbs<br />
In green.</p>
