<h1 class="title-poem">Grasshopper</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/Velimir-Khlebnikov.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Velimir Khlebnikov</h2>
<p>Wingletting with the golden scrawl<br />
Of its finest sinews,<br />
The grasshopper loaded its trailer-belly<br />
With many coastal herbs and faiths.<br />
    "Ping, ping, ping!" tra-lah-ed the zingzinger.<br />
O, swanderful!<br />
O, illuminate!</p>
