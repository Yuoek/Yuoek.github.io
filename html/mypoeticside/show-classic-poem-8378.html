<h1 class="title-poem">She died—this was the way she died</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>150<br />
<br />
She died—this was the way she died.<br />
And when her breath was done<br />
Took up her simple wardrobe<br />
And started for the sun.<br />
Her little figure at the gate<br />
The Angels must have spied,<br />
Since I could never find her<br />
Upon the mortal side.</p>
