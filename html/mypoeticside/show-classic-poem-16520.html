<h1 class="title-poem">Send Round the Hat</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Lawson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Lawson</h2>
<p>Now this is the creed from the Book of the Bush –<br />
Should be simple and plain to a dunce:<br />
"If a man’s in a hole you must pass round the hat –<br />
Were he jail-bird or gentleman once."</p>
