<h1 class="title-poem">When One has given up One's life</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>853<br />
<br />
When One has given up One's life<br />
The parting with the rest<br />
Feels easy, as when Day lets go<br />
Entirely the West<br />
<br />
The Peaks, that lingered last<br />
Remain in Her regret<br />
As scarcely as the Iodine<br />
Upon the Cataract.</p>
