<h1 class="title-poem">His Confidence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>Undying love to buy<br />
I wrote upon<br />
The corners of this eye<br />
All wrongs done.<br />
What payment were enough<br />
For undying love?<br />
<br />
I broke my heart in two<br />
So hard I struck.<br />
What matter? for I know<br />
That out of rock,<br />
Out of a desolate source,<br />
Love leaps upon its course.</p>
