<h1 class="title-poem">God permit industrious angels</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>God permit industrious angels<br />
Afternoons to play.<br />
I met one, -- forgot my school-mates,<br />
All, for him, straightaway.<br />
<br />
God calls home the angels promptly<br />
At the setting sun;<br />
I missed mine. How dreary marbles,<br />
After playing the Crown!</p>
