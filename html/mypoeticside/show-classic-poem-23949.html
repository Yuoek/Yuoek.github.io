<h1 class="title-poem">Blind From My Birth</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Blind from my birth,<br />
Where flowers are springing<br />
I sit on earth<br />
All dark.<br />
Hark! hark!<br />
A lark is singing.<br />
His notes are all for me,<br />
For me his mirth: -<br />
Till some day I shall see<br />
Beautiful flowers<br />
And birds in bowers<br />
Where all Joy Bells are ringing.</p>
