<h1 class="title-poem">Conviction (III)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/steviesmith.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stevie Smith</h2>
<p>The shadow was so black,<br />
I thought it was a cat,<br />
But once in to it<br />
I knew it<br />
No more black<br />
Than a shadow's back.<br />
<br />
Illusion is a freak<br />
Of mind;<br />
The cat's to seek.</p>
