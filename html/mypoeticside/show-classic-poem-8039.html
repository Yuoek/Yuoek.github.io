<h1 class="title-poem">That is solemn we have ended</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>934<br />
<br />
That is solemn we have ended<br />
Be it but a Play<br />
Or a Glee among the Garret<br />
Or a Holiday<br />
<br />
Or a leaving Home, or later,<br />
Parting with a World<br />
We have understood for better<br />
Still to be explained.</p>
