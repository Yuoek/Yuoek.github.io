<h1 class="title-poem">Tod's Amendment</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>The World hath set its heavy yoke<br />
Upon the old white-bearded folk<br />
Who strive to please the King.<br />
God's mercy is upon the young,<br />
God's wisdom in the baby tongue<br />
That fears not anything.</p>
