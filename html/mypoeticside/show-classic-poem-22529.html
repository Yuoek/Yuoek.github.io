<h1 class="title-poem">Resentment Near the Jade Stairs</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>Dew whitens the jade stairs.<br />
This late, it soaks her gauze stockings.<br />
<br />
She lowers her crystal blind to watch<br />
the breaking, glass-clear moon of autumn.</p>
