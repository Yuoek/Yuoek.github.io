<h1 class="title-poem">To Astronomers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Prate not to me so much of suns and of nebulous bodies;<br />
  Think ye Nature but great, in that she gives thee to count?<br />
Though your object may be the sublimest that space holds within it,<br />
  Yet, my good friends, the sublime dwells not in the regions of space.</p>
