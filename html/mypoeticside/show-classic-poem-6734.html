<h1 class="title-poem">But Men Loved Darkness rather than Light</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/richard-crashaw.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Crashaw</h2>
<p>The world's light shines, shine as it will,<br />
  The world will love its darkness still.<br />
  I doubt though when the world's in hell,<br />
  It will not love its darkness half so well.</p>
