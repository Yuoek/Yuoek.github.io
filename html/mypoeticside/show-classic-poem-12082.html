<h1 class="title-poem">Rubaiyat 13</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/03/shams.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Shams al-Din Hafiz</h2>
<p>Every friend who talked of love, became a foe.<br />
Every eagle shifted its shape to a crow.<br />
They say the night is pregnant, and I say,<br />
Who is the father? And how do you know?</p>
