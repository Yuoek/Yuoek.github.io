<h1 class="title-poem">Tumbling-hair</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>Tumbling-hair<br />
             picker of buttercups<br />
                                  violets<br />
dandelions<br />
And the big bullying daisies<br />
                            through the field wonderful<br />
with eyes a little sorry<br />
Another comes<br />
             also picking flowers</p>
