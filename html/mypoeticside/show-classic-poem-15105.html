<h1 class="title-poem">The Prayer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>My brother kneels, so saith Kabir,<br />
To stone and brass in heathen wise,<br />
But in my brother's voice I hear<br />
My own unanswered agonies.<br />
His God is as his fates assign,<br />
His prayer is all the world's--and mine.</p>
