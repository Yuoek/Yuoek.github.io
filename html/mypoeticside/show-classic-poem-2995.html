<h1 class="title-poem">In the forest</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bjřrnstjerne Bjřrnson</h2>
<p>List to the forest-voice murmuring low:<br />
All that it saw when alone with its laughter,<br />
All that it suffered in times that came after,<br />
Mournful it tells, that the wind may know.</p>
