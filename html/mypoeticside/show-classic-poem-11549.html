<h1 class="title-poem">The Bliss Of Sorrow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/goethe.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>NEVER dry, never dry,<br />
<br />
 Tears that eternal love sheddeth!<br />
How dreary, how dead doth the world still appear,<br />
When only half-dried on the eye is the tear!<br />
<br />
Never dry, never dry,<br />
<br />
 Tears that unhappy love sheddeth!</p>
