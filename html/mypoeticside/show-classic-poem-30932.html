<h1 class="title-poem">Thaw</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-thomas.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Phillip Edward Thomas</h2>
<p>Over the land half freckled with snow half-thawed<br />
The speculating rooks at their nests cawed,<br />
And saw from elm-tops, delicate as a flower of grass,<br />
What we below could not see, Winter pass.</p>
