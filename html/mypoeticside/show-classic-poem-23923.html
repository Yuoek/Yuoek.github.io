<h1 class="title-poem">A Motherless Soft Lambkin</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>A motherless soft lambkin<br />
Along upon a hill;<br />
No mother's fleece to shelter him<br />
And wrap him from the cold: -<br />
I'll run to him and comfort him,<br />
I'll fetch him, that I will;<br />
I'll care for him and feed him<br />
Until he's strong and bold.</p>
