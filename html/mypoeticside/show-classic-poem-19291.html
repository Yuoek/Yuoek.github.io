<h1 class="title-poem">Epitaph</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>Heap not on this mound<br />
Roses that she loved so well:<br />
Why bewilder her with roses,<br />
That she cannot see or smell?<br />
<br />
She is happy where she lies<br />
With the dust upon her eyes.</p>
