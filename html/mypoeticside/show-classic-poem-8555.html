<h1 class="title-poem">All the letters I can write</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>334<br />
<br />
All the letters I can write<br />
Are not fair as this—<br />
Syllables of Velvet—<br />
Sentences of Plush,<br />
Depths of Ruby, undrained,<br />
Hid, Lip, for Thee—<br />
Play it were a Humming Bird—<br />
And just sipped—me—</p>
