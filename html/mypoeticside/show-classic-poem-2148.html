<h1 class="title-poem">Know'st Thou What Gray Methuselah</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/Konb.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Konstantin Batyushkov</h2>
<p>Know'st thou what gray Methuselah<br />
Pronounced when parting with this life?<br />
       Man's born a slave,<br />
       He dies a slave,<br />
       And death will never tell him why<br />
He walked this lovely vale of tears,<br />
       Suffered, wept, endured, and disappeared.</p>
