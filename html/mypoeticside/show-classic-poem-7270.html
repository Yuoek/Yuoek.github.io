<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/John-Davidson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Davidson</h2>
<p>THE boat is chafing at our long delay,<br />
 And we must leave too soon<br />
The spicy sea-pinks and the inborne spray,<br />
 The tawny sands, the moon.<br />
<br />
Keep us, O Thetis, in our western flight!<br />
 Watch from thy pearly throne<br />
Our vessel, plunging deeper into night<br />
 To reach a land unknown.</p>
