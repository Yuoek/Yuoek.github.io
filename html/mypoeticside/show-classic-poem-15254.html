<h1 class="title-poem">His Wedded Wife</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>Cry "Murder" in the market-place, and each<br />
Will turn upon his neighbour anxious eyes<br />
Asking: "Art thou the man?" We hunted Cain<br />
Some centuries ago across the world.<br />
This bred the fear our own misdeeds maintain<br />
To-day.</p>
