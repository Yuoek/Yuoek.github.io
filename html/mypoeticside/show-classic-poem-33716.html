<h1 class="title-poem">Walt Whitman's Caution</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>TO The States, or any one of them, or any city of The States,<br />
        Resist much, obey little;<br />
Once unquestioning obedience, once fully enslaved;<br />
Once fully enslaved, no nation, state, city, of this earth, ever<br />
        afterward resumes its liberty.</p>
