<h1 class="title-poem">High In The Mountains By A Deep Ravine</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/Michelangelo.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Michelangelo Buonarroti</h2>
<p>High in the mountains by a deep ravine<br />
inside my massive block, enclosed, alone —<br />
but then brought down and stripped, I now am seen<br />
against my will and destitute of stone.</p>
