<h1 class="title-poem">I held a Jewel in my fingers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>245<br />
<br />
I held a Jewel in my fingers—<br />
And went to sleep—<br />
The day was warm, and winds were prosy—<br />
I said "'Twill keep"—<br />
<br />
I woke—and chid my honest fingers,<br />
The Gem was gone—<br />
And now, an Amethyst remembrance<br />
Is all I own—</p>
