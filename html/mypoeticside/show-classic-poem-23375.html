<h1 class="title-poem">The Ants</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Joachim-Ringelnatz.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joachim Ringelnatz</h2>
<p>There once were two ants in Westphalia<br />
Who wanted to go to Australia.<br />
But cursing their feet<br />
In a Belgian street<br />
They gave up the trip as a failya.</p>
