<h1 class="title-poem">O Why Do You Walk (a Parody)</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/aehou.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">A. E. Housman</h2>
<p>O why do you walk through the fields in boots,<br />
     Missing so much and so much?<br />
O fat white woman whom nobody shoots,<br />
Why do you walk through the fields in boots,<br />
When the grass is soft as the breast of coots<br />
     And shivering-sweet to the touch?</p>
