<h1 class="title-poem">A Cry</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>Oh, there are eyes that he can see,<br />
And hands to make his hands rejoice,<br />
But to my lover I must be<br />
Only a voice.<br />
<br />
Oh, there are breasts to bear his head,<br />
And lips whereon his lips can lie,<br />
But I must be till I am dead<br />
Only a cry.</p>
