<h1 class="title-poem">At the Desk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Theodor-Storm.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Theodor Storm</h2>
<p>I spent the entire day in official details;<br />
And it almost pulled me down like the others:<br />
I felt that tiny insane voluptuousness,<br />
Getting this done, finally finishing that.</p>
