<h1 class="title-poem">At Yoshino River</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/kino.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ki no Tsurayuki</h2>
<p>At Yoshino River<br />
Waves crash high above the rocks;<br />
The rushing water<br />
Swift as your<br />
Lodging within my thoughts.</p>
