<h1 class="title-poem">A Night—there lay the Days between</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>471<br />
<br />
A Night—there lay the Days between—<br />
The Day that was Before—<br />
And Day that was Behind—were one—<br />
And now—'twas Night—was here—<br />
<br />
Slow—Night—that must be watched away—<br />
As Grains upon a shore—<br />
Too imperceptible to note—<br />
Till it be night—no more—</p>
