<h1 class="title-poem">'Tis Opposites—entice</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>'Tis Opposites—entice—<br />
Deformed Men—ponder Grace—<br />
Bright fires—the Blanketless—<br />
The Lost—Day's face—<br />
<br />
The Blind—esteem it be<br />
Enough Estate—to see—<br />
The Captive—strangles new—<br />
For deeming—Beggars—play—<br />
<br />
To lack—enamor Thee—<br />
Tho' the Divinity—<br />
Be only<br />
Me—</p>
