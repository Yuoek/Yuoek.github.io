                    <h2 class="title-content">Johann Wolfgang von Goethe</h2>
<p>OH world, with what baseness and guilt thou art rife!<br />
<br />
Thou nurtures, trainest, and illest the while.<br />
<br />
He only whom Allah doth bless with his smile<br />
Is train'd and is nurtured with riches and life.</p>
