<h1 class="title-poem">If this is</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>120<br />
<br />
If this is "fading"<br />
Oh let me immediately "fade"!<br />
If this is "dying"<br />
Bury me, in such a shroud of red!<br />
If this is "sleep,"<br />
On such a night<br />
How proud to shut the eye!<br />
Good Evening, gentle Fellow men!<br />
Peacock presumes to die!</p>
