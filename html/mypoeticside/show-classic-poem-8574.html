<h1 class="title-poem">Baffled for just a day or two</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>17<br />
<br />
Baffled for just a day or two—<br />
Embarrassed—not afraid—<br />
Encounter in my garden<br />
An unexpected Maid.<br />
<br />
She beckons, and the woods start—<br />
She nods, and all begin—<br />
Surely, such a country<br />
I was never in!</p>
