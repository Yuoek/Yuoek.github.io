<h1 class="title-poem">A Toast to Iceland</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jonas Hallgrimsson</h2>
<p>Our land of lakes forever fair<br />
below blue mountain summits,<br />
of swans, of salmon leaping where<br />
the silver water plummets,<br />
of glaciers swelling broad and bare<br />
above earth's fiery sinews ---<br />
the Lord pour out his largess there<br />
as long as earth continues!</p>
