<h1 class="title-poem">i shall imagine life</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/06/eecummings.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">e.e. cummings</h2>
<p>i shall imagine life<br />
is not worth dying,if<br />
(and when)roses complain<br />
their beauties are in vain<br />
<br />
but though mankind persuades<br />
itself that every weed's<br />
a rose,roses(you feel<br />
certain)will only smile</p>
