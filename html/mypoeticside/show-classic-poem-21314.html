<h1 class="title-poem">The Apple Tree</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>When first we saw the apple tree<br />
 The boughs were dark and straight,<br />
But never grief to give had we,<br />
 Though Spring delayed so late.<br />
<br />
When last I came away from there<br />
 The boughs were heavy hung,<br />
But little grief had I to spare<br />
 For Summer, perished young.</p>
