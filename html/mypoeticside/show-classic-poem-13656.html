<h1 class="title-poem">Problems</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>2 and 2 are 4.<br />
4 and 4 are 8.<br />
<br />
But what would happen<br />
If the last 4 was late?<br />
<br />
And how would it be<br />
If one 2 was me?<br />
<br />
Or if the first 4 was you<br />
Divided by 2?</p>
