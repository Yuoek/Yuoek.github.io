<h1 class="title-poem">Those Two</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/allen_ginsberg.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Allen Ginsberg</h2>
<p>That tree said<br />
   I don't like that white car under me,<br />
                   it smells gasoline<br />
That other tree next to it said<br />
   O you're always complaining<br />
            you're a neurotic<br />
       you can see by the way you're bent over.</p>
