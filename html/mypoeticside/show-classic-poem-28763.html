<h1 class="title-poem">Remembrance</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/su-tung.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Su Tung-po</h2>
<p>To what can our life on earth be likened?<br />
To a flock of geese,<br />
alighting on the snow.<br />
Sometimes leaving a trace of their passage.</p>
