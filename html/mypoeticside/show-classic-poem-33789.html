<h1 class="title-poem">Not My Enemies Ever Invade Me</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>NOT my enemies ever invade me--no harm to my pride from them I fear;<br />
But the lovers I recklessly love--lo! how they master me!<br />
Lo! me, ever open and helpless, bereft of my strength!<br />
Utterly abject, grovelling on the ground before them.</p>
