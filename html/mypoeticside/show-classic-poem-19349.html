<h1 class="title-poem">To a Young Poet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/ednast.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edna St. Vincent Millay</h2>
<p>Time cannot break the bird's wing from the bird.<br />
Bird and wing together<br />
Go down, one feather.<br />
<br />
No thing that ever flew,<br />
Not the lark, not you,<br />
Can die as others do.</p>
