<h1 class="title-poem">The Flower must not blame the Bee</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>206<br />
<br />
The Flower must not blame the Bee—<br />
That seeketh his felicity<br />
Too often at her door—<br />
<br />
But teach the Footman from Vevay—<br />
Mistress is "not at home"—to say—<br />
To people—any more!</p>
