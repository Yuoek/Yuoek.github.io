<h1 class="title-poem">General Review Of The Sex Situation</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Woman wants monogamy;<br />
Man delights in novelty.<br />
Love is woman's moon and sun;<br />
Man has other forms of fun.<br />
Woman lives but in her lord;<br />
Count to ten, and man is bored.<br />
With this the gist and sum of it,<br />
What earthly good can come of it?</p>
