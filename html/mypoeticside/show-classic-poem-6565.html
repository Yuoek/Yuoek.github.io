<h1 class="title-poem">I looked here</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>I looked here;<br />
I looked there;<br />
Nowhere could I see my love.<br />
And -- this time --<br />
She was in my heart.<br />
Truly, then, I have no complaint,<br />
For though she be fair and fairer,<br />
She is none so fair as she<br />
In my heart.</p>
