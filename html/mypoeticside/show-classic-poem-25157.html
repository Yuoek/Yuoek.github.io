<h1 class="title-poem">We put the urn aboard ship</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/sappho.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sappho</h2>
<p>We put the urn aboard ship<br />
with this inscription:<br />
<br />
This is the dust of little<br />
Timas who unmarried was led<br />
into Persephone's dark bedroom<br />
<br />
And she being far from home, girls<br />
her age took new-edged blades<br />
to cut, in mourning for her,<br />
these curls of their soft hair</p>
