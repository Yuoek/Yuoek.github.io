<h1 class="title-poem">Shoes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>when you're young<br />
a pair of<br />
female<br />
high-heeled shoes<br />
just sitting<br />
alone<br />
in the closet<br />
can fire your<br />
bones;<br />
when you're old<br />
it's just<br />
a pair of shoes<br />
without<br />
anybody<br />
in them<br />
and<br />
just as<br />
well.</p>
