<h1 class="title-poem">The Prophet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/lawrence.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">D.H. Lawrence</h2>
<p>Ah, my darling, when over the purple horizon shall loom<br />
The shrouded mother of a new idea, men hide their faces,<br />
Cry out and fend her off, as she seeks her procreant groom,<br />
Wounding themselves against her, denying her fecund embraces.</p>
