<h1 class="title-poem">Mystic shadow</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Mystic shadow, bending near me,<br />
Who art thou?<br />
Whence come ye?<br />
And -- tell me -- is it fair<br />
Or is the truth bitter as eaten fire?<br />
Tell me!<br />
Fear not that I should quaver.<br />
For I dare -- I dare.<br />
Then, tell me!</p>
