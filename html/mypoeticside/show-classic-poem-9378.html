<h1 class="title-poem">Curtain</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/pld.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Paul Laurence Dunbar</h2>
<p>VILLAIN shows his indiscretion,<br />
Villain's partner makes confession.<br />
Juvenile, with golden tresses,<br />
Finds her pa and dons long dresses.<br />
Scapegrace comes home money-laden,<br />
Hero comforts tearful maiden,<br />
Soubrette marries loyal chappie,<br />
Villain skips, and all are happy.</p>
