<h1 class="title-poem">Regret for Peony Flowers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Bai-Juyi.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bai Juyi</h2>
<p>I'm saddened by the peonies before the steps, so red,<br />
As evening came I found that only two remained.<br />
Once morning's winds have blown, they surely won't survive,<br />
At night I gaze by lamplight, to cherish the fading red.</p>
