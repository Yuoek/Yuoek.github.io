<h1 class="title-poem">I send Two Sunsets</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>308<br />
<br />
I send Two Sunsets—<br />
Day and I—in competition ran—<br />
I finished Two—and several Stars—<br />
While He—was making One—<br />
<br />
His own was ampler—but as I<br />
Was saying to a friend—<br />
Mine—is the more convenient<br />
To Carry in the Hand—</p>
