<h1 class="title-poem">Away from Home are some and I—</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>821<br />
<br />
Away from Home are some and I—<br />
An Emigrant to be<br />
In a Metropolis of Homes<br />
Is easy, possibly—<br />
<br />
The Habit of a Foreign Sky<br />
We—difficult—acquire<br />
As Children, who remain in Face<br />
The more their Feet retire.</p>
