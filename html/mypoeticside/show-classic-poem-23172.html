<h1 class="title-poem">Spires</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/loa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lola Ridge</h2>
<p>Spires of Grace Church,<br />
For you the workers of the world<br />
Travailed with the mountains...<br />
Aborting their own dreams<br />
Till the dream of you arose -<br />
Beautiful, swaddled in stone -<br />
Scorning their hands.</p>
