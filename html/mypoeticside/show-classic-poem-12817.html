<h1 class="title-poem">To Anthea</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Anthea, I am going hence<br />
With some small stock of innocence;<br />
But yet those blessed gates I see<br />
Withstanding entrance unto me;<br />
To pray for me do thou begin;--<br />
The porter then will let me in.</p>
