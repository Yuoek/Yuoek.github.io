<h1 class="title-poem">Mourning Yin Yao</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>We follow you home to the Mountain.<br />
Back again through oak and green pine.<br />
Beyond the White Clouds you stay forever.<br />
Only this stream runs down to Humankind.</p>
