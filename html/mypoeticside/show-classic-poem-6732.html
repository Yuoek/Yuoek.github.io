<h1 class="title-poem">Two Went up into the Temple to Pray</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/richard-crashaw.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Richard Crashaw</h2>
<p>Two went to pray? O rather say<br />
  One went to brag, th' other to pray:<br />
<br />
   One stands up close and treads on high,<br />
  Where th' other dares not send his eye.<br />
<br />
   One nearer to God's altar trod,<br />
  The other to the altar's God.</p>
