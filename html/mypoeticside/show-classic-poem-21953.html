<h1 class="title-poem">I Know, I Alone</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/fernandopessoa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Fernando Pessoa</h2>
<p>I know, I alone<br />
How much it hurts, this heart<br />
With no faith nor law<br />
Nor melody nor thought.<br />
<br />
Only I, only I<br />
And none of this can I say<br />
Because feeling is like the sky -<br />
Seen, nothing in it to see.</p>
