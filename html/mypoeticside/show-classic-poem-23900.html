<h1 class="title-poem">A City Plum Is Not A Plum</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>A city plum is not a plum;<br />
A dumb-bell is no bell, though dumb;<br />
A party rat is not a rat;<br />
A sailor's cat is not a cat;<br />
A soldier's frog is not a frog;<br />
A captain's log is not a log.</p>
