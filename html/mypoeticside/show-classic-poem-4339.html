<h1 class="title-poem">it was just a little while ago</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/charles_bukowski.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Bukowski</h2>
<p>almost dawn<br />
blackbirds on the telephone wire<br />
waiting<br />
as I eat yesterday's<br />
forgotten sandwich<br />
at 6 a.m.<br />
an a quiet Sunday morning.<br />
<br />
one shoe in the corner<br />
standing upright<br />
the other laying on it's<br />
side.<br />
<br />
yes, some lives were made to be<br />
wasted.</p>
