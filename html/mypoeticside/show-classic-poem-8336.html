<h1 class="title-poem">My friend attacks my friend!</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>118<br />
<br />
My friend attacks my friend!<br />
Oh Battle picturesque!<br />
Then I turn Soldier too,<br />
And he turns Satirist!<br />
How martial is this place!<br />
Had I a mighty gun<br />
I think I'd shoot the human race<br />
And then to glory run!</p>
