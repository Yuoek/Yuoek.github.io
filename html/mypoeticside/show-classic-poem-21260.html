<h1 class="title-poem">Sanctuary</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>My land is bare of chattering folk;<br />
 The clouds are low along the ridges,<br />
And sweet's the air with curly smoke<br />
 From all my burning bridges.</p>
