<h1 class="title-poem">A Christmas Hymn</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/10/fur.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Joseph Furphy</h2>
<p>The Seraph-song of morning's prime<br />
That hail'd Messiah's birth,<br />
The charter of a coming time<br />
When Love shall rule the earth,<br />
Rings from yon far Judaean hill —</p>
