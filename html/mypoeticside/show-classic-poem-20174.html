<h1 class="title-poem">Reading Aloud</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/02/Christopher-Morley.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christopher Morley</h2>
<p>ONCE we read Tennyson aloud<br />
In our great fireside chair;<br />
Between the lines my lips could touch<br />
Her April-scented hair.<br />
<br />
How very fond I was, to think<br />
The printed poems fair,<br />
When close within my arms I held<br />
A living lyric there!</p>
