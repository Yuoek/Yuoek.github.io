<h1 class="title-poem">Have you ever made a just man?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>"Have you ever made a just man?"<br />
"Oh, I have made three," answered God,<br />
"But two of them are dead,<br />
And the third --<br />
Listen! Listen!<br />
And you will hear the thud of his defeat."</p>
