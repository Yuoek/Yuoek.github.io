<h1 class="title-poem">Upon Julia's Clothes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Upon Julia's Clothes<br />
<br />
              Whenas in silks my Julia goes,<br />
              Then, then, methinks, how sweetly flows<br />
              That liquefaction of her clothes!<br />
<br />
              Next, when I cast mine eyes and see<br />
              That brave vibration each way free,<br />
              Oh how that glittering taketh me!</p>
