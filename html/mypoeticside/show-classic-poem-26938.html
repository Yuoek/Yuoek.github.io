<h1 class="title-poem">Take, O Take those Lips Away</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/william-shakespeare.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Shakespeare</h2>
<p>Take, O take those lips away,<br />
    That so sweetly were forsworn;<br />
  And those eyes, the break of day,<br />
    Lights that do mislead the morn:<br />
  But my kisses bring again,<br />
        bring again,<br />
  Seals of love, but seal'd in vain,<br />
        seal'd in vain.</p>
