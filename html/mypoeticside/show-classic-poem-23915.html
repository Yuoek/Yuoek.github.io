<h1 class="title-poem">A Diamond Or A Coal?</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>A diamond or a coal?<br />
A diamond, if you please:<br />
Who cares about a clumsy coal<br />
Beneath the summer trees?<br />
A diamond or a coal?<br />
A coal, sir, if you please:<br />
One comes to care about the coal<br />
What time the waters freeze.</p>
