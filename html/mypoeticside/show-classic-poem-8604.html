<h1 class="title-poem">Dreams—are well—but Waking's better</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>450<br />
<br />
Dreams—are well—but Waking's better,<br />
If One wake at morn—<br />
If One wake at Midnight—better—<br />
Dreaming—of the Dawn—<br />
<br />
Sweeter—the Surmising Robins—<br />
Never gladdened Tree—<br />
Than a Solid Dawn—confronting—<br />
Leading to no Day—</p>
