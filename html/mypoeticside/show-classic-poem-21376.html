<h1 class="title-poem">Mortal Enemy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Let another cross his way-<br />
 She's the one will do the weeping!<br />
Little need I fear he'll stray<br />
 Since I have his heart in keeping-<br />
<br />
Let another hail him dear-<br />
 Little chance that he'll forget me!<br />
Only need I curse and fear<br />
 Her he loved before he met me.</p>
