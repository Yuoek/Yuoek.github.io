<h1 class="title-poem">The Serpent's Legacy</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/06/daley.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Victor James Daley</h2>
<p>An Apple caused man’s fall, as some believe;<br />
   But that old Snake, malevolently wise,<br />
A deadlier snare set when he left to Eve<br />
   His tongue of honey and mesmeric eyes.</p>
