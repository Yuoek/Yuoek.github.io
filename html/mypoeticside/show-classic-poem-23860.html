<h1 class="title-poem">The Peacock Has A Score Of Eyes</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>The peacock has a score of eyes,<br />
With which he cannot see;<br />
The cod-fish has a silent sound,<br />
However that may be;<br />
No dandelions tell the time,<br />
Although they turn to clocks;<br />
Cat's-cradle does not hold the cat,<br />
Nor foxglove fit the fox.</p>
