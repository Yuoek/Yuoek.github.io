<h1 class="title-poem">A Weight with Needles on the pounds</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>264<br />
<br />
A Weight with Needles on the pounds—<br />
To push, and pierce, besides—<br />
That if the Flesh resist the Heft—<br />
The puncture—coolly tries—<br />
<br />
That not a pore be overlooked<br />
Of all this Compound Frame—<br />
As manifold for Anguish—<br />
As Species—be—for name—</p>
