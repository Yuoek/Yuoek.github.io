<h1 class="title-poem">Social Note</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/dorothy-parker.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Dorothy Parker</h2>
<p>Lady, lady, should you meet<br />
One whose ways are all discreet,<br />
One who murmurs that his wife<br />
Is the lodestar of his life,<br />
One who keeps assuring you<br />
That he never was untrue,<br />
Never loved another one . . .<br />
 Lady, lady, better run!</p>
