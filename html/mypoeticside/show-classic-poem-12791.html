<h1 class="title-poem">To His Paternal Country</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>O earth!  earth!  earth!  hear thou my voice, and be<br />
Loving and gentle for to cover me!<br />
Banish'd from thee I live;--ne'er to return,<br />
Unless thou giv'st my small remains an urn.</p>
