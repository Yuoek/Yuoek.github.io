<h1 class="title-poem">The Early Morning.</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>The moon on the one hand, the dawn on the other:<br />
The moon is my sister, the dawn is my brother.<br />
The moon on my left and the dawn on my right.<br />
My brother, good morning: my sister, good night.</p>
