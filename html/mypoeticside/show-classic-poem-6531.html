<h1 class="title-poem">Many red devils ran from my heart</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Many red devils ran from my heart<br />
And out upon the page,<br />
They were so tiny<br />
The pen could mash them.<br />
And many struggled in the ink.<br />
It was strange<br />
To write in this red muck<br />
Of things from my heart.</p>
