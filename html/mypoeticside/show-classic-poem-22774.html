<h1 class="title-poem">And the Days Are Not Full Enough</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/ezra-pound.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Ezra Pound</h2>
<p>And the days are not full enough<br />
And the nights are not full enough<br />
And life slips by like a field mouse<br />
      Not shaking the grass</p>
