<h1 class="title-poem">Brownie, Brownie, Let Down Your Milk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Brownie, Brownie, let down your milk<br />
White as swansdown and smooth as silk,<br />
Fresh as dew and pure as snow:<br />
For I know where the cowslips blow,<br />
And you shall have a cowslip wreath<br />
No sweeter scented than your breath.</p>
