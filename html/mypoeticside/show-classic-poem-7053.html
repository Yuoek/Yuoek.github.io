<h1 class="title-poem">Corona Inutilis</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/08/IMG_3182.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">James Lister Cuthbertson</h2>
<p>I TWINED a wreath of heather white  <br />
 To bind my lady’s hair,  <br />
And deemed her locks in even light  <br />
 Would well the burden bear;  <br />
But when I saw the tresses brown,          <br />
 And found the face so fair,  <br />
I tore the wreath, and left the crown  <br />
 Of beauty only there.</p>
