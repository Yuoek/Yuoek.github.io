<h1 class="title-poem">Not all die early, dying young</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Not all die early, dying young—<br />
Maturity of Fate<br />
Is consummated equally<br />
In Ages, or a Night—<br />
<br />
A Hoary Boy, I've known to drop<br />
Whole statured—by the side<br />
Of Junior of Fourscore—'twas Act<br />
Not Period—that died.</p>
