<h1 class="title-poem">The Fallen Oak</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/Sarah-Orne-Jewett.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sarah Orne Jewett</h2>
<p>Where the oak fell, a great road leads away,<br />
Across the country to the door of day,<br />
To find no ending where the sky begins:—<br />
What the oak knew our larger outlook wins.</p>
