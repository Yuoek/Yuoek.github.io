<h1 class="title-poem">Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>Oh roses for the flush of youth,<br />
And laurel for the perfect prime;<br />
But pluck an ivy branch for me<br />
Grown old before my time.<br />
<br />
<br />
Oh violets for the grave of youth,<br />
And bay for those dead in their prime;<br />
Give me the withered leaves I chose<br />
Before in the old time.</p>
