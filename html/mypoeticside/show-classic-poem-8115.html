<h1 class="title-poem">This Bauble was preferred of Bees</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>805<br />
<br />
This Bauble was preferred of Bees—<br />
By Butterflies admired<br />
At Heavenly—Hopeless Distances—<br />
Was justified of Bird—<br />
<br />
Did Noon—enamel—in Herself<br />
Was Summer to a Score<br />
Who only knew of Universe—<br />
It had created Her.</p>
