<h1 class="title-poem">The Chemical conviction</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>954<br />
<br />
The Chemical conviction<br />
That Nought be lost<br />
Enable in Disaster<br />
My fractured Trust—<br />
<br />
The Faces of the Atoms<br />
If I shall see<br />
How more the Finished Creatures<br />
Departed me!</p>
