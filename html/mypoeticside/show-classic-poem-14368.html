<h1 class="title-poem">To A Ten-Months' Child</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/donald.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Donald Justice</h2>
<p>Late arrival, no<br />
One would think of blaming you<br />
For hesitating so.<br />
<br />
Who, setting his hand to knock<br />
At a door so strange as this one,<br />
Might not draw back?</p>
