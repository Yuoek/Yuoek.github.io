<h1 class="title-poem">To A Mocking Bird</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/07/tockard.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Jerome Stockard</h2>
<p>The name thou wearest does thee grievous wrong.  <br />
 No mimic thou! That voice is thine alone!  <br />
The poets sing but strains of Shakespeare’s song;  <br />
 The birds, but notes of thine imperial own!</p>
