<h1 class="title-poem">Memory of April</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/williamcarloswilliams.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Carlos Williams</h2>
<p>You say love is this, love is that:<br />
Poplar tassels, willow tendrils<br />
the wind and the rain comb,<br />
tinkle and drip, tinkle and drip--<br />
branches drifting apart. Hagh!<br />
Love has not even visited this country.</p>
