<h1 class="title-poem">Prayer for a profusion of sunflowers</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/09/alowell.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Amy Lowell</h2>
<p>Send sunflowers!<br />
With my turkey-bone whistle<br />
I am calling the birds<br />
To sing upon the sunflowers.<br />
For when the clouds hear them singing<br />
They will come quickly,<br />
And rain will fall upon our fields.<br />
Send sunflowers!</p>
