<h1 class="title-poem">A Thought From Propertius</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/William-Butler-Yeats.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Butler Yeats</h2>
<p>SHE might, so noble from head<br />
To great shapely knees<br />
The long flowing line,<br />
Have walked to the altar<br />
Through the holy images<br />
At pallas Athene's Side,<br />
Or been fit spoil for a centaur<br />
Drunk with the unmixed wine.</p>
