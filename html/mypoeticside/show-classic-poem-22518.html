<h1 class="title-poem">Mountain Drinking Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Li-Po.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Li Po</h2>
<p>To drown the ancient sorrows,<br />
we drank a hundred jugs of wine<br />
there in the beautiful night.<br />
We couldn't go to bed with the moon so bright.<br />
<br />
The finally the wine overcame us<br />
and we lay down on the empty mountain--<br />
the earth for a pillow,<br />
and a blanket made of heaven.</p>
