<h1 class="title-poem">Dropped into the Ether Acre</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>665<br />
<br />
Dropped into the Ether Acre—<br />
Wearing the Sod Gown—<br />
Bonnet of Everlasting Laces—<br />
Brooch—frozen on—<br />
<br />
Horses of Blonde—and Coach of Silver—<br />
Baggage a strapped Pearl—<br />
Journey of Down—and Whip of Diamond—<br />
Riding to meet the Earl—</p>
