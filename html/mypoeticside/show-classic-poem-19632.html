<h1 class="title-poem">There Once Was an Old Monk of Basing</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/08/monkhouse.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Cosmo Monkhouse</h2>
<p>There once was an old monk of Basing,<br />
    Whose salads were something amazing;<br />
        But he told his confessor<br />
        That Nebuchadnezzar<br />
    Had given him hints upon grazing.</p>
