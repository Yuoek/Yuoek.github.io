<h1 class="title-poem">Delirij</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/Srecko.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Srecko Kosovel</h2>
<p>Martirij misli.<br />
Sinje morje.<br />
Siva jeca.<br />
Vojak nabada misli obupne<br />
na svoj bajonet<br />
pred oknom.<br />
Pardon. »O, nic.«<br />
Sigaretta.<br />
Eine Edison.<br />
Cujem sinje morje,<br />
ki bije enakomerno<br />
ob mojo lobanjo.</p>
