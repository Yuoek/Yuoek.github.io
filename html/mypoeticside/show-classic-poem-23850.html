<h1 class="title-poem">I Dreamt I Caught A Little Owl</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>‘I dreamt I caught a little owl<br />
And the bird was blue -’<br />
‘But you may hunt for ever<br />
And not find such a one.’<br />
‘I dreamt I set a sunflower,<br />
And red as blood it grew -’<br />
‘But such a sunflower never<br />
Bloomed beneath the sun.’</p>
