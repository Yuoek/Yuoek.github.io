<h1 class="title-poem">Her breast is fit for pearls</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>84<br />
<br />
Her breast is fit for pearls,<br />
But I was not a "Diver"—<br />
Her brow is fit for thrones<br />
But I have not a crest.<br />
Her heart is fit for home—<br />
I—a Sparrow—build there<br />
Sweet of twigs and twine<br />
My perennial nest.</p>
