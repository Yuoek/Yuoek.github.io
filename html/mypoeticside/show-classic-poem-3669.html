<h1 class="title-poem">On Reading a Recent Greek Poet</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/brecht.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bertolt Brecht</h2>
<p>After the wailing had already begun<br />
along the walls, their ruin certain,<br />
the Trojans fidgeted with bits of wood<br />
in the three-ply doors, itsy-bitsy<br />
pieces of wood, fussing with them.<br />
And began to get their nerve back and feel hopeful.</p>
