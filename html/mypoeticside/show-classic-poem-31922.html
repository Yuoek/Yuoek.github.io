<h1 class="title-poem">The Mocking-Bird</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Henry-Van-Dyke.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Henry Van Dyke</h2>
<p>In mirth he mocks the other birds at noon,<br />
Catching the lilt of every easy tune;<br />
But when the day departs he sings of love,--<br />
His own wild song beneath the listening moon.</p>
