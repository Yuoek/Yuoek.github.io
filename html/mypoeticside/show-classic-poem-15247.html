<h1 class="title-poem">In Error</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/08/kipling.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rudyard Kipling</h2>
<p>They burnt a corpse upon the sand--<br />
The light shone out afar;<br />
It guided home the plunging dhows<br />
That beat from Zanzibar.<br />
Spirit of Fire, where'er Thy altars rise,<br />
Thou art the Light of Guidance to our eyes!</p>
