<h1 class="title-poem">I want—it pleaded—All its life—</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>"I want"—it pleaded—All its life—<br />
I want—was chief it said<br />
When Skill entreated it—the last—<br />
And when so newly dead—<br />
<br />
I could not deem it late—to hear<br />
That single—steadfast sigh—<br />
The lips had placed as with a "Please"<br />
Toward Eternity—</p>
