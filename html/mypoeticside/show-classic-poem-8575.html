<h1 class="title-poem">Beauty—be not caused—It Is</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>516<br />
<br />
Beauty—be not caused—It Is—<br />
Chase it, and it ceases—<br />
Chase it not, and it abides—<br />
<br />
Overtake the Creases<br />
<br />
In the Meadow—when the Wind<br />
Runs his fingers thro' it—<br />
Deity will see to it<br />
That You never do it—</p>
