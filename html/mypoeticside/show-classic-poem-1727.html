<h1 class="title-poem">This Little Bag</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/janeausten.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Jane Austen</h2>
<p>This little bag I hope will prove <br />
To be not vainly made-- <br />
For, if you should a needle want <br />
It will afford you aid. <br />
And as we are about to part <br />
T'will serve another end, <br />
For when you look upon the Bag <br />
You'll recollect your friend</p>
