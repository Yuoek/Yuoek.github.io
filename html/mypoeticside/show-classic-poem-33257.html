<h1 class="title-poem">A Reply</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/09/Wang-Wei.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Wang Wei</h2>
<p>I have a place on the Chungnan slopes.<br />
       Sitting there you can see the Mountains.<br />
       No one there, no guests, the gate is closed.<br />
       No plans all day, just time and silence.<br />
       Nothing stops you gazing and dreaming.<br />
       Why not come and try to find me there?</p>
