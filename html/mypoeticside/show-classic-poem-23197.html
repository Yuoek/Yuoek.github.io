<h1 class="title-poem">Debris</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/01/loa.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lola Ridge</h2>
<p>I love those spirits<br />
That men stand off and point at,<br />
Or shudder and hood up their souls -<br />
Those ruined ones,<br />
Where Liberty has lodged an hour<br />
And passed like flame,<br />
Bursting asunder the too small house.</p>
