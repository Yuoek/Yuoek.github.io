<h1 class="title-poem">Sleepwalk</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/05/gerrit.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Gerrit Achterberg</h2>
<p>Tonight I have walked with you<br />
along the deaf lanes of sleep,<br />
and now that it is morning<br />
nothing has changed,<br />
other than that the two who during the night<br />
were completely together<br />
have left me once again this morning<br />
and continued together further on their way.</p>
