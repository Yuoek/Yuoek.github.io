<h1 class="title-poem">My Youth</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/William-Henry-Davies.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">William Henry Davies</h2>
<p>My youth was my old age,<br />
  Weary and long;<br />
It had too many cares<br />
  To think of song;<br />
My moulting days all came<br />
  When I was young.<br />
<br />
Now, in life's prime, my soul<br />
  Comes out in flower;<br />
Late, as with Robin, comes<br />
  My singing power;<br />
I was not born to joy<br />
  Till this late hour.</p>
