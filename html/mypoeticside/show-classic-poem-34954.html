<h1 class="title-poem">The Pekingese</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/12/elin.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Elinor Morton Hoyt Wylie</h2>
<p>For a picture<br />
<br />
This Pekingese, that makes the sand-grains spin,<br />
Is digging little tunnels to Pekin:<br />
Dream him emerging in a porcelain cave<br />
Where wounded dragons stain a pearly wave.</p>
