<h1 class="title-poem">Fanfares</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>In the old days<br />
At barn raisings<br />
After they worked together<br />
They danced together.<br />
So lay the floor, Americans,<br />
Put up the beams,<br />
Ceil the roof,<br />
Then ready with the fiddles<br />
Now choose your partners,<br />
This is our time, our own, our only<br />
        time.<br />
Together we make<br />
Today.</p>
