<h1 class="title-poem">All Circumstances are the Frame</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>820<br />
<br />
All Circumstances are the Frame<br />
In which His Face is set—<br />
All Latitudes exist for His<br />
Sufficient Continent—<br />
<br />
The Light His Action, and the Dark<br />
The Leisure of His Will—<br />
In Him Existence serve or set<br />
A Force illegible.</p>
