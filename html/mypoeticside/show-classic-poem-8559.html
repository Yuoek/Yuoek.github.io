<h1 class="title-poem">Ambition cannot find him</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>68<br />
<br />
Ambition cannot find him.<br />
Affection doesn't know<br />
How many leagues of nowhere<br />
Lie between them now.<br />
<br />
Yesterday, undistinguished!<br />
Eminent Today<br />
For our mutual hone, Immortality!</p>
