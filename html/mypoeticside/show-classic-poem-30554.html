<h1 class="title-poem">Song At Capri</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Sara-Teasdale.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sara Teasdale</h2>
<p>When beauty grows too great to bear<br />
How shall I ease me of its ache,<br />
For beauty more than bitterness<br />
Makes the heart break.<br />
<br />
Now while I watch the dreaming sea<br />
With isles like flowers against her breast,<br />
Only one voice in all the world<br />
Could give me rest.</p>
