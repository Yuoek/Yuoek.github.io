<h1 class="title-poem">On the Little God</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/hillaire.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Hilaire Belloc</h2>
<p>Of all the gods that gave me all their glories<br />
To-day there deigns to walk with me but one.<br />
I lead him by the hand and tell him stories.<br />
It is the Queen of Cyprus' little son.</p>
