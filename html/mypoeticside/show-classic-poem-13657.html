<h1 class="title-poem">My People</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/langston-hughes.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Langston Hughes</h2>
<p>The night is beautiful,<br />
So the faces of my people.<br />
<br />
The stars are beautiful,<br />
So the eyes of my people.<br />
<br />
Beautiful, also, is the sun.<br />
Beautiful, also, are the souls of my people.</p>
