<h1 class="title-poem">Work</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/04/gen.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Genevieve Taggard</h2>
<p>The idle are the sad.<br />
Our day has work to do.<br />
Our day's necessity<br />
Our will<br />
Is work.<br />
Lung and throat of the people<br />
Body and breath,<br />
Palate and tongue,<br />
Heart and will,<br />
We rivet hand to hand.</p>
