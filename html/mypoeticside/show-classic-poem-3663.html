<h1 class="title-poem">To Be Read in the Morning and at Night</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/brecht.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Bertolt Brecht</h2>
<p>My love<br />
Has told me<br />
That he needs me.<br />
<br />
That's why<br />
I take good care of myself<br />
Watch out where I'm going and<br />
Fear that any drop of rain<br />
Might kill me.</p>
