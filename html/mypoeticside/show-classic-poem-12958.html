<h1 class="title-poem">The Old Wives' Prayer</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/Robert-Herrick.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Herrick</h2>
<p>Holy-Rood, come forth and shield<br />
Us i' th' city and the field;<br />
Safely guard us, now and aye,<br />
From the blast that burns by day;<br />
And those sounds that us affright<br />
In the dead of dampish night;<br />
Drive all hurtful fiends us fro,<br />
By the time the cocks first crow.</p>
