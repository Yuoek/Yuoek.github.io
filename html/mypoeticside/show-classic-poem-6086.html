<h1 class="title-poem">I ask of thee, love, nothing but relief</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/03/MEC.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Mary Elizabeth Coleridge</h2>
<p>I ask of thee, love, nothing but relief.<br />
Thou canst not bring the old days back again;<br />
For I was happy then,<br />
Not knowing heavenly joy, not knowing grief</p>
