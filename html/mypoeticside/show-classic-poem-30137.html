<h1 class="title-poem">The Gardener LI: Then Finish the Last Song</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/07/tagore.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rabindranath Tagore</h2>
<p>Then finish the last song and let us<br />
leave.<br />
    Forget this night when the night is<br />
no more.<br />
    Whom do I try to clasp in my<br />
arms? Dreams can never be made captive.<br />
    My eager hands press emptiness to<br />
my heart and it bruises my breast.</p>
