<h1 class="title-poem">Epigram</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/lamb.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Charles Lamb</h2>
<p>(Written in the last reign.)<br />
<br />
Ye Politicians, tell me, pray,<br />
Why thus with woe and care rent?<br />
This is the worst that you can say,<br />
Some wind has blown the wig away,<br />
And left the hair apparent.</p>
