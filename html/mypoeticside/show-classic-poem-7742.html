<h1 class="title-poem">The Looking Glass</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/09/CJD.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Clarence Michael James Dennis</h2>
<p>When I look into the looking glass<br />
  I'm always sure to see -<br />
No matter how I dodge about -<br />
  Me, looking out at me.<br />
<br />
I often wonder as I look,<br />
  And those strange features spy,<br />
If I, in there, think I'm as plain<br />
  As I, out here, think I.</p>
