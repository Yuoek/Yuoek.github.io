<h1 class="title-poem">Falcons</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Raymond-Queneau.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Raymond Queneau</h2>
<p>The falcons break their dandies<br />
And leave the printed lazurite,<br />
And up from indumentum glances<br />
The silver saker of dearth.<br />
<br />
The canellas burn their soffioni,<br />
The blobs let through the deans,<br />
The young manchet feels his podleys<br />
And wonders what's to pay.</p>
