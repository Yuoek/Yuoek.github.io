<h1 class="title-poem">The Rose Family</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/robert_frost.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Robert Frost</h2>
<p>The rose is a rose,<br />
And was always a rose.<br />
But the theory now goes<br />
That the apple's a rose,<br />
And the pear is, and so's<br />
The plum, I suppose.<br />
The dear only knows<br />
What will next prove a rose.<br />
You, of course, are a rose -<br />
But were always a rose.</p>
