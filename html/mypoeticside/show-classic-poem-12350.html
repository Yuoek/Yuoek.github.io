<h1 class="title-poem">Suburban Dames</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/11/lesbia.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Lesbia Harford</h2>
<p>All day long<br />
We sew fine muslin up for you to wear,<br />
Muslin that women wove for you elsewhere,<br />
A million strong.<br />
<br />
Just like flames,<br />
Insatiable, you eat up all our hours,<br />
And sun and loves and talk and flowers,<br />
Suburban dames.</p>
