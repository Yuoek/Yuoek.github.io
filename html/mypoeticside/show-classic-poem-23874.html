<h1 class="title-poem">O Sailor, Come Ashore</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>O sailor, come ashore,<br />
What have you brought for me?<br />
Red coral, white coral,<br />
Coral from the sea.<br />
I did not dig it from the ground,<br />
Nor pluck it from a tree;<br />
Feeble insects made it<br />
In the stormy sea.</p>
