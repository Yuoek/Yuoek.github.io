<h1 class="title-poem">A Route of Evanescence</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>A Route of Evanescence<br />
With a revolving Wheel--<br />
A Resonance of Emerald--<br />
A Rush of Cochineal--<br />
And every Blossom on the Bush<br />
Adjusts its tumbled Head--<br />
The mail from Tunis, probably,<br />
An easy Morning's Ride--</p>
