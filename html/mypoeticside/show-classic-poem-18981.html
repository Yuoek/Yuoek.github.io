<h1 class="title-poem">Just Done</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2023/08/Sadiq_1.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Yuan Mei</h2>
<p> All the heart needs is a home<br />
<br />
in which to dwell in the quiet.<br />
<br />
The flavor of desirelessness<br />
<br />
lasts longest.<br />
<br />
<br />
<br />
So a boy runs off<br />
<br />
to snatch at floating willow silks...<br />
<br />
If he didn't capture them<br />
<br />
how could he let them go?</p>
