<h1 class="title-poem">The Virtue Of Woman</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/12/Freidrich-Schiller.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Friedrich von Schiller</h2>
<p>Man of virtue has need;-into life with boldness he plunges,<br />
 Entering with fortune more sure into the hazardous strife;<br />
But to woman one virtue suffices; it is ever shining<br />
 Lovingly forth to the heart; so let it shine to the eye!</p>
