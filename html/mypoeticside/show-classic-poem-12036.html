<h1 class="title-poem">Two Bouts of Woe</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/02/nagid.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Samuel ha-Nagid</h2>
<p>Consider how shameful rejoicing is,<br />
Since it comes between two bouts of woe.<br />
You wept when you came into this world,<br />
And another mourns you when you go.</p>
