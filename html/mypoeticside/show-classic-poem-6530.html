<h1 class="title-poem">Once there was a man</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2016/05/crane.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Stephen Crane</h2>
<p>Once there was a man --<br />
Oh, so wise!<br />
In all drink<br />
He detected the bitter,<br />
And in all touch<br />
He found the sting.<br />
At last he cried thus:<br />
"There is nothing --<br />
No life,<br />
No joy,<br />
No pain --<br />
There is nothing save opinion,<br />
And opinion be damned."</p>
