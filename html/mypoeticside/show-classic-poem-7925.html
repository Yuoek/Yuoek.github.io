<h1 class="title-poem">How the Waters closed above Him</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>923<br />
<br />
How the Waters closed above Him<br />
We shall never know—<br />
How He stretched His Anguish to us<br />
That—is covered too—<br />
<br />
Spreads the Pond Her Base of Lilies<br />
Bold above the Boy<br />
Whose unclaimed Hat and Jacket<br />
Sum the History—</p>
