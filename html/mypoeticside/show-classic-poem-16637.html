<h1 class="title-poem">There Was an Old Man in a Tree</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/edward-lear.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Edward Lear</h2>
<p>There was an Old Man in a tree,<br />
Who was horribly bored by a bee.<br />
When they said "Does it buzz?"<br />
He replied "Yes, it does!<br />
It's a regular brute of a bee!"</p>
