<h1 class="title-poem">Gliding Over All</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/06/walt-whitman.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Walt Whitman</h2>
<p>GLIDING o'er all, through all,<br />
Through Nature, Time, and Space,<br />
As a ship on the waters advancing,<br />
The voyage of the soul--not life alone,<br />
Death, many deaths I'll sing.</p>
