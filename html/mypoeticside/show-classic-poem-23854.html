<h1 class="title-poem">The Summer Nights Are Short</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>The summer nights are short<br />
Where northern days are long:<br />
For hours and hours lark after lark<br />
Trills out his song.<br />
The summer days are short<br />
Where southern nights are long:<br />
Yet short the night when nightingales<br />
Trill out their song.</p>
