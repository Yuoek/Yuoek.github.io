<h1 class="title-poem">Our lives are Swiss—</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2009/07/emily_dickinson.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Emily Dickinson</h2>
<p>Our lives are Swiss—<br />
So still—so Cool—<br />
Till some odd afternoon<br />
The Alps neglect their Curtains<br />
And we look farther on!<br />
<br />
Italy stands the other side!<br />
While like a guard between—<br />
The solemn Alps—<br />
The siren Alps<br />
Forever intervene!</p>
