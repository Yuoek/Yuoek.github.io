<h1 class="title-poem">Lover's Gifts V: I Would Ask For Still More</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2013/07/tagore.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Rabindranath Tagore</h2>
<p>I would ask for still more, if I had the sky with all its stars,<br />
and the world with its endless riches; but I would be content with<br />
the smallest corner of this earth if only she were mine.</p>
