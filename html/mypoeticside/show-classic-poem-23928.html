<h1 class="title-poem">What do the stars do</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/07/rossetti-29sk6s9-246x300.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Christina Georgina Rossetti</h2>
<p>What do the stars do<br />
Up in the sky,<br />
Higher than the wind can blow,<br />
Or the clouds can fly?<br />
Each star in its own glory<br />
Circles, circles still;<br />
As it was lit to shine and set,<br />
And do its Maker's will.</p>
