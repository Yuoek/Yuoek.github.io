<h1 class="title-poem">Upon the death of Sir Albert Morton's Wife</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2015/05/Sir-Henry-Wotton.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Sir Henry Wotton</h2>
<p>He first deceased; she for a little tried<br />
To live without him, liked it not, and died.</p>
