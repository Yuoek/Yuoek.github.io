<h1 class="title-poem">From: Green Lions</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/10/Douglas-Stewart.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Douglas Stewart</h2>
<p>The bay is gouged by the wind.<br />
In the jagged hollows green lions crouch<br />
and stretch<br />
and slouch<br />
and sudden with spurting manes and a glitter of haunches<br />
charge at the shore<br />
and rend the sand and roar.</p>
