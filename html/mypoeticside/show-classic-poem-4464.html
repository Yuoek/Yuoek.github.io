<h1 class="title-poem">Of Man By Nature</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/11/John-Bunyan.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">John Bunyan</h2>
<p>From God he's a backslider,<br />
Of ways he loves the wider;<br />
With wickedness a sider,<br />
More venom than a spider.<br />
In sin he's a considerer,<br />
A make-bate and divider;<br />
Blind reason is his guider,<br />
The devil is his rider.</p>
