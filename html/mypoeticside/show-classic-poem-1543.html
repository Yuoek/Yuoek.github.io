<h1 class="title-poem">L'Adieu</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2014/08/Guillaume-Apollinaire.jpg);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Guillaume Apollinaire</h2>
<p>J'ai cueilli ce brin de bruyère<br />
L'automne est morte souviens-t'en<br />
Nous ne nous verrons plus sur terre<br />
Odeur du temps Brin de bruyère<br />
Et souviens-toi que je t'attends</p>
