<h1 class="title-poem">On Rupert Brooke</h1>
                <div class="post-autor"><div style="background:url(https://mypoeticside.com/wp-content/uploads/2017/01/FDC.png);background-size: cover;width:120px;height:120px" alt="" /></div>
                    <h2 class="title-content">Frances Darwin Cornford</h2>
<p>A young Apollo, golden-haired,<br />
Stands dreaming on the verge of strife,<br />
Magnificently unprepared<br />
For the long littleness of life.</p>
