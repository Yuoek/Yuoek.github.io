
<p>Once our idea of heaven meant<br />
all the dead relatives waiting<br />
on the kept lawn of the many mansions<br />
as if, suddenly sinless, they had nothing<br />
to do.</p>
<p>...heaven may be<br />
only the mind's fear of the wonders it imagines.</p>
<p>Now a doll found naked in a ditch<br />
eyes rusted open, is blasphemy.</p>
