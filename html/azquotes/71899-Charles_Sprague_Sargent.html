
<p>Be purity of life the test, leave to the heart, to heaven the rest.</p>
<p>Who never found what good from science grew,<br />
Save the grand truth, that one and one make two.</p>
<p>Yes, social friend, I love thee well,<br />
In learned doctor's spite;<br />
Thy clouds all other clouds dispel<br />
And lap me in delight.</p>
