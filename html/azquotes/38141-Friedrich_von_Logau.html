
<p>Though the mills of God grind slowly, yet they grind exceeding small.</p>
<p>Man-like is it to fall into sin, <br />
Fiend-like is it to dwell therein; <br />
Christ-like is it for sin to grieve, <br />
God-like is it all sin to leave.</p>
<p>What use is it that knowledge mounts? It's knowing something good that counts.</p>
