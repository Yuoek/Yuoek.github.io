
<p>Silence is a sounding thing, To one who listens hungrily</p>
<p>I want to feel the surging<br />
Of my sad people's soul<br />
Hidden by a minstrel-smile.</p>
<p>I want to hear the chanting<br />
Around a heathen fire<br />
Of a strange black race.</p>
<p>All eager-lipped I kissed the mouth of Death.</p>
