
<p>Are there rules about betting on baseball games? Yeah--you have to stay away from the Padres.</p>
<p>Imagination might be scarier than reality ... but not by much.</p>
<p>Belief was immune to logic; it operated by its own laws.</p>
<p>It took years of wear and tear before idealism crumbled like so much bric-a-brac.</p>
