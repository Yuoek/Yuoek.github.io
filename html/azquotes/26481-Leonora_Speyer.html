
<p>The trees are God's great alphabet: <br />
With them <br />
He writes in shining green <br />
Across the world <br />
His thoughts serene.</p>
<p>Love has a hundred gentle ends.</p>
<p>To be exact has naught to do with pedantry or dogma.</p>
<p>I believe in anthologies, although I know they offer only a glimpse.</p>
