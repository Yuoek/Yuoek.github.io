
<p>Go, forget me! why should sorrow <br />
O'er that brow a shadow fling? <br />
Go, forget me, and to-morrow <br />
Brightly smile and sweetly sing! <br />
Smile,—though I shall not be near thee; <br />
Sing,—though I shall never hear thee!</p>
<p>Those who do remember it will find new ways to screw it up.</p>
