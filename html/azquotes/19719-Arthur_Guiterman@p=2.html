
<p>The Deer don't dineWhen a Wolf's about,And the PorcupineSticks his quill-points out.</p>
<p>I hope the Vandals had thorns in their sandals</p>
<p>The Cat on your hearthstone to this day presages, By solemnly sneezing, the coming of rain!</p>
<p>Until the Donkey tried to clear The Fence, he thought himself a Deer.</p>
