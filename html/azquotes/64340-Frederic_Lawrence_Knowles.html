
<p>The night walked down the sky with the moon in her hand.</p>
<p>For me the motley and the bauble, yea,<br />
Though all be vanity, as the Preacher saith,<br />
The mirth of love be mine for one brief breath!</p>
<p>I find no foeman in the road but fear; to doubt is failure and to dare success.</p>
