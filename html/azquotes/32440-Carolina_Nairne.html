
<p>There 's nae sorrow there, John, There 's neither cauld nor care, John, The day is aye fair, In the land o' the leal.</p>
<p>Gude nicht, and joy be wi' you a'.</p>
<p>[On Bonnie Prince Charlie:] Oh, Charlie is my darling, / My darling, my darling; / Oh, Charlie is my darling, / The young Chevalier.</p>
