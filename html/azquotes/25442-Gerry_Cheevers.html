
<p>We goaltenders tend to be very proud bastards.</p>
<p>Roses are red, violets are blue, they got ten, we only got two.</p>
<p>Sometimes you think they must have come out of the chimp cages at the Bronx zoo.</p>
<p>In golf I am one under; one under a tree, one under a rock, and one under a bush.</p>
