
<p>I shall be a good politician. Even if it kills me. Or if it kills anyone else, for that matter.</p>
<p>My heart is in the coffin there with Caesar</p>
<p>Friends, Romans, Countrymen, lend me your ears.</p>
<p>When Caesar says, 'do this,' it is perform'd.</p>
<p>You, boy, who owe everything to a name</p>
