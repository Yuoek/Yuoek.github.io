
<p>The tree of liberty grows only when watered by the blood of tyrants.</p>
<p>In spite of their hats being very ugly, Goddam! I love the English.</p>
<p>L'arbre de la liberté croît lorsqu'il est arrosé du sang de toute espèce de tyrans (The tree of liberty grows only when watered by the blood of tyrants).</p>
