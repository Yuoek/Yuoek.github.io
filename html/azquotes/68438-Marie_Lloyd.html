
<p>A little of what you fancy does you good.</p>
<p>My old man said, `Follow the van, Don't dilly-dally on the way!'<br />
But I dillied and dallied, dallied and dillied,<br />
Lost the van and don't know where to roam.</p>
<p>You can't trust the 'specials' like the old time 'coppers' When you can't find your way home.</p>
