
<p>an uneasy rhythm of life is more life like than an easy death</p>
<p>Every morning <br />
I wake up with the news<br />
of bloodshed.<br />
I feel my body,<br />
desperate to know whether<br />
I'm still alive.</p>
<p>I salute my desires with a bow.<br />
were it not for them to come and play<br />
mind would be empty just like me.</p>
