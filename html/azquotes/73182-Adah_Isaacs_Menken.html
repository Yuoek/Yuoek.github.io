
<p>Good women are rarely clever and clever women are rarely good.</p>
<p>There is a graveyard in my poor heart - dark, heaped-up graves, from which no flowers spring.</p>
<p>There is no such thing as unfortunate genius; if a man or woman is fit for work, God appoints the field.</p>
<p>Life is a lie, and Love a cheat.</p>
