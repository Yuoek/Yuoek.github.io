
<p>Distrust my wisdom, but regard my truth.</p>
<p>Fragrant o'er all the western groves The tall magnolia towers unshaded.</p>
<p>Love and hope are twins.</p>
<p>The full-blown rose, mid dewy sweets Most perfect dies.</p>
<p>How can I no longer bear my weary doom? Alas! what have I gain'd for all I lost?</p>
