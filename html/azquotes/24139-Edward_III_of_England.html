
<p>Evil to him who evil thinks.</p>
<p>Of the Black Prince [his son] at Crécy, 1345: Let the boy win his spurs. [Old English] Also say to them, that they suffre hym this day to wynne his spurres, for if god be pleased, I woll this iourney be his, and the honoure therof.</p>
<p>Let the boy win his spurs.</p>
