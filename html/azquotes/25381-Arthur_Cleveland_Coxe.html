
<p>Tis the night - the night<br />
Of the grave's delight,<br />
And the warlocks are at their play;<br />
Ye think that without<br />
The wild winds shout,<br />
But no, it is they - it is they.</p>
<p>Flowers are words which even a baby can understand.</p>
<p>'Tis the night - the night Of the grave's delight.</p>
