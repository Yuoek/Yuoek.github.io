
<p>Great sorrows have no leisure to complain:<br />
Least ills vent forth, great griefs within remain.</p>
<p>My rage is not malicious; like a spark<br />
Of fire by steel inforced out of a flint<br />
It is no sooner kindled, but extinct.</p>
<p>The sweetest cordial we receive at last,<br />
Is conscience of our virtuous actions past.</p>
