<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Toc_mypoeticside</title>
<meta name="description" content="Toc_mypoeticside。" />
<meta name="keywords" content="纯CSS,样式控制,折叠展开,菜单,效果,特效演示" />
<meta name="author" content="jQuery插件库" />
<meta name="Copyright" content="jQuery插件库" />
<style>
* {
margin: 0;
padding: 0;
}
a {
text-decoration: none;
}
#conter {
width: 1000px;
margin: auto;
}
#help-left {
width: auto;
font-family: 'microsoft YaHei';
float: left;
}
.menu {
border-left: 1px solid #3cbfb3;
border-right: 1px solid #3cbfb3;
}
.menu:last-child {
border-bottom: 1px solid #3cbfb3;
}
.menu summary {
height: 40px;
line-height: 40px;
text-indent: 10px;
outline: none;
font-size: 14px;
font-weight: 700;
border-top: 1px solid #3cbfb3;
background: -webkit-gradient(linear, left top, left bottom, color-stop(0, #FEFEFE), color-stop(1, #fff0));
cursor: pointer;
display: flex;
}
/*使用下面这个，可以去掉小三角，神奇的菜单就可以完成了*/
.menu summary::-webkit-details-marker {
}
.menu summary:before {
content: "🌸";
display: inline-block;
width: 16px;
height: 16px;
margin-right: 10px;
font-size: 18px;
font-weight: 700;
}
.menu[open] summary:before {
content: "🕊️";
}
.menu ul {
padding: 10px 0;
}
.menu ul li {
list-style: none;
text-indent: 25px;
font-size: 12px;
height: 30px;
line-height: 30px;
}
.menu ul li a {
display: block;
color: #096868;
}
.menu ul li a:hover {
text-decoration: underline;
}
</style>
</head>
<body>
<section id="conter">
<section id="help-left">
<!--open为展开菜单，close为折叠菜单-->
<details class="menu" close>
<summary>Xavier Villaurrutia Poems</summary>
<ul>
<li><a href="../../mypoeticside/show-classic-poem-32200.html" target="A">Love Is An Anguish, A Question</a></li>
<li><a href="../../mypoeticside/show-classic-poem-32201.html" target="A">Nocturne: Nothing Is Heard</a></li>
<li><a href="../../mypoeticside/show-classic-poem-32202.html" target="A">Nocturne: The Angels</a></li>
<li><a href="../../mypoeticside/show-classic-poem-32203.html" target="A">Nocturne: The Bedroom</a></li>
</ul>
</details><details class="menu" close>
<summary>Xenophanes Poems</summary>
<ul>
<li><a href="../../mypoeticside/show-classic-poem-34984.html" target="A">War Memories</a></li>
</ul>
</details>
</section>
<section id="help-right"></section>
</section>
</body>
</html>
